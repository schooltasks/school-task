<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>SchoolTask - Биржа поручений</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', 'Inter', system-ui; }
        body { background: linear-gradient(145deg, #f0f4fa 0%, #e2e8f0 100%); min-height: 100vh; padding: 20px; }
        .app-container { max-width: 1300px; margin: 0 auto; }
        .header { background: white; border-radius: 32px; padding: 16px 28px; margin-bottom: 28px; display: flex; flex-wrap: wrap; align-items: center; justify-content: space-between; gap: 15px; box-shadow: 0 8px 20px rgba(0,0,0,0.05); }
        .logo h1 { font-size: 1.8rem; background: linear-gradient(135deg, #1e2b3c, #2c4c6e); -webkit-background-clip: text; background-clip: text; color: transparent; }
        .user-info { display: flex; align-items: center; gap: 25px; background: #f8fafc; padding: 8px 20px; border-radius: 60px; }
        .balance-card { background: #eef2ff; padding: 6px 16px; border-radius: 40px; font-weight: bold; color: #1e3a5f; }
        .balance-card span { font-size: 1.3rem; color: #0f2b3d; }
        .logout-btn { background: none; border: none; color: #7f8c8d; cursor: pointer; font-size: 0.9rem; padding: 6px 12px; border-radius: 30px; }
        .logout-btn:hover { background: #e2e8f0; }
        .nav-menu { display: flex; gap: 12px; flex-wrap: wrap; margin-bottom: 25px; }
        .nav-btn { background: white; border: none; padding: 12px 28px; border-radius: 60px; font-weight: 600; font-size: 1rem; cursor: pointer; color: #2d3e50; }
        .nav-btn.active { background: #1e4a6e; color: white; }
        .tasks-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(340px, 1fr)); gap: 24px; margin-top: 20px; }
        .task-card { background: white; border-radius: 28px; padding: 20px; box-shadow: 0 8px 20px rgba(0,0,0,0.05); }
        .task-header { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 12px; }
        .task-price { font-size: 1.7rem; font-weight: 800; color: #2b6e4f; }
        .task-school { background: #eef2ff; padding: 5px 12px; border-radius: 30px; font-size: 0.75rem; font-weight: 600; }
        .task-desc { font-size: 1.1rem; margin: 15px 0; color: #1e2a36; }
        .task-meta { font-size: 0.75rem; color: #5f7f9e; margin-bottom: 16px; }
        .take-btn, .delete-btn, .edit-btn { width: 100%; border: none; padding: 12px; border-radius: 40px; font-weight: bold; cursor: pointer; margin-top: 8px; }
        .take-btn { background: #1f6392; color: white; }
        .take-btn:hover { background: #0e4b70; }
        .take-btn:disabled { background: #b9cddf; cursor: not-allowed; }
        .delete-btn { background: #dc2626; color: white; }
        .delete-btn:hover { background: #b91c1c; }
        .edit-btn { background: #f59e0b; color: white; }
        .edit-btn:hover { background: #d97706; }
        .action-buttons { display: flex; gap: 10px; margin-top: 8px; }
        .action-buttons button { flex: 1; }
        .form-card { background: white; border-radius: 32px; padding: 28px; max-width: 500px; margin: 20px auto; }
        .form-group { margin-bottom: 20px; }
        label { font-weight: 600; display: block; margin-bottom: 8px; color: #25455f; }
        input, textarea, select { width: 100%; padding: 14px 16px; border: 1px solid #cbd5e1; border-radius: 28px; font-size: 1rem; }
        .submit-btn { background: #2c6e4f; color: white; border: none; padding: 14px; width: 100%; border-radius: 40px; font-weight: bold; cursor: pointer; margin-top: 10px; }
        .warning-message { background: #fef9e3; border-left: 5px solid #f5b042; padding: 14px; border-radius: 20px; margin: 15px 0; }
        .error-message { background: #fee2e2; border-left: 5px solid #dc2626; color: #991b1b; padding: 14px; border-radius: 20px; }
        .toast-msg { position: fixed; bottom: 30px; right: 30px; background: #1f2f3e; color: white; padding: 12px 24px; border-radius: 60px; z-index: 1000; animation: fadein 0.3s; }
        @keyframes fadein { from { opacity: 0; transform: translateY(20px);} to { opacity: 1; transform: translateY(0);} }
        .empty-state { text-align: center; padding: 50px; background: white; border-radius: 40px; color: #5a6c7e; }
        .admin-panel { background: white; border-radius: 32px; padding: 24px; margin-bottom: 25px; border: 2px solid #ffd966; }
        .admin-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; flex-wrap: wrap; }
        .admin-stats { background: #f1f5f9; padding: 10px 18px; border-radius: 60px; font-weight: bold; }
        .users-table { overflow-x: auto; }
        .users-table table { width: 100%; border-collapse: collapse; }
        .users-table th, .users-table td { padding: 12px 8px; text-align: left; border-bottom: 1px solid #e2e8f0; }
        .users-table th { background: #f8fafc; }
        .balance-control { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
        .balance-control input { width: 80px; padding: 6px 10px; }
        .ban-control { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; margin-top: 8px; }
        .ban-control input { width: 70px; padding: 6px; }
        .ban-control select { width: auto; padding: 6px; }
        .topup-btn, .withdraw-btn, .ban-btn, .unban-btn { border: none; padding: 6px 14px; border-radius: 30px; cursor: pointer; font-weight: bold; }
        .topup-btn { background: #2c6e4f; color: white; }
        .withdraw-btn { background: #dc2626; color: white; }
        .ban-btn { background: #dc2626; color: white; }
        .unban-btn { background: #10b981; color: white; }
        .admin-close { background: #7f8c8d; border: none; padding: 8px 20px; border-radius: 30px; color: white; cursor: pointer; }
        .tabs-buttons { display: flex; gap: 15px; margin-bottom: 25px; }
        .tab-btn { flex: 1; padding: 14px; background: white; border: none; border-radius: 60px; font-weight: bold; cursor: pointer; }
        .tab-btn.active { background: #1e4a6e; color: white; }
        .banned-row { background: #fee2e2; }
        .ban-info { font-size: 0.7rem; color: #dc2626; margin-top: 4px; }
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); justify-content: center; align-items: center; z-index: 2000; }
        .modal-content { background: white; border-radius: 32px; padding: 28px; max-width: 500px; width: 90%; }
        .modal-buttons { display: flex; gap: 10px; margin-top: 20px; }
        .modal-buttons button { flex: 1; }
    </style>
</head>
<body>
<div class="app-container" id="app"></div>

<script>
    // ========== НАСТРОЙКИ ==========
    let adminPassword = "dsl382dAZX";
    let currentUser = null;
    let adminMode = false;
    let authMode = 'login';

    // ========== РАБОТА С ДАННЫМИ ==========
    function loadData() {
        if (!localStorage.getItem('schoolTasks_users')) {
            const defaultUsers = [
                { id: 'u1', name: 'Алексей', school: 'Школа №7', corp: 'Корпус А', balance: 500, password: 'alex123', isBanned: false, banReason: '', banExpires: null },
                { id: 'u2', name: 'Мария', school: 'Гимназия 1', corp: 'Корпус Б', balance: 320, password: 'maria123', isBanned: false, banReason: '', banExpires: null }
            ];
            localStorage.setItem('schoolTasks_users', JSON.stringify(defaultUsers));
            localStorage.setItem('schoolTasks_tasks', JSON.stringify([]));
            localStorage.setItem('schoolTasks_nextUserId', 3);
            localStorage.setItem('schoolTasks_nextTaskId', 1);
            localStorage.setItem('adminEarnings', 0);
        }
        return {
            users: JSON.parse(localStorage.getItem('schoolTasks_users')),
            tasks: JSON.parse(localStorage.getItem('schoolTasks_tasks')),
            nextUserId: parseInt(localStorage.getItem('schoolTasks_nextUserId')),
            nextTaskId: parseInt(localStorage.getItem('schoolTasks_nextTaskId')),
            adminEarnings: parseFloat(localStorage.getItem('adminEarnings') || 0)
        };
    }

    function saveData(users, tasks, nextUserId, nextTaskId, adminEarnings) {
        localStorage.setItem('schoolTasks_users', JSON.stringify(users));
        localStorage.setItem('schoolTasks_tasks', JSON.stringify(tasks));
        localStorage.setItem('schoolTasks_nextUserId', nextUserId);
        localStorage.setItem('schoolTasks_nextTaskId', nextTaskId);
        localStorage.setItem('adminEarnings', adminEarnings);
    }

    function showToast(msg, isError = false) {
        const toast = document.createElement('div');
        toast.className = 'toast-msg';
        toast.innerText = msg;
        if(isError) toast.style.background = '#b91c1c';
        document.body.appendChild(toast);
        setTimeout(() => toast.remove(), 3000);
    }

    function checkAndUnbanUser(user) {
        if (!user.isBanned) return false;
        if (user.banExpires && new Date() > new Date(user.banExpires)) {
            user.isBanned = false;
            user.banReason = '';
            user.banExpires = null;
            return true;
        }
        return false;
    }

    function updateAllBans() {
        let data = loadData();
        let changed = false;
        for (let user of data.users) {
            if (checkAndUnbanUser(user)) changed = true;
        }
        if (changed) {
            saveData(data.users, data.tasks, data.nextUserId, data.nextTaskId, data.adminEarnings);
            if (currentUser) {
                let updated = data.users.find(u => u.id === currentUser.id);
                if (updated && !updated.isBanned && currentUser.isBanned) {
                    currentUser = updated;
                    showToast('✅ Ваш аккаунт разблокирован!');
                }
            }
        }
    }

    function registerUser(name, school, corp, password) {
        if(!name.trim() || !school.trim() || !corp.trim()) {
            showToast('Заполните все поля', true);
            return false;
        }
        if(!password || password.length < 3) {
            showToast('Пароль не менее 3 символов', true);
            return false;
        }
        let data = loadData();
        let existing = data.users.find(u => u.name.toLowerCase() === name.trim().toLowerCase() && u.school === school && u.corp === corp);
        if(existing) {
            showToast('Пользователь уже существует', true);
            return false;
        }
        const newUser = {
            id: 'u' + data.nextUserId,
            name: name.trim(),
            school: school.trim(),
            corp: corp.trim(),
            balance: 0,
            password: password,
            isBanned: false,
            banReason: '',
            banExpires: null
        };
        data.users.push(newUser);
        data.nextUserId++;
        saveData(data.users, data.tasks, data.nextUserId, data.nextTaskId, data.adminEarnings);
        currentUser = newUser;
        showToast(`Добро пожаловать, ${newUser.name}!`);
        renderApp();
        return true;
    }

    function loginUser(name, school, corp, password) {
        if(!name.trim() || !school.trim() || !corp.trim()) {
            showToast('Заполните все поля', true);
            return false;
        }
        let data = loadData();
        let user = data.users.find(u => u.name.toLowerCase() === name.trim().toLowerCase() && u.school === school && u.corp === corp);
        if(!user) {
            showToast('Пользователь не найден', true);
            return false;
        }
        if(user.password !== password) {
            showToast('Неверный пароль', true);
            return false;
        }
        if (user.isBanned && user.banExpires && new Date() > new Date(user.banExpires)) {
            user.isBanned = false;
            user.banReason = '';
            user.banExpires = null;
            saveData(data.users, data.tasks, data.nextUserId, data.nextTaskId, data.adminEarnings);
            showToast('Срок блокировки истёк, вы разблокированы.');
        } else if (user.isBanned) {
            let expiresDate = user.banExpires ? new Date(user.banExpires).toLocaleString() : 'навсегда';
            showToast(`⛔ Аккаунт заблокирован до ${expiresDate}. Причина: ${user.banReason || 'не указана'}`, true);
            return false;
        }
        currentUser = user;
        showToast(`С возвращением, ${currentUser.name}!`);
        renderApp();
        return true;
    }

    function logout() {
        currentUser = null;
        adminMode = false;
        authMode = 'login';
        renderApp();
    }

    function isCurrentUserBanned() {
        if(!currentUser) return false;
        let data = loadData();
        let user = data.users.find(u => u.id === currentUser.id);
        if (!user) return false;
        if (user.isBanned && user.banExpires && new Date() > new Date(user.banExpires)) {
            user.isBanned = false;
            user.banReason = '';
            user.banExpires = null;
            saveData(data.users, data.tasks, data.nextUserId, data.nextTaskId, data.adminEarnings);
            currentUser = user;
            showToast('Ваш аккаунт разблокирован.');
            return false;
        }
        return user.isBanned;
    }

    function createTask(description, price, locationDetails) {
        if(!currentUser) return;
        if(isCurrentUserBanned()) {
            showToast('Вы заблокированы!', true);
            return;
        }
        let priceNum = parseFloat(price);
        if(isNaN(priceNum) || priceNum <= 0) {
            showToast('Цена должна быть положительной', true);
            return;
        }
        let data = loadData();
        let userIdx = data.users.findIndex(u => u.id === currentUser.id);
        if(data.users[userIdx].balance < priceNum) {
            showToast(`Недостаточно средств. Баланс: ${data.users[userIdx].balance}₽`, true);
            return;
        }
        data.users[userIdx].balance -= priceNum;
        const newTask = {
            id: data.nextTaskId,
            creatorId: currentUser.id,
            description: description.trim(),
            price: priceNum,
            location: locationDetails.trim(),
            status: 'open',
            takerId: null
        };
        data.tasks.push(newTask);
        data.nextTaskId++;
        saveData(data.users, data.tasks, data.nextUserId, data.nextTaskId, data.adminEarnings);
        currentUser = data.users.find(u => u.id === currentUser.id);
        showToast(`Задание создано! -${priceNum}₽`);
        renderApp();
    }

    function takeTask(taskId) {
        if(!currentUser) return;
        if(isCurrentUserBanned()) {
            showToast('Вы заблокированы!', true);
            return;
        }
        let data = loadData();
        let task = data.tasks.find(t => t.id == taskId);
        if(!task || task.status !== 'open') {
            showToast('Задание недоступно', true);
            return;
        }
        if(task.creatorId === currentUser.id) {
            showToast('Нельзя взять своё задание', true);
            return;
        }
        let creator = data.users.find(u => u.id === task.creatorId);
        if(creator?.isBanned) {
            showToast('Автор задания заблокирован', true);
            return;
        }
        let executor = data.users.find(u => u.id === currentUser.id);
        const totalPrice = task.price;
        const commission = totalPrice * 0.05;
        const executorGain = totalPrice - commission;
        executor.balance += executorGain;
        let adminEarnings = data.adminEarnings + commission;
        task.status = 'taken';
        task.takerId = currentUser.id;
        saveData(data.users, data.tasks, data.nextUserId, data.nextTaskId, adminEarnings);
        currentUser = data.users.find(u => u.id === currentUser.id);
        showToast(`Вы взяли задание! +${executorGain.toFixed(2)}₽ (комиссия 5%)`);
        renderApp();
    }

    function deleteTask(taskId) {
        if(!currentUser) return;
        let data = loadData();
        let taskIndex = data.tasks.findIndex(t => t.id == taskId);
        if(taskIndex === -1) return;
        let task = data.tasks[taskIndex];
        if(task.creatorId !== currentUser.id) {
            showToast('Можно удалять только свои задания', true);
            return;
        }
        if(task.status !== 'open') {
            showToast('Нельзя удалить уже взятое задание', true);
            return;
        }
        let creator = data.users.find(u => u.id === task.creatorId);
        if(creator) creator.balance += task.price;
        data.tasks.splice(taskIndex, 1);
        saveData(data.users, data.tasks, data.nextUserId, data.nextTaskId, data.adminEarnings);
        currentUser = data.users.find(u => u.id === currentUser.id);
        showToast(`Задание удалено, ${task.price}₽ возвращено`);
        renderApp();
    }

    function editTask(taskId, newDescription, newPrice, newLocation) {
        if(!currentUser) return;
        let data = loadData();
        let task = data.tasks.find(t => t.id == taskId);
        if(!task) { showToast('Задание не найдено', true); return false; }
        if(task.creatorId !== currentUser.id) { showToast('Редактировать можно только свои задания', true); return false; }
        if(task.status !== 'open') { showToast('Нельзя редактировать уже взятое задание', true); return false; }

        let newPriceNum = parseFloat(newPrice);
        if(isNaN(newPriceNum) || newPriceNum <= 0) { showToast('Цена должна быть положительной', true); return false; }

        let creator = data.users.find(u => u.id === task.creatorId);
        let oldPrice = task.price;
        let priceDiff = newPriceNum - oldPrice;

        if(priceDiff > 0) {
            if(creator.balance < priceDiff) {
                showToast(`Недостаточно средств для повышения цены. Нужно ещё ${priceDiff}₽`, true);
                return false;
            }
            creator.balance -= priceDiff;
        } else if(priceDiff < 0) {
            creator.balance += Math.abs(priceDiff);
        }

        task.description = newDescription.trim();
        task.price = newPriceNum;
        task.location = newLocation.trim();

        saveData(data.users, data.tasks, data.nextUserId, data.nextTaskId, data.adminEarnings);
        currentUser = data.users.find(u => u.id === currentUser.id);
        showToast(`Задание обновлено! ${priceDiff !== 0 ? (priceDiff > 0 ? `Списано ${priceDiff}₽` : `Возвращено ${Math.abs(priceDiff)}₽`) : ''}`);
        renderApp();
        return true;
    }

    function adminChangeBalance(userId, amount) {
        if(amount === 0) return;
        let data = loadData();
        let user = data.users.find(u => u.id === userId);
        if(!user) return;
        user.balance += amount;
        saveData(data.users, data.tasks, data.nextUserId, data.nextTaskId, data.adminEarnings);
        if(currentUser && currentUser.id === userId) currentUser = user;
        showToast(`${amount > 0 ? 'Пополнение' : 'Списание'} для ${user.name}: ${amount > 0 ? `+${amount}` : amount}₽. Новый баланс: ${user.balance}₽`);
        renderApp();
    }

    function banUserWithDuration(userId, days, hours, reason) {
        let data = loadData();
        let user = data.users.find(u => u.id === userId);
        if(!user) return;
        if(user.id === currentUser?.id) { showToast('Нельзя забанить себя', true); return; }
        let expires = null;
        if (days > 0 || hours > 0) {
            expires = new Date();
            expires.setDate(expires.getDate() + days);
            expires.setHours(expires.getHours() + hours);
        }
        user.isBanned = true;
        user.banReason = reason || 'Нарушение правил';
        user.banExpires = expires ? expires.toISOString() : null;
        saveData(data.users, data.tasks, data.nextUserId, data.nextTaskId, data.adminEarnings);
        let durationText = '';
        if (days > 0 && hours > 0) durationText = `на ${days} дн. ${hours} ч.`;
        else if (days > 0) durationText = `на ${days} дн.`;
        else if (hours > 0) durationText = `на ${hours} ч.`;
        else durationText = 'навсегда';
        showToast(`⛔ ${user.name} заблокирован ${durationText}. Причина: ${user.banReason}`);
        renderApp();
    }

    function unbanUser(userId) {
        let data = loadData();
        let user = data.users.find(u => u.id === userId);
        if(!user) return;
        user.isBanned = false;
        user.banReason = '';
        user.banExpires = null;
        saveData(data.users, data.tasks, data.nextUserId, data.nextTaskId, data.adminEarnings);
        showToast(`✅ ${user.name} разблокирован`);
        renderApp();
    }

    function requestAdminAccess() {
        let pwd = prompt("Введите пароль администратора:");
        if(pwd === adminPassword) {
            adminMode = true;
            showToast("Админ-панель активирована");
            renderApp();
        } else {
            showToast("Неверный пароль", true);
        }
    }

    function exitAdminMode() {
        adminMode = false;
        renderApp();
    }

    function showEditModal(task) {
        const modal = document.createElement('div');
        modal.className = 'modal';
        modal.style.display = 'flex';
        modal.innerHTML = `
            <div class="modal-content">
                <h3>✏️ Редактировать задание</h3>
                <div class="form-group"><label>Описание</label><textarea id="editDesc" rows="2">${task.description}</textarea></div>
                <div class="form-group"><label>Цена (₽)</label><input type="number" id="editPrice" value="${task.price}"></div>
                <div class="form-group"><label>Место</label><input type="text" id="editLocation" value="${task.location}"></div>
                <div class="modal-buttons"><button class="submit-btn" id="saveEditBtn">Сохранить</button><button class="delete-btn" id="cancelEditBtn">Отмена</button></div>
            </div>
        `;
        document.body.appendChild(modal);
        modal.querySelector('#saveEditBtn').onclick = () => {
            const newDesc = modal.querySelector('#editDesc').value;
            const newPrice = modal.querySelector('#editPrice').value;
            const newLoc = modal.querySelector('#editLocation').value;
            if(newDesc && newPrice && newLoc) { editTask(task.id, newDesc, newPrice, newLoc); modal.remove(); }
            else showToast('Заполните все поля', true);
        };
        modal.querySelector('#cancelEditBtn').onclick = () => modal.remove();
    }

    function renderApp() {
        updateAllBans();

        const appDiv = document.getElementById('app');
        
        if(!currentUser) {
            const isLoginMode = authMode === 'login';
            appDiv.innerHTML = `
                <div class="header" style="justify-content:center;"><div class="logo"><h1>🏫 SchoolTask</h1><span>Биржа поручений</span></div></div>
                <div class="form-card">
                    <div class="tabs-buttons">
                        <button class="tab-btn ${isLoginMode ? 'active' : ''}" id="loginTabBtn">🔐 Вход</button>
                        <button class="tab-btn ${!isLoginMode ? 'active' : ''}" id="registerTabBtn">📝 Регистрация</button>
                    </div>
                    ${isLoginMode ? `
                        <div class="form-group"><label>Имя</label><input type="text" id="loginName"></div>
                        <div class="form-group"><label>Школа</label><input type="text" id="loginSchool"></div>
                        <div class="form-group"><label>Корпус</label><input type="text" id="loginCorp"></div>
                        <div class="form-group"><label>Пароль</label><input type="password" id="loginPassword"></div>
                        <button class="submit-btn" id="loginBtn">Войти</button>
                    ` : `
                        <div class="form-group"><label>Имя</label><input type="text" id="regName"></div>
