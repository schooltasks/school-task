<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>SchoolTask - Биржа поручений</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', system-ui; }
        body { background: linear-gradient(145deg, #f0f4fa 0%, #e2e8f0 100%); min-height: 100vh; padding: 20px; transition: background 0.3s, color 0.3s; }
        body.dark-theme { background: linear-gradient(145deg, #1a1a2e 0%, #16213e 100%); color: #e2e8f0; }
        body.dark-theme .header, body.dark-theme .card, body.dark-theme .task-card, body.dark-theme .admin-panel, body.dark-theme .help-box, body.dark-theme .announcement { background: #1e293b; color: #e2e8f0; }

        body.dark-theme .tab { background: #334155; color: #e2e8f0; }
        body.dark-theme .tab.active { background: #3b82f6; }
        body.dark-theme input, body.dark-theme textarea, body.dark-theme select { background: #334155; border-color: #475569; color: #e2e8f0; }
        
        .container { max-width: 1300px; margin: 0 auto; }
        .header, .card, .task-card { background: white; border-radius: 32px; padding: 20px; margin-bottom: 20px; box-shadow: 0 8px 20px rgba(0,0,0,0.05); }

        .bonus-card { background: linear-gradient(135deg, #fef3c7, #fde68a); color: #92400e; padding: 6px 16px; border-radius: 40px; font-weight: bold; cursor: pointer; }
        button { cursor: pointer; border: none; border-radius: 40px; padding: 10px 20px; font-weight: bold; transition: 0.2s; }
        .btn-primary { background: #2c6e4f; color: white; }
        .btn-success { background: #10b981; color: white; }
        .btn-danger { background: #dc2626; color: white; }
        .btn-edit { background: #8b5cf6; color: white; }
        .btn-info { background: #3b82f6; color: white; }
        .theme-toggle { background: #334155; color: white; padding: 8px 16px; border-radius: 60px; cursor: pointer; }
        input, textarea, select { width: 100%; padding: 12px 16px; border: 1px solid #cbd5e1; border-radius: 28px; margin-bottom: 12px; font-size: 1rem; }

        .admin-header { display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 10px; margin-bottom: 20px; }
        .search-box { display: flex; align-items: center; gap: 8px; background: #f1f5f9; padding: 5px 15px; border-radius: 40px; }

        .balance-control input { width: 80px; margin: 0; padding: 6px; border-radius: 30px; }
        
        .announcement { background: linear-gradient(135deg, #ffd700 0%, #ffb347 100%); border-radius: 32px; padding: 20px; margin-bottom: 20px; text-align: center; animation: pulse 2s infinite; }
        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.02); } 100% { transform: scale(1); } }
        .announcement h2 { font-size: 1.8rem; color: #1e293b; margin-bottom: 10px; }
        .announcement p { color: #1e293b; margin-bottom: 15px; }
        .announcement .bonus-highlight { background: #dc2626; color: white; display: inline-block; padding: 5px 15px; border-radius: 40px; margin: 10px 0; }
        .share-buttons { display: flex; gap: 15px; justify-content: center; margin-top: 15px; flex-wrap: wrap; }
        .share-btn { padding: 10px 20px; border-radius: 40px; font-weight: bold; cursor: pointer; }
        .share-tg { background: #0088cc; color: white; }
        .share-vk { background: #0077ff; color: white; }
        .copy-link { background: #6b7280; color: white; }
        
        .help-box { background: #e0f2fe; border-radius: 20px; padding: 15px; margin-bottom: 20px; text-align: center; border-left: 5px solid #0284c7; }
        .help-box h4 { color: #0284c7; margin-bottom: 8px; }
        .help-box p { font-size: 0.9rem; color: #075985; }
        body.dark-theme .help-box { background: #0c4a6e; border-left-color: #38bdf8; }
        body.dark-theme .help-box h4 { color: #38bdf8; }
        body.dark-theme .help-box p { color: #bae6fd; }
        
        .referral-code { background: #e2e8f0; padding: 10px; border-radius: 40px; font-family: monospace; cursor: pointer; text-align: center; margin-top: 15px; }
        .disabled-warning { background: #fee2e2; color: #dc2626; padding: 10px 20px; border-radius: 40px; display: inline-block; }
        
        .task-header { display: flex; justify-content: space-between; margin-bottom: 12px; flex-wrap: wrap; }
        .task-price { font-size: 1.6rem; font-weight: 800; color: #2b6e4f; }
        .task-status { padding: 4px 12px; border-radius: 30px; font-size: 0.75rem; font-weight: bold; }
        .status-open { background: #e2e8f0; color: #1e4a6e; }
        .status-progress { background: #fef3c7; color: #d97706; }
        .status-awaiting { background: #e0f2fe; color: #0284c7; }
        .status-completed { background: #d1fae5; color: #10b981; }
        .action-buttons { display: flex; gap: 10px; margin-top: 12px; flex-wrap: wrap; }
        .filter-group { display: flex; gap: 10px; margin-bottom: 15px; flex-wrap: wrap; }
        .filter-group input, .filter-group select { flex: 1; margin: 0; }
        
        .toast { position: fixed; bottom: 30px; right: 30px; background: #1f2f3e; color: white; padding: 12px 24px; border-radius: 60px; z-index: 1000; animation: fadein 0.3s; }
        @keyframes fadein { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        .loading { text-align: center; padding: 40px; color: #6b7280; }
        .error-text { color: #dc2626; font-size: 0.8rem; display: none; margin-top: -8px; margin-bottom: 12px; }
        
        .debug-console { position: fixed; bottom: 10px; left: 10px; right: 10px; background: #1e293b; color: #0f0; font-family: monospace; font-size: 10px; padding: 8px; border-radius: 8px; max-height: 150px; overflow-y: auto; z-index: 9999; display: none; }
        .debug-console.show { display: block; }
        
        .modal-overlay { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.7); display: flex; align-items: center; justify-content: center; z-index: 2000; }
        .edit-modal, .bonus-modal, .ban-modal { background: white; border-radius: 32px; width: 90%; max-width: 500px; padding: 20px; }
        
        @media (max-width: 700px) { .filter-group { flex-direction: column; } }

</head>
<body>
<div id="app"><div class="loading">⏳ Загрузка...</div></div>
<div class="debug-console" id="debugConsole"></div>

<script>
// ========== НАСТРОЙКИ ==========
const API_URL = 'https://script.google.com/macros/s/AKfycbzCI6Aj5vR9_iFUt4FzwMjrzCKySRdr0B82zEUinPCMnzoMoonLq9dZPfgUcIw66JWbAw/exec';
const ADMIN_PASSWORD = 'dsl382dAZX';

let currentUser = null;
let authMode = 'login';
let adminMode = false;
let adminSearchTerm = '';
let users = [];
let tasks = [];
let isDarkTheme = localStorage.getItem('darkTheme') === 'true';
let filters = { scope: 'school', minPrice: '', maxPrice: '' };

// Функция для отладки
function debugLog(msg, data) {
    const debugDiv = document.getElementById('debugConsole');
    if (debugDiv) {
        const time = new Date().toLocaleTimeString();
        const logMsg = `[${time}] ${msg}${data ? ': ' + JSON.stringify(data) : ''}\n`;
        debugDiv.innerHTML += logMsg;
        debugDiv.scrollTop = debugDiv.scrollHeight;
        console.log(msg, data || '');
    }
}

// Показать/скрыть отладку по двойному клику
document.addEventListener('dblclick', () => {
    const debugDiv = document.getElementById('debugConsole');
    if (debugDiv) debugDiv.classList.toggle('show');
});

if (isDarkTheme) document.body.classList.add('dark-theme');

function toggleTheme() { 
    isDarkTheme = !isDarkTheme; 
    localStorage.setItem('darkTheme', isDarkTheme); 
    if (isDarkTheme) document.body.classList.add('dark-theme'); 
    else document.body.classList.remove('dark-theme'); 
    renderApp(); 
}

// ========== ЗАГРУЗКА ДАННЫХ ИЗ GOOGLE ==========
async function loadDataFromGoogle() {
    try {
        debugLog('Загрузка данных из Google...');
        
        const usersRes = await fetch(`${API_URL}?action=getUsers`);
        debugLog('GET users response status:', usersRes.status);
        
        const tasksRes = await fetch(`${API_URL}?action=getTasks`);
        debugLog('GET tasks response status:', tasksRes.status);
        
        if (!usersRes.ok || !tasksRes.ok) {
            throw new Error(`HTTP error: ${usersRes.status} ${tasksRes.status}`);
        }
        
        const googleUsers = await usersRes.json();
        const googleTasks = await tasksRes.json();
        
        debugLog('Загружено пользователей:', googleUsers?.length || 0);
        debugLog('Загружено заданий:', googleTasks?.length || 0);
        
        if (googleUsers && Array.isArray(googleUsers)) {
            users = googleUsers;
            if (users.length > 0) {
                debugLog('Первый пользователь:', users[0]);
            } else {
                debugLog('ВНИМАНИЕ: Пользователи не найдены в Google Sheets!');
            }
        }
        if (googleTasks && Array.isArray(googleTasks)) {
            tasks = googleTasks;
        }
        
        return true;
    } catch(e) {
        debugLog('Ошибка загрузки из Google:', e.message);
        showToast('⚠️ Не удалось загрузить данные. Проверьте интернет.', true);
        return false;
    }
}

async function saveToGoogle(action, params) {
    try {
        debugLog(`saveToGoogle: ${action}`, params);
        
        // Используем POST для всех запросов
        const formData = new URLSearchParams();
        formData.append('action', action);
        for (let key in params) {
            if (params[key] !== undefined && params[key] !== null) {
                formData.append(key, params[key]);
            }
        }
        
        debugLog(`Отправка POST запроса к ${API_URL}`);
        
        const response = await fetch(API_URL, {
            method: 'POST',
            headers: {
                'Content-Type': 'application/x-www-form-urlencoded',
            },
            body: formData.toString()
        });
        
        const result = await response.json();
        debugLog(`Ответ от сервера (${action}):`, result);
        
        return result;
    } catch(e) {
        debugLog('Ошибка сохранения:', e.message);
        showToast('⚠️ Не удалось сохранить. Проверьте интернет.', true);
        return { success: false, error: e.message };
    }
}

function showToast(msg, isError) {
    let toast = document.createElement('div');
    toast.className = 'toast';
    toast.innerText = msg;
    if (isError) toast.style.background = '#b91c1c';
    document.body.appendChild(toast);
    setTimeout(() => toast.remove(), 3000);
}

function saveSession() { 
    if (currentUser) localStorage.setItem('schooltask_session', JSON.stringify({ id: currentUser.id, name: currentUser.name })); 
    else localStorage.removeItem('schooltask_session'); 
}

function restoreSession() {
    let saved = localStorage.getItem('schooltask_session');
    if (!saved) return false;
    try {
        let session = JSON.parse(saved);
        let user = users.find(u => u.id === session.id);
        if (user && !user.isBanned) { 
            currentUser = user; 
            debugLog('Сессия восстановлена для:', currentUser.name);
            return true; 
        }
        localStorage.removeItem('schooltask_session');
    } catch(e) { console.error(e); }
    return false;
}

function getReferralLink() { 
    let url = window.location.href.split('?')[0];
    if (currentUser && currentUser.referral_code) return url + '?ref=' + currentUser.referral_code;
    return url;
}

function copyReferralLink() { 
    navigator.clipboard.writeText(getReferralLink()); 
    showToast('✅ Ссылка скопирована! +5₽ за каждого друга', false); 
}

function shareTelegram() { 
    let link = getReferralLink();
    window.open('https://t.me/share/url?url=' + encodeURIComponent(link) + '&text=' + encodeURIComponent('SchoolTask - биржа поручений! +5₽ на бонусный счёт за друга!'), '_blank'); 
}

function shareVK() { 
    let link = getReferralLink();
    window.open('https://vk.com/share.php?url=' + encodeURIComponent(link), '_blank'); 
}

function showBonusHelp() {
    alert('🎁 Бонусный счёт\n\nБонусы НЕЛЬЗЯ вывести, только тратить на создание заданий!\n\n✨ Как получить:\n• +5₽ за каждого приглашённого друга\n• +10₽ за каждое выполненное задание\n• +20₽ за получение отзыва 5 звёзд\n• +3₽ ежедневный бонус за вход');
}

async function registerUser(name, school, corp, password) {
    if (!name.trim() || !school.trim() || !corp.trim()) { showToast('Заполните все поля', true); return false; }
    if (!/^\d+$/.test(school)) { showToast('❌ Школа только цифры!', true); return false; }
    if (password.length < 3) { showToast('Пароль не менее 3 символов', true); return false; }
    if (users.some(u => u.name === name)) { showToast('❌ Имя уже занято', true); return false; }
    
    let id = 'u' + Date.now();
    let referralCode = 'REF' + Math.random().toString(36).substring(2, 8).toUpperCase();
    
    debugLog('Регистрация пользователя:', { id, name, school, corp, referralCode });
    
    const result = await saveToGoogle('registerUser', {
        id: id, 
        name: name.trim(), 
        school: school.trim(), 
        corp: corp.trim(),
        balance: 0, 
        bonus_balance: 0, 
        password: password, 
        referral_code: referralCode,
        referred_by: ''
    });
    
    if (result && result.success) {
        showToast('✅ Регистрация успешна!', false);
        await loadDataFromGoogle();
        currentUser = users.find(u => u.id === id);
        if (currentUser) {
            saveSession();
            renderApp();
            return true;
        } else {
            debugLog('Пользователь не найден после регистрации, пробуем найти по имени');
            currentUser = users.find(u => u.name === name.trim());
            if (currentUser) {
                saveSession();
                renderApp();
                return true;
            }
        }
    } else {
        const errorMsg = result?.error || 'Неизвестная ошибка';
        debugLog('Ошибка регистрации:', errorMsg);
        showToast(`❌ Ошибка регистрации: ${errorMsg}`, true);
    }
    return false;
}

async function loginUser(name, school, corp, password) {
    let cleanName = name ? name.toString().trim() : '';
    let cleanSchool = school ? school.toString().trim() : '';
    let cleanCorp = corp ? corp.toString().trim() : '';
    let cleanPassword = password ? password.toString().trim() : '';
    
    debugLog('Попытка входа:', { name: cleanName, school: cleanSchool, corp: cleanCorp });
    debugLog('Всего пользователей в системе:', users.length);
    
    if (users.length === 0) {
        showToast('❌ Нет данных о пользователях. Обновите страницу.', true);
        return false;
    }
    
    if (!cleanName || !cleanSchool || !cleanCorp) { 
        showToast('Заполните все поля', true); 
        return false; 
    }
    if (!cleanPassword) { 
        showToast('Введите пароль', true); 
        return false; 
    }
    
    let user = users.find(u => u.name === cleanName && u.school === cleanSchool && u.corp === cleanCorp);
    
    if (!user) { 
        debugLog('Пользователь не найден. Доступные имена:', users.map(u => u.name));
        showToast('❌ Пользователь не найден', true); 
        return false; 
    }
    
    debugLog('Найден пользователь:', { name: user.name, hasPassword: !!user.password });
    
    if (user.password !== cleanPassword) { 
        debugLog('Неверный пароль. Ожидался:', user.password, 'Получен:', cleanPassword);
        showToast('❌ Неверный пароль', true); 
        return false; 
    }
    
    if (user.isBanned) { 
        showToast('⛔ Аккаунт заблокирован. Причина: ' + (user.banReason || 'Не указана'), true); 
        return false; 
    }
    
    currentUser = user;
    saveSession();
    showToast('✅ С возвращением, ' + currentUser.name + '!', false);
    renderApp();
    return true;
}

function logout() { 
    currentUser = null; 
    adminMode = false; 
    localStorage.removeItem('schooltask_session'); 
    renderApp(); 
}

async function createTask(desc, price, loc, paymentType, scope) {
    if (!currentUser) return;
    let priceNum = parseFloat(price);
    if (isNaN(priceNum) || priceNum <= 0) { showToast('Цена должна быть положительной', true); return; }
    
    let balance = paymentType === 'bonus' ? (parseFloat(currentUser.bonus_balance)||0) : (parseFloat(currentUser.balance)||0);
    if (balance < priceNum) { showToast('Недостаточно средств', true); return; }
    
    if (paymentType === 'bonus') { 
        currentUser.bonus_balance -= priceNum; 
    } else { 
        currentUser.balance -= priceNum; 
    }
    
    let newTask = { 
        id: Date.now().toString(), 
        creatorId: currentUser.id, 
        creatorSchool: currentUser.school, 
        description: desc, 
        price: priceNum, 
        location: loc, 
        payment_type: paymentType, 
        scope: scope, 
        status: 'open', 
        takerId: null, 
        createdAt: new Date().toISOString() 
    };
    
    await saveToGoogle('createTask', newTask);
    await saveToGoogle('updateUser', { id: currentUser.id, balance: currentUser.balance, bonus_balance: currentUser.bonus_balance });
    await loadDataFromGoogle();
    
    currentUser = users.find(u => u.id === currentUser.id);
    showToast('✅ Задание создано!', false); 
    renderApp(); 
}

async function deleteTask(taskId) {
    if (!confirm('Удалить задание?')) return;
    let task = tasks.find(t => t.id == taskId);
    if (task && task.status === 'open' && task.creatorId === currentUser.id) {
        if (task.payment_type === 'bonus') { 
            currentUser.bonus_balance += parseFloat(task.price); 
        } else { 
            currentUser.balance += parseFloat(task.price); 
        }
        await saveToGoogle('updateUser', { id: currentUser.id, balance: currentUser.balance, bonus_balance: currentUser.bonus_balance });
    }
    await saveToGoogle('deleteTask', { id: taskId });
    await loadDataFromGoogle();
    currentUser = users.find(u => u.id === currentUser.id);
    showToast('🗑️ Задание удалено', false); 
    renderApp(); 
}

function showEditModal(task) {
    let newDesc = prompt('Новое описание:', task.description);
    if (!newDesc) return;
    let newPrice = parseFloat(prompt('Новая цена:', task.price));
    if (isNaN(newPrice) || newPrice <= 0) { showToast('Цена должна быть положительной', true); return; }
    let newLoc = prompt('Новое место:', task.location);
    if (!newLoc) return;
    let newScope = confirm('Для всех участников? (OK - да, Отмена - только моя школа)') ? 'all' : 'school';
    
    saveToGoogle('updateTask', { id: task.id, description: newDesc, price: newPrice, location: newLoc, scope: newScope }).then(() => {
        loadDataFromGoogle().then(() => {
            currentUser = users.find(u => u.id === currentUser.id);
            showToast('✅ Задание обновлено', false);
            renderApp();
        });
    });
}

async function takeTask(taskId) {
    let task = tasks.find(t => t.id == taskId);
    if (!task || task.status !== 'open') return;
    if (task.creatorId === currentUser.id) { showToast('Нельзя взять своё задание', true); return; }
    await saveToGoogle('updateTask', { id: task.id, status: 'in_progress', takerId: currentUser.id });
    await loadDataFromGoogle();
    showToast('📢 Вы взяли задание!', false); 
    renderApp(); 
}

async function confirmCompletion(taskId) {
    let task = tasks.find(t => t.id == taskId);
    if (!task || task.status !== 'in_progress') return;
    if (task.takerId !== currentUser.id) return;
    await saveToGoogle('updateTask', { id: task.id, status: 'awaiting_confirmation' });
    await loadDataFromGoogle();
    showToast('✅ Задание выполнено! Ожидайте подтверждения', false); 
    renderApp(); 
}

async function confirmReceipt(taskId) {
    let task = tasks.find(t => t.id == taskId);
    if (!task || task.status !== 'awaiting_confirmation') return;
    if (task.creatorId !== currentUser.id) return;
    let executor = users.find(u => u.id === task.takerId);
    let total = parseFloat(task.price);
    let gain = total * 0.95;
    if (executor) { 
        executor.balance += gain;
        executor.bonus_balance += 10;
        await saveToGoogle('updateUser', { id: executor.id, balance: executor.balance, bonus_balance: executor.bonus_balance });
    }
    await saveToGoogle('updateTask', { id: task.id, status: 'completed' });
    await loadDataFromGoogle();
    showToast('💰 Подтверждено!', false); 
    renderApp(); 
}

async function rejectReceipt(taskId) {
    let task = tasks.find(t => t.id == taskId);
    if (!task || task.status !== 'awaiting_confirmation') return;
    if (task.creatorId !== currentUser.id) return;
    if (task.payment_type === 'bonus') { 
        currentUser.bonus_balance += parseFloat(task.price); 
    } else { 
        currentUser.balance += parseFloat(task.price); 
    }
    await saveToGoogle('updateUser', { id: currentUser.id, balance: currentUser.balance, bonus_balance: currentUser.bonus_balance });
    await saveToGoogle('updateTask', { id: task.id, status: 'disputed' });
    await loadDataFromGoogle();
    currentUser = users.find(u => u.id === currentUser.id);
    showToast('⚠️ Деньги возвращены', false); 
    renderApp(); 
}

async function adminChangeBalance(userId, amount, isBonus) {
    let user = users.find(u => u.id === userId);
    if (!user) return;
    if (isBonus) {
        user.bonus_balance += amount;
        if (currentUser && currentUser.id === userId) currentUser.bonus_balance = user.bonus_balance;
        showToast((amount > 0 ? '+' : '') + amount + '₽ на бонусный счёт для ' + user.name, false);
    } else {
        user.balance += amount;
        if (currentUser && currentUser.id === userId) currentUser.balance = user.balance;
        showToast((amount > 0 ? '+' : '') + amount + '₽ на основной баланс для ' + user.name, false);
    }
    await saveToGoogle('updateUser', { id: userId, balance: user.balance, bonus_balance: user.bonus_balance });
    await loadDataFromGoogle();
    renderApp(); 
}

function showBanModal(userId) {
    let user = users.find(u => u.id === userId);
    if (!user) return;
    let reason = prompt('Причина блокировки:', 'Нарушение правил');
    if (!reason) return;
    user.isBanned = true;
    user.banReason = reason;
    saveToGoogle('updateUser', { id: userId, isBanned: true, banReason: reason }).then(() => {
        loadDataFromGoogle().then(() => {
            if (currentUser && currentUser.id === userId) logout();
            else showToast('⛔ ' + user.name + ' заблокирован. Причина: ' + reason, false);
            renderApp();
        });
    });
}

function unbanUser(userId) {
    let user = users.find(u => u.id === userId);
    if (!user) return;
    saveToGoogle('updateUser', { id: userId, isBanned: false, banReason: '' }).then(() => {
        loadDataFromGoogle().then(() => {
            showToast('✅ ' + user.name + ' разблокирован', false);
            renderApp();
        });
    });
}

function requestAdminAccess() { 
    let pwd = prompt("Пароль администратора:"); 
    if (pwd === ADMIN_PASSWORD) { 
        adminMode = true; 
        showToast("Админ-панель активирована", false); 
        renderApp(); 
    } else showToast("Неверный пароль", true); 
}

function exitAdminMode() { adminMode = false; renderApp(); }

function deleteAllTasks() {
    if (confirm('Удалить ВСЕ задания?')) {
        Promise.all(tasks.map(task => saveToGoogle('deleteTask', { id: task.id }))).then(() => {
            loadDataFromGoogle().then(() => {
                showToast('✅ Все задания удалены', false);
                renderApp();
            });
        });
    }
}

function getStatusText(status) {
    switch(status) {
        case 'open': return { text: '📋 Доступно', class: 'status-open' };
        case 'in_progress': return { text: '⏳ Выполняется', class: 'status-progress' };
        case 'awaiting_confirmation': return { text: '🕐 Ожидает', class: 'status-awaiting' };
        case 'completed': return { text: '✅ Выполнено', class: 'status-completed' };
        default: return { text: status, class: 'status-open' };
    }
}

        let clearTasksBtn = document.getElementById('clearTasksBtn');
        if (clearTasksBtn) clearTasksBtn.onclick = deleteAllTasks;
        
        let adminSearch = document.getElementById('adminSearch');
        if (adminSearch) {
            adminSearch.oninput = (e) => { adminSearchTerm = e.target.value; renderApp(); };
        }
        
        document.querySelectorAll('.topup-btn').forEach(btn => {
            btn.onclick = () => {
                let userId = btn.getAttribute('data-userid');
                let isBonus = btn.getAttribute('data-bonus') === 'true';
                let amountField = isBonus ? document.getElementById(`bonus-${userId}`) : document.getElementById(`amount-${userId}`);
                let amount = parseFloat(amountField ? amountField.value : 100);
                if (amount > 0) adminChangeBalance(userId, amount, isBonus);
                else showToast('Введите сумму', true);
            };
        });
        
        document.querySelectorAll('.withdraw-btn').forEach(btn => {
            btn.onclick = () => {
                let userId = btn.getAttribute('data-userid');
                let isBonus = btn.getAttribute('data-bonus') === 'true';
                let amountField = isBonus ? document.getElementById(`bonus-${userId}`) : document.getElementById(`amount-${userId}`);
                let amount = parseFloat(amountField ? amountField.value : 100);
                if (amount > 0) adminChangeBalance(userId, -amount, isBonus);
                else showToast('Введите сумму', true);
            };
        });
        
        document.querySelectorAll('.ban-btn').forEach(btn => {
            btn.onclick = () => showBanModal(btn.getAttribute('data-userid'));
        });
        
        document.querySelectorAll('.unban-btn').forEach(btn => {
            btn.onclick = () => unbanUser(btn.getAttribute('data-userid'));
        });
    }
    
    document.querySelectorAll('.take-btn').forEach(btn => {
        btn.onclick = () => takeTask(btn.getAttribute('data-id'));
    });
    
    document.querySelectorAll('.delete-btn').forEach(btn => {
        btn.onclick = () => deleteTask(btn.getAttribute('data-id'));
    });
    
    document.querySelectorAll('.edit-btn').forEach(btn => {
        let taskId = btn.getAttribute('data-id');
        let task = tasks.find(t => t.id == taskId);
        if (task) btn.onclick = () => showEditModal(task);
    });
    
    document.querySelectorAll('.complete-btn').forEach(btn => {
        btn.onclick = () => confirmCompletion(btn.getAttribute('data-id'));
    });
    
    document.querySelectorAll('.confirm-btn').forEach(btn => {
        btn.onclick = () => confirmReceipt(btn.getAttribute('data-id'));
    });
    
    document.querySelectorAll('.reject-btn').forEach(btn => {
        btn.onclick = () => rejectReceipt(btn.getAttribute('data-id'));
    });
}

// ЗАПУСК
loadDataFromGoogle().then(() => {
    restoreSession();
    renderApp();
});
</script>
</body>
</html>
