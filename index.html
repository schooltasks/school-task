<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>SchoolTask - Биржа поручений</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', system-ui; }
        body { background: linear-gradient(145deg, #f0f4fa 0%, #e2e8f0 100%); min-height: 100vh; padding: 20px; }
        .container { max-width: 1300px; margin: 0 auto; }
        .card, .header, .admin-panel, .task-card, .form-card { background: white; border-radius: 32px; padding: 20px; margin-bottom: 20px; box-shadow: 0 8px 20px rgba(0,0,0,0.05); }
        .header { display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; }
        .logo h1 { background: linear-gradient(135deg, #1e2b3c, #2c4c6e); -webkit-background-clip: text; background-clip: text; color: transparent; }
        .user-info { display: flex; align-items: center; gap: 20px; background: #f8fafc; padding: 8px 20px; border-radius: 60px; }
        .balance-card { background: #eef2ff; padding: 6px 16px; border-radius: 40px; font-weight: bold; }
        button { cursor: pointer; border: none; border-radius: 40px; padding: 10px 20px; font-weight: bold; transition: 0.2s; }
        .btn-primary { background: #2c6e4f; color: white; }
        .btn-primary:hover { background: #1e4a38; }
        .btn-danger { background: #dc2626; color: white; }
        .btn-warning { background: #f59e0b; color: white; }
        input, textarea { width: 100%; padding: 12px 16px; border: 1px solid #cbd5e1; border-radius: 28px; margin-bottom: 12px; font-size: 1rem; }
        .tabs { display: flex; gap: 12px; flex-wrap: wrap; margin-bottom: 20px; }
        .tab { background: white; padding: 10px 24px; border-radius: 60px; cursor: pointer; font-weight: 600; }
        .tab.active { background: #1e4a6e; color: white; }
        .tasks-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 20px; }
        .task-header { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 12px; }
        .task-price { font-size: 1.6rem; font-weight: 800; color: #2b6e4f; }
        .task-school { background: #eef2ff; padding: 4px 12px; border-radius: 30px; font-size: 0.75rem; }
        .action-buttons { display: flex; gap: 10px; margin-top: 12px; }
        .action-buttons button { flex: 1; }
        .admin-panel { border: 2px solid #ffd966; }
        .admin-header { display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 10px; margin-bottom: 20px; }
        .search-box { display: flex; align-items: center; gap: 8px; background: #f1f5f9; padding: 5px 15px; border-radius: 40px; }
        .search-box input { margin: 0; padding: 8px; background: transparent; border: none; width: 200px; }
        .refresh-btn { background: #3b82f6; color: white; padding: 8px 16px; }
        .users-table { overflow-x: auto; }
        .users-table table { width: 100%; border-collapse: collapse; }
        .users-table th, .users-table td { padding: 12px 8px; text-align: left; border-bottom: 1px solid #e2e8f0; }
        .users-table th { background: #f8fafc; }
        .balance-control { display: flex; gap: 5px; flex-wrap: wrap; }
        .balance-control input { width: 70px; margin: 0; padding: 6px; }
        .ban-control { display: flex; gap: 5px; flex-wrap: wrap; margin-top: 5px; }
        .ban-control input { width: 55px; margin: 0; padding: 6px; }
        .ban-control input:last-child { width: 90px; }
        .topup-btn, .withdraw-btn, .ban-btn, .unban-btn { padding: 6px 12px; font-size: 0.8rem; }
        .topup-btn { background: #2c6e4f; color: white; }
        .withdraw-btn { background: #dc2626; color: white; }
        .ban-btn { background: #dc2626; color: white; }
        .unban-btn { background: #10b981; color: white; }
        .banned-row { background: #fee2e2; }
        .ban-info { font-size: 0.7rem; color: #dc2626; margin-top: 4px; }
        .toast { position: fixed; bottom: 30px; right: 30px; background: #1f2f3e; color: white; padding: 12px 24px; border-radius: 60px; z-index: 1000; animation: fadein 0.3s; }
        @keyframes fadein { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        .empty-state { text-align: center; padding: 40px; color: #6b7280; }
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); justify-content: center; align-items: center; z-index: 2000; }
        .modal-content { background: white; border-radius: 32px; padding: 28px; max-width: 500px; width: 90%; }
        @media (max-width: 700px) { .admin-header { flex-direction: column; align-items: stretch; } .search-box { justify-content: center; } }
    </style>
</head>
<body>
<div class="container" id="app"></div>

<script>
    // ========== НАСТРОЙКИ ==========
    const API_URL = 'https://script.google.com/macros/s/AKfycbxxPlLZQOVqOPGSXipd0dHVSbqg5b_8UePmI4CVGNr52GK74Y_p95KT4qtX_OGStciO/exec';
    const ADMIN_PASSWORD = 'dsl382dAZX';
    
    let currentUser = null;
    let adminMode = false;
    let authMode = 'login';
    let adminSearchTerm = '';
    let allUsers = [];
    let allTasks = [];

    // ========== API ВЫЗОВЫ ==========
    async function apiCall(params) {
        const url = new URL(API_URL);
        Object.keys(params).forEach(key => url.searchParams.append(key, params[key]));
        try {
            const response = await fetch(url.toString());
            return await response.json();
        } catch (error) {
            console.error('API error:', error);
            showToast('Ошибка связи с сервером', true);
            return null;
        }
    }

    async function loadUsers() {
        const result = await apiCall({ action: 'getUsers' });
        if (result && Array.isArray(result)) {
            allUsers = result;
            return allUsers;
        }
        return [];
    }

    async function loadTasks() {
        const result = await apiCall({ action: 'getTasks' });
        if (result && Array.isArray(result)) {
            allTasks = result;
            return allTasks;
        }
        return [];
    }

    async function syncData() {
        await Promise.all([loadUsers(), loadTasks()]);
    }

    async function registerUserAPI(user) {
        return await apiCall({
            action: 'registerUser',
            id: user.id,
            name: user.name,
            school: user.school,
            corp: user.corp,
            balance: user.balance,
            password: user.password,
            isBanned: user.isBanned || false,
            banReason: user.banReason || '',
            banExpires: user.banExpires || '',
            registeredAt: user.registeredAt || new Date().toISOString()
        });
    }

    async function updateUserAPI(userId, updates) {
        return await apiCall({ action: 'updateUser', id: userId, ...updates });
    }

    async function createTaskAPI(task) {
        return await apiCall({
            action: 'createTask',
            id: task.id,
            creatorId: task.creatorId,
            description: task.description,
            price: task.price,
            location: task.location,
            status: task.status,
            takerId: task.takerId || '',
            createdAt: task.createdAt || new Date().toISOString()
        });
    }

    async function updateTaskAPI(taskId, updates) {
        return await apiCall({ action: 'updateTask', id: taskId, ...updates });
    }

    async function deleteTaskAPI(taskId) {
        return await apiCall({ action: 'deleteTask', id: taskId });
    }

    function showToast(msg, isError = false) {
        const toast = document.createElement('div');
        toast.className = 'toast';
        toast.innerText = msg;
        if (isError) toast.style.background = '#b91c1c';
        document.body.appendChild(toast);
        setTimeout(() => toast.remove(), 3000);
    }

    function saveSession() {
        if (currentUser) localStorage.setItem('schoolTasks_session', currentUser.id);
        else localStorage.removeItem('schoolTasks_session');
    }

    async function restoreSession() {
        const savedUserId = localStorage.getItem('schoolTasks_session');
        if (savedUserId) {
            await syncData();
            const user = allUsers.find(u => u.id === savedUserId);
            if (user && user.isBanned !== 'true' && user.isBanned !== true) {
                currentUser = user;
                return true;
            } else {
                localStorage.removeItem('schoolTasks_session');
            }
        }
        return false;
    }

    // ========== РЕГИСТРАЦИЯ И ВХОД ==========
    async function registerUser(name, school, corp, password) {
        if (!name.trim() || !school.trim() || !corp.trim()) { showToast('Заполните все поля', true); return false; }
        if (!password || password.length < 3) { showToast('Пароль не менее 3 символов', true); return false; }
        await syncData();
        const existing = allUsers.find(u => u.name.toLowerCase() === name.trim().toLowerCase() && u.school === school && u.corp === corp);
        if (existing) { showToast('Пользователь уже существует', true); return false; }
        const nextId = 'u' + (allUsers.length + 1);
        const newUser = {
            id: nextId, name: name.trim(), school: school.trim(), corp: corp.trim(),
            balance: 0, password: password, isBanned: false, banReason: '', banExpires: null,
            registeredAt: new Date().toISOString()
        };
        const result = await registerUserAPI(newUser);
        if (result && result.success) {
            await syncData();
            currentUser = newUser;
            saveSession();
            showToast(`Добро пожаловать, ${newUser.name}!`);
            renderApp();
            return true;
        } else { showToast('Ошибка регистрации', true); return false; }
    }

    async function loginUser(name, school, corp, password) {
        if (!name.trim() || !school.trim() || !corp.trim()) { showToast('Заполните все поля', true); return false; }
        await syncData();
        const user = allUsers.find(u => u.name.toLowerCase() === name.trim().toLowerCase() && u.school === school && u.corp === corp);
        if (!user) { showToast('Пользователь не найден', true); return false; }
        if (user.password !== password) { showToast('Неверный пароль', true); return false; }
        const isBanned = user.isBanned === 'true' || user.isBanned === true;
        if (isBanned && user.banExpires && new Date() > new Date(user.banExpires)) {
            await updateUserAPI(user.id, { isBanned: false, banReason: '', banExpires: '' });
            await syncData();
            showToast('Срок блокировки истёк, вы разблокированы.');
        } else if (isBanned) {
            let expiresDate = user.banExpires ? new Date(user.banExpires).toLocaleString() : 'навсегда';
            showToast(`⛔ Аккаунт заблокирован до ${expiresDate}. Причина: ${user.banReason || 'не указана'}`, true);
            return false;
        }
        currentUser = user;
        saveSession();
        showToast(`С возвращением, ${currentUser.name}!`);
        renderApp();
        return true;
    }

    function logout() { currentUser = null; adminMode = false; authMode = 'login'; localStorage.removeItem('schoolTasks_session'); renderApp(); }

    // ========== ЗАДАНИЯ ==========
    async function createTask(description, price, locationDetails) {
        if (!currentUser) return;
        let priceNum = parseFloat(price);
        if (isNaN(priceNum) || priceNum <= 0) { showToast('Цена должна быть положительной', true); return; }
        await syncData();
        const userIdx = allUsers.findIndex(u => u.id === currentUser.id);
        if (allUsers[userIdx].balance < priceNum) { showToast(`Недостаточно средств. Баланс: ${allUsers[userIdx].balance}₽`, true); return; }
        allUsers[userIdx].balance -= priceNum;
        await updateUserAPI(currentUser.id, { balance: allUsers[userIdx].balance });
        const newTask = {
            id: (allTasks.length + 1).toString(),
            creatorId: currentUser.id,
            description: description.trim(),
            price: priceNum,
            location: locationDetails.trim(),
            status: 'open',
            takerId: null,
            createdAt: new Date().toISOString()
        };
        await createTaskAPI(newTask);
        await syncData();
        currentUser = allUsers.find(u => u.id === currentUser.id);
        saveSession();
        showToast(`Задание создано! -${priceNum}₽`);
        renderApp();
    }

    async function takeTask(taskId) {
        if (!currentUser) return;
        await syncData();
        let task = allTasks.find(t => t.id == taskId);
        if (!task || task.status !== 'open') { showToast('Задание недоступно', true); return; }
        if (task.creatorId === currentUser.id) { showToast('Нельзя взять своё задание', true); return; }
        let creator = allUsers.find(u => u.id === task.creatorId);
        if (creator?.isBanned === 'true' || creator?.isBanned === true) { showToast('Автор задания заблокирован', true); return; }
        const totalPrice = parseFloat(task.price);
        const commission = totalPrice * 0.05;
        const executorGain = totalPrice - commission;
        const executor = allUsers.find(u => u.id === currentUser.id);
        executor.balance += executorGain;
        await updateUserAPI(executor.id, { balance: executor.balance });
        await updateTaskAPI(task.id, { status: 'taken', takerId: currentUser.id });
        await syncData();
        currentUser = allUsers.find(u => u.id === currentUser.id);
        saveSession();
        showToast(`Вы взяли задание! +${executorGain.toFixed(2)}₽ (комиссия 5%)`);
        renderApp();
    }

    async function deleteTask(taskId) {
        if (!currentUser) return;
        await syncData();
        let task = allTasks.find(t => t.id == taskId);
        if (!task) return;
        if (task.creatorId !== currentUser.id) { showToast('Можно удалять только свои задания', true); return; }
        if (task.status !== 'open') { showToast('Нельзя удалить уже взятое задание', true); return; }
        let creator = allUsers.find(u => u.id === task.creatorId);
        if (creator) {
            creator.balance += parseFloat(task.price);
            await updateUserAPI(creator.id, { balance: creator.balance });
        }
        await deleteTaskAPI(task.id);
        await syncData();
        currentUser = allUsers.find(u => u.id === currentUser.id);
        saveSession();
        showToast(`Задание удалено, ${task.price}₽ возвращено`);
        renderApp();
    }

    async function editTask(taskId, newDescription, newPrice, newLocation) {
        if (!currentUser) return;
        await syncData();
        let task = allTasks.find(t => t.id == taskId);
        if (!task) { showToast('Задание не найдено', true); return false; }
        if (task.creatorId !== currentUser.id) { showToast('Редактировать можно только свои задания', true); return false; }
        if (task.status !== 'open') { showToast('Нельзя редактировать уже взятое задание', true); return false; }
        let newPriceNum = parseFloat(newPrice);
        if (isNaN(newPriceNum) || newPriceNum <= 0) { showToast('Цена должна быть положительной', true); return false; }
        let creator = allUsers.find(u => u.id === task.creatorId);
        let oldPrice = parseFloat(task.price);
        let priceDiff = newPriceNum - oldPrice;
        if (priceDiff > 0) {
            if (creator.balance < priceDiff) { showToast(`Недостаточно средств для повышения цены. Нужно ещё ${priceDiff}₽`, true); return false; }
            creator.balance -= priceDiff;
        } else if (priceDiff < 0) { creator.balance += Math.abs(priceDiff); }
        await updateUserAPI(creator.id, { balance: creator.balance });
        await updateTaskAPI(task.id, { description: newDescription.trim(), price: newPriceNum, location: newLocation.trim() });
        await syncData();
        currentUser = allUsers.find(u => u.id === currentUser.id);
        saveSession();
        showToast(`Задание обновлено! ${priceDiff !== 0 ? (priceDiff > 0 ? `Списано ${priceDiff}₽` : `Возвращено ${Math.abs(priceDiff)}₽`) : ''}`);
        renderApp();
        return true;
    }

    // ========== АДМИН-ФУНКЦИИ ==========
    async function adminChangeBalance(userId, amount) {
        if (amount === 0) return;
        await syncData();
        let user = allUsers.find(u => u.id === userId);
        if (!user) return;
        user.balance = (parseFloat(user.balance) || 0) + amount;
        await updateUserAPI(userId, { balance: user.balance });
        await syncData();
        if (currentUser && currentUser.id === userId) currentUser = user;
        showToast(`${amount > 0 ? 'Пополнение' : 'Списание'} для ${user.name}: ${amount > 0 ? `+${amount}` : amount}₽. Новый баланс: ${user.balance}₽`);
        renderApp();
    }

    async function banUserWithDuration(userId, days, hours, reason) {
        await syncData();
        let user = allUsers.find(u => u.id === userId);
        if (!user) return;
        if (user.id === currentUser?.id) { showToast('Нельзя забанить себя', true); return; }
        let expires = null;
        if (days > 0 || hours > 0) {
            expires = new Date();
            expires.setDate(expires.getDate() + days);
            expires.setHours(expires.getHours() + hours);
        }
        await updateUserAPI(userId, { isBanned: true, banReason: reason || 'Нарушение правил', banExpires: expires ? expires.toISOString() : '' });
        await syncData();
        let durationText = '';
        if (days > 0 && hours > 0) durationText = `на ${days} дн. ${hours} ч.`;
        else if (days > 0) durationText = `на ${days} дн.`;
        else if (hours > 0) durationText = `на ${hours} ч.`;
        else durationText = 'навсегда';
        showToast(`⛔ ${user.name} заблокирован ${durationText}. Причина: ${reason || 'Нарушение правил'}`);
        renderApp();
    }

    async function unbanUser(userId) {
        await updateUserAPI(userId, { isBanned: false, banReason: '', banExpires: '' });
        await syncData();
        showToast(`✅ ${allUsers.find(u => u.id === userId)?.name} разблокирован`);
        renderApp();
    }

    function requestAdminAccess() {
        let pwd = prompt("Введите пароль администратора:");
        if (pwd === ADMIN_PASSWORD) { adminMode = true; showToast("Админ-панель активирована"); renderApp(); }
        else showToast("Неверный пароль", true);
    }

    function exitAdminMode() { adminMode = false; renderApp(); }

    function showEditModal(task) {
        const modal = document.createElement('div');
        modal.className = 'modal';
        modal.style.display = 'flex';
        modal.innerHTML = `
            <div class="modal-content">
                <h3>✏️ Редактировать задание</h3>
                <div class="form-group"><label>Описание</label><textarea id="editDesc" rows="2">${task.description}</textarea></div>
                <div class="form-group"><label>Цена (₽)</label><input type="number" id="editPrice" value="${task.price}"></div>
                <div class="form-group"><label>Место</label><input type="text" id="editLocation" value="${task.location}"></div>
                <div class="modal-buttons" style="display:flex; gap:10px; margin-top:20px;"><button class="btn-primary" id="saveEditBtn">Сохранить</button><button class="btn-danger" id="cancelEditBtn">Отмена</button></div>
            </div>
        `;
        document.body.appendChild(modal);
        modal.querySelector('#saveEditBtn').onclick = () => {
            const newDesc = modal.querySelector('#editDesc').value;
            const newPrice = modal.querySelector('#editPrice').value;
            const newLoc = modal.querySelector('#editLocation').value;
            if (newDesc && newPrice && newLoc) { editTask(task.id, newDesc, newPrice, newLoc); modal.remove(); }
            else showToast('Заполните все поля', true);
        };
        modal.querySelector('#cancelEditBtn').onclick = () => modal.remove();
    }

    // ========== ОТРИСОВКА ==========
    async function renderApp() {
        await syncData();

        const appDiv = document.getElementById('app');
        if (!currentUser) {
            const isLoginMode = authMode === 'login';
            appDiv.innerHTML = `
                <div class="header"><div class="logo"><h1>🏫 SchoolTask</h1><span>Биржа поручений</span></div></div>
                <div class="form-card">
                    <div class="tabs" style="display:flex; gap:15px; margin-bottom:20px;">
                        <div class="tab ${isLoginMode ? 'active' : ''}" id="loginTabBtn">🔐 Вход</div>
                        <div class="tab ${!isLoginMode ? 'active' : ''}" id="registerTabBtn">📝 Регистрация</div>
                    </div>
                    ${isLoginMode ? `
                        <input type="text" id="loginName" placeholder="Имя">
                        <input type="text" id="loginSchool" placeholder="Школа">
                        <input type="text" id="loginCorp" placeholder="Корпус">
                        <input type="password" id="loginPassword" placeholder="Пароль">
                        <button class="btn-primary" id="loginBtn">Войти</button>
                    ` : `
                        <input type="text" id="regName" placeholder="Имя">
                        <input type="text" id="regSchool" placeholder="Школа">
                        <input type="text" id="regCorp" placeholder="Корпус">
                        <input type="password" id="regPassword" placeholder="Пароль (мин. 3 символа)">
                        <button class="btn-primary" id="registerBtn">Зарегистрироваться</button>
                    `}
                    <div style="margin-top:15px; text-align:center;">Пополнение и вывод: @leshr_ak47</div>
                </div>
            `;
            document.getElementById('loginTabBtn')?.addEventListener('click', () => { authMode = 'login'; renderApp(); });
            document.getElementById('registerTabBtn')?.addEventListener('click', () => { authMode = 'register'; renderApp(); });
            document.getElementById('loginBtn')?.addEventListener('click', () => {
                loginUser(
                    document.getElementById('loginName').value,
                    document.getElementById('loginSchool').value,
                    document.getElementById('loginCorp').value,
                    document.getElementById('loginPassword').value
                );
            });
            document.getElementById('registerBtn')?.addEventListener('click', () => {
                registerUser(
                    document.getElementById('regName').value,
                    document.getElementById('regSchool').value,
                    document.getElementById('regCorp').value,
                    document.getElementById('regPassword').value
                );
            });
            return;
        }

        const openTasks = allTasks.filter(t => t.status === 'open' && !allUsers.find(u => u.id === t.creatorId)?.isBanned);
        const myCreatedTasks = allTasks.filter(t => t.creatorId === currentUser.id);
        const takenByMe = allTasks.filter(t => t.takerId === currentUser.id && t.status === 'taken');

        const tasksHtml = (tasksList, showTakeBtn = true, showEditDelete = false) => {
            if (!tasksList.length) return '<div class="empty-state">✨ Нет заданий</div>';
            return `<div class="tasks-grid">${tasksList.map(task => {
                const creator = allUsers.find(u => u.id === task.creatorId);
                const isMy = task.creatorId === currentUser.id;
                let actionButtons = '';
                if (task.status === 'open' && !isMy && showTakeBtn && creator?.isBanned !== 'true') {
                    actionButtons = `<button class="btn-primary take-btn" data-taskid="${task.id}">📌 Взять задание</button>`;
                } else if (task.status === 'open' && isMy && showEditDelete) {
                    actionButtons = `<div class="action-buttons"><button class="btn-warning edit-btn" data-taskid="${task.id}">✏️ Редактировать</button><button class="btn-danger delete-btn" data-taskid="${task.id}">❌ Удалить</button></div>`;
                } else if (task.status === 'open' && isMy) {
                    actionButtons = `<button class="btn-primary" disabled>Ваше задание</button>`;
                } else if (task.status === 'taken') {
                    actionButtons = `<div style="background:#e9ecef; text-align:center; padding:8px; border-radius:40px;">✅ В работе</div>`;
                }
                return `
                    <div class="task-card">
                        <div class="task-header"><div class="task-price">${task.price} ₽</div><div class="task-school">${creator ? creator.school : ''}</div></div>
                        <div class="task-desc">📌 ${task.description}</div>
                        <div class="task-meta">📍 ${task.location}</div>
                        ${actionButtons}
                    </div>
                `;
            }).join('')}</div>`;
        };

        let adminPanelHtml = '';
        const isAdmin = currentUser.name.toLowerCase() === 'leshr_ak47';
        if (isAdmin && adminMode) {
            let filteredUsers = allUsers;
            if (adminSearchTerm.trim()) {
                const searchLower = adminSearchTerm.toLowerCase();
                filteredUsers = filteredUsers.filter(u => u.name.toLowerCase().includes(searchLower) || u.school.toLowerCase().includes(searchLower));
            }
            adminPanelHtml = `
                <div class="admin-panel">
                    <div class="admin-header">
                        <h2>👑 Админ-панель</h2>
                        <div class="admin-stats">💰 Комиссия: 0 ₽ (будет добавлена)</div>
                        <button class="btn-danger" id="exitAdminBtn">Выйти</button>
                    </div>
                    <div class="admin-header">
                        <div class="search-box">🔍 <input type="text" id="adminSearch" placeholder="Поиск по имени или школе..." value="${adminSearchTerm}"></div>
                        <div><button class="refresh-btn" id="refreshUsersBtn">🔄 Обновить список</button> <span class="balance-card">👥 Всего: ${allUsers.length}</span></div>
                    </div>
                    <div class="users-table">
                        <table><thead><tr><th>Имя</th><th>Школа / Корпус</th><th>Баланс</th><th>Дата рег.</th><th>Статус</th><th>Баланс</th><th>Бан</th></tr></thead>
                        <tbody>${filteredUsers.map(user => {
                            const isBanned = user.isBanned === 'true' || user.isBanned === true;
                            let banInfo = '';
                            if (isBanned) {
                                let expires = user.banExpires ? new Date(user.banExpires).toLocaleString() : 'навсегда';
                                banInfo = `<div class="ban-info">⛔ до ${expires}<br>${user.banReason}</div>`;
                            }
                            const regDate = user.registeredAt ? new Date(user.registeredAt).toLocaleDateString() : '—';
                            return `<tr class="${isBanned ? 'banned-row' : ''}">
                                <td><strong>${user.name}</strong></td>
                                <td>${user.school}<br><span style="font-size:0.7rem;">${user.corp}</span></td>
                                <td style="font-weight:bold;">${parseFloat(user.balance || 0).toFixed(2)} ₽</td>
                                <td class="reg-date">${regDate}</td>
                                <td>${isBanned ? '⛔ Забанен' : '✅ Активен'}${banInfo}</td>
                                <td><div class="balance-control"><input type="number" id="amount-${user.id}" placeholder="Сумма" value="100"><button class="topup-btn" data-userid="${user.id}">💰 +</button><button class="withdraw-btn" data-userid="${user.id}">💸 -</button></div></td>
                                <td>${!isBanned ? `<div class="ban-control"><input type="number" id="days-${user.id}" placeholder="Дни" value="0"><input type="number" id="hours-${user.id}" placeholder="Часы" value="0"><input type="text" id="reason-${user.id}" placeholder="Причина"><button class="ban-btn" data-userid="${user.id}">⛔ Бан</button></div>` : `<button class="unban-btn" data-userid="${user.id}">✅ Разбанить</button>`}</td>
                            </tr>`}).join('')}</tbody></table>
                        ${filteredUsers.length === 0 ? '<div style="text-align:center; padding:20px;">🔍 Ничего не найдено</div>' : ''}
                    </div>
                </div>
            `;
        }

        const createForm = `
            <div class="form-card">
                <h3>📝 Создать задание</h3>
                <div class="warning-message" style="background:#fef9e3; padding:12px; border-radius:20px; margin-bottom:15px;">💰 Стоимость спишется с баланса. Исполнитель получит 95%</div>
                <textarea id="taskDesc" rows="2" placeholder="Что нужно сделать?"></textarea>
                <input type="number" id="taskPrice" placeholder="Цена (руб)">
                <input type="text" id="taskLocation" placeholder="Место">
                <button class="btn-primary" id="createTaskBtn">Создать</button>
            </div>
        `;

        let activeTab = window._activeTab || 'allTasks';
        let mainContent = '';
        if (activeTab === 'allTasks') mainContent = `<h3>📋 Доступные задания</h3>${tasksHtml(openTasks, true, false)}`;
        else if (activeTab === 'myTasks') mainContent = `<h3>📌 Мои задания</h3>${tasksHtml(myCreatedTasks, false, true)}`;
        else if (activeTab === 'takenTasks') mainContent = `<h3>⚡ Взятые мной</h3>${tasksHtml(takenByMe, false, false)}`;
        else if (activeTab === 'create') mainContent = createForm;

        const adminButtonHtml = isAdmin ? `<button id="adminPanelBtn" style="background:#2c3e50; color:white; border:none; padding:6px 20px; border-radius:60px;">🔐 Админка</button>` : '';

        appDiv.innerHTML = `
            <div class="header">
                <div class="logo"><h1>🏫 SchoolTask</h1></div>
                <div class="user-info">
                    <div>👋 ${currentUser.name} | ${currentUser.school}</div>
                    <div class="balance-card">💰 ${parseFloat(currentUser.balance || 0).toFixed(2)} ₽</div>
                    <button class="btn-danger" id="logoutBtn" style="padding:6px 12px;">Выйти</button>
                </div>
            </div>
            <div style="display:flex; justify-content:space-between; margin-bottom:15px; flex-wrap:wrap; gap:10px;">
                <span>📢 Пополнение и вывод: @leshr_ak47</span>
                <div><button id="topupBtn" style="background:#ffd966; border:none; padding:6px 20px; border-radius:60px;">➕ Пополнить</button><button id="withdrawBtn" style="background:#f97316; border:none; padding:6px 20px; border-radius:60px; margin-left:10px;">💸 Вывод</button>${adminButtonHtml}</div>
            </div>
            ${adminPanelHtml}
            <div class="tabs">
                <div class="tab ${activeTab === 'allTasks' ? 'active' : ''}" data-tab="allTasks">📋 Все задания</div>
                <div class="tab ${activeTab === 'myTasks' ? 'active' : ''}" data-tab="myTasks">📦 Мои</div>
                <div class="tab ${activeTab === 'takenTasks' ? 'active' : ''}" data-tab="takenTasks">🤝 Взятые</div>
                <div class="tab ${activeTab === 'create' ? 'active' : ''}" data-tab="create">➕ Создать</div>
            </div>
            ${mainContent}
            <div style="margin-top:20px; text-align:center; font-size:12px;">⚠️ Комиссия 5% | Вывод средств через администратора @leshr_ak47</div>
        `;

        document.querySelectorAll('.tab').forEach(el => {
            el.addEventListener('click', () => { window._activeTab = el.dataset.tab; renderApp(); });
        });
        document.getElementById('logoutBtn')?.addEventListener('click', logout);
        document.getElementById('topupBtn')?.addEventListener('click', () => showToast('Напишите @leshr_ak47 для пополнения баланса'));
        document.getElementById('withdrawBtn')?.addEventListener('click', () => showToast('Вывод средств через администратора в Telegram @leshr_ak47'));
        if (isAdmin) {
            document.getElementById('adminPanelBtn')?.addEventListener('click', () => { if (adminMode) exitAdminMode(); else requestAdminAccess(); });
            document.getElementById('exitAdminBtn')?.addEventListener('click', exitAdminMode);
            document.getElementById('refreshUsersBtn')?.addEventListener('click', async () => { await syncData(); renderApp(); showToast('Список обновлён'); });
            document.getElementById('adminSearch')?.addEventListener('input', (e) => { adminSearchTerm = e.target.value; renderApp(); });
        }
        document.getElementById('createTaskBtn')?.addEventListener('click', () => {
            const desc = document.getElementById('taskDesc')?.value;
            const price = document.getElementById('taskPrice')?.value;
            const loc = document.getElementById('taskLocation')?.value;
            if (desc && price && loc) createTask(desc, price, loc);
            else showToast('Заполните все поля', true);
        });
        document.querySelectorAll('.take-btn').forEach(btn => btn.addEventListener('click', () => takeTask(parseInt(btn.dataset.taskid))));
        document.querySelectorAll('.delete-btn').forEach(btn => btn.addEventListener('click', () => deleteTask(parseInt(btn.dataset.taskid))));
        document.querySelectorAll('.edit-btn').forEach(btn => {
            const taskId = parseInt(btn.dataset.taskid);
            const task = allTasks.find(t => t.id == taskId);
            if (task) btn.addEventListener('click', () => showEditModal(task));
        });
        if (isAdmin) {
            document.querySelectorAll('.topup-btn').forEach(btn => btn.addEventListener('click', () => {
                const userId = btn.dataset.userid;
                const amount = parseFloat(document.getElementById(`amount-${userId}`)?.value);
                if (amount > 0) adminChangeBalance(userId, amount);
                else showToast('Введите сумму', true);
            }));
            document.querySelectorAll('.withdraw-btn').forEach(btn => btn.addEventListener('click', () => {
                const userId = btn.dataset.userid;
                const amount = parseFloat(document.getElementById(`amount-${userId}`)?.value);
                if (amount > 0) adminChangeBalance(userId, -amount);
                else showToast('Введите сумму', true);
            }));
            document.querySelectorAll('.ban-btn').forEach(btn => btn.addEventListener('click', () => {
                const userId = btn.dataset.userid;
                const days = parseInt(document.getElementById(`days-${userId}`)?.value) || 0;
                const hours = parseInt(document.getElementById(`hours-${userId}`)?.value) || 0;
                const reason = document.getElementById(`reason-${userId}`)?.value || '';
                if (days === 0 && hours === 0 && !confirm('Бан навсегда. Продолжить?')) return;
                banUserWithDuration(userId, days, hours, reason);
            }));
            document.querySelectorAll('.unban-btn').forEach(btn => btn.addEventListener('click', () => unbanUser(btn.dataset.userid)));
        }
    }

    restoreSession().then(() => renderApp());
</script>
</body>
</html>
