<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>SchoolTask - Биржа поручений</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', system-ui; }
        body { background: linear-gradient(145deg, #f0f4fa 0%, #e2e8f0 100%); min-height: 100vh; padding: 20px; transition: background 0.3s, color 0.3s; }
        
        body.dark-theme {
            background: linear-gradient(145deg, #1a1a2e 0%, #16213e 100%);
            color: #e2e8f0;
        }
        body.dark-theme .header,
        body.dark-theme .card,
        body.dark-theme .admin-panel,
        body.dark-theme .task-card,
        body.dark-theme .chat-modal,
        body.dark-theme .reviews-modal {
            background: #1e293b;
            color: #e2e8f0;
        }
        body.dark-theme .user-info {
            background: #334155;
        }
        body.dark-theme .tab {
            background: #334155;
            color: #e2e8f0;
        }
        body.dark-theme .tab.active {
            background: #3b82f6;
        }
        body.dark-theme input,
        body.dark-theme textarea {
            background: #334155;
            border-color: #475569;
            color: #e2e8f0;
        }
        body.dark-theme .search-box {
            background: #334155;
        }
        body.dark-theme .users-table th,
        body.dark-theme .users-table td {
            border-bottom-color: #475569;
        }
        
        .container { max-width: 1300px; margin: 0 auto; }
        .header, .card, .admin-panel, .task-card { background: white; border-radius: 32px; padding: 20px; margin-bottom: 20px; box-shadow: 0 8px 20px rgba(0,0,0,0.05); }
        .header { display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; }
        .logo h1 { background: linear-gradient(135deg, #1e2b3c, #2c4c6e); -webkit-background-clip: text; background-clip: text; color: transparent; font-size: 1.6rem; }
        .user-info { display: flex; align-items: center; gap: 20px; background: #f8fafc; padding: 8px 20px; border-radius: 60px; }
        .balance-card { background: #eef2ff; padding: 6px 16px; border-radius: 40px; font-weight: bold; }
        button { cursor: pointer; border: none; border-radius: 40px; padding: 10px 20px; font-weight: bold; transition: 0.2s; }
        .btn-primary { background: #2c6e4f; color: white; }
        .btn-success { background: #10b981; color: white; }
        .btn-danger { background: #dc2626; color: white; }
        .btn-warning { background: #f59e0b; color: white; }
        .btn-info { background: #3b82f6; color: white; }
        .btn-outline { background: transparent; border: 1px solid #cbd5e1; }
        .theme-toggle { background: #334155; color: white; padding: 8px 16px; border-radius: 60px; font-size: 0.9rem; }
        input, textarea { width: 100%; padding: 12px 16px; border: 1px solid #cbd5e1; border-radius: 28px; margin-bottom: 12px; font-size: 1rem; }
        .tabs { display: flex; gap: 12px; flex-wrap: wrap; margin-bottom: 20px; }
        .tab { background: white; padding: 10px 24px; border-radius: 60px; cursor: pointer; font-weight: 600; }
        .tab.active { background: #1e4a6e; color: white; }
        .tasks-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(350px, 1fr)); gap: 20px; }
        .task-header { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 12px; flex-wrap: wrap; gap: 8px; }
        .task-price { font-size: 1.6rem; font-weight: 800; color: #2b6e4f; }
        .task-status { padding: 4px 12px; border-radius: 30px; font-size: 0.75rem; font-weight: bold; }
        .status-open { background: #e2e8f0; color: #1e4a6e; }
        .status-progress { background: #fef3c7; color: #d97706; }
        .status-awaiting { background: #e0f2fe; color: #0284c7; }
        .status-completed { background: #d1fae5; color: #10b981; }
        .status-disputed { background: #fee2e2; color: #dc2626; }
        .action-buttons { display: flex; gap: 10px; margin-top: 12px; flex-wrap: wrap; }
        .admin-panel { border: 2px solid #ffd966; }
        .admin-header { display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 10px; margin-bottom: 20px; }
        .search-box { display: flex; align-items: center; gap: 8px; background: #f1f5f9; padding: 5px 15px; border-radius: 40px; }
        .search-box input { margin: 0; padding: 8px; background: transparent; border: none; width: 200px; outline: none; }
        .refresh-btn { background: #3b82f6; color: white; padding: 8px 16px; border-radius: 40px; }
        .users-table { overflow-x: auto; margin-top: 15px; }
        .users-table table { width: 100%; border-collapse: collapse; }
        .users-table th, .users-table td { padding: 12px 8px; text-align: left; border-bottom: 1px solid #e2e8f0; }
        .balance-control, .ban-control { display: flex; gap: 5px; flex-wrap: wrap; align-items: center; }
        .balance-control input, .ban-control input { width: 70px; margin: 0; padding: 6px; border-radius: 30px; border: 1px solid #cbd5e1; }
        .toast { position: fixed; bottom: 30px; right: 30px; background: #1f2f3e; color: white; padding: 12px 24px; border-radius: 60px; z-index: 1000; animation: fadein 0.3s; }
        @keyframes fadein { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        .error-text { color: #dc2626; font-size: 0.8rem; margin-top: -8px; margin-bottom: 12px; display: none; }
        .loading { text-align: center; padding: 40px; color: #6b7280; }
        
        .stars { display: flex; gap: 5px; margin: 10px 0; }
        .star { font-size: 24px; cursor: pointer; color: #cbd5e1; transition: 0.2s; }
        .star.active { color: #f59e0b; }
        .star:hover { transform: scale(1.1); }
        .user-rating { display: inline-flex; align-items: center; gap: 5px; background: #fef3c7; padding: 4px 10px; border-radius: 20px; font-size: 0.8rem; }
        
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.7);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 2000;
        }
        .chat-modal, .reviews-modal {
            background: white;
            border-radius: 32px;
            width: 90%;
            max-width: 500px;
            max-height: 80vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        .chat-header, .reviews-header {
            padding: 16px 20px;
            border-bottom: 1px solid #e2e8f0;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 16px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        .message {
            max-width: 80%;
            padding: 10px 14px;
            border-radius: 20px;
            font-size: 0.9rem;
        }
        .message-mine {
            background: #3b82f6;
            color: white;
            align-self: flex-end;
        }
        .message-other {
            background: #e2e8f0;
            align-self: flex-start;
        }
        .chat-input {
            display: flex;
            gap: 10px;
            padding: 16px;
            border-top: 1px solid #e2e8f0;
        }
        .chat-input input {
            flex: 1;
            margin: 0;
        }
        .review-item {
            padding: 12px;
            border-bottom: 1px solid #e2e8f0;
        }
        
        @media (max-width: 700px) { .admin-header { flex-direction: column; align-items: stretch; } .search-box { justify-content: center; } }
    </style>
</head>
<body>
<div class="container" id="app"><div class="loading">⏳ Загрузка...</div></div>

<script>
    // ========== НАСТРОЙКИ ==========
    const API_URL = 'https://script.google.com/macros/s/AKfycbwy3VOArLHWEsstVY1xV39ik8yNtqt1ftbE7X7VJuwn-AOhsr-kJwLXITJIYPSWINFW4g/exec';
    const ADMIN_PASSWORD = 'dsl382dAZX';
    const TASK_TIMEOUT_HOURS = 5;
    
    // Состояние приложения
    let currentUser = null;
    let adminMode = false;
    let authMode = 'login';
    let adminSearchTerm = '';
    let cachedUsers = [];
    let cachedTasks = [];
    let cachedReviews = [];
    let cachedMessages = {};
    let isLoading = false;
    let isCreatingTask = false;
    let isDarkTheme = localStorage.getItem('darkTheme') === 'true';
    
    // Кэширование
    let cacheExpiry = 0;
    const CACHE_DURATION = 30000; // 30 секунд
    
    // Пагинация
    let currentPage = 0;
    const ITEMS_PER_PAGE = 10;
    
    // Применяем тему при загрузке
    if (isDarkTheme) document.body.classList.add('dark-theme');

    // ========== ХЕШ-ФУНКЦИЯ ДЛЯ ЗАЩИТЫ СЕССИИ ==========
    function simpleHash(str) {
        if (!str) return '';
        let hash = 0;
        for (let i = 0; i < str.length; i++) {
            hash = ((hash << 5) - hash) + str.charCodeAt(i);
            hash |= 0;
        }
        return hash.toString();
    }

    // ========== ВСПОМОГАТЕЛЬНЫЕ ФУНКЦИИ ==========
    function debounce(func, delay) {
        let timeout;
        return function(...args) {
            clearTimeout(timeout);
            timeout = setTimeout(() => func.apply(this, args), delay);
        };
    }

    function toggleTheme() {
        isDarkTheme = !isDarkTheme;
        localStorage.setItem('darkTheme', isDarkTheme);
        if (isDarkTheme) document.body.classList.add('dark-theme');
        else document.body.classList.remove('dark-theme');
        renderApp();
    }

    async function apiCall(params, silent = false) {
        const url = new URL(API_URL);
        Object.keys(params).forEach(key => url.searchParams.append(key, params[key]));
        try {
            const response = await fetch(url.toString());
            const text = await response.text();
            try {
                return JSON.parse(text);
            } catch (e) {
                if (!silent) showToast('Ошибка: сервер вернул некорректный ответ', true);
                return null;
            }
        } catch (error) {
            if (!silent) showToast('Ошибка связи с сервером', true);
            return null;
        }
    }

    async function syncData(force = false) {
        const now = Date.now();
        if (!force && cacheExpiry > now && cachedUsers.length > 0) {
            return { users: cachedUsers, tasks: cachedTasks, reviews: cachedReviews };
        }
        
        if (isLoading) return { users: cachedUsers, tasks: cachedTasks, reviews: cachedReviews };
        isLoading = true;
        
        try {
            const [users, tasks, reviews] = await Promise.all([
                apiCall({ action: 'getUsers' }, true),
                apiCall({ action: 'getTasks' }, true),
                apiCall({ action: 'getReviews' }, true)
            ]);
            if (users && Array.isArray(users)) cachedUsers = users;
            if (tasks && Array.isArray(tasks)) cachedTasks = tasks;
            if (reviews && Array.isArray(reviews)) cachedReviews = reviews;
            cacheExpiry = now + CACHE_DURATION;
        } catch (e) {}
        
        isLoading = false;
        return { users: cachedUsers, tasks: cachedTasks, reviews: cachedReviews };
    }

    function forceSync() {
        cacheExpiry = 0;
        return syncData(true);
    }

    function showToast(msg, isError = false) {
        const toast = document.createElement('div');
        toast.className = 'toast';
        toast.innerText = msg;
        if (isError) toast.style.background = '#b91c1c';
        document.body.appendChild(toast);
        setTimeout(() => toast.remove(), 3000);
    }

    // ========== ЗАЩИЩЁННАЯ СИСТЕМА СЕССИЙ ==========
    function saveSession() {
        if (currentUser) {
            const sessionData = {
                id: currentUser.id,
                name: currentUser.name,
                school: currentUser.school,
                corp: currentUser.corp,
                passwordHash: simpleHash(currentUser.password),
                savedAt: Date.now()
            };
            localStorage.setItem('schoolTasks_session', JSON.stringify(sessionData));
            // Дополнительно сохраняем в sessionStorage для проверки
            sessionStorage.setItem('schoolTasks_currentUserId', currentUser.id);
        } else {
            localStorage.removeItem('schoolTasks_session');
            sessionStorage.removeItem('schoolTasks_currentUserId');
        }
    }

    async function restoreSession() {
        const savedSession = localStorage.getItem('schoolTasks_session');
        if (!savedSession) return false;
        
        try {
            const sessionData = JSON.parse(savedSession);
            
            // Проверка возраста сессии (максимум 7 дней)
            const SESSION_MAX_AGE = 7 * 24 * 60 * 60 * 1000;
            if (Date.now() - sessionData.savedAt > SESSION_MAX_AGE) {
                localStorage.removeItem('schoolTasks_session');
                return false;
            }
            
            await syncData();
            
            // Поиск пользователя (сначала по ID, потом по уникальной комбинации)
            let user = cachedUsers.find(u => u.id === sessionData.id);
            
            if (!user) {
                user = cachedUsers.find(u => 
                    u.name === sessionData.name && 
                    u.school === sessionData.school &&
                    u.corp === sessionData.corp
                );
            }
            
            if (!user) {
                localStorage.removeItem('schoolTasks_session');
                return false;
            }
            
            // Проверка хеша пароля (защита от подмены)
            const currentHash = simpleHash(user.password);
            if (currentHash !== sessionData.passwordHash) {
                console.warn('Хеш пароля не совпадает, сессия недействительна');
                localStorage.removeItem('schoolTasks_session');
                return false;
            }
            
            // Проверка бана
            const isBanned = user.isBanned === 'true' || user.isBanned === true;
            if (isBanned) {
                if (user.banExpires && new Date() > new Date(user.banExpires)) {
                    await apiCall({ action: 'updateUser', id: user.id, isBanned: false, banReason: '', banExpires: '' });
                    user.isBanned = false;
                } else {
                    localStorage.removeItem('schoolTasks_session');
                    return false;
                }
            }
            
            currentUser = user;
            // Обновляем сессию
            saveSession();
            return true;
        } catch (e) {
            console.error('Ошибка восстановления сессии:', e);
            localStorage.removeItem('schoolTasks_session');
        }
        
        return false;
    }

    function isUsernameTaken(name) {
        return cachedUsers.some(u => u.name && u.name.toLowerCase() === name.trim().toLowerCase());
    }

    async function registerUser(name, school, corp, password) {
        if (!name.trim() || !school.trim() || !corp.trim()) { 
            showToast('Заполните все поля', true); 
            return false; 
        }
        if (!password || password.length < 3) { 
            showToast('Пароль не менее 3 символов', true); 
            return false; 
        }
        
        await syncData();
        
        if (isUsernameTaken(name)) {
            showToast(`❌ Имя "${name}" уже занято! Выберите другое.`, true);
            return false;
        }
        
        const nextId = 'u' + Date.now();
        const newUser = {
            id: nextId,
            name: name.trim(),
            school: school.trim(),
            corp: corp.trim(),
            balance: 0,
            password: password.trim(),
            isBanned: false,
            banReason: '',
            banExpires: null,
            rating: 0,
            ratingCount: 0,
            registeredAt: new Date().toISOString()
        };
        
        const result = await apiCall({
            action: 'registerUser',
            id: newUser.id, name: newUser.name, school: newUser.school, corp: newUser.corp,
            balance: newUser.balance, password: newUser.password, isBanned: false,
            banReason: '', banExpires: '', registeredAt: newUser.registeredAt,
            rating: 0, ratingCount: 0
        });
        
        if (result && result.success) {
            cachedUsers.push(newUser);
            currentUser = newUser;
            saveSession();
            showToast(`✅ Добро пожаловать, ${newUser.name}!`);
            renderApp();
            return true;
        } else { 
            showToast('Ошибка регистрации. Проверьте интернет или обратитесь к администратору.', true); 
            return false; 
        }
    }

    async function loginUser(name, school, corp, password) {
        const cleanName = name ? name.toString().trim() : '';
        const cleanSchool = school ? school.toString().trim() : '';
        const cleanCorp = corp ? corp.toString().trim() : '';
        const cleanPassword = password ? password.toString().trim() : '';
        
        if (!cleanName || !cleanSchool || !cleanCorp) { 
            showToast('Заполните все поля (имя, школа, корпус)', true); 
            return false; 
        }
        if (!cleanPassword) { 
            showToast('Введите пароль', true); 
            return false; 
        }
        
        await syncData();
        
        const user = cachedUsers.find(u => {
            const userName = u.name ? u.name.toString().trim() : '';
            const userSchool = u.school ? u.school.toString().trim() : '';
            const userCorp = u.corp ? u.corp.toString().trim() : '';
            return userName === cleanName && userSchool === cleanSchool && userCorp === cleanCorp;
        });
        
        if (!user) { 
            showToast(`❌ Пользователь не найден.\nПроверьте данные`, true); 
            return false; 
        }
        
        const userPassword = user.password ? user.password.toString().trim() : '';
        if (userPassword !== cleanPassword) { 
            showToast(`❌ Неверный пароль для пользователя ${user.name}`, true); 
            return false; 
        }
        
        const isBanned = user.isBanned === 'true' || user.isBanned === true;
        if (isBanned && user.banExpires && new Date() > new Date(user.banExpires)) {
            await apiCall({ action: 'updateUser', id: user.id, isBanned: false, banReason: '', banExpires: '' });
            user.isBanned = false;
            showToast('Срок блокировки истёк, вы разблокированы.');
        } else if (isBanned) {
            let expiresDate = user.banExpires ? new Date(user.banExpires).toLocaleString() : 'навсегда';
            showToast(`⛔ Аккаунт заблокирован до ${expiresDate}. Причина: ${user.banReason || 'не указана'}`, true);
            return false;
        }
        
        currentUser = user;
        saveSession();
        showToast(`✅ С возвращением, ${currentUser.name}!`);
        currentPage = 0;
        renderApp();
        return true;
    }

    function logout() { 
        currentUser = null; 
        adminMode = false; 
        authMode = 'login'; 
        currentPage = 0;
        localStorage.removeItem('schoolTasks_session'); 
        sessionStorage.removeItem('schoolTasks_currentUserId');
        renderApp(); 
    }

    async function createTask(description, price, locationDetails) {
        if (!currentUser) return;
        if (isCreatingTask) {
            showToast('Подождите, задание уже создаётся...', true);
            return;
        }
        
        let priceNum = parseFloat(price);
        if (isNaN(priceNum) || priceNum <= 0) { showToast('Цена должна быть положительной', true); return; }
        
        isCreatingTask = true;
        
        await syncData();
        const userIdx = cachedUsers.findIndex(u => u.id === currentUser.id);
        if (cachedUsers[userIdx].balance < priceNum) { 
            showToast(`Недостаточно средств. Баланс: ${cachedUsers[userIdx].balance}₽`, true); 
            isCreatingTask = false;
            return; 
        }
        
        cachedUsers[userIdx].balance -= priceNum;
        currentUser.balance = cachedUsers[userIdx].balance;
        
        const newTask = {
            id: Date.now().toString(),
            creatorId: currentUser.id,
            creatorSchool: currentUser.school,
            description: description.trim(),
            price: priceNum,
            location: locationDetails.trim(),
            status: 'open',
            takerId: null,
            takenAt: null,
            completedAt: null,
            createdAt: new Date().toISOString()
        };
        
        await apiCall({ action: 'updateUser', id: currentUser.id, balance: currentUser.balance });
        const result = await apiCall({ action: 'createTask', ...newTask, takerId: '' });
        
        if (result && result.success) {
            cachedTasks.push(newTask);
            cacheExpiry = 0;
            showToast(`Задание создано! -${priceNum}₽ (деньги заморожены до подтверждения)`);
        } else {
            cachedUsers[userIdx].balance += priceNum;
            currentUser.balance = cachedUsers[userIdx].balance;
            showToast('Ошибка создания задания', true);
        }
        
        isCreatingTask = false;
        renderApp();
    }

    async function takeTask(taskId) {
        if (!currentUser) return;
        await syncData();
        let task = cachedTasks.find(t => t.id == taskId);
        if (!task || task.status !== 'open') { showToast('Задание недоступно', true); return; }
        if (task.creatorId === currentUser.id) { showToast('Нельзя взять своё задание', true); return; }
        
        task.status = 'in_progress';
        task.takerId = currentUser.id;
        task.takenAt = new Date().toISOString();
        
        await apiCall({ action: 'updateTask', id: task.id, status: 'in_progress', takerId: currentUser.id, takenAt: task.takenAt });
        
        showToast(`📢 Вы взяли задание! Выполните его и нажмите "Подтвердить выполнение".`);
        cacheExpiry = 0;
        renderApp();
    }

    async function confirmCompletion(taskId) {
        if (!currentUser) return;
        await syncData();
        let task = cachedTasks.find(t => t.id == taskId);
        if (!task || task.status !== 'in_progress') { showToast('Задание нельзя подтвердить', true); return; }
        if (task.takerId !== currentUser.id) { showToast('Только исполнитель может подтвердить выполнение', true); return; }
        
        task.status = 'awaiting_confirmation';
        task.completedAt = new Date().toISOString();
        
        await apiCall({ action: 'updateTask', id: task.id, status: 'awaiting_confirmation', completedAt: task.completedAt });
        
        showToast(`✅ Вы отметили задание как выполненное. Ожидайте подтверждения от создателя.`);
        cacheExpiry = 0;
        renderApp();
    }

    async function confirmReceipt(taskId) {
        if (!currentUser) return;
        await syncData();
        let task = cachedTasks.find(t => t.id == taskId);
        if (!task || task.status !== 'awaiting_confirmation') { showToast('Задание нельзя подтвердить', true); return; }
        if (task.creatorId !== currentUser.id) { showToast('Только создатель может подтвердить получение', true); return; }
        
        const totalPrice = parseFloat(task.price);
        const commission = totalPrice * 0.05;
        const executorGain = totalPrice - commission;
        
        const executor = cachedUsers.find(u => u.id === task.takerId);
        if (executor) {
            executor.balance = (parseFloat(executor.balance) || 0) + executorGain;
            await apiCall({ action: 'updateUser', id: executor.id, balance: executor.balance });
        }
        
        task.status = 'completed';
        
        await apiCall({ action: 'updateTask', id: task.id, status: 'completed' });
        
        showToast(`💰 Подтверждено! ${executorGain.toFixed(2)}₽ переведено исполнителю. Комиссия 5% (${commission.toFixed(2)}₽)`);
        
        setTimeout(() => {
            if (confirm(`Хотите оставить отзыв об исполнителе ${executor?.name}?`)) {
                showReviewModal(task.takerId, task.id);
            }
        }, 500);
        
        cacheExpiry = 0;
        renderApp();
    }

    async function markAsNotReceived(taskId) {
        if (!currentUser) return;
        await syncData();
        let task = cachedTasks.find(t => t.id == taskId);
        if (!task || task.status !== 'awaiting_confirmation') { showToast('Задание нельзя отменить', true); return; }
        if (task.creatorId !== currentUser.id) { showToast('Только создатель может отметить "не получил"', true); return; }
        
        const creator = cachedUsers.find(u => u.id === task.creatorId);
        if (creator) {
            creator.balance = (parseFloat(creator.balance) || 0) + parseFloat(task.price);
            await apiCall({ action: 'updateUser', id: creator.id, balance: creator.balance });
            if (currentUser.id === creator.id) currentUser.balance = creator.balance;
        }
        
        task.status = 'disputed';
        
        await apiCall({ action: 'updateTask', id: task.id, status: 'disputed' });
        
        showToast(`⚠️ Вы отметили, что не получили услугу. Деньги возвращены на ваш баланс.`);
        cacheExpiry = 0;
        renderApp();
    }

    async function forceCancelTask(taskId) {
        if (!currentUser) return;
        await syncData();
        let task = cachedTasks.find(t => t.id == taskId);
        if (!task) return;
        if (task.creatorId !== currentUser.id) { showToast('Можно удалять только свои задания', true); return; }
        if (task.status !== 'open') { showToast('Нельзя удалить задание, которое уже взято', true); return; }
        
        const creator = cachedUsers.find(u => u.id === task.creatorId);
        if (creator) {
            creator.balance = (parseFloat(creator.balance) || 0) + parseFloat(task.price);
            await apiCall({ action: 'updateUser', id: creator.id, balance: creator.balance });
            if (currentUser.id === creator.id) currentUser.balance = creator.balance;
        }
        
        await apiCall({ action: 'deleteTask', id: task.id });
        
        cachedTasks = cachedTasks.filter(t => t.id != taskId);
        cacheExpiry = 0;
        showToast(`Задание удалено, ${task.price}₽ возвращено на баланс`);
        renderApp();
    }

    // ========== ОТЗЫВЫ ==========
    async function addReview(userId, taskId, rating, comment) {
        const newReview = {
            id: Date.now().toString(),
            fromUserId: currentUser.id,
            toUserId: userId,
            taskId: taskId,
            rating: parseInt(rating),
            comment: comment.trim(),
            createdAt: new Date().toISOString()
        };
        
        await apiCall({ action: 'addReview', ...newReview });
        cachedReviews.push(newReview);
        
        const user = cachedUsers.find(u => u.id === userId);
        const userReviews = cachedReviews.filter(r => r.toUserId === userId);
        const totalRating = userReviews.reduce((sum, r) => sum + parseInt(r.rating), 0);
        const newRating = totalRating / userReviews.length;
        const newRatingCount = userReviews.length;
        
        await apiCall({ action: 'updateUser', id: userId, rating: newRating, ratingCount: newRatingCount });
        user.rating = newRating;
        user.ratingCount = newRatingCount;
        
        showToast(`⭐ Спасибо за отзыв!`);
        cacheExpiry = 0;
        renderApp();
    }

    function getUserRating(userId) {
        const user = cachedUsers.find(u => u.id === userId);
        if (!user || user.ratingCount == 0) return null;
        return { rating: parseFloat(user.rating).toFixed(1), count: user.ratingCount };
    }

    function showReviewModal(userId, taskId) {
        const user = cachedUsers.find(u => u.id === userId);
        let selectedRating = 5;
        
        const modal = document.createElement('div');
        modal.className = 'modal-overlay';
        modal.innerHTML = `
            <div class="reviews-modal">
                <div class="reviews-header">
                    <h3>⭐ Оценить ${user?.name}</h3>
                    <button class="btn-danger" id="closeReviewModal" style="padding: 5px 15px;">✕</button>
                </div>
                <div style="padding: 20px;">
                    <div class="stars" id="starRating">
                        ${[1,2,3,4,5].map(s => `<span class="star ${s <= 5 ? 'active' : ''}" data-rating="${s}">★</span>`).join('')}
                    </div>
                    <textarea id="reviewComment" rows="3" placeholder="Напишите отзыв (необязательно)"></textarea>
                    <button class="btn-primary" id="submitReview" style="width:100%;">Отправить отзыв</button>
                </div>
            </div>
        `;
        document.body.appendChild(modal);
        
        const stars = modal.querySelectorAll('.star');
        stars.forEach(star => {
            star.addEventListener('click', () => {
                const rating = parseInt(star.dataset.rating);
                selectedRating = rating;
                stars.forEach(s => {
                    if (parseInt(s.dataset.rating) <= rating) s.classList.add('active');
                    else s.classList.remove('active');
                });
            });
        });
        
        modal.querySelector('#closeReviewModal').onclick = () => modal.remove();
        modal.querySelector('#submitReview').onclick = () => {
            const comment = modal.querySelector('#reviewComment').value;
            addReview(userId, taskId, selectedRating, comment);
            modal.remove();
        };
    }

    function showUserReviews(userId) {
        const user = cachedUsers.find(u => u.id === userId);
        const reviews = cachedReviews.filter(r => r.toUserId === userId);
        
        const modal = document.createElement('div');
        modal.className = 'modal-overlay';
        modal.innerHTML = `
            <div class="reviews-modal">
                <div class="reviews-header">
                    <h3>⭐ Отзывы о ${user?.name}</h3>

                </div>
                <div style="padding: 20px; max-height: 60vh; overflow-y: auto;">

    // ========== ЧАТ ==========
    async function sendMessage(taskId, message) {
        if (!message.trim()) return;
        
        if (!cachedMessages[taskId]) cachedMessages[taskId] = [];
        cachedMessages[taskId].push({
            id: Date.now().toString(),
            fromUserId: currentUser.id,
            message: message.trim(),
            timestamp: new Date().toISOString()
        });
        
        await apiCall({ action: 'saveMessage', taskId: taskId, messages: JSON.stringify(cachedMessages[taskId]) }, true);
        renderApp();
    }

    async function openChat(taskId) {
        await syncData();
        
        const saved = await apiCall({ action: 'getMessages', taskId: taskId }, true);
        if (saved && saved.messages) {
            cachedMessages[taskId] = JSON.parse(saved.messages);
        } else if (!cachedMessages[taskId]) {
            cachedMessages[taskId] = [];
        }
        
        const task = cachedTasks.find(t => t.id == taskId);
        const otherUserId = task.creatorId === currentUser.id ? task.takerId : task.creatorId;
        const otherUser = cachedUsers.find(u => u.id === otherUserId);
        
        const modal = document.createElement('div');
        modal.className = 'modal-overlay';
        modal.innerHTML = `
            <div class="chat-modal">
                <div class="chat-header">
                    <h3>💬 Чат с ${otherUser?.name}</h3>
                    <button class="btn-danger" id="closeChat" style="padding: 5px 15px;">✕</button>
                </div>
                <div class="chat-messages" id="chatMessages">
                    ${cachedMessages[taskId].map(m => `
                        <div class="message ${m.fromUserId === currentUser.id ? 'message-mine' : 'message-other'}">
                            <strong>${m.fromUserId === currentUser.id ? 'Я' : otherUser?.name}:</strong> ${m.message}
                            <div style="font-size:0.7rem; opacity:0.7;">${new Date(m.timestamp).toLocaleTimeString()}</div>
                        </div>
                    `).join('')}
                </div>
                <div class="chat-input">
                    <input type="text" id="chatMessageInput" placeholder="Введите сообщение...">
                    <button class="btn-primary" id="sendMessageBtn">📤</button>
                </div>
            </div>
        `;
        document.body.appendChild(modal);
        
        const messagesDiv = modal.querySelector('#chatMessages');
        messagesDiv.scrollTop = messagesDiv.scrollHeight;
        
        modal.querySelector('#closeChat').onclick = () => modal.remove();
        modal.querySelector('#sendMessageBtn').onclick = async () => {
            const input = modal.querySelector('#chatMessageInput');
            await sendMessage(taskId, input.value);
            input.value = '';
            const newMessages = cachedMessages[taskId] || [];
            messagesDiv.innerHTML = newMessages.map(m => `
                <div class="message ${m.fromUserId === currentUser.id ? 'message-mine' : 'message-other'}">
                    <strong>${m.fromUserId === currentUser.id ? 'Я' : otherUser?.name}:</strong> ${m.message}
                    <div style="font-size:0.7rem; opacity:0.7;">${new Date(m.timestamp).toLocaleTimeString()}</div>
                </div>
            `).join('');
            messagesDiv.scrollTop = messagesDiv.scrollHeight;
        };
        
        modal.querySelector('#chatMessageInput').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') modal.querySelector('#sendMessageBtn').click();
        });
    }

    function getTaskStatusText(status) {
        switch(status) {
            case 'open': return { text: '📋 Доступно', class: 'status-open' };
            case 'in_progress': return { text: '⏳ Выполняется', class: 'status-progress' };
            case 'awaiting_confirmation': return { text: '🕐 Ожидает подтверждения', class: 'status-awaiting' };
            case 'completed': return { text: '✅ Выполнено', class: 'status-completed' };
            case 'disputed': return { text: '⚠️ Спор', class: 'status-disputed' };
            default: return { text: status, class: 'status-open' };
        }
    }

    async function adminChangeBalance(userId, amount) {
        if (amount === 0) return;
        const user = cachedUsers.find(u => u.id === userId);
        if (!user) return;
        user.balance = (parseFloat(user.balance) || 0) + amount;
        await apiCall({ action: 'updateUser', id: userId, balance: user.balance });
        if (currentUser && currentUser.id === userId) currentUser.balance = user.balance;
        showToast(`${amount > 0 ? 'Пополнение' : 'Списание'} для ${user.name}: ${amount > 0 ? `+${amount}` : amount}₽`);
        cacheExpiry = 0;
        renderApp();
    }

    async function banUserWithDuration(userId, days, hours, reason) {
        const user = cachedUsers.find(u => u.id === userId);
        if (!user) return;
        if (user.id === currentUser?.id) { showToast('Нельзя забанить себя', true); return; }
        
        let expires = '';
        if (days > 0 || hours > 0) {
            const exp = new Date();
            exp.setDate(exp.getDate() + days);
            exp.setHours(exp.getHours() + hours);
            expires = exp.toISOString();
        }
        
        user.isBanned = true;
        user.banReason = reason || 'Нарушение правил';
        user.banExpires = expires;
        
        await apiCall({ action: 'updateUser', id: userId, isBanned: true, banReason: user.banReason, banExpires: expires });
        
        let durationText = '';
        if (days > 0 && hours > 0) durationText = `на ${days} дн. ${hours} ч.`;
        else if (days > 0) durationText = `на ${days} дн.`;
        else if (hours > 0) durationText = `на ${hours} ч.`;
        else durationText = 'навсегда';
        showToast(`⛔ ${user.name} заблокирован ${durationText}`);
        cacheExpiry = 0;
        renderApp();
    }

    async function unbanUser(userId) {
        const user = cachedUsers.find(u => u.id === userId);
        if (!user) return;
        user.isBanned = false;
        user.banReason = '';
        user.banExpires = null;
        await apiCall({ action: 'updateUser', id: userId, isBanned: false, banReason: '', banExpires: '' });
        showToast(`✅ ${user.name} разблокирован`);
        cacheExpiry = 0;
        renderApp();
    }

        let pwd = prompt("Введите пароль администратора:");

    // ========== ОСНОВНОЙ РЕНДЕР ==========

        const now = new Date();
        for (let task of cachedTasks) {
            if (task.status === 'awaiting_confirmation' && task.completedAt) {
                const completedAt = new Date(task.completedAt);
                const hoursPassed = (now - completedAt) / (1000 * 60 * 60);
                if (hoursPassed >= TASK_TIMEOUT_HOURS) {
                    const creator = cachedUsers.find(u => u.id === task.creatorId);
                    if (creator) {
                        creator.balance = (parseFloat(creator.balance) || 0) + parseFloat(task.price);
                        await apiCall({ action: 'updateUser', id: creator.id, balance: creator.balance }, true);
                    }
                    task.status = 'disputed';
                    await apiCall({ action: 'updateTask', id: task.id, status: 'disputed' }, true);

                            <td>${isBanned ? '⛔ Забанен' : '✅ Активен'}${isBanned && user.banExpires ? `<div class="ban-info" style="font-size:0.7rem; color:#dc2626;">до ${new Date(user.banExpires).toLocaleString()}<br>${user.banReason || ''}</div>` : ''}</td>
                            <td><div class="balance-control"><input type="number" id="amount-${user.id}" placeholder="Сумма" value="100"><button class="topup-btn" data-userid="${user.id}">💰 +</button><button class="withdraw-btn" data-userid="${user.id}">💸 -</button></div></td>
                            <td>${!isBanned ? `<div class="ban-control"><input type="number" id="days-${user.id}" placeholder="Дни" value="0"><input type="number" id="hours-${user.id}" placeholder="Часы" value="0"><input type="text" id="reason-${user.id}" placeholder="Причина" style="width:100px;"><button class="ban-btn" data-userid="${user.id}">⛔ Бан</button></div>` : `<button class="unban-btn" data-userid="${user.id}">✅ Разбанить</button>`}</td>
                        </tr>`}).join('')}</tbody>}</table></div>
                </div>
            `;
        }
        
        const createForm = `<div class="card"><h3>📝 Создать задание</h3><div style="background:#fef9e3; padding:12px; border-radius:20px; margin-bottom:15px;">💰 Деньги будут заморожены до подтверждения получения</div><textarea id="taskDesc" rows="2" placeholder="Что нужно сделать? (например: принеси булочку в 40 кабинет)"></textarea><input type="number" id="taskPrice" placeholder="Цена (руб)"><input type="text" id="taskLocation" placeholder="Место (кабинет, этаж)"><button class="btn-primary" id="createTaskBtn">Создать</button></div>`;
        
        let activeTab = window._activeTab || 'allTasks';
        let mainContent = '';
        if (activeTab === 'allTasks') mainContent = `<h3>📋 Доступные задания (школа ${currentUser.school})</h3>${tasksHtml(paginatedTasks, true, true)}`;
        else if (activeTab === 'myTasks') mainContent = `<h3>📌 Мои задания (созданные мной)</h3>${tasksHtml(myCreatedTasks, true, false)}`;
        else if (activeTab === 'myExecutions') mainContent = `<h3>⚡ Мои выполнения</h3>${tasksHtml(myTasksAsExecutor, true, false)}`;
        else if (activeTab === 'create') mainContent = createForm;
        
        const adminButtonHtml = isAdmin ? `<button id="adminPanelBtn" style="background:#2c3e50; color:white; border:none; padding:6px 20px; border-radius:60px;">🔐 Админка</button>` : '';
        
        appDiv.innerHTML = `
            <div class="header">
                <div class="logo"><h1>🏫 SchoolTask</h1><span>Биржа поручений</span></div>
                <div class="user-info">
                    <div>👋 ${currentUser.name} | ${currentUser.school}</div>
                    <div class="balance-card">💰 ${(parseFloat(currentUser.balance) || 0).toFixed(2)} ₽</div>
                    <button class="theme-toggle" id="themeToggleBtn">${isDarkTheme ? '☀️' : '🌙'}</button>
                    <button class="btn-danger" id="logoutBtn" style="padding:6px 12px;">Выйти</button>
                </div>
            </div>
            <div style="display:flex; justify-content:space-between; margin-bottom:15px; flex-wrap:wrap; gap:10px;">
                <span>📢 Пополнение и вывод: @leshr_ak47</span>
                <div>
                    <button id="topupBtn" style="background:#ffd966; border:none; padding:6px 20px; border-radius:60px;">➕ Пополнить</button>
                    <button id="withdrawBtn" style="background:#f97316; border:none; padding:6px 20px; border-radius:60px; margin-left:10px;">💸 Вывод</button>
                    ${adminButtonHtml}
                </div>
            </div>
            ${adminPanelHtml}
            <div class="tabs">
                <div class="tab ${activeTab === 'allTasks' ? 'active' : ''}" data-tab="allTasks">📋 Все задания</div>
                <div class="tab ${activeTab === 'myTasks' ? 'active' : ''}" data-tab="myTasks">📦 Мои</div>
                <div class="tab ${activeTab === 'myExecutions' ? 'active' : ''}" data-tab="myExecutions">⚡ Мои выполнения</div>
                <div class="tab ${activeTab === 'create' ? 'active' : ''}" data-tab="create">➕ Создать</div>
            </div>
            ${mainContent}
            <div style="margin-top:20px; text-align:center; font-size:12px; color:#4b5563;">⚠️ Комиссия 5% | ${TASK_TIMEOUT_HOURS} часов на подтверждение получения</div>
        `;
        
        // Обработчики событий
        document.querySelectorAll('.tab').forEach(el => el.addEventListener('click', () => { 
            window._activeTab = el.dataset.tab; 
            currentPage = 0;
            renderApp(); 
        }));
        document.getElementById('logoutBtn')?.addEventListener('click', logout);
        document.getElementById('topupBtn')?.addEventListener('click', () => showToast('Напишите @leshr_ak47 для пополнения баланса'));
        document.getElementById('withdrawBtn')?.addEventListener('click', () => showToast('Вывод средств через администратора в Telegram @leshr_ak47'));
        document.getElementById('themeToggleBtn')?.addEventListener('click', toggleTheme);
        
        if (isAdmin) {
            document.getElementById('adminPanelBtn')?.addEventListener('click', () => { if (adminMode) exitAdminMode(); else requestAdminAccess(); });
            document.getElementById('exitAdminBtn')?.addEventListener('click', exitAdminMode);
            document.getElementById('refreshUsersBtn')?.addEventListener('click', async () => { await forceSync(); renderApp(); showToast('Список обновлён'); });
            
            const searchInput = document.getElementById('adminSearch');
            if (searchInput) {
                const debouncedSearch = debounce((value) => {
                    adminSearchTerm = value;
                    renderApp();
                }, 300);
                searchInput.addEventListener('input', (e) => debouncedSearch(e.target.value));
            }
        }
        
        document.getElementById('createTaskBtn')?.addEventListener('click', () => {
            const desc = document.getElementById('taskDesc')?.value;
            const price = document.getElementById('taskPrice')?.value;
            const loc = document.getElementById('taskLocation')?.value;
            if (desc && price && loc) createTask(desc, price, loc);
            else showToast('Заполните все поля', true);
        });
        
        document.getElementById('loadMoreBtn')?.addEventListener('click', () => {
            currentPage++;
            renderApp();
        });
        
        document.querySelectorAll('.take-btn').forEach(btn => btn.addEventListener('click', () => takeTask(btn.dataset.taskid)));
        document.querySelectorAll('.delete-task-btn').forEach(btn => btn.addEventListener('click', () => forceCancelTask(btn.dataset.taskid)));
        document.querySelectorAll('.confirm-complete-btn').forEach(btn => btn.addEventListener('click', () => confirmCompletion(btn.dataset.taskid)));
        document.querySelectorAll('.confirm-receipt-btn').forEach(btn => btn.addEventListener('click', () => confirmReceipt(btn.dataset.taskid)));
        document.querySelectorAll('.cancel-receipt-btn').forEach(btn => btn.addEventListener('click', () => markAsNotReceived(btn.dataset.taskid)));
        document.querySelectorAll('.chat-btn').forEach(btn => btn.addEventListener('click', () => openChat(btn.dataset.taskid)));
        document.querySelectorAll('.review-btn').forEach(btn => btn.addEventListener('click', () => showReviewModal(btn.dataset.userid, btn.dataset.taskid)));
        document.querySelectorAll('.view-reviews-btn').forEach(btn => btn.addEventListener('click', () => showUserReviews(btn.dataset.userid)));
        
        if (isAdmin && adminMode) {
            document.querySelectorAll('.topup-btn').forEach(btn => btn.addEventListener('click', () => {
                const userId = btn.dataset.userid;
                const amount = parseFloat(document.getElementById(`amount-${userId}`)?.value);
                if (amount > 0) adminChangeBalance(userId, amount);
                else showToast('Введите сумму', true);
            }));
            document.querySelectorAll('.withdraw-btn').forEach(btn => btn.addEventListener('click', () => {
                const userId = btn.dataset.userid;
                const amount = parseFloat(document.getElementById(`amount-${userId}`)?.value);
                if (amount > 0) adminChangeBalance(userId, -amount);
                else showToast('Введите сумму', true);
            }));
            document.querySelectorAll('.ban-btn').forEach(btn => btn.addEventListener('click', () => {
                const userId = btn.dataset.userid;
                const days = parseInt(document.getElementById(`days-${userId}`)?.value) || 0;
                const hours = parseInt(document.getElementById(`hours-${userId}`)?.value) || 0;
                const reason = document.getElementById(`reason-${userId}`)?.value || '';
                if (days === 0 && hours === 0 && !confirm('Бан навсегда. Продолжить?')) return;
                banUserWithDuration(userId, days, hours, reason);
            }));
            document.querySelectorAll('.unban-btn').forEach(btn => btn.addEventListener('click', () => unbanUser(btn.dataset.userid)));
        }
    }

    restoreSession().then(() => renderApp());
</script>
</body>
</html>
