<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>SchoolTask | Биржа поручений + Бурмалда</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', system-ui, 'Roboto', sans-serif;
        }

        body {
            background: linear-gradient(145deg, #f0f4fa 0%, #e2e8f0 100%);
            min-height: 100vh;
            padding: 20px;
            transition: background 0.3s, color 0.3s;
        }

        body.dark-theme {
            background: linear-gradient(145deg, #1a1a2e 0%, #16213e 100%);
            color: #e2e8f0;
        }

        body.dark-theme .header,
        body.dark-theme .card,
        body.dark-theme .task-card,
        body.dark-theme .admin-panel,
        body.dark-theme .help-box,
        body.dark-theme .announcement,
        body.dark-theme .honor-board,
        body.dark-theme .notifications-panel,
        body.dark-theme .upgrade-panel {
            background: #1e293b;
            color: #e2e8f0;
        }

        body.dark-theme .user-info {
            background: #334155;
        }

        body.dark-theme .tab {
            background: #334155;
            color: #e2e8f0;
        }

        body.dark-theme .tab.active {
            background: #3b82f6;
        }

        body.dark-theme input,
        body.dark-theme textarea,
        body.dark-theme select {
            background: #334155;
            border-color: #475569;
            color: #e2e8f0;
        }

        .container {
            max-width: 1300px;
            margin: 0 auto;
        }

        .header,
        .card,
        .task-card,
        .upgrade-panel {
            background: white;
            border-radius: 32px;
            padding: 20px;
            margin-bottom: 20px;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.05);
            transition: all 0.2s cubic-bezier(0.2, 0.9, 0.4, 1.1);
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
        }

        .logo h1 {
            background: linear-gradient(135deg, #1e2b3c, #2c4c6e);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            font-size: 1.6rem;
        }

        .user-info {
            display: flex;
            align-items: center;
            gap: 20px;
            background: #f8fafc;
            padding: 8px 20px;
            border-radius: 60px;
            flex-wrap: wrap;
        }

        .balance-card,
        .bonus-card {
            padding: 6px 16px;
            border-radius: 40px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.08s cubic-bezier(0.2, 0.9, 0.4, 1.1);
        }

        .balance-card:active,
        .bonus-card:active {
            transform: scale(0.92);
        }

        .balance-card {
            background: #eef2ff;
        }

        .bonus-card {
            background: linear-gradient(135deg, #fef3c7, #fde68a);
            color: #92400e;
        }

        button {
            cursor: pointer;
            border: none;
            border-radius: 40px;
            padding: 10px 20px;
            font-weight: bold;
            transition: all 0.08s cubic-bezier(0.2, 0.9, 0.4, 1.1);
        }

        button:active {
            transform: scale(0.94);
        }

        button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none !important;
        }

        .btn-primary {
            background: #2c6e4f;
            color: white;
        }
        .btn-success { background: #10b981; color: white; }
        .btn-danger { background: #dc2626; color: white; }
        .btn-edit { background: #8b5cf6; color: white; }
        .btn-info { background: #3b82f6; color: white; }
        .theme-toggle { background: #334155; color: white; padding: 8px 16px; border-radius: 60px; cursor: pointer; }

        input, textarea, select {
            width: 100%;
            padding: 12px 16px;
            border: 1px solid #cbd5e1;
            border-radius: 28px;
            margin-bottom: 12px;
            font-size: 1rem;
        }

        input:focus, textarea:focus, select:focus {
            outline: none;
            border-color: #3b82f6;
            transform: scale(1.01);
        }

        .tabs {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            margin-bottom: 20px;
        }

        .tab {
            background: white;
            padding: 10px 24px;
            border-radius: 60px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.08s cubic-bezier(0.2, 0.9, 0.4, 1.1);
        }

        .tab:active { transform: scale(0.94); }
        .tab.active { background: #1e4a6e; color: white; }

        .tasks-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
            gap: 20px;
        }

        .admin-panel {
            background: white;
            border-radius: 32px;
            padding: 20px;
            margin-bottom: 20px;
            border: 2px solid #ffd966;
        }

        .admin-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 10px;
            margin-bottom: 20px;
        }

        .search-box {
            display: flex;
            align-items: center;
            gap: 8px;
            background: #f1f5f9;
            padding: 5px 15px;
            border-radius: 40px;
        }
        .search-box input { margin: 0; padding: 8px; background: transparent; border: none; width: 200px; outline: none; }

        .users-table { overflow-x: auto; margin-top: 15px; }
        .users-table table { width: 100%; border-collapse: collapse; }
        .users-table th, .users-table td { padding: 12px 8px; text-align: left; border-bottom: 1px solid #e2e8f0; }

        .announcement {
            background: linear-gradient(135deg, #ffd700 0%, #ffb347 100%);
            border-radius: 32px;
            padding: 20px;
            margin-bottom: 20px;
            text-align: center;
            animation: pulse 2s infinite;
        }
        @keyframes pulse { 0%,100% { transform: scale(1); } 50% { transform: scale(1.01); } }

        .share-buttons {
            display: flex;
            gap: 15px;
            justify-content: center;
            margin-top: 15px;
            flex-wrap: wrap;
        }
        .share-btn {
            padding: 10px 20px;
            border-radius: 40px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.08s cubic-bezier(0.2, 0.9, 0.4, 1.1);
        }
        .share-btn:active { transform: scale(0.94); }
        .share-tg { background: #0088cc; color: white; }
        .share-vk { background: #0077ff; color: white; }
        .copy-link { background: #6b7280; color: white; }

        .help-box {
            background: #e0f2fe;
            border-radius: 20px;
            padding: 15px;
            margin-bottom: 20px;
            text-align: center;
            border-left: 5px solid #0284c7;
        }
        .referral-code {
            background: #e2e8f0;
            padding: 10px;
            border-radius: 40px;
            font-family: monospace;
            cursor: pointer;
            text-align: center;
            margin-top: 15px;
        }

        .task-header {
            display: flex;
            justify-content: space-between;
            margin-bottom: 12px;
            flex-wrap: wrap;
        }
        .task-price { font-size: 1.6rem; font-weight: 800; color: #2b6e4f; }
        .task-status { padding: 4px 12px; border-radius: 30px; font-size: 0.75rem; font-weight: bold; }
        .status-open { background: #e2e8f0; color: #1e4a6e; }
        .status-progress { background: #fef3c7; color: #d97706; }
        .status-awaiting { background: #e0f2fe; color: #0284c7; }
        .status-completed { background: #d1fae5; color: #10b981; }
        .action-buttons { display: flex; gap: 10px; margin-top: 12px; flex-wrap: wrap; }
        .filter-group { display: flex; gap: 10px; margin-bottom: 15px; flex-wrap: wrap; }
        .filter-group input, .filter-group select { flex: 1; margin: 0; }

        .toast {
            position: fixed;
            bottom: 30px;
            right: 30px;
            background: #1f2f3e;
            color: white;
            padding: 12px 24px;
            border-radius: 60px;
            z-index: 1000;
            animation: toastFadeIn 0.3s, toastFadeOut 0.3s 2.7s forwards;
        }
        @keyframes toastFadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes toastFadeOut { to { opacity: 0; transform: translateY(20px); } }

        .wallet-modal {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.8);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 2000;
            animation: modalFadeIn 0.2s;
        }
        @keyframes modalFadeIn { from { opacity: 0; } to { opacity: 1; } }
        .wallet-container {
            background: white;
            border-radius: 32px;
            width: 90%;
            max-width: 400px;
            padding: 20px;
            animation: modalScaleIn 0.2s;
        }
        @keyframes modalScaleIn { from { transform: scale(0.9); opacity: 0; } to { transform: scale(1); opacity: 1; } }

        .video-rule {
            background: #fef3c7;
            border-left: 5px solid #f59e0b;
            padding: 15px;
            margin-bottom: 20px;
            border-radius: 16px;
        }
        .support-link {
            margin-top: 20px;
            padding: 10px;
            background: #f1f5f9;
            border-radius: 20px;
            text-align: center;
            font-size: 12px;
            color: #475569;
        }

        .notification-badge {
            background: #ef4444;
            color: white;
            border-radius: 20px;
            padding: 2px 8px;
            font-size: 0.7rem;
            margin-left: 5px;
        }
        .notifications-panel {
            background: white;
            border-radius: 24px;
            padding: 15px;
            margin-bottom: 20px;
            max-height: 300px;
            overflow-y: auto;
        }
        .notification-item {
            padding: 10px;
            border-bottom: 1px solid #e2e8f0;
            cursor: pointer;
        }
        .notification-item.unread { background: #eef2ff; font-weight: bold; }

        .honor-board {
            background: linear-gradient(135deg, #fef9e6, #fff4e0);
            border-radius: 24px;
            padding: 15px;
            text-align: center;
            margin-bottom: 20px;
        }
        .honor-list {
            display: flex;
            justify-content: center;
            gap: 20px;
            flex-wrap: wrap;
            margin-top: 10px;
        }
        .honor-item {
            background: white;
            border-radius: 20px;
            padding: 10px 15px;
            min-width: 120px;
            box-shadow: 0 2px 6px rgba(0,0,0,0.1);
        }
        .honor-medal { font-size: 2rem; }

        /* Стили для бурмалды */
        .upgrade-panel {
            text-align: center;
        }
        .upgrade-panel .wheel-container {
            position: relative;
            width: 320px;
            height: 320px;
            margin: 0 auto 20px;
        }
        .upgrade-panel canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100% !important;
            height: 100% !important;
            border-radius: 50%;
            box-shadow: 0 0 0 8px #2c3e2f, 0 12px 28px black;
        }
        .upgrade-panel .center-badge {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: #1f2d29dd;
            backdrop-filter: blur(8px);
            border-radius: 60px;
            padding: 6px 12px;
            font-weight: bold;
            font-size: 0.85rem;
            color: #ffd966;
            border: 1px solid #ffd966aa;
            z-index: 12;
            white-space: nowrap;
            pointer-events: none;
        }
        .upgrade-inputs {
            display: flex;
            gap: 15px;
            margin: 15px 0;
            flex-wrap: wrap;
        }
        .upgrade-inputs .input-block {
            flex: 1;
            background: #0f1c19;
            border-radius: 44px;
            padding: 8px 15px;
            border: 1px solid #ffd966aa;
        }
        .upgrade-inputs .input-block label {
            font-size: 0.7rem;
            text-transform: uppercase;
            color: #ffd966;
            display: block;
        }
        .upgrade-inputs .input-block input {
            width: 100%;
            background: transparent;
            border: none;
            font-size: 1.6rem;
            font-weight: bold;
            color: #ffdf8c;
            outline: none;
            padding: 5px 0;
        }
        .upgrade-panel .balance-switch {
            display: flex;
            gap: 15px;
            justify-content: center;
            margin: 10px 0 15px;
        }
        .upgrade-panel .balance-btn {
            background: #0f1c19;
            border: 1px solid #ffd96688;
            border-radius: 60px;
            padding: 8px 20px;
            font-weight: bold;
            color: #ddddbb;
            cursor: pointer;
            transition: 0.08s linear;
            flex: 1;
            text-align: center;
        }
        .upgrade-panel .balance-btn.active {
            background: #f7b32b;
            color: #1f2a1b;
            border-color: #ffdd99;
            box-shadow: 0 0 6px #ffcd7e;
        }
        .upgrade-panel .balance-amount {
            font-size: 0.75rem;
            margin-top: 4px;
            color: #ffdfaa;
        }
        .upgrade-panel .chance-panel {
            text-align: center;
            background: #07131299;
            border-radius: 60px;
            padding: 12px;
            margin: 0 0 16px;
            backdrop-filter: blur(4px);
        }
        .upgrade-panel .chance-digits {
            font-size: 2.5rem;
            font-weight: 800;
            color: #ffd966;
            line-height: 1;
        }
        .upgrade-panel .spin-button {
            width: 100%;
            background: linear-gradient(95deg, #f0a500, #ff7b00);
            border: none;
            padding: 16px;
            font-size: 1.6rem;
            font-weight: bold;
            color: #1f2a1b;
            border-radius: 60px;
            cursor: pointer;
            transition: 0.05s linear;
            box-shadow: 0 7px 0 #8b4600;
        }
        .upgrade-panel .spin-button:active { transform: translateY(3px); box-shadow: 0 3px 0 #8b4600; }
        .upgrade-panel .spin-button:disabled { opacity: 0.55; transform: none; cursor: not-allowed; }
        .upgrade-panel .result-area {
            margin-top: 20px;
            background: #00000066;
            border-radius: 50px;
            padding: 14px;
            text-align: center;
            font-weight: bold;
            font-size: 0.95rem;
            color: #ffeca2;
            backdrop-filter: blur(4px);
        }

        /* Стили для званий и шкалы прогресса */
        .rank-badge {
            display: inline-block;
            background: #2c3e2f;
            border-radius: 20px;
            padding: 4px 12px;
            font-size: 0.7rem;
            font-weight: bold;
            margin-left: 8px;
            color: #ffd966;
        }
        .progress-container {
            background: #2c3e2f;
            border-radius: 20px;
            height: 12px;
            margin: 10px 0;
            overflow: hidden;
        }
        .progress-fill {
            background: linear-gradient(90deg, #f7b32b, #ffd966);
            height: 100%;
            width: 0%;
            border-radius: 20px;
            transition: width 0.5s ease;
        }
        .rank-progress-text {
            font-size: 0.7rem;
            color: #bbaa66;
            text-align: right;
            margin-top: 4px;
        }
        .next-rank-info {
            font-size: 0.75rem;
            color: #ffd966;
            margin-top: 5px;
        }

        @media (max-width: 700px) {
            .filter-group { flex-direction: column; }
            body { padding: 12px; }
            .upgrade-inputs { flex-direction: column; }
        }
    </style>
</head>
<body>
<div id="app"></div>

<script>
    const API_URL = 'https://script.google.com/macros/s/AKfycbzaQq5Qku56TgwPpRrT3PRFpaJIZVin2wRqshXXTFcwKCUurMzRljNzQ45nzjgdy9t8/exec';

    let currentUser = null;
    let authMode = 'login';
    let adminMode = false;
    let adminSearchTerm = '';
    let users = [];
    let tasks = [];
    let reviews = [];
    let reports = [];
    let isDarkTheme = localStorage.getItem('darkTheme') === 'true';
    let filters = { scope: 'school', minPrice: '', maxPrice: '' };
    let notifications = [];

    if (isDarkTheme) document.body.classList.add('dark-theme');

    function escapeHtml(t) { if (!t) return ''; const d = document.createElement('div'); d.textContent = t; return d.innerHTML; }
    function showToast(msg, isErr, dur = 2500) { let t = document.createElement('div'); t.className = 'toast'; t.innerHTML = msg; if (isErr) t.style.background = '#b91c1c'; document.body.appendChild(t); setTimeout(() => t.remove(), dur); }
    function formatDate(d) { return d ? new Date(d).toLocaleString('ru-RU', { day:'2-digit', month:'2-digit', year:'numeric', hour:'2-digit', minute:'2-digit' }) : 'неизвестно'; }
    function saveLocalData() { localStorage.setItem('schooltask_notifications', JSON.stringify(notifications)); }
    function loadLocalData() { const s = localStorage.getItem('schooltask_notifications'); if (s) notifications = JSON.parse(s); }

    function addNotification(userId, text, taskId = null) {
        const n = { id: Date.now(), userId, text, read: false, createdAt: new Date().toISOString(), taskId };
        notifications.push(n); saveLocalData();
        if (currentUser && currentUser.id === userId) showToast(`🔔 ${text}`, false, 3500);
    }

    let isLoading = false, usersCache, tasksCache, reviewsCache, reportsCache, lastLoad=0, CACHE_TTL=30000;
    async function loadData(force=false) {
        if (!force && usersCache && (Date.now()-lastLoad)<CACHE_TTL) { users=usersCache; tasks=tasksCache; reviews=reviewsCache; reports=reportsCache; return true; }
        if (isLoading) return users.length>0;
        isLoading=true;
        try {
            const [u,t,rv,rp] = await Promise.all([ fetch(API_URL+'?action=getUsers').then(r=>r.json()).catch(()=>[]), fetch(API_URL+'?action=getTasks').then(r=>r.json()).catch(()=>[]), fetch(API_URL+'?action=getReviews').then(r=>r.json()).catch(()=>[]), fetch(API_URL+'?action=getReports').then(r=>r.json()).catch(()=>[]) ]);
            if (Array.isArray(u)) users = u;
            if (Array.isArray(t)) tasks = t;
            if (Array.isArray(rv)) reviews = rv;
            if (Array.isArray(rp)) reports = rp;
            usersCache=users; tasksCache=tasks; reviewsCache=reviews; reportsCache=reports; lastLoad=Date.now();
            isLoading=false; return true;
        } catch(e){ isLoading=false; return false; }
    }
    async function saveToGoogle(action, params) {
        try {
            const fd = new URLSearchParams();
            fd.append('action', action);
            for(let k in params) if(params[k]!==undefined && params[k]!==null) fd.append(k, typeof params[k]==='object'?JSON.stringify(params[k]):params[k]);
            const resp = await fetch(API_URL, { method:'POST', headers:{'Content-Type':'application/x-www-form-urlencoded'}, body:fd });
            const txt = await resp.text();
            try { return JSON.parse(txt); } catch(e){ return { success:false }; }
        } catch(e){ return { success:false }; }
    }

    function saveSession() { if(currentUser) localStorage.setItem('schooltask_session', JSON.stringify({ id:currentUser.id, name:currentUser.name, school:currentUser.school, corp:currentUser.corp })); else localStorage.removeItem('schooltask_session'); }
    async function restoreSession() { let s = localStorage.getItem('schooltask_session'); if(!s) return false; try { let ses = JSON.parse(s); await loadData(true); let u = users.find(u=>u.name===ses.name && u.school===ses.school && u.corp===ses.corp); if(u && u.isBanned!=='true') { currentUser=u; return true; } localStorage.removeItem('schooltask_session'); } catch(e){} return false; }

    function getReferralLink() { let url = window.location.href.split('?')[0]; if(currentUser?.referral_code) return url+'?ref='+currentUser.referral_code; return url; }
    function copyReferralLink() { navigator.clipboard.writeText(getReferralLink()); showToast('✅ Ссылка скопирована! +5₽ за каждого друга', false); }
    function shareTelegram() { window.open('https://t.me/share/url?url='+encodeURIComponent(getReferralLink())+'&text='+encodeURIComponent('SchoolTask - биржа поручений! +5₽ на бонусный счёт за друга!'), '_blank'); }
    function shareVK() { window.open('https://vk.com/share.php?url='+encodeURIComponent(getReferralLink()), '_blank'); }
    function showBonusHelp() { alert('🎁 Бонусный счёт\n\nБонусы НЕЛЬЗЯ вывести, только тратить на создание заданий!\n\n✨ Как получить:\n• +5₽ за каждого приглашённого друга\n• +10₽ за выполнение задания\n• +20₽ за отзыв 5 звёзд'); }

    let walletModal = null;
    function openWalletModal() { if(!currentUser) return; if(walletModal) walletModal.remove(); walletModal = document.createElement('div'); walletModal.className = 'wallet-modal'; walletModal.innerHTML = `<div class="wallet-container"><div style="display:flex;justify-content:space-between;"><h3>💰 Кошелёк</h3><button onclick="closeWalletModal()" style="background:none;font-size:28px;">✕</button></div><div style="text-align:center;margin:20px 0;"><div>💰 Основной баланс</div><div style="font-size:2rem;font-weight:bold;">${(parseFloat(currentUser.balance)||0).toFixed(2)} ₽</div></div><div style="text-align:center;margin:20px 0;"><div>🎁 Бонусный счёт</div><div style="font-size:2rem;font-weight:bold;">${(parseFloat(currentUser.bonus_balance)||0).toFixed(2)} ₽</div></div><div style="display:flex;flex-direction:column;gap:10px;"><button class="btn-success" onclick="showPaymentAlert('deposit')">💰 Пополнить</button><button class="btn-primary" onclick="showPaymentAlert('withdraw')">💸 Вывод</button></div><button class="btn-danger" onclick="closeWalletModal()" style="margin-top:15px;">Закрыть</button></div>`; document.body.appendChild(walletModal); }
    function closeWalletModal() { if(walletModal){ walletModal.remove(); walletModal=null; } renderApp(); }
    function showPaymentAlert(type) { if(type==='deposit') alert('💳 ПОПОЛНЕНИЕ БАЛАНСА\n\nДля пополнения баланса напишите в Telegram:\n@leshr_ak47'); else alert('💸 ВЫВОД СРЕДСТВ\n\nНапишите в Telegram:\n@leshr_ak47\n\nМин. сумма: 100₽'); }

    // ========== ФУНКЦИЯ ДЛЯ ОПРЕДЕЛЕНИЯ ЗВАНИЯ И ПРОГРЕССА ==========
    const rankThresholds = [
        { name: '🐣 Новичок', color: '#aaaaaa', tasksNeeded: 0, emoji: '🐣' },
        { name: '🌱 Ученик', color: '#87CEEB', tasksNeeded: 10, emoji: '🌱' },
        { name: '📌 Опытный', color: '#90EE90', tasksNeeded: 20, emoji: '📌' },
        { name: '⭐ Продвинутый', color: '#cd7f32', tasksNeeded: 50, emoji: '⭐' },
        { name: '💎 Мастер', color: '#c0c0c0', tasksNeeded: 100, emoji: '💎' },
        { name: '👑 Легенда', color: '#ffd700', tasksNeeded: 200, emoji: '👑' }
    ];

    function getUserRankInfo(user) {
        const completed = user.tasksCompleted || 0;
        let currentRank = rankThresholds[0];
        let nextRank = null;
        for (let i = rankThresholds.length - 1; i >= 0; i--) {
            if (completed >= rankThresholds[i].tasksNeeded) {
                currentRank = rankThresholds[i];
                nextRank = rankThresholds[i + 1] || null;
                break;
            }
        }
        if (!nextRank && completed < rankThresholds[0].tasksNeeded) {
            currentRank = rankThresholds[0];
            nextRank = rankThresholds[1];
        }
        let progress = 100;
        let needed = 0;
        let remaining = 0;
        if (nextRank) {
            const currentNeeded = currentRank.tasksNeeded;
            const nextNeeded = nextRank.tasksNeeded;
            needed = nextNeeded - currentNeeded;
            const currentProgress = completed - currentNeeded;
            progress = Math.min(100, Math.max(0, (currentProgress / needed) * 100));
            remaining = nextNeeded - completed;
        }
        return { currentRank, nextRank, progress, remaining, completed };
    }

    // -------------------- БУРМАЛДА --------------------
    let upgradeCanvas=null, upgradeCtx=null;
    let upgradeFairWinPercent=0;
    let upgradeArrowAngle=0;
    let upgradeIsSpinning=false;
    let upgradeSpinAnimationId=null;
    const MAIN_PENALTY = 0.45;

    function computeFairChance(bet,target){ if(bet<=0||target<=0) return 0; let raw=(bet/target)*100; return Math.min(raw,100); }
    
    function getArrowAngleWithRealChance(fair,account){
        let realWinPercent = (account === 'main') ? fair * MAIN_PENALTY : fair;
        if(realWinPercent >= 100) realWinPercent = 100;
        let winAngle = (fair / 100) * Math.PI * 2;
        let startSector = -Math.PI / 2 - winAngle / 2;
        let endSector = startSector + winAngle;
        let r = Math.random();
        let angle;
        if(r < realWinPercent / 100){
            let t = Math.random();
            angle = startSector + t * winAngle;
        } else {
            let darkAngle = Math.PI * 2 - winAngle;
            let darkStart = endSector;
            let t = Math.random();
            angle = darkStart + t * darkAngle;
        }
        return angle;
    }
    
    function drawUpgradeWheel(winPercent){
        if(!upgradeCtx) return;
        const w=upgradeCanvas.width=500;
        const h=upgradeCanvas.height=500;
        const radius=220;
        const cx=w/2, cy=h/2;
        upgradeCtx.clearRect(0,0,w,h);
        upgradeCtx.beginPath();
        upgradeCtx.arc(cx,cy,radius,0,Math.PI*2);
        upgradeCtx.fillStyle='#2c423d';
        upgradeCtx.fill();
        if(winPercent<=0){
            upgradeCtx.beginPath();
            upgradeCtx.arc(cx,cy,radius,0,Math.PI*2);
            upgradeCtx.fillStyle='#3e5a54';
            upgradeCtx.fill();
        } else {
            let winAngle=(winPercent/100)*Math.PI*2;
            let startAngle=-Math.PI/2-winAngle/2;
            upgradeCtx.beginPath();
            upgradeCtx.moveTo(cx,cy);
            upgradeCtx.arc(cx,cy,radius,startAngle,startAngle+winAngle);
            upgradeCtx.closePath();
            upgradeCtx.fillStyle='#f7b32b';
            upgradeCtx.fill();
            if(winPercent<100){
                upgradeCtx.beginPath();
                upgradeCtx.moveTo(cx,cy);
                upgradeCtx.arc(cx,cy,radius,startAngle+winAngle,startAngle+Math.PI*2);
                upgradeCtx.closePath();
                upgradeCtx.fillStyle='#3e5a54';
                upgradeCtx.fill();
            }
        }
        upgradeCtx.beginPath();
        upgradeCtx.arc(cx,cy,radius,0,Math.PI*2);
        upgradeCtx.strokeStyle='#fdcc6e';
        upgradeCtx.lineWidth=4;
        upgradeCtx.stroke();
        if(winPercent>0&&winPercent<100){
            let winAngle=(winPercent/100)*Math.PI*2;
            let startAngle=-Math.PI/2-winAngle/2;
            upgradeCtx.beginPath();
            upgradeCtx.moveTo(cx,cy);
            upgradeCtx.lineTo(cx+radius*0.92*Math.cos(startAngle),cy+radius*0.92*Math.sin(startAngle));
            upgradeCtx.strokeStyle='#ffeaac';
            upgradeCtx.lineWidth=2.8;
            upgradeCtx.stroke();
            upgradeCtx.beginPath();
            upgradeCtx.moveTo(cx,cy);
            upgradeCtx.lineTo(cx+radius*0.92*Math.cos(startAngle+winAngle),cy+radius*0.92*Math.sin(startAngle+winAngle));
            upgradeCtx.stroke();
        }
        upgradeCtx.beginPath();
        upgradeCtx.arc(cx,cy,34,0,Math.PI*2);
        upgradeCtx.fillStyle='#1d2d28';
        upgradeCtx.fill();
        upgradeCtx.fillStyle='#ffcd7e';
        upgradeCtx.font='bold 23px "Segoe UI"';
        upgradeCtx.fillText("⚡",cx-12,cy+10);
    }
    
    function drawUpgradeArrow(angleRad){
        if(!upgradeCtx) return;
        const w=upgradeCanvas.width;
        const h=upgradeCanvas.height;
        const cx=w/2, cy=h/2;
        const arrowLen=210, arrowWidth=22;
        const tipX=cx+Math.cos(angleRad)*arrowLen;
        const tipY=cy+Math.sin(angleRad)*arrowLen;
        const backX=cx-Math.cos(angleRad)*(arrowLen*0.2);
        const backY=cy-Math.sin(angleRad)*(arrowLen*0.2);
        upgradeCtx.beginPath();
        upgradeCtx.moveTo(tipX,tipY);
        const anglePerp=angleRad+Math.PI/2;
        const leftX=tipX-Math.cos(anglePerp)*arrowWidth;
        const leftY=tipY-Math.sin(anglePerp)*arrowWidth;
        const rightX=tipX+Math.cos(anglePerp)*arrowWidth;
        const rightY=tipY+Math.sin(anglePerp)*arrowWidth;
        upgradeCtx.lineTo(leftX,leftY);
        upgradeCtx.lineTo(backX,backY);
        upgradeCtx.lineTo(rightX,rightY);
        upgradeCtx.closePath();
        upgradeCtx.fillStyle='#ffc857';
        upgradeCtx.shadowBlur=4;
        upgradeCtx.fill();
        upgradeCtx.fillStyle='#000000cc';
        upgradeCtx.font='bold 26px "Segoe UI"';
        upgradeCtx.fillText("▼",tipX-13,tipY-8);
        upgradeCtx.shadowBlur=0;
    }
    
    function renderUpgradeFull(){ drawUpgradeWheel(upgradeFairWinPercent); drawUpgradeArrow(upgradeArrowAngle); }
    
    function refreshUpgradeUI(){
        let bet=parseFloat(document.getElementById('upgradeBet')?.value);
        let target=parseFloat(document.getElementById('upgradeTarget')?.value);
        if(isNaN(bet)) bet=0; if(isNaN(target)) target=0;
        let fair=computeFairChance(bet,target);
        upgradeFairWinPercent=fair;
        let chanceSpan=document.getElementById('upgradeChancePercent');
        if(chanceSpan) chanceSpan.innerHTML=`${fair.toFixed(1)}%`;
        let spinBtn=document.getElementById('upgradeSpinBtn');
        if(bet<=0||target<=0){ if(spinBtn) spinBtn.disabled=true; } else { if(spinBtn) spinBtn.disabled=false; }
        let centerSpan=document.getElementById('upgradeCenterPercent');
        if(centerSpan) centerSpan.innerHTML=`${fair.toFixed(0)}%`;
        renderUpgradeFull();
    }
    
    async function upgradeStartSpin(){
        let spinBtn=document.getElementById('upgradeSpinBtn');
        if(spinBtn.disabled) return;
        let bet=parseFloat(document.getElementById('upgradeBet').value);
        let target=parseFloat(document.getElementById('upgradeTarget').value);
        if(isNaN(bet)||isNaN(target)||bet<=0||target<=0){ alert('Введите положительные числа'); return; }
        let upgradeActiveAccount=document.getElementById('upgradeBtnMain').classList.contains('active')?'main':'bonus';
        let available=(upgradeActiveAccount==='main')?(parseFloat(currentUser.balance)||0):(parseFloat(currentUser.bonus_balance)||0);
        if(available<bet){ alert(`Недостаточно средств на ${upgradeActiveAccount==='main'?'основном':'бонусном'} счету`); return; }
        
        refreshUpgradeUI();
        let fair=upgradeFairWinPercent;
        let realWin=(upgradeActiveAccount==='main')?fair * MAIN_PENALTY:fair;
        if(realWin<=0&&upgradeActiveAccount==='main'){ alert('Реальный шанс слишком низкий, увеличьте желаемый выигрыш'); return; }
        
        if(upgradeActiveAccount==='main') currentUser.balance=(parseFloat(currentUser.balance)||0)-bet;
        else currentUser.bonus_balance=(parseFloat(currentUser.bonus_balance)||0)-bet;
        await saveToGoogle('updateUser',{ id:currentUser.id, balance:currentUser.balance, bonus_balance:currentUser.bonus_balance });
        updateUpgradeBalancesUI();
        
        spinBtn.disabled=true;
        spinBtn.innerText='🌀 КРУТИМ... 🌀';
        document.getElementById('upgradeResult').innerHTML='<span style="color:#ffd966;">⚙️ вращение...</span>';
        
        let targetAngle=getArrowAngleWithRealChance(fair,upgradeActiveAccount);
        const extraRot=7*Math.PI*2;
        let startAngle=upgradeArrowAngle;
        let startTime=performance.now();
        let duration=900;
        
        function animate(now){
            if(!upgradeIsSpinning) return;
            let elapsed=now-startTime;
            let t=Math.min(1,elapsed/duration);
            let ease=1-Math.pow(1-t,3);
            let curAngle=startAngle+(targetAngle+extraRot-startAngle)*ease;
            upgradeArrowAngle=curAngle;
            renderUpgradeFull();
            if(t<1){ upgradeSpinAnimationId=requestAnimationFrame(animate); }
            else{
                upgradeArrowAngle=(targetAngle+extraRot)%(Math.PI*2);
                renderUpgradeFull();
                upgradeIsSpinning=false;
                if(upgradeSpinAnimationId) cancelAnimationFrame(upgradeSpinAnimationId);
                upgradeSpinAnimationId=null;
                finishUpgradeSpin(bet,target,upgradeActiveAccount, fair);
            }
        }
        upgradeIsSpinning=true;
        upgradeSpinAnimationId=requestAnimationFrame(animate);
    }
    
    async function finishUpgradeSpin(bet,target,acc, fair){
        let angleNorm=(upgradeArrowAngle+2*Math.PI)%(Math.PI*2);
        let winAngle=(fair/100)*Math.PI*2;
        let startSector=-Math.PI/2-winAngle/2;
        let isWin=false;
        if(fair>0){ let diff=(angleNorm-startSector+2*Math.PI)%(Math.PI*2); isWin=diff<=winAngle; }
        
        let resultDiv = document.getElementById('upgradeResult');
        
        if(isWin){
            let winAmount=target;
            if(acc==='main') currentUser.balance=(parseFloat(currentUser.balance)||0)+winAmount;
            else currentUser.bonus_balance=(parseFloat(currentUser.bonus_balance)||0)+winAmount;
            await saveToGoogle('updateUser',{ id:currentUser.id, balance:currentUser.balance, bonus_balance:currentUser.bonus_balance });

            resultDiv.innerHTML=`<span style="color:#bef264;">✨ ПОБЕДА! ✨<br>+${winAmount.toFixed(2)} ₽</span>`;
            showToast(`🎉 Вы выиграли ${winAmount.toFixed(2)} ₽!`, false);
        } else {
            resultDiv.innerHTML=`<span style="color:#fca5a5;">💥 ПРОИГРЫШ 💥<br>потеряно ${bet.toFixed(2)} ₽</span>`;
            showToast(`😞 Вы проиграли ${bet.toFixed(2)} ₽`, true);
        }
        let spinBtn=document.getElementById('upgradeSpinBtn');
        spinBtn.disabled=false;
        spinBtn.innerText='🎯 КРУТИТЬ СТРЕЛКУ 🎯';
        updateUpgradeBalancesUI();
        renderApp();
    }

            else if(activeTab==='create') content=createForm;
            else if(activeTab==='upgrade') content=upgradeHtml;

            appDiv.innerHTML=`<div class="container"><div class="header"><div class="logo"><h1>🏫 SchoolTask</h1></div><div class="user-info"><div>👋 ${escapeHtml(currentUser.name)} | ${escapeHtml(currentUser.school)} <span class="rank-badge">${rankInfo.currentRank.emoji} ${rankInfo.currentRank.name}</span></div><div class="balance-card" onclick="openWalletModal()">💰 ${(parseFloat(currentUser.balance)||0).toFixed(2)} ₽</div><div class="bonus-card" onclick="showBonusHelp()">🎁 ${(parseFloat(currentUser.bonus_balance)||0).toFixed(2)} ₽</div><button class="theme-toggle" id="themeToggleBtn">${isDarkTheme?'☀️':'🌙'}</button><button class="btn-danger" id="logoutBtn">Выйти</button></div></div><div style="margin-bottom:12px;">${adminBtn}</div>${adminHtml}${renderNotifications()}${honorHtml}${helpBlock}<div class="tabs"><div class="tab ${activeTab==='allTasks'?'active':''}" data-tab="allTasks">📋 Все</div><div class="tab ${activeTab==='myTasks'?'active':''}" data-tab="myTasks">📦 Мои</div><div class="tab ${activeTab==='myExecutions'?'active':''}" data-tab="myExecutions">⚡ В работе</div><div class="tab ${activeTab==='completed'?'active':''}" data-tab="completed">✅ Готово</div><div class="tab ${activeTab==='profile'?'active':''}" data-tab="profile">👤 Профиль</div><div class="tab ${activeTab==='create'?'active':''}" data-tab="create">➕ Создать</div><div class="tab ${activeTab==='upgrade'?'active':''}" data-tab="upgrade">🎲 Бурмалда</div></div>${content}<div class="support-link">📞 Поддержка: <strong>@leshr_ak47</strong></div></div>`;

            document.querySelectorAll('.tab').forEach(tab=>{ tab.onclick=()=>{ window._activeTab=tab.getAttribute('data-tab'); renderApp(); }; });
            if(document.getElementById('logoutBtn')) document.getElementById('logoutBtn').onclick=()=>{ currentUser=null; localStorage.removeItem('schooltask_session'); renderApp(); };
            if(document.getElementById('themeToggleBtn')) document.getElementById('themeToggleBtn').onclick=()=>{ isDarkTheme=!isDarkTheme; localStorage.setItem('darkTheme',isDarkTheme); document.body.classList.toggle('dark-theme',isDarkTheme); renderApp(); };
            if(document.getElementById('createBtn')) document.getElementById('createBtn').onclick=()=>{ createTask(document.getElementById('taskDesc').value, document.getElementById('taskPrice').value, document.getElementById('taskLocation').value, document.getElementById('paymentType').value, document.getElementById('taskScope').value, document.getElementById('createBtn')); };
            if(document.getElementById('applyFilters')) document.getElementById('applyFilters').onclick=()=>{ filters.scope=document.getElementById('filterScope').value; filters.minPrice=document.getElementById('filterMinPrice').value; filters.maxPrice=document.getElementById('filterMaxPrice').value; renderApp(); };
            if(document.getElementById('markNotifReadBtn')) document.getElementById('markNotifReadBtn').onclick=markNotificationsRead;
            document.querySelectorAll('.notification-item').forEach(item=>{ item.onclick=()=>{ let nid=item.getAttribute('data-notif-id'); let n=notifications.find(n=>n.id==nid); if(n&&!n.read){ n.read=true; saveLocalData(); renderApp(); } }; });

            if(isAdmin){
                if(document.getElementById('adminPanelBtn')) document.getElementById('adminPanelBtn').onclick=()=>adminMode?exitAdminMode():requestAdminAccess();
                if(document.getElementById('exitAdminBtn')) document.getElementById('exitAdminBtn').onclick=exitAdminMode;
                if(document.getElementById('clearTasksBtn')) document.getElementById('clearTasksBtn').onclick=deleteAllTasks;
                if(document.getElementById('showStatsBtn')) document.getElementById('showStatsBtn').onclick=()=>{ alert(`📊 СТАТИСТИКА\n👥 ${users.length}\n📋 ${tasks.length}\n⭐ ${reviews.length}`); };
                if(document.getElementById('showReportsBtn')) document.getElementById('showReportsBtn').onclick=()=>{ if(reports.length===0) alert('📋 Жалоб нет.'); else alert('⚠️ Жалобы:\n'+reports.slice(0,10).map(r=>`${r.reason}`).join('\n')); };
                if(document.getElementById('adminSearch')) document.getElementById('adminSearch').oninput=e=>{ adminSearchTerm=e.target.value; renderApp(); };
                document.querySelectorAll('.topup-btn').forEach(btn=>{ btn.onclick=()=>{ let uid=btn.getAttribute('data-userid'); let isBonus=btn.getAttribute('data-bonus')==='true'; let amountField=isBonus?document.getElementById('bonus-'+uid):document.getElementById('amount-'+uid); let amt=parseFloat(amountField?.value||100); if(amt>0) adminChangeBalance(uid,amt,isBonus); }; });
                document.querySelectorAll('.withdraw-btn').forEach(btn=>{ btn.onclick=()=>{ let uid=btn.getAttribute('data-userid'); let isBonus=btn.getAttribute('data-bonus')==='true'; let amountField=isBonus?document.getElementById('bonus-'+uid):document.getElementById('amount-'+uid); let amt=parseFloat(amountField?.value||100); if(amt>0) adminChangeBalance(uid,-amt,isBonus); }; });
                document.querySelectorAll('.ban-btn').forEach(btn=>{ btn.onclick=()=>showBanModal(btn.getAttribute('data-userid')); });
                document.querySelectorAll('.unban-btn').forEach(btn=>{ btn.onclick=()=>unbanUser(btn.getAttribute('data-userid')); });
                document.querySelectorAll('.reviews-btn').forEach(btn=>{ btn.onclick=()=>{ let uid=btn.getAttribute('data-userid'); let uRev=reviews.filter(r=>r.toUserId===uid); let uObj=users.find(u=>u.id===uid); if(uRev.length===0) alert(`⭐ У ${uObj?.name} нет отзывов.`); else alert(`⭐ ОТЗЫВЫ О ${uObj?.name}\nСр.оценка: ${(uRev.reduce((s,r)=>s+parseInt(r.rating),0)/uRev.length).toFixed(1)}\nВсего: ${uRev.length}`); }; });
                document.querySelectorAll('.user-tasks-btn').forEach(btn=>{ btn.onclick=()=>{ let uid=btn.getAttribute('data-userid'); let uTasks=tasks.filter(t=>t.creatorId===uid||t.takerId===uid); let uObj=users.find(u=>u.id===uid); alert(`📋 ЗАДАНИЯ ${uObj?.name}\n📝 Создал: ${uTasks.filter(t=>t.creatorId===uid).length}\n🔧 Взял: ${uTasks.filter(t=>t.takerId===uid).length}`); }; });
            }

            document.querySelectorAll('.take-btn').forEach(btn=>{ btn.onclick=()=>takeTask(btn.getAttribute('data-id'),btn); });
            document.querySelectorAll('.delete-btn').forEach(btn=>{ btn.onclick=()=>deleteTask(btn.getAttribute('data-id'),btn); });
            document.querySelectorAll('.edit-btn').forEach(btn=>{ let tid=btn.getAttribute('data-id'); let task=tasks.find(t=>t.id==tid); if(task) btn.onclick=()=>showEditModal(task); });
            document.querySelectorAll('.complete-btn').forEach(btn=>{ btn.onclick=()=>confirmCompletion(btn.getAttribute('data-id'),btn); });
            document.querySelectorAll('.confirm-btn').forEach(btn=>{ btn.onclick=()=>confirmReceipt(btn.getAttribute('data-id'),btn); });
            document.querySelectorAll('.reject-btn').forEach(btn=>{ btn.onclick=()=>rejectReceipt(btn.getAttribute('data-id'),btn); });
            document.querySelectorAll('.review-btn').forEach(btn=>{ btn.onclick=()=>showReviewModal(btn.getAttribute('data-id'),btn.getAttribute('data-userid')); });
            document.querySelectorAll('.report-btn').forEach(btn=>{ btn.onclick=()=>showReportModal(btn.getAttribute('data-id'),btn.getAttribute('data-userid')); });

            if(document.getElementById('upgradeCanvas')){
                upgradeCanvas=document.getElementById('upgradeCanvas');
                upgradeCtx=upgradeCanvas.getContext('2d');
                refreshUpgradeUI();
                document.getElementById('upgradeBet').addEventListener('input',refreshUpgradeUI);
                document.getElementById('upgradeTarget').addEventListener('input',refreshUpgradeUI);
                document.getElementById('upgradeSpinBtn').addEventListener('click',upgradeStartSpin);
                document.getElementById('upgradeBtnMain').addEventListener('click',switchUpgradeToMain);
                document.getElementById('upgradeBtnBonus').addEventListener('click',switchUpgradeToBonus);
            }
        },10);
    }

    loadLocalData();
    (async()=>{ await loadData(false); await restoreSession(); renderApp(); })();
</script>
</body>
</html>
