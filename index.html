<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', system-ui; }

        .balance-control { display: flex; gap: 5px; align-items: center; flex-wrap: wrap; }

        .announcement { background: linear-gradient(135deg, #ffd700 0%, #ffb347 100%); border-radius: 32px; padding: 20px; margin-bottom: 20px; text-align: center; animation: pulse 2s infinite; }

        body.dark-theme .help-box { background: #0c4a6e; border-left-color: #38bdf8; }
        body.dark-theme .help-box h4 { color: #38bdf8; }
        body.dark-theme .help-box p { color: #bae6fd; }

        .task-header { display: flex; justify-content: space-between; margin-bottom: 12px; flex-wrap: wrap; }
        .task-price { font-size: 1.6rem; font-weight: 800; color: #2b6e4f; }
        .task-status { padding: 4px 12px; border-radius: 30px; font-size: 0.75rem; font-weight: bold; }
        .status-open { background: #e2e8f0; color: #1e4a6e; }
        .status-progress { background: #fef3c7; color: #d97706; }
        .status-awaiting { background: #e0f2fe; color: #0284c7; }
        .status-completed { background: #d1fae5; color: #10b981; }
        .action-buttons { display: flex; gap: 10px; margin-top: 12px; flex-wrap: wrap; }
        .filter-group { display: flex; gap: 10px; margin-bottom: 15px; flex-wrap: wrap; }
        .filter-group input, .filter-group select { flex: 1; margin: 0; }
        
        .toast { position: fixed; bottom: 30px; right: 30px; background: #1f2f3e; color: white; padding: 12px 24px; border-radius: 60px; z-index: 1000; animation: fadein 0.3s; }

        .loading { text-align: center; padding: 40px; color: #6b7280; }
        .error-text { color: #dc2626; font-size: 0.8rem; display: none; margin-top: -8px; margin-bottom: 12px; }

        .wallet-container { background: white; border-radius: 32px; width: 90%; max-width: 400px; padding: 20px; }
        body.dark-theme .wallet-container { background: #1e293b; }
        .wallet-balance { font-size: 1.5rem; font-weight: bold; text-align: center; margin: 15px 0; }
        .wallet-buttons { display: flex; gap: 15px; margin-top: 20px; }
        .wallet-buttons button { flex: 1; }
        
        .chat-modal { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.8); display: flex; align-items: center; justify-content: center; z-index: 2000; }
        .chat-container { background: white; border-radius: 32px; width: 90%; max-width: 500px; height: 80%; display: flex; flex-direction: column; overflow: hidden; }
        .chat-messages { flex: 1; overflow-y: auto; padding: 20px; }
        .chat-message { margin-bottom: 15px; padding: 10px; border-radius: 20px; }
        .chat-message.mine { background: #3b82f6; color: white; text-align: right; }
        .chat-message.other { background: #e2e8f0; }
        .chat-input { display: flex; padding: 15px; gap: 10px; border-top: 1px solid #e2e8f0; }
        .chat-input input { flex: 1; margin: 0; }
        
        @media (max-width: 700px) { .filter-group { flex-direction: column; } }

</head>
<body>
<div id="app"><div class="loading">⏳ Загрузка...</div></div>

<script>
// ========== НАСТРОЙКИ ==========
const API_URL = 'https://script.google.com/macros/s/AKfycbxf5v8wNf6_yx-S87wcuWdr4kYbza6bWqQKwTaPZjIXZYtkPNB3AO3mHYW2Fo9lShA_/exec';
const ADMIN_PASSWORD = 'dsl382dAZX';

let currentUser = null;
let authMode = 'login';
let adminMode = false;
let adminSearchTerm = '';
let users = [];
let tasks = [];
let reviews = [];
let isDarkTheme = localStorage.getItem('darkTheme') === 'true';
let filters = { scope: 'school', minPrice: '', maxPrice: '' };
let currentChatTask = null;
let chatMessages = [];
let isLoading = false;
let isDataLoaded = false;
let isWalletModalOpen = false;

if (isDarkTheme) document.body.classList.add('dark-theme');

function toggleTheme() { 
    isDarkTheme = !isDarkTheme; 
    localStorage.setItem('darkTheme', isDarkTheme); 
    if (isDarkTheme) document.body.classList.add('dark-theme'); 
    else document.body.classList.remove('dark-theme'); 
    renderApp(); 
}

// ========== ЗАГРУЗКА ДАННЫХ ==========
async function loadDataFromGoogle() {
    if (isLoading) return isDataLoaded;
    isLoading = true;
    
    try {
        console.log('Загрузка данных...');
        
        const response = await fetch(API_URL + '?action=getUsers');
        if (response.ok) {
            const data = await response.json();
            if (Array.isArray(data)) {
                users = data;
                console.log('Загружено пользователей:', users.length);
            }
        }
        
        const tasksResponse = await fetch(API_URL + '?action=getTasks');
        if (tasksResponse.ok) {
            const tasksData = await tasksResponse.json();
            if (Array.isArray(tasksData)) {
                tasks = tasksData;
                console.log('Загружено заданий:', tasks.length);
            }
        }
        
        const reviewsResponse = await fetch(API_URL + '?action=getReviews');
        if (reviewsResponse.ok) {
            const reviewsData = await reviewsResponse.json();
            if (Array.isArray(reviewsData)) {
                reviews = reviewsData;
                console.log('Загружено отзывов:', reviews.length);
            }
        }
        
        isDataLoaded = true;
        return true;
    } catch(e) {
        console.error('Ошибка загрузки:', e);
        showToast('⚠️ Не удалось загрузить данные', true);
        return false;
    } finally {
        isLoading = false;
    }
}

async function saveToGoogle(action, params) {
    try {
        const formData = new URLSearchParams();
        formData.append('action', action);
        for (let key in params) {
            if (params[key] !== undefined && params[key] !== null) {
                formData.append(key, params[key]);
            }
        }
        
        const response = await fetch(API_URL, {
            method: 'POST',
            headers: {
                'Content-Type': 'application/x-www-form-urlencoded',
            },
            body: formData.toString()
        });
        
        const result = await response.json();
        return result;
    } catch(e) {
        console.error('Ошибка сохранения:', e);
        showToast('⚠️ Не удалось сохранить', true);
        return { success: false };
    }
}

function showToast(msg, isError) {
    let toast = document.createElement('div');
    toast.className = 'toast';
    toast.innerText = msg;
    if (isError) toast.style.background = '#b91c1c';
    document.body.appendChild(toast);
    setTimeout(() => toast.remove(), 3000);
}

function saveSession() { 
    if (currentUser) localStorage.setItem('schooltask_session', JSON.stringify({ id: currentUser.id, name: currentUser.name })); 
    else localStorage.removeItem('schooltask_session'); 
}

function restoreSession() {
    let saved = localStorage.getItem('schooltask_session');
    if (!saved) return false;
    try {
        let session = JSON.parse(saved);
        let user = users.find(u => u.id === session.id);
        if (user && user.isBanned !== 'true') { 
            currentUser = user; 
            return true; 
        }
        localStorage.removeItem('schooltask_session');
    } catch(e) { console.error(e); }
    return false;
}

function getReferralLink() { 
    let url = window.location.href.split('?')[0];
    if (currentUser && currentUser.referral_code) return url + '?ref=' + currentUser.referral_code;
    return url;
}

function copyReferralLink() { 
    navigator.clipboard.writeText(getReferralLink()); 
    showToast('✅ Ссылка скопирована! +5₽ за каждого друга', false); 
}

function shareTelegram() { 
    let link = getReferralLink();
    window.open('https://t.me/share/url?url=' + encodeURIComponent(link) + '&text=' + encodeURIComponent('SchoolTask - биржа поручений! +5₽ на бонусный счёт за друга!'), '_blank'); 
}

function shareVK() { 
    let link = getReferralLink();
    window.open('https://vk.com/share.php?url=' + encodeURIComponent(link), '_blank'); 
}

function showBonusHelp() {
    alert('🎁 Бонусный счёт\n\nБонусы НЕЛЬЗЯ вывести, только тратить на создание заданий!\n\n✨ Как получить:\n• +5₽ за каждого приглашённого друга\n• +10₽ за каждое выполненное задание\n• +20₽ за получение отзыва 5 звёзд\n• +3₽ ежедневный бонус за вход');
}

// ===== МЕНЮ КОШЕЛЬКА =====
function openWalletModal() {
    if (!currentUser) return;
    isWalletModalOpen = true;
    renderWalletModal();
}

function closeWalletModal() {
    isWalletModalOpen = false;
    renderApp();
}

function showPaymentAlert(type) {
    if (type === 'deposit') {
        alert('💳 ПОПОЛНЕНИЕ БАЛАНСА\n\nДля пополнения баланса напишите в Telegram:\n@leshr_ak47\n\nУкажите ваш логин и сумму пополнения.\n\nКомиссия: 10% (1₽ на сайте = 0.9₽ после комиссии)');
    } else {
        alert('💸 ВЫВОД СРЕДСТВ\n\nДля вывода средств напишите в Telegram:\n@leshr_ak47\n\nУкажите ваш логин, сумму вывода и реквизиты для перевода.\n\nМинимальная сумма вывода: 100₽');
    }
}

function renderWalletModal() {
    let modal = document.getElementById('walletModal');
    if (!modal) {
        modal = document.createElement('div');
        modal.id = 'walletModal';
        modal.className = 'wallet-modal';
        document.body.appendChild(modal);
    }
    
    const mainBalance = (parseFloat(currentUser.balance) || 0).toFixed(2);
    const bonusBalance = (parseFloat(currentUser.bonus_balance) || 0).toFixed(2);
    
    modal.innerHTML = `
        <div class="wallet-container">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
                <h3>💰 Кошелёк</h3>
                <button onclick="closeWalletModal()" style="background: none; font-size: 28px; cursor: pointer; padding: 0 10px;">✕</button>
            </div>
            <div class="wallet-balance">
                <div>💰 Основной баланс</div>
                <div style="color: #2c6e4f; font-size: 2rem;">${mainBalance} ₽</div>
            </div>
            <div class="wallet-balance" style="border-top: 1px solid #e2e8f0; padding-top: 15px;">
                <div>🎁 Бонусный счёт</div>
                <div style="color: #eab308; font-size: 2rem;">${bonusBalance} ₽</div>
            </div>
            <div style="margin-top: 20px; padding: 15px; background: #e0f2fe; border-radius: 20px; text-align: center;">
                <p style="font-size: 14px;">💡 1 ₽ на сайте = 0.9 ₽ после комиссии (-10%)</p>
            </div>
            <div class="wallet-buttons">
                <button class="btn-success" onclick="showPaymentAlert('deposit')">💰 Пополнить</button>
                <button class="btn-primary" onclick="showPaymentAlert('withdraw')">💸 Вывод</button>
            </div>
            <button class="btn-danger" onclick="closeWalletModal()" style="margin-top: 15px; width: 100%;">Закрыть</button>
        </div>
    `;
    
    modal.style.display = 'flex';
}

// ===== ВАЛИДАЦИЯ ИМЕНИ =====
function isValidName(name) {
    if (/^\d+$/.test(name)) return false;
    if (!/[a-zA-Zа-яА-Я]/.test(name)) return false;
    return true;
}

// ===== ВХОД И РЕГИСТРАЦИЯ =====
async function registerUser(name, school, corp, password) {
    if (!name.trim() || !school.trim() || !corp.trim()) { showToast('Заполните все поля', true); return false; }
    if (!/^\d+$/.test(school)) { showToast('❌ Школа только цифры!', true); return false; }
    if (!/^\d+$/.test(corp)) { showToast('❌ Корпус только цифры!', true); return false; }
    if (password.length < 3) { showToast('Пароль не менее 3 символов', true); return false; }
    
    if (!isValidName(name.trim())) {
        showToast('❌ Имя должно содержать буквы! Нельзя использовать только цифры.', true);
        return false;
    }
    
    const userExists = users.some(u => u.name === name.trim());
    if (userExists) { 
        showToast('❌ Пользователь с таким именем уже существует', true); 
        return false; 
    }
    
    let id = 'u' + Date.now();
    let referralCode = 'REF' + Math.random().toString(36).substring(2, 8).toUpperCase();
    let refCode = new URLSearchParams(window.location.search).get('ref');
    
    showToast('⏳ Регистрация...', false);
    
    let result = await saveToGoogle('registerUser', {
        id: id, 
        name: name.trim(), 
        school: school.trim(), 
        corp: corp.trim(),
        balance: 0, 
        bonus_balance: 0, 
        password: password, 
        referral_code: referralCode, 
        referred_by: refCode || ''
    });
    
    if (result && result.success) {
        isDataLoaded = false;
        await loadDataFromGoogle();
        
        currentUser = users.find(u => u.id === id);
        if (!currentUser) {
            currentUser = users.find(u => u.name === name.trim());
        }
        
        if (currentUser) {
            saveSession();
            showToast('✅ Добро пожаловать, ' + currentUser.name + '!', false);
            renderApp();
            return true;
        } else {
            showToast('❌ Ошибка: пользователь создан, но не найден', true);
            return false;
        }
    }
    showToast('❌ Ошибка регистрации', true);
    return false;
}

async function loginUser(name, school, corp, password) {
    let cleanName = name ? name.toString().trim() : '';
    let cleanSchool = school ? school.toString().trim() : '';
    let cleanCorp = corp ? corp.toString().trim() : '';
    let cleanPassword = password ? password.toString().trim() : '';
    
    if (!cleanName || !cleanSchool || !cleanCorp) { 
        showToast('Заполните все поля', true); 
        return false; 
    }
    if (!cleanPassword) { 
        showToast('Введите пароль', true); 
        return false; 
    }
    
    if (!isDataLoaded || users.length === 0) {
        await loadDataFromGoogle();
    }
    
    let user = users.find(u => {
        return String(u.name || '').trim() === cleanName && 
               String(u.school || '').trim() === cleanSchool && 
               String(u.corp || '').trim() === cleanCorp;
    });
    
    if (!user) { 
        showToast('❌ Пользователь не найден. Проверьте имя, школу и корпус.', true); 
        return false; 
    }
    
    if (String(user.password || '').trim() !== cleanPassword) { 
        showToast('❌ Неверный пароль', true); 
        return false; 
    }
    
    if (user.isBanned === 'true') { 
        showToast('⛔ Аккаунт заблокирован', true); 
        return false; 
    }
    
    currentUser = user;
    saveSession();
    showToast('✅ С возвращением, ' + currentUser.name + '!', false);
    renderApp();
    return true;
}

function logout() { 
    currentUser = null; 
    adminMode = false; 
    localStorage.removeItem('schooltask_session'); 
    renderApp(); 
}

// ===== ЗАДАНИЯ =====
async function createTask(desc, price, loc, paymentType, scope) {
    if (!currentUser) return;
    let priceNum = parseFloat(price);
    if (isNaN(priceNum) || priceNum <= 0) { showToast('Цена должна быть положительной', true); return; }
    
    let balance = paymentType === 'bonus' ? (parseFloat(currentUser.bonus_balance)||0) : (parseFloat(currentUser.balance)||0);
    if (balance < priceNum) { showToast('Недостаточно средств', true); return; }
    
    showToast('⏳ Создание задания...', false);
    
    if (paymentType === 'bonus') { 
        currentUser.bonus_balance -= priceNum; 
    } else { 
        currentUser.balance -= priceNum; 
    }
    
    let newTask = { 
        id: Date.now().toString(), 
        creatorId: currentUser.id, 
        creatorSchool: currentUser.school,
        creatorCorp: currentUser.corp,
        description: desc, 
        price: priceNum, 
        location: loc, 
        payment_type: paymentType, 
        scope: scope, 
        status: 'open', 
        takerId: '', 
        createdAt: new Date().toISOString() 
    };
    
    let createResult = await saveToGoogle('createTask', newTask);
    if (!createResult || !createResult.success) {
        showToast('❌ Ошибка создания задания', true);
        if (paymentType === 'bonus') { 
            currentUser.bonus_balance += priceNum; 
        } else { 
            currentUser.balance += priceNum; 
        }
        renderApp();
        return;
    }
    
    await saveToGoogle('updateUser', { id: currentUser.id, balance: currentUser.balance, bonus_balance: currentUser.bonus_balance });
    
    isDataLoaded = false;
    await loadDataFromGoogle();
    
    currentUser = users.find(u => u.id === currentUser.id);
    showToast('✅ Задание создано!', false); 
    renderApp(); 
}

async function deleteTask(taskId) {
    if (!confirm('Удалить задание?')) return;
    let task = tasks.find(t => t.id == taskId);
    if (task && task.status === 'open' && task.creatorId === currentUser.id) {
        if (task.payment_type === 'bonus') { 
            currentUser.bonus_balance += parseFloat(task.price); 
        } else { 
            currentUser.balance += parseFloat(task.price); 
        }
        await saveToGoogle('updateUser', { id: currentUser.id, balance: currentUser.balance, bonus_balance: currentUser.bonus_balance });
    }
    await saveToGoogle('deleteTask', { id: taskId });
    isDataLoaded = false;
    await loadDataFromGoogle();
    currentUser = users.find(u => u.id === currentUser.id);
    showToast('🗑️ Задание удалено', false); 
    renderApp(); 
}

function showEditModal(task) {
    let newDesc = prompt('Новое описание:', task.description);
    if (!newDesc) return;
    let newPrice = parseFloat(prompt('Новая цена:', task.price));
    if (isNaN(newPrice) || newPrice <= 0) { showToast('Цена должна быть положительной', true); return; }
    let newLoc = prompt('Новое место:', task.location);
    if (!newLoc) return;
    let newScope = confirm('Для всех участников? (OK - да, Отмена - только моя школа)') ? 'all' : 'school';
    
    saveToGoogle('updateTask', { id: task.id, description: newDesc, price: newPrice, location: newLoc, scope: newScope }).then(async () => {
        isDataLoaded = false;
        await loadDataFromGoogle();
        currentUser = users.find(u => u.id === currentUser.id);
        showToast('✅ Задание обновлено', false);
        renderApp();
    });
}

async function takeTask(taskId) {
    let task = tasks.find(t => t.id == taskId);
    if (!task || task.status !== 'open') return;
    if (task.creatorId === currentUser.id) { showToast('Нельзя взять своё задание', true); return; }
    await saveToGoogle('updateTask', { id: task.id, status: 'in_progress', takerId: currentUser.id });
    isDataLoaded = false;
    await loadDataFromGoogle();
    showToast('📢 Вы взяли задание!', false); 
    renderApp(); 
}

async function confirmCompletion(taskId) {
    let task = tasks.find(t => t.id == taskId);
    if (!task || task.status !== 'in_progress') return;
    if (task.takerId !== currentUser.id) return;
    await saveToGoogle('updateTask', { id: task.id, status: 'awaiting_confirmation' });
    isDataLoaded = false;
    await loadDataFromGoogle();
    showToast('✅ Задание выполнено! Ожидайте подтверждения', false); 
    renderApp(); 
}

async function confirmReceipt(taskId) {
    let task = tasks.find(t => t.id == taskId);
    if (!task || task.status !== 'awaiting_confirmation') return;
    if (task.creatorId !== currentUser.id) return;
    let executor = users.find(u => u.id === task.takerId);
    let total = parseFloat(task.price);
    let gain = total * 0.95;
    if (executor) { 
        executor.balance += gain;
        executor.bonus_balance += 10;
        await saveToGoogle('updateUser', { id: executor.id, balance: executor.balance, bonus_balance: executor.bonus_balance });
        await saveToGoogle('addTaskCompleteBonus', { userId: executor.id });
    }
    await saveToGoogle('updateTask', { id: task.id, status: 'completed' });
    isDataLoaded = false;
    await loadDataFromGoogle();
    showToast('💰 Подтверждено! Исполнитель получил ' + gain.toFixed(2) + '₽', false); 
    renderApp(); 
}

async function rejectReceipt(taskId) {
    let task = tasks.find(t => t.id == taskId);
    if (!task || task.status !== 'awaiting_confirmation') return;
    if (task.creatorId !== currentUser.id) return;
    if (task.payment_type === 'bonus') { 
        currentUser.bonus_balance += parseFloat(task.price); 
    } else { 
        currentUser.balance += parseFloat(task.price); 
    }
    await saveToGoogle('updateUser', { id: currentUser.id, balance: currentUser.balance, bonus_balance: currentUser.bonus_balance });
    await saveToGoogle('updateTask', { id: task.id, status: 'disputed' });
    isDataLoaded = false;
    await loadDataFromGoogle();
    currentUser = users.find(u => u.id === currentUser.id);
    showToast('⚠️ Деньги возвращены', false); 
    renderApp(); 
}

// ===== ЧАТ =====
async function openChat(taskId) {
    currentChatTask = taskId;
    await loadMessages();
    renderChatModal();
}

async function loadMessages() {
    const result = await saveToGoogle('getMessages', { taskId: currentChatTask });
    if (result && result.messages) {
        try {
            chatMessages = JSON.parse(result.messages);
        } catch(e) {
            chatMessages = [];
        }
    } else {
        chatMessages = [];
    }
}

async function sendMessage() {
    let input = document.getElementById('chatInput');
    let text = input.value.trim();
    if (!text) return;
    
    chatMessages.push({
        from: currentUser.id,
        fromName: currentUser.name,
        text: text,
        time: new Date().toISOString()
    });
    
    await saveToGoogle('saveMessage', { 
        taskId: currentChatTask, 
        messages: JSON.stringify(chatMessages) 
    });
    
    input.value = '';
    renderChatModal();
}

function renderChatModal() {
    let modal = document.getElementById('chatModal');
    if (!modal) {
        modal = document.createElement('div');
        modal.id = 'chatModal';
        modal.className = 'chat-modal';
        document.body.appendChild(modal);
    }
    
    modal.innerHTML = `
        <div class="chat-container">
            <div style="padding: 15px; background: #3b82f6; color: white; display: flex; justify-content: space-between;">
                <strong>💬 Чат по заданию</strong>
                <button onclick="closeChat()" style="background: none; color: white; font-size: 20px;">✕</button>
            </div>
            <div class="chat-messages" id="chatMessages">
                ${chatMessages.map(msg => `
                    <div class="chat-message ${msg.from === currentUser.id ? 'mine' : 'other'}">
                        <div><strong>${msg.fromName}</strong> ${new Date(msg.time).toLocaleTimeString()}</div>
                        <div>${msg.text}</div>
                    </div>
                `).join('')}
            </div>
            <div class="chat-input">
                <input type="text" id="chatInput" placeholder="Введите сообщение...">
                <button class="btn-primary" onclick="sendMessage()">📤</button>
            </div>
        </div>
    `;
    
    modal.style.display = 'flex';
    setTimeout(() => {
        let messagesDiv = document.getElementById('chatMessages');
        if (messagesDiv) messagesDiv.scrollTop = messagesDiv.scrollHeight;
    }, 100);
}

function closeChat() {
    let modal = document.getElementById('chatModal');
    if (modal) modal.style.display = 'none';
    currentChatTask = null;
}

function getStatusText(status) {
    switch(status) {
        case 'open': return { text: '📋 Доступно', class: 'status-open' };
        case 'in_progress': return { text: '⏳ Выполняется', class: 'status-progress' };
        case 'awaiting_confirmation': return { text: '🕐 Ожидает', class: 'status-awaiting' };
        case 'completed': return { text: '✅ Выполнено', class: 'status-completed' };
        default: return { text: status, class: 'status-open' };
    }
}

function getRatingStars(rating) {
    let stars = '';
    for (let i = 1; i <= 5; i++) {
        stars += i <= rating ? '⭐' : '☆';
    }
    return stars;
}

        if (task.status === 'awaiting_confirmation' && task.creatorId === currentUser.id) {
            btns = `<div class="action-buttons"><button class="btn-success confirm-btn" data-id="${task.id}">💰 Подтвердить получение</button><button class="btn-danger reject-btn" data-id="${task.id}">❌ Не получил</button></div>`;
        }
        if (task.status === 'completed' && task.creatorId === currentUser.id && !reviews.some(r => r.taskId === task.id && r.fromUserId === currentUser.id)) {
            btns += `<button class="btn-info review-btn" data-id="${task.id}" data-userid="${task.takerId}">⭐ Оставить отзыв</button>`;
        }
        if (showEditDelete && task.creatorId === currentUser.id && task.status === 'open') {
            btns += `<div class="action-buttons"><button class="btn-edit edit-btn" data-id="${task.id}">✏️ Редактировать</button><button class="btn-danger delete-btn" data-id="${task.id}">🗑️ Удалить</button></div>`;
        }
        
        let taskReviews = reviews.filter(r => r.taskId === task.id);
        let avgRating = taskReviews.length > 0 ? taskReviews.reduce((sum, r) => sum + parseInt(r.rating), 0) / taskReviews.length : 0;
        
        let scopeIcon = task.scope === 'all' ? '🌍' : '🏫';
        let scopeText = task.scope === 'all' ? 'Для всех участников' : `Только школа ${task.creatorSchool}, корпус ${task.creatorCorp}`;
        
        return `<div class="task-card">
            <div class="task-header">
                <div class="task-price">${task.price} ₽</div>
                <div class="task-status ${status.class}">${status.text}</div>
            </div>
            <div class="task-desc">📌 ${task.description}</div>
            <div class="task-meta">📍 ${task.location} | ${scopeIcon} ${scopeText}</div>
            <div style="font-size:0.7rem; color:#6b7280;">👤 Создатель: ${creator?.name || '?'} (${creator?.school || ''}, корпус ${creator?.corp || ''})${task.takerId ? `<br>👤 Исполнитель: ${executor?.name || '?'}` : ''}</div>
            ${avgRating > 0 ? `<div style="font-size:0.7rem; color:#fbbf24;">${getRatingStars(avgRating)} (${taskReviews.length} отзывов)</div>` : ''}
            <div class="action-buttons">
                <button class="btn-info chat-btn" data-id="${task.id}" style="background:#8b5cf6;">💬 Чат</button>
                ${btns}
            </div>
        </div>`;
    };
    
    let createForm = `<div class="card">
        <h3>📝 Создать задание</h3>
        <textarea id="taskDesc" rows="2" placeholder="Что нужно сделать? (например: принеси булочку в 40 кабинет)"></textarea>
        <input type="number" id="taskPrice" placeholder="Цена (руб)">
        <input type="text" id="taskLocation" placeholder="Место (кабинет, этаж)">
        <select id="paymentType">
            <option value="main">💰 Оплатить с основного счёта (${(parseFloat(currentUser.balance) || 0).toFixed(2)} ₽)</option>
            <option value="bonus">🎁 Оплатить с бонусного счёта (${(parseFloat(currentUser.bonus_balance) || 0).toFixed(2)} ₽)</option>
        </select>
        <select id="taskScope">
            <option value="school">🏫 Только моя школа и корпус</option>
            <option value="all">🌍 Для всех участников сайта</option>
        </select>
        <button class="btn-primary" id="createBtn">Создать</button>
    </div>`;
    
    let profileHtml = `<div class="card">
        <h3>👤 Мой профиль</h3>
        <p><strong>Имя:</strong> ${currentUser.name}</p>
        <p><strong>Школа:</strong> ${currentUser.school}</p>
        <p><strong>Корпус:</strong> ${currentUser.corp}</p>
        <p><strong>💰 Основной баланс:</strong> ${(parseFloat(currentUser.balance) || 0).toFixed(2)} ₽</p>
        <p><strong>🎁 Бонусный счёт:</strong> ${(parseFloat(currentUser.bonus_balance) || 0).toFixed(2)} ₽</p>
        <p><strong>👥 Приглашено друзей:</strong> ${currentUser.referral_count || 0}</p>
        <p><strong>⭐ Рейтинг:</strong> ${getRatingStars(parseFloat(currentUser.rating) || 0)} (${currentUser.ratingCount || 0} оценок)</p>
        <p><strong>📊 Выполнено заданий:</strong> ${currentUser.tasksCompleted || 0}</p>
        <p><strong>💰 Заработано:</strong> ${(parseFloat(currentUser.totalEarned) || 0).toFixed(2)} ₽</p>
        <div class="referral-code" onclick="copyReferralLink()">🔗 ${getReferralLink()}</div>
        <p style="font-size:12px; margin-top:10px;">➕ За каждого друга, который зарегистрируется по вашей ссылке, вы получите +5₽ на бонусный счёт!</p>
    </div>`;
    
    let activeTab = window._activeTab || 'allTasks';
    let content = '';
    
    if (activeTab === 'allTasks') {
        content = `<h3>📋 Доступные задания ${filters.scope === 'all' ? '(для всех участников)' : `(ваша школа ${currentUser.school}, корпус ${currentUser.corp})`}</h3>
                   ${helpBlock}
                   <div class="filter-group">
                       <select id="filterScope">
                           <option value="school" ${filters.scope === 'school' ? 'selected' : ''}>🏫 Только моя школа и корпус</option>
                           <option value="all" ${filters.scope === 'all' ? 'selected' : ''}>🌍 Для всех участников</option>
                       </select>
                       <input type="number" id="filterMinPrice" placeholder="Цена от" value="${filters.minPrice}">
                       <input type="number" id="filterMaxPrice" placeholder="Цена до" value="${filters.maxPrice}">
                       <button id="applyFilters" class="btn-info">🔍 Применить</button>
                   </div>
                   <div class="tasks-grid">${openTasks.map(t => taskCard(t, true, false)).join('') || '<div style="text-align:center; padding:40px;">✨ Нет заданий</div>'}</div>`;
    } else if (activeTab === 'myTasks') {
        content = `<h3>📌 Мои задания (созданные мной)</h3>
                   <div class="tasks-grid">${myCreatedTasks.map(t => taskCard(t, true, true)).join('') || '<div style="text-align:center; padding:40px;">✨ У вас пока нет созданных заданий</div>'}</div>`;
    } else if (activeTab === 'myExecutions') {
        content = `<h3>⚡ Мои выполнения</h3>
                   <div class="tasks-grid">${myExecTasks.map(t => taskCard(t, true, false)).join('') || '<div style="text-align:center; padding:40px;">✨ Вы пока не взяли ни одного задания</div>'}</div>`;
    } else if (activeTab === 'completed') {
        content = `<h3>✅ Завершённые задания</h3>
                   <div class="tasks-grid">${myCompletedTasks.map(t => taskCard(t, false, false)).join('') || '<div style="text-align:center; padding:40px;">✨ Нет завершённых заданий</div>'}</div>`;
    } else if (activeTab === 'profile') {
        content = profileHtml;
    } else if (activeTab === 'create') {
        content = createForm;
    }
    
    appDiv.innerHTML = `
        <div class="container">
            <div class="header">
                <div class="logo"><h1>🏫 SchoolTask</h1></div>
                <div class="user-info">
                    <div>👋 ${currentUser.name} | ${currentUser.school}</div>
                    <div class="balance-card" onclick="openWalletModal()">💰 ${(parseFloat(currentUser.balance) || 0).toFixed(2)} ₽</div>
                    <div class="bonus-card" onclick="showBonusHelp()">🎁 ${(parseFloat(currentUser.bonus_balance) || 0).toFixed(2)} ₽</div>
                    <button class="theme-toggle" id="themeToggleBtn">${isDarkTheme ? '☀️' : '🌙'}</button>
                    <button class="btn-danger" id="logoutBtn">Выйти</button>
                </div>
            </div>
            <div style="display:flex; justify-content:space-between; margin-bottom:15px; flex-wrap:wrap; gap:10px;">
                <div>${adminEntryBtn}</div>
            </div>
            ${adminPanelHtml}
            <div class="tabs">
                <div class="tab ${activeTab === 'allTasks' ? 'active' : ''}" data-tab="allTasks">📋 Все задания</div>
                <div class="tab ${activeTab === 'myTasks' ? 'active' : ''}" data-tab="myTasks">📦 Мои задания</div>
                <div class="tab ${activeTab === 'myExecutions' ? 'active' : ''}" data-tab="myExecutions">⚡ В работе</div>
                <div class="tab ${activeTab === 'completed' ? 'active' : ''}" data-tab="completed">✅ Завершённые</div>
                <div class="tab ${activeTab === 'profile' ? 'active' : ''}" data-tab="profile">👤 Профиль</div>
                <div class="tab ${activeTab === 'create' ? 'active' : ''}" data-tab="create">➕ Создать</div>
            </div>
            ${content}
            <div style="margin-top:20px; text-align:center; font-size:12px;">⚠️ Комиссия 5% | Общайтесь в чате с исполнителем</div>
        </div>
    `;
    
    document.querySelectorAll('.tab').forEach(tab => {
        tab.onclick = () => {
            window._activeTab = tab.getAttribute('data-tab');
            renderApp();
        };
    });
    
    document.getElementById('logoutBtn').onclick = logout;
    document.getElementById('themeToggleBtn').onclick = toggleTheme;
    
    if (document.getElementById('createBtn')) {
        document.getElementById('createBtn').onclick = () => {
            let desc = document.getElementById('taskDesc').value;
            let price = document.getElementById('taskPrice').value;
            let loc = document.getElementById('taskLocation').value;
            let pt = document.getElementById('paymentType').value;
            let sc = document.getElementById('taskScope').value;
            if (desc && price && loc) createTask(desc, price, loc, pt, sc);
            else showToast('Заполните все поля', true);
        };
    }
    
    if (document.getElementById('applyFilters')) {
        document.getElementById('applyFilters').onclick = () => {
            filters.scope = document.getElementById('filterScope').value;
            filters.minPrice = document.getElementById('filterMinPrice').value;
            filters.maxPrice = document.getElementById('filterMaxPrice').value;
            renderApp();
        };
    }
    
    if (isAdmin) {
        if (document.getElementById('adminPanelBtn')) {
            document.getElementById('adminPanelBtn').onclick = () => adminMode ? exitAdminMode() : requestAdminAccess();
        }
        if (document.getElementById('exitAdminBtn')) document.getElementById('exitAdminBtn').onclick = exitAdminMode;
        if (document.getElementById('refreshUsersBtn')) {
            document.getElementById('refreshUsersBtn').onclick = async () => { 
                isDataLoaded = false;
                await loadDataFromGoogle(); 
                renderApp(); 
            };
        }
        if (document.getElementById('clearTasksBtn')) document.getElementById('clearTasksBtn').onclick = deleteAllTasks;
        if (document.getElementById('adminSearch')) {
            document.getElementById('adminSearch').oninput = (e) => { adminSearchTerm = e.target.value; renderApp(); };
        }
        
        document.querySelectorAll('.topup-btn').forEach(btn => {
            btn.onclick = () => {
                let userId = btn.getAttribute('data-userid');
                let isBonus = btn.getAttribute('data-bonus') === 'true';
                let amountField = isBonus ? document.getElementById('bonus-' + userId) : document.getElementById('amount-' + userId);
                let amount = parseFloat(amountField ? amountField.value : 100);
                if (amount > 0) adminChangeBalance(userId, amount, isBonus);
            };
        });
        
        document.querySelectorAll('.withdraw-btn').forEach(btn => {
            btn.onclick = () => {
                let userId = btn.getAttribute('data-userid');
                let isBonus = btn.getAttribute('data-bonus') === 'true';
                let amountField = isBonus ? document.getElementById('bonus-' + userId) : document.getElementById('amount-' + userId);
                let amount = parseFloat(amountField ? amountField.value : 100);
                if (amount > 0) adminChangeBalance(userId, -amount, isBonus);
            };
        });
        
        document.querySelectorAll('.ban-btn').forEach(btn => {
            btn.onclick = () => showBanModal(btn.getAttribute('data-userid'));
        });
        
        document.querySelectorAll('.unban-btn').forEach(btn => {
            btn.onclick = () => unbanUser(btn.getAttribute('data-userid'));
        });
    }
    
    document.querySelectorAll('.take-btn').forEach(btn => {
        btn.onclick = () => takeTask(btn.getAttribute('data-id'));
    });
    
    document.querySelectorAll('.delete-btn').forEach(btn => {
        btn.onclick = () => deleteTask(btn.getAttribute('data-id'));
    });
    
    document.querySelectorAll('.edit-btn').forEach(btn => {
        let taskId = btn.getAttribute('data-id');
        let task = tasks.find(t => t.id == taskId);
        if (task) btn.onclick = () => showEditModal(task);
    });
    
    document.querySelectorAll('.complete-btn').forEach(btn => {
        btn.onclick = () => confirmCompletion(btn.getAttribute('data-id'));
    });
    
    document.querySelectorAll('.confirm-btn').forEach(btn => {
        btn.onclick = () => confirmReceipt(btn.getAttribute('data-id'));
    });
    
    document.querySelectorAll('.reject-btn').forEach(btn => {
        btn.onclick = () => rejectReceipt(btn.getAttribute('data-id'));
    });
    
    document.querySelectorAll('.chat-btn').forEach(btn => {
        btn.onclick = () => openChat(btn.getAttribute('data-id'));
    });
    
    document.querySelectorAll('.review-btn').forEach(btn => {
        btn.onclick = () => showReviewModal(btn.getAttribute('data-id'), btn.getAttribute('data-userid'));
    });
}

window.sendMessage = sendMessage;
window.closeChat = closeChat;
window.shareTelegram = shareTelegram;
window.shareVK = shareVK;
window.copyReferralLink = copyReferralLink;
window.showBonusHelp = showBonusHelp;
window.openWalletModal = openWalletModal;
window.closeWalletModal = closeWalletModal;
window.showPaymentAlert = showPaymentAlert;

// ЗАПУСК
loadDataFromGoogle().then(() => {
    restoreSession();
    renderApp();
});
</script>
</body>
</html>
