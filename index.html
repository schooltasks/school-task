<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>SchoolTask | Биржа поручений + Бурмалда</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', system-ui, 'Roboto', sans-serif;
        }

        body {
            background: linear-gradient(135deg, #f5f7fa 0%, #eef2f7 100%);
            min-height: 100vh;
            padding: 20px;
            transition: background 0.3s ease;
        }

        body.dark {
            background: linear-gradient(145deg, #0a0f0a 0%, #050a05 100%);
        }

        .container {
            max-width: 1300px;
            margin: 0 auto;
        }

        .header, .card, .task-card, .upgrade-panel {
            background: white;
            border-radius: 32px;
            padding: 20px;
            margin-bottom: 20px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.08);
            transition: all 0.3s cubic-bezier(0.2, 0.9, 0.4, 1.1);
        }

        body.dark .header,
        body.dark .card,
        body.dark .task-card,
        body.dark .upgrade-panel {
            background: #1e2a1e;
            border: 1px solid #ffd966aa;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
        }

        .logo h1 {
            background: linear-gradient(135deg, #1a73e8, #0d47a1);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            font-size: 1.6rem;
        }

        body.dark .logo h1 {
            background: linear-gradient(135deg, #ffd966, #ffb347);
            -webkit-background-clip: text;
            background-clip: text;
        }

        .warning-banner {
            background: linear-gradient(135deg, #dc2626, #991b1b);
            color: white;
            padding: 20px;
            border-radius: 24px;
            margin-bottom: 20px;
            text-align: center;
            font-weight: bold;
            animation: pulseWarning 2s infinite;
        }

        @keyframes pulseWarning {
            0%, 100% { transform: scale(1); background: linear-gradient(135deg, #dc2626, #991b1b); }
            50% { transform: scale(1.01); background: linear-gradient(135deg, #ef4444, #dc2626); }
        }

        .user-info {
            display: flex;
            align-items: center;
            gap: 15px;
            background: #e8f0fe;
            padding: 8px 20px;
            border-radius: 60px;
            flex-wrap: wrap;
        }

        body.dark .user-info {
            background: #0f1c19;
        }

        .balance-card, .bonus-card {
            padding: 6px 16px;
            border-radius: 40px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.2s cubic-bezier(0.2, 0.9, 0.4, 1.1);
        }

        .balance-card:hover, .bonus-card:hover { transform: scale(1.05); }
        .balance-card:active, .bonus-card:active { transform: scale(0.95); }
        .balance-card { background: #1a73e8; color: white; }
        .bonus-card { background: #f7b32b; color: #1f2a1b; }

        button {
            cursor: pointer;
            border: none;
            border-radius: 40px;
            padding: 10px 20px;
            font-weight: bold;
            transition: all 0.2s cubic-bezier(0.2, 0.9, 0.4, 1.1);
        }
        button:hover { transform: scale(1.02); }
        button:active { transform: scale(0.97); }
        button:disabled { opacity: 0.6; transform: none; cursor: not-allowed; }

        .btn-primary { background: #1a73e8; color: white; }
        .btn-success { background: #10b981; color: white; }
        .btn-danger { background: #dc2626; color: white; }
        .btn-warning { background: #f59e0b; color: white; }
        .btn-info { background: #3b82f6; color: white; }
        .theme-toggle { background: #64748b; color: white; padding: 8px 16px; border-radius: 60px; }

        input, textarea, select {
            width: 100%;
            padding: 12px 16px;
            border: 2px solid #e2e8f0;
            border-radius: 28px;
            margin-bottom: 12px;
            font-size: 1rem;
            background: white;
            color: #1e293b;
            transition: all 0.2s ease;
        }

        body.dark input, body.dark textarea, body.dark select {
            background: #0f1c19;
            border-color: #ffd96688;
            color: #ffdf8c;
        }

        input:focus, textarea:focus, select:focus {
            outline: none;
            border-color: #1a73e8;
            transform: scale(1.01);
        }

        .tabs {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            margin-bottom: 20px;
        }

        .tab {
            background: #e2e8f0;
            padding: 10px 24px;
            border-radius: 60px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.2s cubic-bezier(0.2, 0.9, 0.4, 1.1);
            color: #1e293b;
        }

        body.dark .tab {
            background: #0f1c19;
            color: #ddd;
        }

        .tab:hover { transform: translateY(-2px); }
        .tab:active { transform: scale(0.96); }
        .tab.active { background: #1a73e8; color: white; }
        body.dark .tab.active { background: #f7b32b; color: #1f2a1b; }

        .tasks-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
            gap: 20px;
        }

        .task-card {
            transition: all 0.3s cubic-bezier(0.2, 0.9, 0.4, 1.1);
        }
        .task-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 8px 25px rgba(0,0,0,0.12);
        }

        .task-header {
            display: flex;
            justify-content: space-between;
            margin-bottom: 12px;
            flex-wrap: wrap;
        }
        .task-price { font-size: 1.6rem; font-weight: 800; color: #1a73e8; }
        body.dark .task-price { color: #ffd966; }
        .task-status { padding: 4px 12px; border-radius: 30px; font-size: 0.75rem; font-weight: bold; }
        .status-open { background: #10b981; color: white; }
        .status-in_progress { background: #f59e0b; color: white; }

        .toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: #1e293b;
            color: white;
            padding: 12px 24px;
            border-radius: 60px;

        .support-link {

        body.dark .honor-item { background: #0f1c19; border: 1px solid #ffd96655; }
        .honor-item:hover { transform: translateY(-3px); }

        /* Бурмалда */
        .upgrade-panel .wheel-container {
            position: relative;
            width: 300px;
            height: 300px;

        .upgrade-panel canvas {

        body.dark .upgrade-panel canvas:hover { box-shadow: 0 0 0 8px #f7b32b; }
        .upgrade-panel .center-badge {

            left: 50%;

            padding: 6px 12px;

        .balance-switch { display: flex; gap: 12px; margin: 10px 0; }
        .balance-btn {

            background: #e2e8f0;
            border-radius: 60px;
            padding: 10px;
            cursor: pointer;
            text-align: center;
            color: #1e293b;

        body.dark .balance-btn { background: #0f1c19; border: 1px solid #ffd96688; color: #ddd; }
        .balance-btn:hover { transform: scale(1.02); }
        .balance-btn.active { background: #1a73e8; color: white; }
        body.dark .balance-btn.active { background: #f7b32b; color: #1f2a1b; }
        .chance-panel {
            text-align: center;

            padding: 12px;
            margin-bottom: 15px;
        }
        body.dark .chance-panel { background: #07131299; }
        .chance-digits { font-size: 1.6rem; font-weight: 800; color: #1a73e8; }
        body.dark .chance-digits { color: #ffd966; }
        .spin-button {
            width: 100%;
            background: linear-gradient(95deg, #1a73e8, #0d47a1);

            font-size: 1.2rem;
            font-weight: bold;

        .result-area {

            padding: 12px;

        body.dark .result-area { background: #00000066; color: #ffeca2; }
        .rank-badge {
            display: inline-block;
            background: #e2e8f0;
            border-radius: 20px;
            padding: 4px 12px;
            font-size: 0.7rem;

        .progress-container {

        body.dark .progress-container { background: #2c3e2f; }

            background: linear-gradient(90deg, #1a73e8, #0d47a1);

        .notification-badge { position: relative; cursor: pointer; }
        .notification-dot {
            position: absolute;
            top: -5px;
            right: -5px;
            background: #ef4444;
            width: 10px;
            height: 10px;
            border-radius: 50%;
            animation: pulse 1s infinite;
        }
        @keyframes pulse {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.5; transform: scale(1.2); }
        }

        .notifications-panel {
            position: fixed;
            top: 80px;
            right: 20px;
            width: 350px;
            max-height: 500px;
            background: white;
            border-radius: 20px;
            border: 1px solid #e2e8f0;

            overflow-y: auto;

        body.dark .notifications-panel { background: #1e2a1e; border-color: #ffd966; }
        @keyframes slideInRight {
            from { opacity: 0; transform: translateX(100px); }
            to { opacity: 1; transform: translateX(0); }
        }
        .notification-item {
            padding: 12px 16px;
            border-bottom: 1px solid #e2e8f0;
            transition: background 0.2s;
        }
        body.dark .notification-item { border-color: #ffd96633; }
        .notification-item:hover { background: #e8f0fe; }
        body.dark .notification-item:hover { background: #2c3e2f; }
        .notification-item.unread { background: #dbeafe; border-left: 3px solid #1a73e8; }
        body.dark .notification-item.unread { background: #2c6e4f33; border-left-color: #f7b32b; }
        .notification-text { font-size: 0.9rem; color: #1e293b; }
        body.dark .notification-text { color: #ffdf8c; }
        .notification-time { font-size: 0.7rem; color: #888; margin-top: 5px; }

        .referral-code {
            background: #e8f0fe;
            padding: 10px;
            border-radius: 40px;
            cursor: pointer;
            text-align: center;
            margin-top: 15px;
            transition: all 0.2s;
        }
        body.dark .referral-code { background: #0f1c19; }
        .referral-code:hover { transform: scale(1.02); }
        .referral-code:active { transform: scale(0.98); }

        .user-rating {
            display: inline-flex;
            align-items: center;
            gap: 5px;
            background: #e8f0fe;
            padding: 4px 12px;
            border-radius: 20px;

        }
        body.dark .user-rating { background: #0f1c19; }

        .review-modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.7);
            z-index: 2000;
            justify-content: center;
            align-items: center;
            animation: fadeIn 0.3s;

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        .review-content {

            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }
        body.dark .review-content { background: #1e2a1e; border: 1px solid #ffd966; }
        .review-stars { display: flex; justify-content: center; gap: 10px; margin: 20px 0; }
        .review-star { font-size: 2rem; cursor: pointer; color: #cbd5e1; transition: all 0.1s; }
        .review-star.selected { color: #f7b32b; }
        .review-star:hover { transform: scale(1.1); }
        textarea {
            width: 100%;
            padding: 12px;
            border-radius: 16px;
            border: 2px solid #e2e8f0;
            margin: 15px 0;

            display: none;
            position: fixed;
            top: 0;
            left: 0;

            background: rgba(0,0,0,0.7);

            justify-content: center;
            align-items: center;
        }

        .modal-content {
            background: white;
            border-radius: 32px;
            padding: 30px;
            max-width: 400px;

            text-align: center;

        body.dark .modal-content { background: #1e2a1e; border: 1px solid #ffd966; }
        .modal-content h3 { margin-bottom: 15px; color: #1a73e8; }
        body.dark .modal-content h3 { color: #ffd966; }
        .modal-content p { margin-bottom: 20px; color: #1e293b; line-height: 1.5; }
        body.dark .modal-content p { color: #ffdf8c; }
        .modal-content .telegram-link {
            background: #1a73e8;
            color: white;
            padding: 12px 24px;
            border-radius: 40px;

        body.dark .bonus-info { background: #0f1c19; }

        .loading-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;

            align-items: center;
            z-index: 2000;
        }
        .spinner {
            width: 50px;
            height: 50px;

        }
    </style>
</head>
<body>
<div id="app">Загрузка...</div>

<script>
// ========== КОНФИГУРАЦИЯ ==========
const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbzLFS58EJ2FkAofaTWjrOnRZUSgC5c4JuS0P-HKmVSaL5FTa0ZRA6BG1GvpEw8u1iYd/exec';

let currentUser = null;
let currentTab = 'allTasks';
let isDark = localStorage.getItem('dark') === 'true';
let showNotifs = false;
let allUsers = [];
let allTasks = [];
let allReviews = [];
let allNotifications = [];

// Бурмалда переменные
let upgradeCanvas, upgradeCtx;
let upgradeVisible = 0, upgradeAngle = -Math.PI / 2;
let upgradeSpinning = false, upgradeAnim = null;
let upgradeAccount = 'bonus';
let firstSpinAfterEnter = true;
let isFirstSpinDone = false;
const MAIN_PENALTY = 0.45;
const MAX_CHANCE = 75;

if (isDark) document.body.classList.add('dark');

// ========== ВСПОМОГАТЕЛЬНЫЕ ФУНКЦИИ ==========
function escapeHtml(s) {
    if (!s) return '';
    return String(s).replace(/[&<>]/g, m => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;' }[m]));
}

function showToast(msg, isError) {
    let t = document.createElement('div');
    t.className = 'toast';
    t.textContent = msg;
    if (isError) t.style.background = '#dc2626';
    document.body.appendChild(t);
    setTimeout(() => t.remove(), 3000);
}

function animateElement(element, animation) {
    if (!element) return;
    element.classList.add(animation);
    setTimeout(() => element.classList.remove(animation), 300);
}

function showModal(title, message, showBonusInfo = false) {
    let modal = document.createElement('div');
    modal.className = 'modal show';
    modal.innerHTML = `
        <div class="modal-content">
            <h3>${title}</h3>
            <p>${message.replace(/\n/g, '<br>')}</p>
            ${showBonusInfo ? '<div class="bonus-info">🎁 <strong>Для чего нужен бонусный счёт?</strong><br><br>• Создание заданий<br>• Участие в бурмалде<br>• Получение наград за выполнение<br>• Реферальные бонусы<br><br>⚠️ Бонусы нельзя вывести на реальные деньги</div>' : ''}
            <a href="https://t.me/leshr_ak47" target="_blank" class="telegram-link">📱 Написать в Telegram</a>
            <div class="close-btn">Закрыть</div>
        </div>
    `;
    document.body.appendChild(modal);
    modal.querySelector('.close-btn').onclick = () => modal.remove();
    modal.onclick = (e) => { if (e.target === modal) modal.remove(); };
}

// ========== API ЗАПРОСЫ ==========
async function callAPI(action, params = {}) {
    try {
        const url = new URL(SCRIPT_URL);
        url.searchParams.append('action', action);
        Object.keys(params).forEach(key => url.searchParams.append(key, params[key]));
        
        const controller = new AbortController();
        const timeoutId = setTimeout(() => controller.abort(), 10000);
        
        const response = await fetch(url.toString(), {
            signal: controller.signal,
            cache: 'no-cache'
        });
        clearTimeout(timeoutId);
        
        const text = await response.text();
        try {
            return JSON.parse(text);
        } catch(e) {
            console.error('JSON parse error:', text.substring(0, 200));
            return null;
        }
    } catch (error) {
        console.error('API Error:', error);
        return null;
    }
}

async function loadUsers() {
    const result = await callAPI('getUsers');
    if (result && !result.error) {
        allUsers = Array.isArray(result) ? result : (result.users || []);
    }
    return allUsers;
}

async function loadTasks() {
    const result = await callAPI('getTasks');
    if (result && !result.error) {
        allTasks = Array.isArray(result) ? result : (result.tasks || []);
    }
    return allTasks;
}

async function loadReviews() {
    const result = await callAPI('getReviews');
    if (result && !result.error) {
        allReviews = Array.isArray(result) ? result : (result.reviews || []);
    }
    return allReviews;
}

async function loadNotifications() {
    if (!currentUser) return;
    const result = await callAPI('getNotifications', { userId: currentUser.id });
    if (result && !result.error) {

async function register(name, school, corp, password, referralCode) {

        showToast('❌ Имя 3-10 символов', true);
        return false;
    }
    if (!school || !/^\d+$/.test(school)) {
        showToast('❌ Школа только цифры', true);
        return false;
    }
    if (!corp || !/^\d+$/.test(corp)) {
        showToast('❌ Корпус только цифры', true);
        return false;
    }
    if (password.length < 3) {
        showToast('❌ Пароль минимум 3 символа', true);
        return false;
    }
    
    await loadUsers();
    const existing = allUsers.find(u => u.name === name && u.school === school && u.corp === corp);
    if (existing) {
        showToast('❌ Пользователь уже существует', true);
        return false;
    }
    
    const userId = 'u' + Date.now() + '_' + Math.random().toString(36).substr(2, 6);
    const userReferralCode = name + '_' + Math.random().toString(36).substr(2, 4).toUpperCase();
    
    const result = await callAPI('registerUser', {
        id: userId,
        name: name,
        school: school,
        corp: corp,
        password: password,
        referral_code: userReferralCode,
        referred_by: referralCode || '',
        registeredAt: new Date().toISOString()
    });
    
    if (result && result.success) {
        showToast('✅ Регистрация успешна! Войдите');
        renderAuth();
        return true;
    } else {
        showToast('❌ ' + (result?.error || 'Ошибка регистрации'), true);
        return false;
    }
}

async function login(name, school, corp, password) {
    await loadUsers();
    
    const user = allUsers.find(u => u.name === name && String(u.school) === String(school) && String(u.corp) === String(corp));

async function createTask(desc, price, location, paymentType, btn) {
    if (!desc || !price || !location) {
        showToast('❌ Заполните все поля', true);
        if (btn) btn.disabled = false;
        return;
    }
    
    const p = parseFloat(price);
    if (isNaN(p) || p <= 0) {
        showToast('❌ Цена должна быть больше 0', true);
        if (btn) btn.disabled = false;
        return;
    }
    
    const balance = paymentType === 'bonus' ? parseFloat(currentUser.bonus_balance) : parseFloat(currentUser.balance);
    if (balance < p) {
        showToast('❌ Недостаточно средств', true);
        if (btn) btn.disabled = false;
        return;
    }
    
    const taskId = 'task_' + Date.now() + '_' + Math.random().toString(36).substr(2, 6);
    
    if (paymentType === 'bonus') {
        currentUser.bonus_balance = (parseFloat(currentUser.bonus_balance) - p).toString();
    } else {
        currentUser.balance = (parseFloat(currentUser.balance) - p).toString();
    }
    
    const result = await callAPI('createTask', {
        id: taskId,
        creatorId: currentUser.id,
        creatorSchool: currentUser.school,
        creatorCorp: currentUser.corp,
        description: desc,
        price: p,
        location: location,
        payment_type: paymentType,
        createdAt: new Date().toISOString()
    });
    
    if (result && result.success) {
        await loadTasks();
        await callAPI('updateUser', { id: currentUser.id, balance: currentUser.balance, bonus_balance: currentUser.bonus_balance });
        showToast('✅ Задание создано!');
        if (btn) btn.disabled = false;
        renderMain();
    } else {
        showToast('❌ Ошибка создания задания', true);
        if (btn) btn.disabled = false;
    }
}

async function confirmTask(taskId, price, executorId, btn) {

    const executor = allUsers.find(u => u.id === executorId);

        await callAPI('updateUser', { id: executorId, balance: newBalance, tasksCompleted: (parseInt(executor.tasksCompleted) || 0) + 1 });
    }
    
    const result = await callAPI('updateTask', {

        status: 'completed',
        completedAt: new Date().toISOString()
    });
    
    if (result && result.success) {
        await loadTasks();

        await loadReviews();

        if (updatedUser) {
            currentUser.balance = updatedUser.balance;
            currentUser.bonus_balance = updatedUser.bonus_balance;
            currentUser.tasksCompleted = updatedUser.tasksCompleted;

        showToast(`💰 Подтверждено! +${gain.toFixed(2)} ₽ исполнителю`, false);
        renderMain();
        
        setTimeout(() => {
            showReviewModal(taskId, executorId);

    } else {
        showToast('❌ Ошибка', true);

function showReviewModal(taskId, executorId) {
    let selectedRating = 0;
    
    const modal = document.createElement('div');
    modal.className = 'review-modal show';
    modal.innerHTML = `
        <div class="review-content">
            <h3>⭐ Оцените выполнение задания</h3>
            <div class="review-stars" id="reviewStars">
                ${[1,2,3,4,5].map(i => `<span class="review-star" data-rating="${i}">☆</span>`).join('')}
            </div>
            <textarea id="reviewComment" rows="3" placeholder="Ваш отзыв (необязательно)"></textarea>
            <button class="btn-primary" id="submitReviewBtn">📝 Отправить отзыв</button>
            <button class="btn-danger" id="skipReviewBtn" style="margin-top: 10px;">Пропустить</button>
        </div>
    `;
    document.body.appendChild(modal);
    
    const stars = modal.querySelectorAll('.review-star');
    stars.forEach(star => {
        star.addEventListener('click', () => {
            selectedRating = parseInt(star.dataset.rating);
            stars.forEach((s, i) => {
                s.textContent = i < selectedRating ? '★' : '☆';
                if (i < selectedRating) s.classList.add('selected');
                else s.classList.remove('selected');
            });
        });
    });
    
    modal.querySelector('#submitReviewBtn').onclick = async () => {
        if (selectedRating === 0) {
            showToast('❌ Выберите оценку от 1 до 5', true);
            return;
        }
        
        const comment = modal.querySelector('#reviewComment').value;
        
        const result = await callAPI('addReview', {
            id: 'rev_' + Date.now(),
            fromUserId: currentUser.id,
            toUserId: executorId,
            taskId: taskId,
            rating: selectedRating,
            comment: comment,
            createdAt: new Date().toISOString()
        });
        
        if (result && result.success) {
            showToast('✅ Отзыв оставлен!', false);
            await loadReviews();
            renderMain();
        } else {
            showToast('❌ ' + (result?.error || 'Ошибка при сохранении отзыва'), true);
        }
        
        modal.remove();
    };
    
    modal.querySelector('#skipReviewBtn').onclick = () => {
        modal.remove();
    };
}

// ========== БУРМАЛДА (СКРЫТЫЕ ШАНСЫ) ==========
function computeChance(bet, target) {
    if (bet <= 0 || target <= 0) return 0;
    return Math.min((bet / target) * 100, MAX_CHANCE);
}

// СКРЫТАЯ ФУНКЦИЯ - возвращает реальный шанс для основного счёта (в 3 раза меньше)
function getRealChanceForMain(displayedChance) {
    return displayedChance / 3;
}

// СКРЫТАЯ ФУНКЦИЯ - для первого спина (реальный шанс 1%)
function getRealChanceForFirstSpin() {
    return 1;
}

function getResultAngle(displayedVisible, realChance, isFirstSpin) {
    let winChance = realChance;
    
    if (isFirstSpin && displayedVisible === 1) {
        winChance = 1;
    }
    
    const winAngle = (displayedVisible / 100) * Math.PI * 2;
    const start = -Math.PI / 2 - winAngle / 2;
    const end = start + winAngle;
    
    if (Math.random() < winChance / 100) {
        return start + Math.random() * winAngle;
    } else {
        return end + Math.random() * (Math.PI * 2 - winAngle);
    }
}

function drawWheel(p) {
    if (!upgradeCtx || !upgradeCanvas) return;
    const canvas = upgradeCanvas;
    canvas.width = 400;
    canvas.height = 400;
    const ctx = upgradeCtx;
    const r = 170, cx = 200, cy = 200;
    
    ctx.clearRect(0, 0, 400, 400);
    ctx.beginPath();
    ctx.arc(cx, cy, r, 0, Math.PI * 2);
    ctx.fillStyle = isDark ? '#2c423d' : '#e2e8f0';
    ctx.fill();
    
    if (p > 0) {
        const a = (p / 100) * Math.PI * 2;
        const s = -Math.PI / 2 - a / 2;
        ctx.beginPath();
        ctx.moveTo(cx, cy);
        ctx.arc(cx, cy, r, s, s + a);
        ctx.fillStyle = isDark ? '#f7b32b' : '#1a73e8';
        ctx.fill();
        
        if (p < 100) {
            ctx.beginPath();
            ctx.moveTo(cx, cy);
            ctx.arc(cx, cy, r, s + a, s + Math.PI * 2);
            ctx.fillStyle = isDark ? '#3e5a54' : '#cbd5e1';
            ctx.fill();
        }
    }
    
    ctx.beginPath();
    ctx.arc(cx, cy, r, 0, Math.PI * 2);
    ctx.strokeStyle = isDark ? '#fdcc6e' : '#64748b';
    ctx.lineWidth = 3;
    ctx.stroke();
    
    ctx.beginPath();
    ctx.arc(cx, cy, 28, 0, Math.PI * 2);
    ctx.fillStyle = isDark ? '#1d2d28' : '#f1f5f9';
    ctx.fill();
    ctx.fillStyle = isDark ? '#ffcd7e' : '#1a73e8';
    ctx.font = 'bold 20px system-ui';
    ctx.fillText("⚡", cx - 10, cy + 8);
}

function drawArrow(a) {
    if (!upgradeCtx) return;
    const ctx = upgradeCtx;
    const cx = 200, cy = 200, len = 160, wid = 18;
    const tipX = cx + Math.cos(a) * len;
    const tipY = cy + Math.sin(a) * len;
    const backX = cx - Math.cos(a) * (len * 0.2);
    const backY = cy - Math.sin(a) * (len * 0.2);
    const p = a + Math.PI / 2;
    const lx = tipX - Math.cos(p) * wid;
    const ly = tipY - Math.sin(p) * wid;
    const rx = tipX + Math.cos(p) * wid;
    const ry = tipY + Math.sin(p) * wid;
    
    ctx.beginPath();
    ctx.moveTo(tipX, tipY);
    ctx.lineTo(lx, ly);
    ctx.lineTo(backX, backY);
    ctx.lineTo(rx, ry);
    ctx.fillStyle = isDark ? '#ffc857' : '#ef4444';
    ctx.fill();
    ctx.fillStyle = '#000';
    ctx.font = 'bold 20px system-ui';
    ctx.fillText("▼", tipX - 10, tipY - 6);
}

function refreshWheel() {
    const betInput = document.getElementById('bet');
    const targetInput = document.getElementById('target');
    if (!betInput || !targetInput || !currentUser) return;
    
    let bet = parseFloat(betInput.value) || 0;
    let target = parseFloat(targetInput.value) || 0;
    
    let chance = (bet / target) * 100;
    if (chance > MAX_CHANCE && bet > 0 && target > 0) {
        const maxBet = (target * MAX_CHANCE) / 100;
        betInput.value = maxBet.toFixed(0);
        bet = maxBet;
        showToast(`⚠️ Шанс не может превышать ${MAX_CHANCE}%`, false);
    }
    
    upgradeVisible = computeChance(bet, target);
    
    const chanceSpan = document.getElementById('chance');
    if (chanceSpan) chanceSpan.innerText = upgradeVisible.toFixed(1) + '%';
    
    const centerSpan = document.getElementById('centerPercent');
    if (centerSpan) centerSpan.innerText = upgradeVisible.toFixed(0) + '%';
    
    const warningSpan = document.getElementById('chanceWarning');
    if (warningSpan) {
        warningSpan.style.display = upgradeVisible >= MAX_CHANCE ? 'block' : 'none';
        if (upgradeVisible >= MAX_CHANCE) warningSpan.innerHTML = '⚠️ Макс. шанс ' + MAX_CHANCE + '%';
    }
    
    let available = 0;
    if (upgradeAccount === 'main') {
        available = parseFloat(currentUser.balance) || 0;
    } else {
        available = parseFloat(currentUser.bonus_balance) || 0;
    }
    
    const spinBtn = document.getElementById('spinBtn');
    if (spinBtn) {
        spinBtn.disabled = !(bet > 0 && target > 0 && upgradeVisible > 0 && available >= bet && !upgradeSpinning);
    }
    
    drawWheel(upgradeVisible);
    drawArrow(upgradeAngle);
}

async function startSpin() {
    if (upgradeSpinning) return;
    const spinBtn = document.getElementById('spinBtn');
    if (spinBtn.disabled) return;
    
    animateElement(spinBtn, 'animate-pulse');
    
    let bet = parseFloat(document.getElementById('bet').value);
    let target = parseFloat(document.getElementById('target').value);
    
    let displayedChance = (bet / target) * 100;
    if (displayedChance > MAX_CHANCE) {
        showToast(`❌ Шанс не может превышать ${MAX_CHANCE}%`, true);
        return;
    }
    
    if (isNaN(bet) || bet <= 0 || target <= 0) {
        showToast('❌ Введите ставку и выигрыш', true);
        return;
    }
    
    // Определяем реальный шанс (СКРЫТО)
    let realChance = displayedChance;
    let isFirstSpin = false;
    
    if (upgradeAccount === 'main') {
        // Для основного счёта реальный шанс в 3 раза меньше
        realChance = displayedChance / 3;
    }
    
    // Если это первый спин после входа в меню
    if (firstSpinAfterEnter) {
        isFirstSpin = true;
        realChance = 1; // Реальный шанс 1%
        firstSpinAfterEnter = false;
    }
    
    console.log(`[СКРЫТО] Отображаемый шанс: ${displayedChance}%, Реальный шанс: ${realChance}%, Счёт: ${upgradeAccount}, Первый спин: ${isFirstSpin}`);
    
    let available = 0;
    if (upgradeAccount === 'main') {
        available = parseFloat(currentUser.balance) || 0;
    } else {
        available = parseFloat(currentUser.bonus_balance) || 0;
    }
    
    if (available < bet) {
        showToast(`❌ Недостаточно средств на ${upgradeAccount === 'main' ? 'основном' : 'бонусном'} счету`, true);
        return;
    }
    
    // СПИСЫВАЕМ СТАВКУ
    if (upgradeAccount === 'main') {
        currentUser.balance = (parseFloat(currentUser.balance) - bet).toString();
    } else {
        currentUser.bonus_balance = (parseFloat(currentUser.bonus_balance) - bet).toString();
    }
    
    const mainBalSpan = document.getElementById('mainBal');
    const bonusBalSpan = document.getElementById('bonusBal');
    if (mainBalSpan) mainBalSpan.innerText = parseFloat(currentUser.balance).toFixed(2) + ' ₽';
    if (bonusBalSpan) bonusBalSpan.innerText = parseFloat(currentUser.bonus_balance).toFixed(2) + ' ₽';
    
    refreshWheel();
    spinBtn.disabled = true;
    upgradeSpinning = true;
    
    const resultDiv = document.getElementById('result');
    if (resultDiv) resultDiv.innerHTML = '🌀 Вращение...';
    
    const finalAngle = getResultAngle(displayedChance, realChance, isFirstSpin);
    const extraRevolutions = 12;
    const extra = extraRevolutions * Math.PI * 2;
    const startAngle = upgradeAngle;
    const startTime = performance.now();
    const duration = 2500;
    
    function animate(now) {
        const t = Math.min(1, (now - startTime) / duration);
        const ease = 1 - Math.pow(1 - t, 3);
        upgradeAngle = startAngle + (finalAngle + extra - startAngle) * ease;
        drawWheel(upgradeVisible);
        drawArrow(upgradeAngle);
        
        if (t < 1) {
            upgradeAnim = requestAnimationFrame(animate);
        } else {
            upgradeAngle = (finalAngle + extra) % (Math.PI * 2);
            drawWheel(upgradeVisible);
            drawArrow(upgradeAngle);
            upgradeSpinning = false;
            if (upgradeAnim) cancelAnimationFrame(upgradeAnim);
            
            const norm = (upgradeAngle + 2 * Math.PI) % (Math.PI * 2);
            const winAngle = (displayedChance / 100) * Math.PI * 2;
            const startSector = -Math.PI / 2 - winAngle / 2;
            const isWin = (norm - startSector + 2 * Math.PI) % (Math.PI * 2) <= winAngle;
            
            if (isWin) {
                if (upgradeAccount === 'main') {
                    currentUser.balance = (parseFloat(currentUser.balance) + target).toString();
                } else {
                    currentUser.bonus_balance = (parseFloat(currentUser.bonus_balance) + target).toString();
                }
                if (resultDiv) {
                    resultDiv.innerHTML = '✨ ПОБЕДА! +' + target.toFixed(2) + ' ₽ ✨';
                    animateElement(resultDiv, 'animate-pulse');
                }
                showToast('🎉 Вы выиграли ' + target.toFixed(2) + ' ₽!');
            } else {
                if (resultDiv) {
                    resultDiv.innerHTML = '💥 ПРОИГРЫШ! -' + bet.toFixed(2) + ' ₽ 💥';
                    animateElement(resultDiv, 'animate-pulse');
                }
                showToast('😞 Проигрыш ' + bet.toFixed(2) + ' ₽', true);
            }
            
            if (mainBalSpan) mainBalSpan.innerText = parseFloat(currentUser.balance).toFixed(2) + ' ₽';
            if (bonusBalSpan) bonusBalSpan.innerText = parseFloat(currentUser.bonus_balance).toFixed(2) + ' ₽';
            refreshWheel();
            spinBtn.disabled = false;
            
            callAPI('updateUser', { id: currentUser.id, balance: currentUser.balance, bonus_balance: currentUser.bonus_balance });
        }
    }
    
    upgradeAnim = requestAnimationFrame(animate);
}

function getUserRank(user) {
    const c = parseInt(user.tasksCompleted) || 0;
    if (c >= 200) return { emoji: '👑', name: 'Легенда', min: 200 };
    if (c >= 100) return { emoji: '💎', name: 'Мастер', min: 100 };
    if (c >= 50) return { emoji: '⭐', name: 'Продвинутый', min: 50 };
    if (c >= 20) return { emoji: '📌', name: 'Опытный', min: 20 };
    if (c >= 10) return { emoji: '🌱', name: 'Ученик', min: 10 };
    return { emoji: '🐣', name: 'Новичок', min: 0 };
}

function getTop3() {
    return [...allUsers].sort((a, b) => (parseInt(b.tasksCompleted) || 0) - (parseInt(a.tasksCompleted) || 0)).slice(0, 3);
}

function renderMain() {
    if (!currentUser) {
        renderAuth();
        return;
    }
    
    // Сбрасываем флаг первого спина при входе в бурмалду
    if (currentTab === 'upgrade') {
        firstSpinAfterEnter = true;
    }
    
    const top3 = getTop3();
    const rank = getUserRank(currentUser);
    const progress = Math.min(100, ((parseInt(currentUser.tasksCompleted) || 0) / 200) * 100);
    
    const userTasks = allTasks.filter(t => t.creatorSchool === currentUser.school);
    const openTasks = userTasks.filter(t => t.status === 'open' && t.creatorId !== currentUser.id);
    const myCreated = allTasks.filter(t => t.creatorId === currentUser.id);
    const myWork = allTasks.filter(t => t.takerId === currentUser.id && t.status === 'in_progress');
    const awaiting = allTasks.filter(t => t.creatorId === currentUser.id && t.status === 'awaiting_confirmation');
    const completed = allTasks.filter(t => t.status === 'completed' && (t.creatorId === currentUser.id || t.takerId === currentUser.id));
    
    const userNotifications = allNotifications.filter(n => n.userId === currentUser.id);
    const unreadCount = userNotifications.filter(n => n.read !== 'true').length;
    
    function taskCard(t, showTake, showDel, showComp, showConf, showDispute) {
        const creator = allUsers.find(u => u.id === t.creatorId);
        const st = getStatusText(t.status);
        let btns = '';
        
        if (showTake && t.status === 'open' && t.creatorId !== currentUser.id) {
            btns += `<button class="btn-primary take-btn" data-id="${t.id}">📌 Взять</button>`;
        }
        if (showDel && t.creatorId === currentUser.id && t.status === 'open') {
            btns += `<button class="btn-danger del-btn" data-id="${t.id}">🗑️ Удалить</button>`;
        }
        if (showComp && t.takerId === currentUser.id && t.status === 'in_progress') {
            btns += `<button class="btn-success comp-btn" data-id="${t.id}">✅ Выполнить</button>`;
        }
        if (showConf && t.creatorId === currentUser.id && t.status === 'awaiting_confirmation') {
            btns += `<button class="btn-success conf-btn" data-id="${t.id}" data-price="${t.price}" data-executor="${t.takerId}">💰 Получил</button>`;
            btns += `<button class="btn-warning dispute-btn" data-id="${t.id}" data-price="${t.price}" data-executor="${t.takerId}">❌ Не получил</button>`;
        }
        
        if (t.status === 'completed' && t.takerId === currentUser.id) {
            const hasReviewFlag = allReviews.some(r => r.taskId === t.id && r.fromUserId === currentUser.id);
            if (!hasReviewFlag) {
                btns += `<button class="btn-info review-btn" data-id="${t.id}" data-executor="${t.creatorId}">⭐ Оставить отзыв</button>`;
            }
        }
        
        return `<div class="task-card">
            <div class="task-header">
                <div class="task-price">${parseFloat(t.price).toFixed(2)} ₽</div>
                <div class="task-status ${st.class}">${st.text}</div>
            </div>
            <div>📌 ${escapeHtml(t.description)}</div>
            <div>📍 ${escapeHtml(t.location)}</div>
            <div>👤 ${escapeHtml(creator?.name || '?')} (${creator?.school || ''})</div>
            <div class="action-buttons">${btns}</div>
        </div>`;
    }
    
    let content = '';
    if (currentTab === 'allTasks') {
        content = `<h3>📋 Доступные задания</h3><div class="tasks-grid">${openTasks.map(t => taskCard(t, true, false, false, false, false)).join('') || '<div style="text-align:center;padding:30px;">✨ Нет заданий</div>'}</div>`;
    } else if (currentTab === 'myTasks') {
        content = `<h3>📌 Мои задания</h3><div class="tasks-grid">${myCreated.map(t => taskCard(t, false, true, false, false, false)).join('') || '<div style="text-align:center;padding:30px;">✨ Нет заданий</div>'}</div>`;
    } else if (currentTab === 'myWork') {
        content = `<h3>⚡ В работе</h3><div class="tasks-grid">${myWork.map(t => taskCard(t, false, false, true, false, false)).join('') || '<div style="text-align:center;padding:30px;">✨ Нет заданий</div>'}</div>`;
    } else if (currentTab === 'awaiting') {
        content = `<h3>🕐 Ожидают подтверждения</h3><div class="tasks-grid">${awaiting.map(t => taskCard(t, false, false, false, true, true)).join('') || '<div style="text-align:center;padding:30px;">✨ Нет заданий</div>'}</div>`;
    } else if (currentTab === 'completed') {
        content = `<h3>✅ Завершённые задания</h3><div class="tasks-grid">${completed.map(t => taskCard(t, false, false, false, false, false)).join('') || '<div style="text-align:center;padding:30px;">✨ Нет заданий</div>'}</div>`;
    } else if (currentTab === 'profile') {
        const userRating = allReviews.filter(r => r.toUserId === currentUser.id).length > 0 ? '⭐'.repeat(Math.min(5, Math.round(allReviews.reduce((a,b)=>a+parseInt(b.rating),0)/allReviews.length))) : 'Нет отзывов';
        content = `<div class="card">
            <h3>👤 Профиль</h3>
            <p><strong>Имя:</strong> ${escapeHtml(currentUser.name)}</p>
            <p><strong>Школа/Корпус:</strong> ${currentUser.school} / ${currentUser.corp}</p>
            <p><strong>💰 Основной баланс:</strong> ${(parseFloat(currentUser.balance) || 0).toFixed(2)} ₽</p>
            <p><strong>🎁 Бонусный баланс:</strong> ${(parseFloat(currentUser.bonus_balance) || 0).toFixed(2)} ₽</p>
            <p><strong>⭐ Рейтинг:</strong> ${userRating} (${allReviews.filter(r => r.toUserId === currentUser.id).length} отзывов)</p>
            <p><strong>📊 Выполнено заданий:</strong> ${parseInt(currentUser.tasksCompleted) || 0}</p>
            <p><strong>📝 Создано заданий:</strong> ${parseInt(currentUser.tasksCreated) || 0}</p>
            <div class="referral-code" onclick="navigator.clipboard.writeText('${currentUser.referral_code || ''}'); showToast('✅ Код скопирован!')">🔗 Ваш реферальный код: <strong>${currentUser.referral_code || 'Нет'}</strong></div>
            <div style="margin-top:20px"><strong>🏆 Звание:</strong> <span class="rank-badge">${rank.emoji} ${rank.name}</span></div>
            <div class="progress-container"><div class="progress-fill" style="width: ${progress}%"></div></div>
            <div class="support-link" style="margin-top:15px">📌 До следующего звания: ${rank.min > (parseInt(currentUser.tasksCompleted) || 0) ? (rank.min - (parseInt(currentUser.tasksCompleted) || 0)) + ' заданий' : 'Максимальное звание!'}</div>
        </div>`;
    } else if (currentTab === 'create') {
        content = `<div class="card">
            <h3>📝 Создать задание</h3>
            <textarea id="taskDesc" rows="2" placeholder="Что нужно сделать?"></textarea>
            <input type="number" id="taskPrice" placeholder="Цена">
            <input type="text" id="taskLocation" placeholder="Место">
            <select id="paymentType">
                <option value="main">💰 Основной (${(parseFloat(currentUser.balance) || 0).toFixed(2)} ₽)</option>
                <option value="bonus">🎁 Бонусный (${(parseFloat(currentUser.bonus_balance) || 0).toFixed(2)} ₽)</option>
            </select>
            <button class="btn-primary" id="createBtn">Создать задание</button>
        </div>`;
    } else if (currentTab === 'upgrade') {
        content = `<div class="upgrade-panel">
            <h3>🎲 БУРМАЛДА (максимальный шанс ${MAX_CHANCE}%)</h3>
            <div class="wheel-container">
                <canvas id="wheelCanvas"></canvas>
                <div class="center-badge" id="centerPercent">0%</div>
            </div>
            <div class="balance-switch">
                <div class="balance-btn ${upgradeAccount === 'main' ? 'active' : ''}" id="btnMain">💰<br><span id="mainBal">${(parseFloat(currentUser.balance) || 0).toFixed(2)} ₽</span></div>
                <div class="balance-btn ${upgradeAccount === 'bonus' ? 'active' : ''}" id="btnBonus">🎁<br><span id="bonusBal">${(parseFloat(currentUser.bonus_balance) || 0).toFixed(2)} ₽</span></div>
            </div>
            <div class="upgrade-inputs">
                <input type="number" id="bet" placeholder="💰 СТАВКА" value="50" step="10">
                <input type="number" id="target" placeholder="🎯 ВЫИГРЫШ" value="100" step="10">
            </div>
            <div class="chance-panel">
                <div>ШАНС НА КОЛЕСЕ</div>
                <div class="chance-digits" id="chance">—%</div>
            </div>
            <div class="chance-warning" id="chanceWarning"></div>
            <button class="spin-button" id="spinBtn">🎯 КРУТИТЬ</button>
            <div class="result-area" id="result">⚡ Нажми на кнопку</div>
        </div>`;
    }
    
    let notifPanel = '';
    if (showNotifs) {
        if (userNotifications.length > 0) {
            notifPanel = `<div class="notifications-panel">
                <div style="padding:10px; border-bottom:1px solid #e2e8f0; font-weight:bold;">Уведомления</div>
                ${userNotifications.map(n => `<div class="notification-item ${n.read !== 'true' ? 'unread' : ''}">
                    <div class="notification-text">${escapeHtml(n.text)}</div>
                    <div class="notification-time">${new Date(n.createdAt).toLocaleString()}</div>
                </div>`).join('')}
            </div>`;
        } else {
            notifPanel = `<div class="notifications-panel"><div class="notification-item">Нет уведомлений</div></div>`;
        }
    }
    
    document.getElementById('app').innerHTML = `
        <div class="container">
            <div class="header">
                <div class="logo"><h1>🏫 SchoolTask</h1></div>
                <div class="user-info">
                    <div>👋 ${escapeHtml(currentUser.name)} | ${currentUser.school}</div>
                    <div class="balance-card" id="balanceCard">💰 ${(parseFloat(currentUser.balance) || 0).toFixed(2)} ₽</div>
                    <div class="bonus-card" id="bonusCard">🎁 ${(parseFloat(currentUser.bonus_balance) || 0).toFixed(2)} ₽</div>
                    <div class="notification-badge" id="notifBtn">
                        <button class="btn-info">🔔 ${unreadCount > 0 ? `(${unreadCount})` : ''}</button>
                        ${unreadCount > 0 ? '<div class="notification-dot"></div>' : ''}
                    </div>
                    <button class="theme-toggle" id="themeBtn">${isDark ? '☀️' : '🌙'}</button>
                    <button class="btn-danger" id="logoutBtn">Выйти</button>
                </div>
            </div>
            <div class="warning-banner">
                <h2>⚠️ ВАЖНОЕ ПРЕДУПРЕЖДЕНИЕ ⚠️</h2>
                <p>ОБЯЗАТЕЛЬНО ЗАПИСЫВАЙТЕ НА ВИДЕО ПРОЦЕСС ВЫПОЛНЕНИЯ ЗАДАНИЯ!</p>
                <p>ЕСЛИ ВАС ЗАСКАМЯТ, А ВИДЕО В ДОКАЗАТЕЛЬСТВО НЕ БУДЕТ - МЫ НИЧЕГО НЕ СМОЖЕМ СДЕЛАТЬ</p>
            </div>
            <div class="honor-board">
                <h3>🏅 Доска почёта (по выполненным заданиям)</h3>
                <div class="honor-list">${top3.map((u, i) => `<div class="honor-item"><div>${i === 0 ? '🥇' : i === 1 ? '🥈' : '🥉'}</div><strong>${escapeHtml(u.name)}</strong><br>✅ ${parseInt(u.tasksCompleted) || 0}</div>`).join('')}</div>
            </div>
            <div class="tabs">
                <div class="tab ${currentTab === 'allTasks' ? 'active' : ''}" data-tab="allTasks">📋 Все</div>
                <div class="tab ${currentTab === 'myTasks' ? 'active' : ''}" data-tab="myTasks">📦 Мои</div>
                <div class="tab ${currentTab === 'myWork' ? 'active' : ''}" data-tab="myWork">⚡ В работе</div>
                <div class="tab ${currentTab === 'awaiting' ? 'active' : ''}" data-tab="awaiting">🕐 Ожидают</div>
                <div class="tab ${currentTab === 'completed' ? 'active' : ''}" data-tab="completed">✅ Готово</div>
                <div class="tab ${currentTab === 'profile' ? 'active' : ''}" data-tab="profile">👤 Профиль</div>
                <div class="tab ${currentTab === 'create' ? 'active' : ''}" data-tab="create">➕ Создать</div>
                <div class="tab ${currentTab === 'upgrade' ? 'active' : ''}" data-tab="upgrade">🎲 Бурмалда</div>
            </div>
            ${content}
            <div class="support-link">📞 Поддержка: <strong>@leshr_ak47</strong> | Реферальная система: +5 бонусов за приглашение</div>
        </div>
        ${notifPanel}
    `;
    
    document.getElementById('balanceCard')?.addEventListener('click', () => {
        animateElement(document.getElementById('balanceCard'), 'animate-pulse');
        showModal('💰 Основной кошелёк', 'Вывод и пополнение средств производится через поддержку.\n\nНапишите @leshr_ak47 в Telegram');
    });
    
    document.getElementById('bonusCard')?.addEventListener('click', () => {
        animateElement(document.getElementById('bonusCard'), 'animate-pulse');
        showModal('🎁 Бонусный счёт', 'Бонусный счёт используется для:\n\n• Создания заданий\n• Участия в бурмалде\n• Получения наград\n• Реферальных бонусов\n\nБонусы нельзя вывести на реальные деньги.', true);
    });
    
    document.querySelectorAll('[data-tab]').forEach(t => t.onclick = () => { 
        animateElement(t, 'animate-pulse');
        currentTab = t.dataset.tab; 
        renderMain(); 
    });
    document.getElementById('logoutBtn').onclick = () => {
        animateElement(document.getElementById('logoutBtn'), 'animate-pulse');
        logout();
    };
    document.getElementById('themeBtn').onclick = () => {
        animateElement(document.getElementById('themeBtn'), 'animate-pulse');
        toggleTheme();
    };
    document.getElementById('notifBtn').onclick = () => { 
        animateElement(document.getElementById('notifBtn'), 'animate-pulse');
        showNotifs = !showNotifs; 
        renderMain(); 
    };
    document.getElementById('createBtn')?.addEventListener('click', () => {
        const btn = document.getElementById('createBtn');
        animateElement(btn, 'animate-pulse');
        btn.disabled = true;
        createTask(
            document.getElementById('taskDesc').value,
            document.getElementById('taskPrice').value,
            document.getElementById('taskLocation').value,
            document.getElementById('paymentType').value,
            btn
        );
    });
    
    document.querySelectorAll('.take-btn').forEach(b => b.onclick = () => takeTask(b.dataset.id, b));
    document.querySelectorAll('.del-btn').forEach(b => b.onclick = () => deleteTask(b.dataset.id, b));
    document.querySelectorAll('.comp-btn').forEach(b => b.onclick = () => completeTask(b.dataset.id, b));
    document.querySelectorAll('.conf-btn').forEach(b => b.onclick = () => confirmTask(b.dataset.id, parseFloat(b.dataset.price), b.dataset.executor, b));
    document.querySelectorAll('.dispute-btn').forEach(b => b.onclick = () => disputeTask(b.dataset.id, parseFloat(b.dataset.price), b.dataset.executor, b));
    document.querySelectorAll('.review-btn').forEach(b => b.onclick = () => showReviewModal(b.dataset.id, b.dataset.executor));
    
    if (currentTab === 'upgrade') {
        setTimeout(() => {
            upgradeCanvas = document.getElementById('wheelCanvas');
            if (upgradeCanvas) {
                upgradeCtx = upgradeCanvas.getContext('2d');
                upgradeAngle = -Math.PI / 2;
                refreshWheel();
                document.getElementById('bet')?.addEventListener('input', refreshWheel);
                document.getElementById('target')?.addEventListener('input', refreshWheel);
                document.getElementById('spinBtn')?.addEventListener('click', startSpin);
                document.getElementById('btnMain')?.addEventListener('click', () => setAccount('main'));
                document.getElementById('btnBonus')?.addEventListener('click', () => setAccount('bonus'));
            }
        }, 50);
    }
}

async function renderApp() {
    if (currentUser) {
        await loadTasks();
        await loadReviews();
        await loadNotifications();
        renderMain();
    } else {
        renderAuth();
    }
}

// ========== ЗАПУСК ==========
(async function init() {
    renderAuth();
    
    const saved = localStorage.getItem('schooltask_user');
    if (saved) {
        try {
            const ses = JSON.parse(saved);
            await loadUsers();
            const user = allUsers.find(u => u.id === ses.id);
            if (user) {
                currentUser = JSON.parse(JSON.stringify(user));
                await renderApp();
            }
        } catch(e) {}
    }
})();
</script>
