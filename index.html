<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>SchoolTask - Биржа поручений</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', system-ui; }
        body { background: linear-gradient(145deg, #f0f4fa 0%, #e2e8f0 100%); min-height: 100vh; padding: 20px; transition: background 0.3s, color 0.3s; }
        body.dark-theme { background: linear-gradient(145deg, #1a1a2e 0%, #16213e 100%); color: #e2e8f0; }
        body.dark-theme .header, body.dark-theme .card, body.dark-theme .task-card, body.dark-theme .help-box, body.dark-theme .admin-panel, body.dark-theme .announcement { background: #1e293b; color: #e2e8f0; }
        body.dark-theme .user-info { background: #334155; }
        body.dark-theme .tab { background: #334155; color: #e2e8f0; }
        body.dark-theme .tab.active { background: #3b82f6; }
        body.dark-theme input, body.dark-theme textarea, body.dark-theme select { background: #334155; border-color: #475569; color: #e2e8f0; }
        
        .container { max-width: 1300px; margin: 0 auto; }
        .header, .card, .task-card { background: white; border-radius: 32px; padding: 20px; margin-bottom: 20px; box-shadow: 0 8px 20px rgba(0,0,0,0.05); }
        .header { display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; }
        .logo h1 { background: linear-gradient(135deg, #1e2b3c, #2c4c6e); -webkit-background-clip: text; background-clip: text; color: transparent; font-size: 1.6rem; }
        .user-info { display: flex; align-items: center; gap: 20px; background: #f8fafc; padding: 8px 20px; border-radius: 60px; flex-wrap: wrap; }
        .balance-card { background: #eef2ff; padding: 6px 16px; border-radius: 40px; font-weight: bold; }
        .bonus-card { background: linear-gradient(135deg, #fef3c7, #fde68a); color: #92400e; padding: 6px 16px; border-radius: 40px; font-weight: bold; cursor: pointer; }
        button { cursor: pointer; border: none; border-radius: 40px; padding: 10px 20px; font-weight: bold; transition: 0.2s; }
        .btn-primary { background: #2c6e4f; color: white; }
        .btn-success { background: #10b981; color: white; }
        .btn-danger { background: #dc2626; color: white; }
        .btn-edit { background: #8b5cf6; color: white; }
        .btn-info { background: #3b82f6; color: white; }
        .theme-toggle { background: #334155; color: white; padding: 8px 16px; border-radius: 60px; }
        input, textarea, select { width: 100%; padding: 12px 16px; border: 1px solid #cbd5e1; border-radius: 28px; margin-bottom: 12px; font-size: 1rem; }
        .tabs { display: flex; gap: 12px; flex-wrap: wrap; margin-bottom: 20px; }
        .tab { background: white; padding: 10px 24px; border-radius: 60px; cursor: pointer; font-weight: 600; }
        .tab.active { background: #1e4a6e; color: white; }
        .tasks-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(350px, 1fr)); gap: 20px; }
        
        .admin-panel { background: white; border-radius: 32px; padding: 20px; margin-bottom: 20px; border: 2px solid #ffd966; }
        .admin-header { display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 10px; margin-bottom: 20px; }
        .search-box { display: flex; align-items: center; gap: 8px; background: #f1f5f9; padding: 5px 15px; border-radius: 40px; }
        .search-box input { margin: 0; padding: 8px; background: transparent; border: none; width: 200px; outline: none; }
        .users-table { overflow-x: auto; margin-top: 15px; }
        .users-table table { width: 100%; border-collapse: collapse; }
        .users-table th, .users-table td { padding: 12px 8px; text-align: left; border-bottom: 1px solid #e2e8f0; }
        .balance-control { display: flex; gap: 5px; align-items: center; flex-wrap: wrap; }
        .balance-control input { width: 80px; margin: 0; padding: 6px; border-radius: 30px; }
        
        .announcement { background: linear-gradient(135deg, #ffd700 0%, #ffb347 100%); border-radius: 32px; padding: 20px; margin-bottom: 20px; text-align: center; animation: pulse 2s infinite; }
        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.02); } 100% { transform: scale(1); } }
        .announcement h2 { font-size: 1.8rem; color: #1e293b; margin-bottom: 10px; }
        .announcement .bonus-highlight { background: #dc2626; color: white; display: inline-block; padding: 5px 15px; border-radius: 40px; margin: 10px 0; }
        .share-buttons { display: flex; gap: 15px; justify-content: center; margin-top: 15px; flex-wrap: wrap; }
        .share-btn { padding: 10px 20px; border-radius: 40px; font-weight: bold; cursor: pointer; }
        .share-tg { background: #0088cc; color: white; }
        .share-vk { background: #0077ff; color: white; }
        .copy-link { background: #6b7280; color: white; }
        
        .help-box { background: #e0f2fe; border-radius: 20px; padding: 15px; margin-bottom: 20px; text-align: center; border-left: 5px solid #0284c7; }
        .help-box h4 { color: #0284c7; margin-bottom: 8px; }
        .help-box p { font-size: 0.9rem; color: #075985; }
        body.dark-theme .help-box { background: #0c4a6e; border-left-color: #38bdf8; }
        body.dark-theme .help-box h4 { color: #38bdf8; }
        body.dark-theme .help-box p { color: #bae6fd; }
        
        .referral-code { background: #e2e8f0; padding: 10px; border-radius: 40px; font-family: monospace; cursor: pointer; text-align: center; margin-top: 15px; }
        .disabled-warning { background: #fee2e2; color: #dc2626; padding: 10px 20px; border-radius: 40px; display: inline-block; }
        
        .task-header { display: flex; justify-content: space-between; margin-bottom: 12px; flex-wrap: wrap; }
        .task-price { font-size: 1.6rem; font-weight: 800; color: #2b6e4f; }
        .task-status { padding: 4px 12px; border-radius: 30px; font-size: 0.75rem; font-weight: bold; }
        .status-open { background: #e2e8f0; color: #1e4a6e; }
        .status-progress { background: #fef3c7; color: #d97706; }
        .status-awaiting { background: #e0f2fe; color: #0284c7; }
        .status-completed { background: #d1fae5; color: #10b981; }
        .action-buttons { display: flex; gap: 10px; margin-top: 12px; flex-wrap: wrap; }
        .filter-group { display: flex; gap: 10px; margin-bottom: 15px; flex-wrap: wrap; }
        .filter-group input, .filter-group select { flex: 1; margin: 0; }
        
        .toast { position: fixed; bottom: 30px; right: 30px; background: #1f2f3e; color: white; padding: 12px 24px; border-radius: 60px; z-index: 1000; animation: fadein 0.3s; }
        @keyframes fadein { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        .loading { text-align: center; padding: 40px; color: #6b7280; }
        .error-text { color: #dc2626; font-size: 0.8rem; display: none; margin-top: -8px; margin-bottom: 12px; }
        
        .modal-overlay { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.7); display: flex; align-items: center; justify-content: center; z-index: 2000; }
        .edit-modal, .bonus-modal, .ban-modal { background: white; border-radius: 32px; width: 90%; max-width: 500px; padding: 20px; }
        
        @media (max-width: 700px) { .share-buttons { flex-direction: column; align-items: center; } .filter-group { flex-direction: column; } }
    </style>
</head>
<body>
<div id="app"><div class="loading">⏳ Загрузка...</div></div>

<script>
(function() {
    // ========== ВСТАВЬТЕ ВАШ ПРАВИЛЬНЫЙ URL ОТ GOOGLE APPS SCRIPT ==========
    const API_URL = 'https://script.google.com/macros/s/AKfycbznzhK39RQQLK9UL6FlHruCsNOBHnNU2pf04htZ9E7ADNJ8lAx4h2a_9X3-0Zn0jL0OHA/exec';
    const ADMIN_PASSWORD = 'dsl382dAZX';
    
    let currentUser = null;
    let authMode = 'login';
    let adminMode = false;
    let adminSearchTerm = '';
    let cachedUsers = [];
    let cachedTasks = [];
    let isDarkTheme = localStorage.getItem('darkTheme') === 'true';
    let filters = { scope: 'school', minPrice: '', maxPrice: '' };
    let isLoading = false;
    
    if (isDarkTheme) document.body.classList.add('dark-theme');
    
    function toggleTheme() { 
        isDarkTheme = !isDarkTheme; 
        localStorage.setItem('darkTheme', isDarkTheme); 
        if (isDarkTheme) document.body.classList.add('dark-theme'); 
        else document.body.classList.remove('dark-theme'); 
        renderApp(); 
    }
    
    async function apiCall(params, timeout = 10000) {
        const controller = new AbortController();
        const timeoutId = setTimeout(() => controller.abort(), timeout);
        try {
            const url = new URL(API_URL);
            Object.keys(params).forEach(k => url.searchParams.append(k, params[k]));
            const response = await fetch(url.toString(), { signal: controller.signal });
            clearTimeout(timeoutId);
            const text = await response.text();
            return JSON.parse(text);
        } catch(e) { 
            clearTimeout(timeoutId);
            console.error('API Error:', e);
            return null; 
        }
    }
    
    async function syncData() {
        if (isLoading) return;
        isLoading = true;
        try {
            const [users, tasks] = await Promise.all([
                apiCall({ action: 'getUsers' }),
                apiCall({ action: 'getTasks' })
            ]);
            if (users && Array.isArray(users)) cachedUsers = users;
            if (tasks && Array.isArray(tasks)) cachedTasks = tasks;
            console.log('Загружено пользователей:', cachedUsers.length);
        } catch(e) { console.error('Sync error:', e); }
        isLoading = false;
    }
    
    function showToast(msg, isError) {
        var toast = document.createElement('div');
        toast.className = 'toast';
        toast.innerText = msg;
        if (isError) toast.style.background = '#b91c1c';
        document.body.appendChild(toast);
        setTimeout(function() { toast.remove(); }, 3000);
    }
    
    function saveSession() { 
        if (currentUser) localStorage.setItem('schooltask_session', JSON.stringify({ id: currentUser.id, name: currentUser.name, savedAt: Date.now() })); 
        else localStorage.removeItem('schooltask_session'); 
    }
    
    async function restoreSession() {
        var saved = localStorage.getItem('schooltask_session');
        if (!saved) return false;
        try {
            var session = JSON.parse(saved);
            await syncData();
            var user = cachedUsers.find(function(u) { return u.id === session.id; });
            if (user && user.isBanned !== 'true') { 
                currentUser = user; 
                return true; 
            }
            localStorage.removeItem('schooltask_session');
        } catch(e) { console.error('Restore error:', e); }
        return false;
    }
    
    function getReferralLink() { 
        var url = window.location.href.split('?')[0];
        if (currentUser && currentUser.referral_code) return url + '?ref=' + currentUser.referral_code;
        return url;
    }
    
    function copyReferralLink() { 
        navigator.clipboard.writeText(getReferralLink()); 
        showToast('✅ Ссылка скопирована! +5₽ за каждого друга', false); 
    }
    
    function shareTelegram() { 
        var link = getReferralLink();
        var text = encodeURIComponent('SchoolTask - биржа поручений! +5₽ на бонусный счёт за друга!');
        window.open('https://t.me/share/url?url=' + encodeURIComponent(link) + '&text=' + text, '_blank'); 
    }
    
    function shareVK() { 
        var link = getReferralLink();
        window.open('https://vk.com/share.php?url=' + encodeURIComponent(link), '_blank'); 
    }
    
    function showBonusHelp() {
        var modal = document.createElement('div');
        modal.className = 'modal-overlay';
        modal.innerHTML = '<div class="bonus-modal"><h3>🎁 Бонусный счёт</h3><div style="background:#fef3c7; padding:12px; border-radius:20px; margin:10px 0;"><p><strong>Бонусы НЕЛЬЗЯ вывести, только тратить на создание заданий!</strong></p></div><p><strong>✨ Как получить бонусы:</strong></p><ul style="margin:10px 0 10px 20px;"><li>👥 +5₽ за каждого приглашённого друга</li><li>✅ +10₽ за каждое выполненное задание</li><li>⭐ +20₽ за получение отзыва 5 звёзд</li><li>📅 +3₽ ежедневный бонус за вход</li></ul><p><strong>💰 Как тратить:</strong> при создании задания выберите "Оплатить с бонусного счёта"</p><button class="btn-primary" id="closeBonus" style="width:100%; margin-top:15px;">Понятно</button></div>';
        document.body.appendChild(modal);
        document.getElementById('closeBonus').onclick = function() { modal.remove(); };
    }
    
    async function registerUser(name, school, corp, password, refCode) {
        if (!name.trim() || !school.trim() || !corp.trim()) { showToast('Заполните все поля', true); return false; }
        if (!/^\d+$/.test(school)) { showToast('❌ Школа только цифры!', true); return false; }
        if (password.length < 3) { showToast('Пароль не менее 3 символов', true); return false; }
        await syncData();
        if (cachedUsers.some(function(u) { return u.name === name; })) { showToast('❌ Имя уже занято', true); return false; }
        var id = 'u' + Date.now();
        var referralCode = 'REF' + Math.random().toString(36).substring(2, 8).toUpperCase();
        var res = await apiCall({ 
            action: 'registerUser', 
            id: id, name: name.trim(), school: school.trim(), corp: corp.trim(), 
            balance: 0, bonus_balance: 0, password: password, referral_code: referralCode, referred_by: refCode || '' 
        });
        if (res && res.success) { 
            await syncData();
            currentUser = cachedUsers.find(function(u) { return u.id === id; });
            saveSession(); 
            showToast('✅ Добро пожаловать, ' + currentUser.name + '!', false); 
            renderApp(); 
            return true; 
        }
        return false;
    }
    
    async function loginUser(name, school, corp, password) {
        var cleanName = name ? name.toString().trim() : '';
        var cleanSchool = school ? school.toString().trim() : '';
        var cleanCorp = corp ? corp.toString().trim() : '';
        var cleanPassword = password ? password.toString().trim() : '';
        
        if (!cleanName || !cleanSchool || !cleanCorp) { 
            showToast('Заполните все поля', true); 
            return false; 
        }
        if (!cleanPassword) { 
            showToast('Введите пароль', true); 
            return false; 
        }
        
        await syncData();
        
        var user = null;
        for (var i = 0; i < cachedUsers.length; i++) {
            var u = cachedUsers[i];
            var userName = u.name ? u.name.toString().trim() : '';
            var userSchool = u.school ? u.school.toString().trim() : '';
            var userCorp = u.corp ? u.corp.toString().trim() : '';
            if (userName === cleanName && userSchool === cleanSchool && userCorp === cleanCorp) {
                user = u;
                break;
            }
        }
        
        if (!user) { 
            showToast('❌ Пользователь не найден.\nПроверьте имя, школу и корпус', true); 
            return false; 
        }
        
        var userPassword = user.password ? user.password.toString().trim() : '';
        if (userPassword !== cleanPassword) { 
            showToast('❌ Неверный пароль для пользователя ' + user.name, true); 
            return false; 
        }
        
        if (user.isBanned === 'true' || user.isBanned === true) { 
            showToast('⛔ Аккаунт заблокирован. Причина: ' + (user.banReason || 'Не указана'), true); 
            return false; 
        }
        
        currentUser = user;
        saveSession();
        showToast('✅ С возвращением, ' + currentUser.name + '!', false);
        renderApp();
        return true;
    }
    
    function logout() { 
        currentUser = null; 
        adminMode = false; 
        localStorage.removeItem('schooltask_session'); 
        renderApp(); 
    }
    
    async function createTask(desc, price, loc, paymentType, scope) {
        if (!currentUser) return;
        var priceNum = parseFloat(price);
        if (isNaN(priceNum) || priceNum <= 0) { showToast('Цена должна быть положительной', true); return; }
        var balance = paymentType === 'bonus' ? (parseFloat(currentUser.bonus_balance)||0) : (parseFloat(currentUser.balance)||0);
        if (balance < priceNum) { showToast('Недостаточно средств', true); return; }
        if (paymentType === 'bonus') { 
            currentUser.bonus_balance -= priceNum; 
            await apiCall({ action: 'updateUser', id: currentUser.id, bonus_balance: currentUser.bonus_balance }); 
        } else { 
            currentUser.balance -= priceNum; 
            await apiCall({ action: 'updateUser', id: currentUser.id, balance: currentUser.balance }); 
        }
        var newTask = { 
            id: Date.now().toString(), 
            creatorId: currentUser.id, 
            creatorSchool: currentUser.school, 
            description: desc, 
            price: priceNum, 
            location: loc, 
            payment_type: paymentType, 
            scope: scope, 
            status: 'open', 
            takerId: null, 
            takenAt: null, 
            completedAt: null, 
            createdAt: new Date().toISOString() 
        };
        await apiCall({ action: 'createTask', ...newTask });
        await syncData(); 
        showToast('✅ Задание создано!', false); 
        renderApp(); 
    }
    
    async function deleteTask(taskId) {
        if (!confirm('Удалить задание?')) return;
        var task = null;
        for (var i = 0; i < cachedTasks.length; i++) {
            if (cachedTasks[i].id == taskId) { task = cachedTasks[i]; break; }
        }
        if (task && task.status === 'open' && task.creatorId === currentUser.id) {
            if (task.payment_type === 'bonus') { 
                currentUser.bonus_balance = (parseFloat(currentUser.bonus_balance)||0) + parseFloat(task.price); 
                await apiCall({ action: 'updateUser', id: currentUser.id, bonus_balance: currentUser.bonus_balance }); 
            } else { 
                currentUser.balance = (parseFloat(currentUser.balance)||0) + parseFloat(task.price); 
                await apiCall({ action: 'updateUser', id: currentUser.id, balance: currentUser.balance }); 
            }
        }
        await apiCall({ action: 'deleteTask', id: taskId });
        await syncData(); 
        showToast('🗑️ Задание удалено', false); 
        renderApp(); 
    }
    
    function showEditModal(task) {
        var modal = document.createElement('div');
        modal.className = 'modal-overlay';
        modal.innerHTML = '<div class="edit-modal"><h3>✏️ Редактировать</h3><textarea id="editDesc" rows="3">' + task.description + '</textarea><input type="number" id="editPrice" value="' + task.price + '"><input type="text" id="editLocation" value="' + task.location + '"><select id="editScope"><option value="school"' + (task.scope === 'school' ? ' selected' : '') + '>🏫 Только моя школа</option><option value="all"' + (task.scope === 'all' ? ' selected' : '') + '>🌍 Для всех</option></select><div style="display:flex; gap:10px; margin-top:15px;"><button class="btn-primary" id="saveEdit">💾 Сохранить</button><button class="btn-danger" id="cancelEdit">Отмена</button></div></div>';
        document.body.appendChild(modal);
        document.getElementById('cancelEdit').onclick = function() { modal.remove(); };
        document.getElementById('saveEdit').onclick = async function() {
            task.description = document.getElementById('editDesc').value;
            task.price = parseFloat(document.getElementById('editPrice').value);
            task.location = document.getElementById('editLocation').value;
            task.scope = document.getElementById('editScope').value;
            await apiCall({ action: 'updateTask', id: task.id, description: task.description, price: task.price, location: task.location, scope: task.scope });
            await syncData(); 
            showToast('✅ Задание обновлено', false); 
            modal.remove(); 
            renderApp(); 
        };
    }
    
    async function takeTask(taskId) {
        var task = null;
        for (var i = 0; i < cachedTasks.length; i++) {
            if (cachedTasks[i].id == taskId) { task = cachedTasks[i]; break; }
        }
        if (!task || task.status !== 'open') return;
        if (task.creatorId === currentUser.id) { showToast('Нельзя взять своё задание', true); return; }
        task.status = 'in_progress'; 
        task.takerId = currentUser.id; 
        task.takenAt = new Date().toISOString();
        await apiCall({ action: 'updateTask', id: task.id, status: 'in_progress', takerId: currentUser.id, takenAt: task.takenAt });
        await syncData(); 
        showToast('📢 Вы взяли задание!', false); 
        renderApp(); 
    }
    
    async function confirmCompletion(taskId) {
        var task = null;
        for (var i = 0; i < cachedTasks.length; i++) {
            if (cachedTasks[i].id == taskId) { task = cachedTasks[i]; break; }
        }
        if (!task || task.status !== 'in_progress') return;
        if (task.takerId !== currentUser.id) return;
        task.status = 'awaiting_confirmation'; 
        task.completedAt = new Date().toISOString();
        await apiCall({ action: 'updateTask', id: task.id, status: 'awaiting_confirmation', completedAt: task.completedAt });
        await syncData(); 
        showToast('✅ Задание выполнено! Ожидайте подтверждения', false); 
        renderApp(); 
    }
    
    async function confirmReceipt(taskId) {
        var task = null;
        for (var i = 0; i < cachedTasks.length; i++) {
            if (cachedTasks[i].id == taskId) { task = cachedTasks[i]; break; }
        }
        if (!task || task.status !== 'awaiting_confirmation') return;
        if (task.creatorId !== currentUser.id) return;
        var executor = null;
        for (var j = 0; j < cachedUsers.length; j++) {
            if (cachedUsers[j].id === task.takerId) { executor = cachedUsers[j]; break; }
        }
        var total = parseFloat(task.price);
        var commission = total * 0.05;
        var gain = total - commission;
        if (executor) { 
            executor.balance = (parseFloat(executor.balance)||0) + gain;
            executor.bonus_balance = (parseFloat(executor.bonus_balance)||0) + 10;
            await apiCall({ action: 'updateUser', id: executor.id, balance: executor.balance, bonus_balance: executor.bonus_balance });
        }
        task.status = 'completed';
        await apiCall({ action: 'updateTask', id: task.id, status: 'completed' });
        await syncData(); 
        showToast('💰 Подтверждено! +' + gain.toFixed(2) + '₽ исполнителю', false); 
        renderApp(); 
    }
    
    async function rejectReceipt(taskId) {
        var task = null;
        for (var i = 0; i < cachedTasks.length; i++) {
            if (cachedTasks[i].id == taskId) { task = cachedTasks[i]; break; }
        }
        if (!task || task.status !== 'awaiting_confirmation') return;
        if (task.creatorId !== currentUser.id) return;
        if (task.payment_type === 'bonus') { 
            currentUser.bonus_balance = (parseFloat(currentUser.bonus_balance)||0) + parseFloat(task.price); 
            await apiCall({ action: 'updateUser', id: currentUser.id, bonus_balance: currentUser.bonus_balance }); 
        } else { 
            currentUser.balance = (parseFloat(currentUser.balance)||0) + parseFloat(task.price); 
            await apiCall({ action: 'updateUser', id: currentUser.id, balance: currentUser.balance }); 
        }
        task.status = 'disputed';
        await apiCall({ action: 'updateTask', id: task.id, status: 'disputed' });

            if (refreshUsersBtn) refreshUsersBtn.onclick = function() { syncData().then(function() { renderApp(); showToast('Обновлено', false); }); };
            
            var clearTasksBtn = document.getElementById('clearTasksBtn');
            if (clearTasksBtn) clearTasksBtn.onclick = deleteAllTasks;
            
            var adminSearch = document.getElementById('adminSearch');
            if (adminSearch) {
                adminSearch.oninput = function(e) { adminSearchTerm = e.target.value; renderApp(); };
            }
            
            var topupBtns = document.querySelectorAll('.topup-btn');
            for (var i = 0; i < topupBtns.length; i++) {
                topupBtns[i].onclick = function() {
                    var userId = this.dataset.userid;
                    var isBonus = this.dataset.bonus === 'true';
                    var amountField = isBonus ? document.getElementById('bonus-' + userId) : document.getElementById('amount-' + userId);
                    var amount = parseFloat(amountField ? amountField.value : 100);
                    if (amount > 0) adminChangeBalance(userId, amount, isBonus);
                    else showToast('Введите сумму', true);
                };
            }
            
            var withdrawBtns = document.querySelectorAll('.withdraw-btn');
            for (var i = 0; i < withdrawBtns.length; i++) {
                withdrawBtns[i].onclick = function() {
                    var userId = this.dataset.userid;
                    var isBonus = this.dataset.bonus === 'true';
                    var amountField = isBonus ? document.getElementById('bonus-' + userId) : document.getElementById('amount-' + userId);
                    var amount = parseFloat(amountField ? amountField.value : 100);
                    if (amount > 0) adminChangeBalance(userId, -amount, isBonus);
                    else showToast('Введите сумму', true);
                };
            }
            
            var banBtns = document.querySelectorAll('.ban-btn');
            for (var i = 0; i < banBtns.length; i++) {
                banBtns[i].onclick = function() { showBanModal(this.dataset.userid); };
            }
            
            var unbanBtns = document.querySelectorAll('.unban-btn');
            for (var i = 0; i < unbanBtns.length; i++) {
                unbanBtns[i].onclick = function() { unbanUser(this.dataset.userid); };
            }
        }
        
        var takeBtns = document.querySelectorAll('.take-btn');
        for (var i = 0; i < takeBtns.length; i++) {
            takeBtns[i].onclick = function() { takeTask(this.dataset.id); };
        }
        
        var deleteBtns = document.querySelectorAll('.delete-btn');
        for (var i = 0; i < deleteBtns.length; i++) {
            deleteBtns[i].onclick = function() { deleteTask(this.dataset.id); };
        }
        
        var editBtns = document.querySelectorAll('.edit-btn');
        for (var i = 0; i < editBtns.length; i++) {
            (function(btn) {
                var taskId = btn.dataset.id;
                var task = null;
                for (var j = 0; j < cachedTasks.length; j++) {
                    if (cachedTasks[j].id == taskId) { task = cachedTasks[j]; break; }
                }
                if (task) btn.onclick = function() { showEditModal(task); };
            })(editBtns[i]);
        }
        
        var completeBtns = document.querySelectorAll('.complete-btn');
        for (var i = 0; i < completeBtns.length; i++) {
            completeBtns[i].onclick = function() { confirmCompletion(this.dataset.id); };
        }
        
        var confirmBtns = document.querySelectorAll('.confirm-btn');
        for (var i = 0; i < confirmBtns.length; i++) {
            confirmBtns[i].onclick = function() { confirmReceipt(this.dataset.id); };
        }
        
        var rejectBtns = document.querySelectorAll('.reject-btn');
        for (var i = 0; i < rejectBtns.length; i++) {
            rejectBtns[i].onclick = function() { rejectReceipt(this.dataset.id); };
        }
    }
    
    restoreSession().then(function() { renderApp(); });
})();
</script>
</body>
</html>
