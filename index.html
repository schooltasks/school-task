<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>SchoolTask | Биржа поручений + Апгрейд</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', system-ui, 'Roboto', sans-serif;
        }

        body {
            background: linear-gradient(145deg, #f0f4fa 0%, #e2e8f0 100%);
            min-height: 100vh;
            padding: 20px;
            transition: background 0.3s, color 0.3s;
        }

        body.dark-theme {
            background: linear-gradient(145deg, #1a1a2e 0%, #16213e 100%);
            color: #e2e8f0;
        }

        body.dark-theme .header,
        body.dark-theme .card,
        body.dark-theme .task-card,
        body.dark-theme .admin-panel,
        body.dark-theme .help-box,
        body.dark-theme .announcement,
        body.dark-theme .honor-board,
        body.dark-theme .notifications-panel,
        body.dark-theme .upgrade-panel {
            background: #1e293b;
            color: #e2e8f0;
        }

        body.dark-theme .user-info {
            background: #334155;
        }

        body.dark-theme .tab {
            background: #334155;
            color: #e2e8f0;
        }

        body.dark-theme .tab.active {
            background: #3b82f6;
        }

        body.dark-theme input,
        body.dark-theme textarea,
        body.dark-theme select {
            background: #334155;
            border-color: #475569;
            color: #e2e8f0;
        }

        .container {
            max-width: 1300px;
            margin: 0 auto;
        }

        .header,
        .card,
        .task-card,
        .upgrade-panel {
            background: white;
            border-radius: 32px;
            padding: 20px;
            margin-bottom: 20px;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.05);
            transition: all 0.2s cubic-bezier(0.2, 0.9, 0.4, 1.1);
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
        }

        .logo h1 {
            background: linear-gradient(135deg, #1e2b3c, #2c4c6e);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            font-size: 1.6rem;
        }

        .user-info {
            display: flex;
            align-items: center;
            gap: 20px;
            background: #f8fafc;
            padding: 8px 20px;
            border-radius: 60px;
            flex-wrap: wrap;
        }

        .balance-card,
        .bonus-card {
            padding: 6px 16px;
            border-radius: 40px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.1s cubic-bezier(0.2, 0.9, 0.4, 1.1);
        }

        .balance-card:active,
        .bonus-card:active {
            transform: scale(0.92);
        }

        .balance-card {
            background: #eef2ff;
        }

        .bonus-card {
            background: linear-gradient(135deg, #fef3c7, #fde68a);
            color: #92400e;
        }

        button {
            cursor: pointer;
            border: none;
            border-radius: 40px;
            padding: 10px 20px;
            font-weight: bold;
            transition: all 0.1s cubic-bezier(0.2, 0.9, 0.4, 1.1);
            position: relative;
            overflow: hidden;
        }

        button:active {
            transform: scale(0.94);
            transition: transform 0.04s;
        }

        button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none !important;
        }

        .btn-primary {
            background: #2c6e4f;
            color: white;
        }

        .btn-success {
            background: #10b981;
            color: white;
        }

        .btn-danger {
            background: #dc2626;
            color: white;
        }

        .btn-edit {
            background: #8b5cf6;
            color: white;
        }

        .btn-info {
            background: #3b82f6;
            color: white;
        }

        .theme-toggle {
            background: #334155;
            color: white;
            padding: 8px 16px;
            border-radius: 60px;
            cursor: pointer;
        }

        input,
        textarea,
        select {
            width: 100%;
            padding: 12px 16px;
            border: 1px solid #cbd5e1;
            border-radius: 28px;
            margin-bottom: 12px;
            font-size: 1rem;
            transition: all 0.15s ease;
        }

        input:focus,
        textarea:focus,
        select:focus {
            outline: none;
            border-color: #3b82f6;
            transform: scale(1.01);
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.1);
        }

        .tabs {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            margin-bottom: 20px;
        }

        .tab {
            background: white;
            padding: 10px 24px;
            border-radius: 60px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.1s cubic-bezier(0.2, 0.9, 0.4, 1.1);
        }

        .tab:active {
            transform: scale(0.94);
        }

        .tab.active {
            background: #1e4a6e;
            color: white;
        }

        .tasks-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
            gap: 20px;
        }

        .admin-panel {
            background: white;
            border-radius: 32px;
            padding: 20px;
            margin-bottom: 20px;
            border: 2px solid #ffd966;
        }

        .admin-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 10px;
            margin-bottom: 20px;
        }

        .search-box {
            display: flex;
            align-items: center;
            gap: 8px;
            background: #f1f5f9;
            padding: 5px 15px;
            border-radius: 40px;
        }

        .search-box input {
            margin: 0;
            padding: 8px;
            background: transparent;
            border: none;
            width: 200px;
            outline: none;
        }

        .users-table {
            overflow-x: auto;
            margin-top: 15px;
        }

        .users-table table {
            width: 100%;
            border-collapse: collapse;
        }

        .users-table th,
        .users-table td {
            padding: 12px 8px;
            text-align: left;
            border-bottom: 1px solid #e2e8f0;
        }

        .announcement {
            background: linear-gradient(135deg, #ffd700 0%, #ffb347 100%);
            border-radius: 32px;
            padding: 20px;
            margin-bottom: 20px;
            text-align: center;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.01); }
        }

        .share-buttons {
            display: flex;
            gap: 15px;
            justify-content: center;
            margin-top: 15px;
            flex-wrap: wrap;
        }

        .share-btn {
            padding: 10px 20px;
            border-radius: 40px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.1s cubic-bezier(0.2, 0.9, 0.4, 1.1);
        }

        .share-btn:active {
            transform: scale(0.94);
        }

        .share-tg {
            background: #0088cc;
            color: white;
        }

        .share-vk {
            background: #0077ff;
            color: white;
        }

        .copy-link {
            background: #6b7280;
            color: white;
        }

        .help-box {
            background: #e0f2fe;
            border-radius: 20px;
            padding: 15px;
            margin-bottom: 20px;
            text-align: center;
            border-left: 5px solid #0284c7;
        }

        .referral-code {
            background: #e2e8f0;
            padding: 10px;
            border-radius: 40px;
            font-family: monospace;
            cursor: pointer;
            text-align: center;
            margin-top: 15px;
        }

        .task-header {
            display: flex;
            justify-content: space-between;
            margin-bottom: 12px;
            flex-wrap: wrap;
        }

        .task-price {
            font-size: 1.6rem;
            font-weight: 800;
            color: #2b6e4f;
        }

        .task-status {
            padding: 4px 12px;
            border-radius: 30px;
            font-size: 0.75rem;
            font-weight: bold;
        }

        .status-open {
            background: #e2e8f0;
            color: #1e4a6e;
        }

        .status-progress {
            background: #fef3c7;
            color: #d97706;
        }

        .status-awaiting {
            background: #e0f2fe;
            color: #0284c7;
        }

        .status-completed {
            background: #d1fae5;
            color: #10b981;
        }

        .action-buttons {
            display: flex;
            gap: 10px;
            margin-top: 12px;
            flex-wrap: wrap;
        }

        .filter-group {
            display: flex;
            gap: 10px;
            margin-bottom: 15px;
            flex-wrap: wrap;
        }

        .filter-group input,
        .filter-group select {
            flex: 1;
            margin: 0;
        }

        .toast {
            position: fixed;
            bottom: 30px;
            right: 30px;
            background: #1f2f3e;
            color: white;
            padding: 12px 24px;
            border-radius: 60px;
            z-index: 1000;
            animation: toastFadeIn 0.3s, toastFadeOut 0.3s 2.7s forwards;
        }

        @keyframes toastFadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes toastFadeOut {
            to { opacity: 0; transform: translateY(20px); }
        }

        .loading {
            text-align: center;
            padding: 40px;
            color: #6b7280;
        }

        .error-text {
            color: #dc2626;
            font-size: 0.8rem;
            display: none;
            margin-top: -8px;
            margin-bottom: 12px;
        }

        .wallet-modal {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.8);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 2000;
            animation: modalFadeIn 0.2s;
        }

        @keyframes modalFadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .wallet-container {
            background: white;
            border-radius: 32px;
            width: 90%;
            max-width: 400px;
            padding: 20px;
            animation: modalScaleIn 0.2s;
        }

        @keyframes modalScaleIn {
            from { transform: scale(0.9); opacity: 0; }
            to { transform: scale(1); opacity: 1; }
        }

        .video-rule {
            background: #fef3c7;
            border-left: 5px solid #f59e0b;
            padding: 15px;
            margin-bottom: 20px;
            border-radius: 16px;
        }

        .support-link {
            margin-top: 20px;
            padding: 10px;
            background: #f1f5f9;
            border-radius: 20px;
            text-align: center;
            font-size: 12px;
            color: #475569;
        }

        .spinner {
            display: inline-block;
            width: 16px;
            height: 16px;
            border: 2px solid white;
            border-top-color: transparent;
            border-radius: 50%;
            animation: spin 0.6s linear infinite;
            margin-right: 8px;
            vertical-align: middle;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .notification-badge {
            background: #ef4444;
            color: white;
            border-radius: 20px;
            padding: 2px 8px;
            font-size: 0.7rem;
            margin-left: 5px;
        }

        .notifications-panel {
            background: white;
            border-radius: 24px;
            padding: 15px;
            margin-bottom: 20px;
            max-height: 300px;
            overflow-y: auto;
        }

        .notification-item {
            padding: 10px;
            border-bottom: 1px solid #e2e8f0;
            cursor: pointer;
        }

        .notification-item.unread {
            background: #eef2ff;
            font-weight: bold;
        }

        .honor-board {
            background: linear-gradient(135deg, #fef9e6, #fff4e0);
            border-radius: 24px;
            padding: 15px;
            text-align: center;
            margin-bottom: 20px;
        }

        .honor-list {
            display: flex;
            justify-content: center;
            gap: 20px;
            flex-wrap: wrap;
            margin-top: 10px;
        }

        .honor-item {
            background: white;
            border-radius: 20px;
            padding: 10px 15px;
            min-width: 120px;
            box-shadow: 0 2px 6px rgba(0, 0, 0, 0.1);
        }

        .honor-medal {
            font-size: 2rem;
        }

        .ranks-container {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-top: 15px;
            max-height: 400px;
            overflow-y: auto;
        }

        .rank-item {
            display: flex;
            align-items: center;
            gap: 15px;
            padding: 12px;
            background: #f8fafc;
            border-radius: 20px;
            transition: all 0.2s;
        }

        .rank-item.earned {
            background: #d1fae5;
            border-left: 4px solid #10b981;
        }

        .rank-icon {
            font-size: 2rem;
            min-width: 55px;
            text-align: center;
        }

        .rank-info {
            flex: 1;
        }

        .rank-name {
            font-weight: bold;
            font-size: 1rem;
        }

        .rank-desc {
            font-size: 0.7rem;
            color: #6b7280;
        }

        .rank-badge {
            font-size: 0.7rem;
            padding: 2px 8px;
            border-radius: 20px;
            background: #e2e8f0;
        }

        .upgrade-panel {
            text-align: center;
        }

        .upgrade-panel .wheel-container {
            position: relative;
            width: 280px;
            height: 280px;
            margin: 0 auto 20px;
        }

        .upgrade-panel canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100% !important;
            height: 100% !important;
            border-radius: 50%;
            box-shadow: 0 0 0 8px #2c3e2f, 0 12px 28px black;
        }

        .upgrade-panel .center-badge {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: #1f2d29dd;
            backdrop-filter: blur(8px);
            border-radius: 60px;
            padding: 6px 12px;
            font-weight: bold;
            font-size: 0.85rem;
            color: #ffd966;
            border: 1px solid #ffd966aa;
            z-index: 12;
            white-space: nowrap;
            pointer-events: none;
        }

        .upgrade-inputs {
            display: flex;
            gap: 15px;
            margin: 15px 0;
            flex-wrap: wrap;
        }

        .upgrade-inputs .input-block {
            flex: 1;
            background: #0f1c19;
            border-radius: 44px;
            padding: 8px 15px;
            border: 1px solid #ffd966aa;
        }

        .upgrade-inputs .input-block label {
            font-size: 0.7rem;
            text-transform: uppercase;
            color: #ffd966;
            display: block;
        }

        .upgrade-inputs .input-block input {
            width: 100%;
            background: transparent;
            border: none;
            font-size: 1.6rem;
            font-weight: bold;
            color: #ffdf8c;
            outline: none;
            padding: 5px 0;
        }

        @media (max-width: 700px) {
            .filter-group { flex-direction: column; }
            body { padding: 12px; }
            .honor-list { flex-direction: column; align-items: center; }
            .upgrade-inputs { flex-direction: column; }
        }
    </style>
</head>
<body>
<div id="app"><div class="loading">⏳ Загрузка...</div></div>

<script>
    const API_URL = 'https://script.google.com/macros/s/AKfycbzaQq5Qku56TgwPpRrT3PRFpaJIZVin2wRqshXXTFcwKCUurMzRljNzQ45nzjgdy9t8/exec';

    let currentUser = null;
    let authMode = 'login';
    let adminMode = false;
    let adminSearchTerm = '';
    let users = [];
    let tasks = [];
    let reviews = [];
    let reports = [];
    let isDarkTheme = localStorage.getItem('darkTheme') === 'true';
    let filters = { scope: 'school', minPrice: '', maxPrice: '' };
    let notifications = [];
    let awardedRankNotifications = new Set();

    if (isDarkTheme) document.body.classList.add('dark-theme');

    function escapeHtml(t) { if (!t) return ''; const d = document.createElement('div'); d.textContent = t; return d.innerHTML; }
    function showToast(msg, isErr, dur = 2500) { let t = document.createElement('div'); t.className = 'toast'; t.innerHTML = msg; if (isErr) t.style.background = '#b91c1c'; document.body.appendChild(t); setTimeout(() => t.remove(), dur); }
    function formatDate(d) { return d ? new Date(d).toLocaleString('ru-RU', { day:'2-digit', month:'2-digit', year:'numeric', hour:'2-digit', minute:'2-digit' }) : 'неизвестно'; }
    function saveLocalData() { localStorage.setItem('schooltask_notifications', JSON.stringify(notifications)); }
    function loadLocalData() { const s = localStorage.getItem('schooltask_notifications'); if (s) notifications = JSON.parse(s); }

    function addNotification(userId, text, taskId = null) {
        const n = { id: Date.now(), userId, text, read: false, createdAt: new Date().toISOString(), taskId };
        notifications.push(n); saveLocalData();
        if (currentUser && currentUser.id === userId) {
            showToast(`🔔 ${text}`, false, 3500);
            if (Notification.permission === "granted" && document.hidden) new Notification("SchoolTask", { body: text });
        }
    }

    const RANKS = {
        tasks: [ { name:'🐣 Новичок', need:0, desc:'Только зарегистрировался' }, { name:'📝 Стажёр', need:1, desc:'Первое выполненное' }, { name:'🏃 Бегунок', need:3 }, { name:'⚡ Шустрый', need:5 }, { name:'🔥 Горячий', need:10 }, { name:'🎯 Снайпер', need:15 }, { name:'💪 Мастер', need:20 }, { name:'⭐ Эксперт', need:30 }, { name:'🦅 Ас', need:40 }, { name:'👑 Легенда', need:50 } ],
        money: [ { name:'💸 Карманные', need:100 }, { name:'🍕 Пицца', need:500 }, { name:'🎧 Наушники', need:1000 }, { name:'🎮 Приставка', need:2000 }, { name:'📱 Телефон', need:5000 }, { name:'💎 Бриллиант', need:10000 } ],
        referrals: [ { name:'🗣️ Говорун', need:1 }, { name:'📢 Глашатай', need:3 }, { name:'🎤 Агитатор', need:5 }, { name:'🌟 Звезда', need:10 }, { name:'🏛️ Основатель', need:20 } ],
        reviews: [ { name:'😊 Душнила', need:3 }, { name:'🌟 Лучик', need:7 }, { name:'💎 Алмазный', need:15 } ],
        rating: [ { name:'👍 Норм', need:4.0 }, { name:'🤩 Красавчик', need:4.5 } ]
    };
    
    function checkAndUpdateRanks(user) {
        if (!user) return;
        const earned = user.earnedRanks || [];
        let newRanks = [];
        const fiveStar = reviews.filter(r=>r.toUserId===user.id && parseInt(r.rating)===5).length;
        const rating = parseFloat(user.rating)||0;
        for (let r of RANKS.tasks) if (!earned.includes(r.name) && (user.tasksCompleted||0)>=r.need) newRanks.push(r);
        for (let r of RANKS.money) if (!earned.includes(r.name) && (user.totalEarned||0)>=r.need) newRanks.push(r);
        for (let r of RANKS.referrals) if (!earned.includes(r.name) && (user.referral_count||0)>=r.need) newRanks.push(r);
        for (let r of RANKS.reviews) if (!earned.includes(r.name) && fiveStar>=r.need) newRanks.push(r);
        for (let r of RANKS.rating) if (!earned.includes(r.name) && rating>=r.need) newRanks.push(r);
        if (newRanks.length) {
            const needNotify = newRanks.some(r=>!awardedRankNotifications.has(r.name));
            if (needNotify) {
                newRanks.forEach(r=>awardedRankNotifications.add(r.name));
                user.earnedRanks = [...earned, ...newRanks.map(r=>r.name)];
                addNotification(user.id, `🎉 Новые звания: ${newRanks.map(r=>r.name).join(', ')}!`);
                saveToGoogle('updateUser', { id: user.id, earnedRanks: JSON.stringify(user.earnedRanks) });
            }
        }
    }

    let isLoading = false, usersCache, tasksCache, reviewsCache, reportsCache, lastLoad=0, CACHE_TTL=30000;
    async function loadData(force=false) {
        if (!force && usersCache && (Date.now()-lastLoad)<CACHE_TTL) { users=usersCache; tasks=tasksCache; reviews=reviewsCache; reports=reportsCache; return true; }
        if (isLoading) return users.length>0;
        isLoading=true;
        try {
            const [u,t,rv,rp] = await Promise.all([ fetch(API_URL+'?action=getUsers').then(r=>r.json()).catch(()=>[]), fetch(API_URL+'?action=getTasks').then(r=>r.json()).catch(()=>[]), fetch(API_URL+'?action=getReviews').then(r=>r.json()).catch(()=>[]), fetch(API_URL+'?action=getReports').then(r=>r.json()).catch(()=>[]) ]);
            if (Array.isArray(u)) users = u.map(u=>({...u, earnedRanks: u.earnedRanks ? (Array.isArray(u.earnedRanks)?u.earnedRanks:JSON.parse(u.earnedRanks)) : []}));
            if (Array.isArray(t)) tasks = t;
            if (Array.isArray(rv)) reviews = rv;
            if (Array.isArray(rp)) reports = rp;
            usersCache=users; tasksCache=tasks; reviewsCache=reviews; reportsCache=reports; lastLoad=Date.now();
            isLoading=false; return true;
        } catch(e){ isLoading=false; return false; }
    }
    
    async function saveToGoogle(action, params) {
        try {
            const fd = new URLSearchParams();
            fd.append('action', action);
            for(let k in params) if(params[k]!==undefined && params[k]!==null) fd.append(k, typeof params[k]==='object'?JSON.stringify(params[k]):params[k]);
            const resp = await fetch(API_URL, { method:'POST', headers:{'Content-Type':'application/x-www-form-urlencoded'}, body:fd });
            const txt = await resp.text();
            try { return JSON.parse(txt); } catch(e){ return { success:false }; }
        } catch(e){ return { success:false }; }
    }

    function saveSession() { if(currentUser) localStorage.setItem('schooltask_session', JSON.stringify({ id:currentUser.id, name:currentUser.name, school:currentUser.school, corp:currentUser.corp })); else localStorage.removeItem('schooltask_session'); }
    async function restoreSession() { let s = localStorage.getItem('schooltask_session'); if(!s) return false; try { let ses = JSON.parse(s); await loadData(true); let u = users.find(u=>u.name===ses.name && u.school===ses.school && u.corp===ses.corp); if(u && u.isBanned!=='true') { currentUser=u; if(Notification.permission==="default") Notification.requestPermission(); checkAndUpdateRanks(currentUser); return true; } localStorage.removeItem('schooltask_session'); } catch(e){} return false; }

    async function createTask(desc,price,loc,payType,scope,btn) {
        if (!desc || !price || !loc) { showToast('❌ Заполните все поля', true); if(btn) btn.disabled=false; return; }
        if(btn) btn.disabled=true;
        let priceNum = parseFloat(price);

    // -------------------- АПГРЕЙД --------------------
    let mainBalanceLocal = 1000;
    let bonusBalanceLocal = 500;
    let activeUpgradeAccount = 'bonus';
    let fairWinPercent = 0;
    let arrowAngle = 0;
    let isSpinningUpgrade = false;
    let spinAnimationId = null;
    const UPGRADE_PENALTY = 25;

    function computeFairChance(bet, target) { if (bet <= 0 || target <= 0) return 0; let raw = (bet / target) * 100; return Math.min(raw, 100); }
    function getArrowAngleWithRealChance(fair, account) {
        let realWinPercent = (account === 'main') ? Math.max(0, fair - UPGRADE_PENALTY) : fair;
        if (realWinPercent >= 100) realWinPercent = 100;
        let winAngle = (fair / 100) * Math.PI * 2;
        let startSector = -Math.PI/2 - winAngle/2;
        let endSector = startSector + winAngle;
        let r = Math.random();
        let angle;
        if (r < realWinPercent / 100) { let t = Math.random(); angle = startSector + t * winAngle; }
        else { let darkAngle = Math.PI * 2 - winAngle; let darkStart = endSector; let t = Math.random(); angle = darkStart + t * darkAngle; }
        return angle;
    }

        let upgradeCanvas = null, upgradeCtx = null;
    function drawUpgradeWheel(winPercent) {
        if (!upgradeCtx) return;
        const w = upgradeCanvas.width = 500;
        const h = upgradeCanvas.height = 500;
        const radius = 220;
        const cx = w/2, cy = h/2;
        upgradeCtx.clearRect(0, 0, w, h);
        upgradeCtx.beginPath();
        upgradeCtx.arc(cx, cy, radius, 0, Math.PI*2);
        upgradeCtx.fillStyle = '#2c423d';
        upgradeCtx.fill();
        if (winPercent <= 0) {
            upgradeCtx.beginPath();
            upgradeCtx.arc(cx, cy, radius, 0, Math.PI*2);
            upgradeCtx.fillStyle = '#3e5a54';
            upgradeCtx.fill();
        } else {
            let winAngle = (winPercent / 100) * Math.PI * 2;
            let startAngle = -Math.PI/2 - winAngle/2;
            upgradeCtx.beginPath();
            upgradeCtx.moveTo(cx, cy);
            upgradeCtx.arc(cx, cy, radius, startAngle, startAngle + winAngle);
            upgradeCtx.closePath();
            upgradeCtx.fillStyle = '#f7b32b';
            upgradeCtx.fill();
            if (winPercent < 100) {
                upgradeCtx.beginPath();
                upgradeCtx.moveTo(cx, cy);
                upgradeCtx.arc(cx, cy, radius, startAngle + winAngle, startAngle + Math.PI*2);
                upgradeCtx.closePath();
                upgradeCtx.fillStyle = '#3e5a54';
                upgradeCtx.fill();
            }
        }
        upgradeCtx.beginPath();
        upgradeCtx.arc(cx, cy, radius, 0, Math.PI*2);
        upgradeCtx.strokeStyle = '#fdcc6e';
        upgradeCtx.lineWidth = 4;
        upgradeCtx.stroke();
        if (winPercent > 0 && winPercent < 100) {
            let winAngle = (winPercent / 100) * Math.PI * 2;
            let startAngle = -Math.PI/2 - winAngle/2;
            upgradeCtx.beginPath();
            upgradeCtx.moveTo(cx, cy);
            upgradeCtx.lineTo(cx + radius * 0.92 * Math.cos(startAngle), cy + radius * 0.92 * Math.sin(startAngle));
            upgradeCtx.strokeStyle = '#ffeaac';
            upgradeCtx.lineWidth = 2.8;
            upgradeCtx.stroke();
            upgradeCtx.beginPath();
            upgradeCtx.moveTo(cx, cy);
            upgradeCtx.lineTo(cx + radius * 0.92 * Math.cos(startAngle + winAngle), cy + radius * 0.92 * Math.sin(startAngle + winAngle));
            upgradeCtx.stroke();
        }
        upgradeCtx.beginPath();
        upgradeCtx.arc(cx, cy, 34, 0, Math.PI*2);
        upgradeCtx.fillStyle = '#1d2d28';
        upgradeCtx.fill();
        upgradeCtx.fillStyle = '#ffcd7e';
        upgradeCtx.font = 'bold 23px "Segoe UI"';
        upgradeCtx.fillText("⚡", cx-12, cy+10);
    }
    function drawUpgradeArrow(angleRad) {
        if (!upgradeCtx) return;
        const w = upgradeCanvas.width;
        const h = upgradeCanvas.height;
        const cx = w/2, cy = h/2;
        const arrowLen = 210;
        const arrowWidth = 22;
        const tipX = cx + Math.cos(angleRad) * arrowLen;
        const tipY = cy + Math.sin(angleRad) * arrowLen;
        const backX = cx - Math.cos(angleRad) * (arrowLen * 0.2);
        const backY = cy - Math.sin(angleRad) * (arrowLen * 0.2);
        upgradeCtx.beginPath();
        upgradeCtx.moveTo(tipX, tipY);
        const anglePerp = angleRad + Math.PI/2;
        const leftX = tipX - Math.cos(anglePerp) * arrowWidth;
        const leftY = tipY - Math.sin(anglePerp) * arrowWidth;
        const rightX = tipX + Math.cos(anglePerp) * arrowWidth;
        const rightY = tipY + Math.sin(anglePerp) * arrowWidth;
        upgradeCtx.lineTo(leftX, leftY);
        upgradeCtx.lineTo(backX, backY);
        upgradeCtx.lineTo(rightX, rightY);
        upgradeCtx.closePath();
        upgradeCtx.fillStyle = '#ffc857';
        upgradeCtx.shadowBlur = 4;
        upgradeCtx.fill();
        upgradeCtx.fillStyle = '#000000cc';
        upgradeCtx.font = 'bold 26px "Segoe UI"';
        upgradeCtx.fillText("▼", tipX-13, tipY-8);
        upgradeCtx.shadowBlur = 0;
    }
    function renderUpgradeFull() {
        drawUpgradeWheel(fairWinPercent);
        drawUpgradeArrow(arrowAngle);
    }
    function refreshUpgradeUI() {
        let bet = parseFloat(document.getElementById('upgradeBet')?.value);
        let target = parseFloat(document.getElementById('upgradeTarget')?.value);
        if (isNaN(bet)) bet = 0;
        if (isNaN(target)) target = 0;

        let chanceSpan = document.getElementById('upgradeChancePercent');
        if (chanceSpan) chanceSpan.innerHTML = `${fair.toFixed(1)}%`;
        let spinBtn = document.getElementById('upgradeSpinBtn');

    async function upgradeStartSpin() {
        let spinBtn = document.getElementById('upgradeSpinBtn');
        if (spinBtn.disabled) return;
        let bet = parseFloat(document.getElementById('upgradeBet').value);
        let target = parseFloat(document.getElementById('upgradeTarget').value);
        if (isNaN(bet) || isNaN(target) || bet <= 0 || target <= 0) {
            alert('Введите положительные числа');
            return;
        }
        let available = (activeUpgradeAccount === 'main') ? mainBalanceLocal : bonusBalanceLocal;
        if (available < bet) {
            alert(`Недостаточно средств на ${activeUpgradeAccount === 'main' ? 'основном' : 'бонусном'} счету`);
            return;
        }
        refreshUpgradeUI();
        let fair = fairWinPercent;
        let realWin = (activeUpgradeAccount === 'main') ? Math.max(0, fair - UPGRADE_PENALTY) : fair;
        if (realWin <= 0 && activeUpgradeAccount === 'main') {
            alert('Реальный шанс слишком низкий, увеличьте желаемый выигрыш');
            return;
        }
        if (activeUpgradeAccount === 'main') mainBalanceLocal -= bet;
        else bonusBalanceLocal -= bet;
        updateUpgradeBalancesUI();
        spinBtn.disabled = true;
        spinBtn.innerText = '🌀 КРУТИМ... 🌀';
        document.getElementById('upgradeResult').innerHTML = '<span style="color:#ffd966;">⚙️ вращение...</span>';
        let targetAngle = getArrowAngleWithRealChance(fair, activeUpgradeAccount);
        const extraRot = 7 * Math.PI * 2;
        let startAngle = arrowAngle;
        let startTime = performance.now();
        let duration = 1300;
        function animate(now) {
            if (!isSpinningUpgrade) return;
            let elapsed = now - startTime;
            let t = Math.min(1, elapsed / duration);
            let ease = 1 - Math.pow(1 - t, 3);
            let curAngle = startAngle + (targetAngle + extraRot - startAngle) * ease;
            arrowAngle = curAngle;
            renderUpgradeFull();
            if (t < 1) {
                spinAnimationId = requestAnimationFrame(animate);
            } else {
                arrowAngle = (targetAngle + extraRot) % (Math.PI*2);
                renderUpgradeFull();
                isSpinningUpgrade = false;
                if (spinAnimationId) cancelAnimationFrame(spinAnimationId);
                spinAnimationId = null;
                finishUpgradeSpin(bet, target);
            }
        }
        isSpinningUpgrade = true;
        spinAnimationId = requestAnimationFrame(animate);
    }
    function finishUpgradeSpin(bet, target) {
        let angleNorm = (arrowAngle + 2*Math.PI) % (Math.PI*2);
        let winAngle = (fairWinPercent / 100) * Math.PI * 2;
        let startSector = -Math.PI/2 - winAngle/2;
        let isWin = false;
        if (fairWinPercent > 0) {
            let diff = (angleNorm - startSector + 2*Math.PI) % (Math.PI*2);
            isWin = diff <= winAngle;
        }
        if (isWin) {
            let winAmount = target;
            if (activeUpgradeAccount === 'main') mainBalanceLocal += winAmount;
            else bonusBalanceLocal += winAmount;
            updateUpgradeBalancesUI();
            document.getElementById('upgradeResult').innerHTML = `<span style="color:#bef264;">✨ ПОБЕДА! ✨<br>+${winAmount.toFixed(2)} ₽</span>`;
        } else {
            document.getElementById('upgradeResult').innerHTML = `<span style="color:#fca5a5;">💥 ПРОИГРЫШ 💥<br>потеряно ${bet.toFixed(2)} ₽</span>`;
        }
        let spinBtn = document.getElementById('upgradeSpinBtn');
        spinBtn.disabled = false;
        spinBtn.innerText = '🎯 КРУТИТЬ СТРЕЛКУ 🎯';
        saveUpgradeBalances();
    }
    function updateUpgradeBalancesUI() {
        document.getElementById('upgradeMainBalanceAmount').innerHTML = `${mainBalanceLocal.toFixed(2)} ₽`;
        document.getElementById('upgradeBonusBalanceAmount').innerHTML = `${bonusBalanceLocal.toFixed(2)} ₽`;
        let mainBtn = document.getElementById('upgradeBtnMain');
        let bonusBtn = document.getElementById('upgradeBtnBonus');
        if (activeUpgradeAccount === 'main') {
            mainBtn.classList.add('active');
            bonusBtn.classList.remove('active');
        } else {
            bonusBtn.classList.add('active');
            mainBtn.classList.remove('active');
        }
        refreshUpgradeUI();
    }

    function switchUpgradeToBonus() { activeUpgradeAccount = 'bonus'; updateUpgradeBalancesUI(); }
    function resetUpgradeBalances() {
        mainBalanceLocal = 1000;
        bonusBalanceLocal = 500;
        activeUpgradeAccount = 'bonus';

        localStorage.setItem('schooltask_upgrade_main', mainBalanceLocal);
        localStorage.setItem('schooltask_upgrade_bonus', bonusBalanceLocal);
        localStorage.setItem('schooltask_upgrade_active', activeUpgradeAccount);

    function loadUpgradeBalances() {
        let savedMain = localStorage.getItem('schooltask_upgrade_main');
        let savedBonus = localStorage.getItem('schooltask_upgrade_bonus');

                document.querySelectorAll('.ban-btn').forEach(btn => { btn.onclick = () => showBanModal(btn.getAttribute('data-userid')); });
                document.querySelectorAll('.unban-btn').forEach(btn => { btn.onclick = () => unbanUser(btn.getAttribute('data-userid')); });
                document.querySelectorAll('.reviews-btn').forEach(btn => { btn.onclick = () => { let uid = btn.getAttribute('data-userid'); let uRev = reviews.filter(r=>r.toUserId===uid); let uObj = users.find(u=>u.id===uid); if(uRev.length===0) alert(`⭐ У ${uObj?.name} нет отзывов.`); else { let avg = uRev.reduce((s,r)=>s+parseInt(r.rating),0)/uRev.length; alert(`⭐ ОТЗЫВЫ О ${uObj?.name}\nСр.оценка: ${avg.toFixed(1)}\nВсего: ${uRev.length}\n\n${uRev.slice(0,5).map(r=>`• ${getRatingStars(r.rating)}: ${r.comment||'без коммента'}`).join('\n')}`); } }; });
                document.querySelectorAll('.user-tasks-btn').forEach(btn => { btn.onclick = () => { let uid = btn.getAttribute('data-userid'); let uTasks = tasks.filter(t=>t.creatorId===uid || t.takerId===uid); let uObj = users.find(u=>u.id===uid); alert(`📋 ЗАДАНИЯ ${uObj?.name}\n📝 Создал: ${uTasks.filter(t=>t.creatorId===uid).length}\n🔧 Взял: ${uTasks.filter(t=>t.takerId===uid).length}`); }; });
            }

            document.querySelectorAll('.take-btn').forEach(btn => { btn.onclick = () => takeTask(btn.getAttribute('data-id'), btn); });
            document.querySelectorAll('.delete-btn').forEach(btn => { btn.onclick = () => deleteTask(btn.getAttribute('data-id'), btn); });
            document.querySelectorAll('.edit-btn').forEach(btn => { let tid = btn.getAttribute('data-id'); let task = tasks.find(t=>t.id==tid); if(task) btn.onclick = () => showEditModal(task); });
            document.querySelectorAll('.complete-btn').forEach(btn => { btn.onclick = () => confirmCompletion(btn.getAttribute('data-id'), btn); });
            document.querySelectorAll('.confirm-btn').forEach(btn => { btn.onclick = () => confirmReceipt(btn.getAttribute('data-id'), btn); });
            document.querySelectorAll('.reject-btn').forEach(btn => { btn.onclick = () => rejectReceipt(btn.getAttribute('data-id'), btn); });
            document.querySelectorAll('.review-btn').forEach(btn => { btn.onclick = () => showReviewModal(btn.getAttribute('data-id'), btn.getAttribute('data-userid')); });
            document.querySelectorAll('.report-btn').forEach(btn => { btn.onclick = () => showReportModal(btn.getAttribute('data-id'), btn.getAttribute('data-userid')); });

            // Апгрейд обработчики
            if(document.getElementById('upgradeCanvas')){
                upgradeCanvas = document.getElementById('upgradeCanvas');
                upgradeCtx = upgradeCanvas.getContext('2d');
                loadUpgradeBalances();
                refreshUpgradeUI();
                document.getElementById('upgradeBet').addEventListener('input', refreshUpgradeUI);
                document.getElementById('upgradeTarget').addEventListener('input', refreshUpgradeUI);
                document.getElementById('upgradeSpinBtn').addEventListener('click', upgradeStartSpin);
                document.getElementById('upgradeBtnMain').addEventListener('click', switchUpgradeToMain);
                document.getElementById('upgradeBtnBonus').addEventListener('click', switchUpgradeToBonus);
                document.getElementById('upgradeResetBtn').addEventListener('click', resetUpgradeBalances);
            }
        }, 10);
    }

    window.shareTelegram = shareTelegram;
    window.shareVK = shareVK;
    window.copyReferralLink = copyReferralLink;
    window.showBonusHelp = showBonusHelp;
    window.openWalletModal = openWalletModal;
    window.closeWalletModal = closeWalletModal;
    window.showPaymentAlert = showPaymentAlert;

    loadLocalData();
    // простой сплеш вместо сложного
    document.body.style.opacity = '1';
    document.body.classList.add('loaded');
    (async()=>{ await loadData(false); await restoreSession(); renderApp(); })();
</script>
</body>
</html>
