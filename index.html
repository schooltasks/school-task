<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>SchoolTask - Биржа поручений</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Segoe UI',system-ui}
body{background:linear-gradient(145deg,#f0f4fa 0%,#e2e8f0 100%);min-height:100vh;padding:20px;transition:.3s}
body.dark-theme{background:linear-gradient(145deg,#1a1a2e 0%,#16213e 100%);color:#e2e8f0}
body.dark-theme .header,body.dark-theme .card,body.dark-theme .task-card,body.dark-theme .admin-panel,body.dark-theme .help-box,body.dark-theme .announcement{background:#1e293b;color:#e2e8f0}
body.dark-theme .user-info{background:#334155}
body.dark-theme .tab{background:#334155;color:#e2e8f0}
body.dark-theme .tab.active{background:#3b82f6}
body.dark-theme input,body.dark-theme textarea,body.dark-theme select{background:#334155;border-color:#475569;color:#e2e8f0}
.container{max-width:1300px;margin:0 auto}
.header,.card,.task-card{background:white;border-radius:32px;padding:20px;margin-bottom:20px;box-shadow:0 8px 20px rgba(0,0,0,0.05)}
.header{display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap}
.logo h1{background:linear-gradient(135deg,#1e2b3c,#2c4c6e);-webkit-background-clip:text;background-clip:text;color:transparent;font-size:1.6rem}
.user-info{display:flex;align-items:center;gap:20px;background:#f8fafc;padding:8px 20px;border-radius:60px;flex-wrap:wrap}
.balance-card{background:#eef2ff;padding:6px 16px;border-radius:40px;font-weight:bold;cursor:pointer}
.bonus-card{background:linear-gradient(135deg,#fef3c7,#fde68a);color:#92400e;padding:6px 16px;border-radius:40px;font-weight:bold;cursor:pointer}
button{cursor:pointer;border:none;border-radius:40px;padding:10px 20px;font-weight:bold;transition:.2s}
button:disabled{opacity:0.6;cursor:not-allowed}
.btn-primary{background:#2c6e4f;color:white}
.btn-success{background:#10b981;color:white}
.btn-danger{background:#dc2626;color:white}
.btn-edit{background:#8b5cf6;color:white}
.btn-info{background:#3b82f6;color:white}
.theme-toggle{background:#334155;color:white;padding:8px 16px;border-radius:60px;cursor:pointer}
input,textarea,select{width:100%;padding:12px 16px;border:1px solid #cbd5e1;border-radius:28px;margin-bottom:12px;font-size:1rem}
.input-hint{font-size:0.75rem;color:#6b7280;margin-top:-8px;margin-bottom:12px}
.tabs{display:flex;gap:12px;flex-wrap:wrap;margin-bottom:20px}
.tab{background:white;padding:10px 24px;border-radius:60px;cursor:pointer;font-weight:600}
.tab.active{background:#1e4a6e;color:white}
.tasks-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(350px,1fr));gap:20px}
.admin-panel{background:white;border-radius:32px;padding:20px;margin-bottom:20px;border:2px solid #ffd966}
.admin-header{display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:10px;margin-bottom:20px}
.search-box{display:flex;align-items:center;gap:8px;background:#f1f5f9;padding:5px 15px;border-radius:40px}
.search-box input{margin:0;padding:8px;background:transparent;border:none;width:200px;outline:none}
.users-table{overflow-x:auto;margin-top:15px}
.users-table table{width:100%;border-collapse:collapse}
.users-table th,.users-table td{padding:12px 8px;text-align:left;border-bottom:1px solid #e2e8f0}
.balance-control{display:flex;gap:5px;align-items:center;flex-wrap:wrap}
.balance-control input{width:80px;margin:0;padding:6px;border-radius:30px}
.announcement{background:linear-gradient(135deg,#ffd700 0%,#ffb347 100%);border-radius:32px;padding:20px;margin-bottom:20px;text-align:center;animation:pulse 2s infinite}
@keyframes pulse{0%{transform:scale(1)}50%{transform:scale(1.02)}100%{transform:scale(1)}}
.announcement h2{font-size:1.8rem;color:#1e293b;margin-bottom:10px}
.announcement p{color:#1e293b;margin-bottom:15px}
.announcement .bonus-highlight{background:#dc2626;color:white;display:inline-block;padding:5px 15px;border-radius:40px;margin:10px 0}
.share-buttons{display:flex;gap:15px;justify-content:center;margin-top:15px;flex-wrap:wrap}
.share-btn{padding:10px 20px;border-radius:40px;font-weight:bold;cursor:pointer}
.share-tg{background:#0088cc;color:white}
.share-vk{background:#0077ff;color:white}
.copy-link{background:#6b7280;color:white}
.help-box{background:#e0f2fe;border-radius:20px;padding:15px;margin-bottom:20px;text-align:center;border-left:5px solid #0284c7}
.help-box h4{color:#0284c7;margin-bottom:8px}
.help-box p{font-size:0.9rem;color:#075985}
body.dark-theme .help-box{background:#0c4a6e;border-left-color:#38bdf8}
body.dark-theme .help-box h4{color:#38bdf8}
body.dark-theme .help-box p{color:#bae6fd}
.referral-code{background:#e2e8f0;padding:10px;border-radius:40px;font-family:monospace;cursor:pointer;text-align:center;margin-top:15px}
.task-header{display:flex;justify-content:space-between;margin-bottom:12px;flex-wrap:wrap}
.task-price{font-size:1.6rem;font-weight:800;color:#2b6e4f}
.task-status{padding:4px 12px;border-radius:30px;font-size:0.75rem;font-weight:bold}
.status-open{background:#e2e8f0;color:#1e4a6e}
.status-progress{background:#fef3c7;color:#d97706}
.status-awaiting{background:#e0f2fe;color:#0284c7}
.status-completed{background:#d1fae5;color:#10b981}
.action-buttons{display:flex;gap:10px;margin-top:12px;flex-wrap:wrap}
.filter-group{display:flex;gap:10px;margin-bottom:15px;flex-wrap:wrap}
.filter-group input,.filter-group select{flex:1;margin:0}
.toast{position:fixed;bottom:30px;right:30px;background:#1f2f3e;color:white;padding:12px 24px;border-radius:60px;z-index:1000;animation:fadein .3s}
@keyframes fadein{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
.loading{text-align:center;padding:40px;color:#6b7280}
.error-text{color:#dc2626;font-size:0.8rem;display:none;margin-top:-8px;margin-bottom:12px}
.wallet-modal{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.8);display:flex;align-items:center;justify-content:center;z-index:2000}
.wallet-container{background:white;border-radius:32px;width:90%;max-width:400px;padding:20px}
.video-rule{background:#fef3c7;border-left:5px solid #f59e0b;padding:15px;margin-bottom:20px;border-radius:16px}
body.dark-theme .video-rule{background:#451a03;border-left-color:#f59e0b}
.video-rule h4{color:#d97706;margin-bottom:8px}
.video-rule p{font-size:0.9rem;color:#92400e}
body.dark-theme .video-rule p{color:#fde68a}
.support-link{margin-top:20px;padding:10px;background:#f1f5f9;border-radius:20px;text-align:center;font-size:12px;color:#475569}
body.dark-theme .support-link{background:#334155;color:#cbd5e1}
@media (max-width:700px){.filter-group{flex-direction:column}}
</style>
</head>
<body>
<div id="app"><div class="loading">⏳ Загрузка...</div></div>
<script>
const API_URL='https://script.google.com/macros/s/AKfycbxf5v8wNf6_yx-S87wcuWdr4kYbza6bWqQKwTaPZjIXZYtkPNB3AO3mHYW2Fo9lShA_/exec';
let currentUser=null,authMode='login',adminMode=false,adminSearchTerm='',users=[],tasks=[],reviews=[],isDarkTheme=localStorage.getItem('darkTheme')==='true',filters={scope:'school',minPrice:'',maxPrice:''},isLoading=false,isDataLoaded=false,isDeleting=false,pendingDeleteTasks=new Set(),reports=[],dailyBonusClaimed=false;
if(isDarkTheme)document.body.classList.add('dark-theme');
function toggleTheme(){isDarkTheme=!isDarkTheme;localStorage.setItem('darkTheme',isDarkTheme);if(isDarkTheme)document.body.classList.add('dark-theme');else document.body.classList.remove('dark-theme');renderApp();}
function escapeHtml(t){if(!t)return '';const d=document.createElement('div');d.textContent=t;return d.innerHTML;}
function showToast(m,i){let t=document.createElement('div');t.className='toast';t.innerText=m;if(i)t.style.background='#b91c1c';document.body.appendChild(t);setTimeout(()=>t.remove(),3000);}
function formatDate(d){if(!d)return'неизвестно';return new Date(d).toLocaleString('ru-RU',{day:'2-digit',month:'2-digit',year:'numeric',hour:'2-digit',minute:'2-digit'});}
async function loadDataFromGoogle(){if(isLoading)return isDataLoaded;isLoading=true;try{const u=await fetch(API_URL+'?action=getUsers');if(u.ok){const d=await u.json();if(Array.isArray(d))users=d;console.log('Пользователей:',users.length);}
const t=await fetch(API_URL+'?action=getTasks');if(t.ok){const d=await t.json();if(Array.isArray(d))tasks=d;}
const r=await fetch(API_URL+'?action=getReviews');if(r.ok){const d=await r.json();if(Array.isArray(d))reviews=d;}
const rp=await fetch(API_URL+'?action=getReports');if(rp.ok){const d=await rp.json();if(Array.isArray(d))reports=d;}
const lb=localStorage.getItem('lastDailyBonus');if(lb){const ld=new Date(parseInt(lb)),td=new Date();dailyBonusClaimed=ld.toDateString()===td.toDateString();}else dailyBonusClaimed=false;
isDataLoaded=true;return true;}catch(e){console.error(e);showToast('⚠️ Не удалось загрузить данные',true);return false;}finally{isLoading=false;}}
async function saveToGoogle(a,p){try{const fd=new URLSearchParams();fd.append('action',a);for(let k in p)if(p[k]!==undefined&&p[k]!==null)fd.append(k,p[k]);const r=await fetch(API_URL,{method:'POST',headers:{'Content-Type':'application/x-www-form-urlencoded'},body:fd.toString()});return await r.json();}catch(e){console.error(e);showToast('⚠️ Не удалось сохранить',true);return{success:false};}}
function saveSession(){if(currentUser)localStorage.setItem('schooltask_session',JSON.stringify({id:currentUser.id,name:currentUser.name}));else localStorage.removeItem('schooltask_session');}
function restoreSession(){let s=localStorage.getItem('schooltask_session');if(!s)return false;try{let ses=JSON.parse(s),u=users.find(u=>u.id===ses.id);if(u&&u.isBanned!=='true'){currentUser=u;return true;}localStorage.removeItem('schooltask_session');}catch(e){return false}return false;}
function getReferralLink(){let u=window.location.href.split('?')[0];if(currentUser&&currentUser.referral_code)return u+'?ref='+currentUser.referral_code;return u;}
function copyReferralLink(){navigator.clipboard.writeText(getReferralLink());showToast('✅ Ссылка скопирована! +5₽ за каждого друга',false);}
function shareTelegram(){window.open('https://t.me/share/url?url='+encodeURIComponent(getReferralLink())+'&text='+encodeURIComponent('SchoolTask - биржа поручений! +5₽ на бонусный счёт за друга!'),'_blank');}
function shareVK(){window.open('https://vk.com/share.php?url='+encodeURIComponent(getReferralLink()),'_blank');}
function showBonusHelp(){alert('🎁 Бонусный счёт\n\nБонусы НЕЛЬЗЯ вывести, только тратить на создание заданий!\n\n✨ Как получить:\n• +5₽ за каждого приглашённого друга\n• +10₽ за выполнение задания\n• +20₽ за отзыв 5 звёзд\n• +3₽ ежедневный бонус за вход');}
async function claimDailyBonus(){if(!currentUser)return;if(dailyBonusClaimed){showToast('❌ Вы уже получали сегодняшний бонус!',false);return;}const r=await saveToGoogle('addDailyBonus',{userId:currentUser.id});if(r&&r.success){currentUser.bonus_balance=(parseFloat(currentUser.bonus_balance)||0)+3;dailyBonusClaimed=true;localStorage.setItem('lastDailyBonus',Date.now().toString());showToast('🎁 +3₽ на бонусный счёт!',false);renderApp();}else showToast('❌ Ошибка при получении бонуса',true);}
let walletModal=null;
function openWalletModal(){if(!currentUser)return;if(walletModal)walletModal.remove();walletModal=document.createElement('div');walletModal.className='wallet-modal';walletModal.style.cssText='position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.8);display:flex;align-items:center;justify-content:center;z-index:2000;';walletModal.innerHTML=`<div class="wallet-container"><div style="display:flex;justify-content:space-between;margin-bottom:20px;"><h3>💰 Кошелёк</h3><button onclick="closeWalletModal()" style="background:none;font-size:28px;cursor:pointer;">✕</button></div><div style="text-align:center;margin:20px 0;"><div style="color:#6b7280;">💰 Основной баланс</div><div style="color:#2c6e4f;font-size:2rem;font-weight:bold;">${(parseFloat(currentUser.balance)||0).toFixed(2)} ₽</div></div><div style="text-align:center;margin:20px 0;border-top:1px solid #e2e8f0;padding-top:20px;"><div style="color:#6b7280;">🎁 Бонусный счёт</div><div style="color:#eab308;font-size:2rem;font-weight:bold;">${(parseFloat(currentUser.bonus_balance)||0).toFixed(2)} ₽</div></div><div style="margin:20px 0;padding:15px;background:#e0f2fe;border-radius:20px;text-align:center;"><p style="font-size:14px;">💡 1 ₽ на сайте = 0.9 ₽ после комиссии (-10%)</p></div><div style="display:flex;flex-direction:column;gap:10px;"><button class="btn-success" onclick="showPaymentAlert('deposit')">💰 Пополнить</button><button class="btn-primary" onclick="showPaymentAlert('withdraw')">💸 Вывод</button><button class="btn-info" onclick="claimDailyBonus()">🎁 Ежедневный бонус (+3₽)</button></div><button class="btn-danger" onclick="closeWalletModal()" style="margin-top:15px;width:100%">Закрыть</button></div>`;document.body.appendChild(walletModal);}
function closeWalletModal(){if(walletModal){walletModal.remove();walletModal=null;}renderApp();}
function showPaymentAlert(t){if(t==='deposit')alert('💳 ПОПОЛНЕНИЕ БАЛАНСА\n\nДля пополнения баланса напишите в Telegram:\n@leshr_ak47\n\nУкажите ваш логин и сумму пополнения.\n\nКомиссия: 10%');else alert('💸 ВЫВОД СРЕДСТВ\n\nДля вывода средств напишите в Telegram:\n@leshr_ak47\n\nУкажите ваш логин, сумму вывода и реквизиты.\n\nМинимальная сумма: 100₽');}
async function addReport(reportedId,taskId,reason){if(!currentUser)return;const r=await saveToGoogle('addReport',{id:Date.now().toString(),reporterId:currentUser.id,reportedId:reportedId,taskId:taskId,reason:reason,createdAt:new Date().toISOString()});if(r&&r.success){showToast('✅ Жалоба отправлена!',false);await loadDataFromGoogle();renderApp();}else showToast('❌ Ошибка при отправке жалобы',true);}
function showReportModal(taskId,reportedId){let r=prompt('Опишите причину жалобы:','Нарушение правил');if(r&&r.trim())addReport(reportedId,taskId,r.trim());else if(r!==null)showToast('❌ Укажите причину жалобы',true);}
function validateName(n){if(n.length<3)return'❌ Имя должно быть не менее 3 символов';if(n.length>10)return'❌ Имя не более 10 символов';if(/^\d+$/.test(n))return'❌ Имя не может состоять только из цифр!';if(!/[a-zA-Zа-яА-Я]/.test(n))return'❌ Имя должно содержать хотя бы одну букву';if(users.some(u=>u.name===n))return'❌ Пользователь с таким именем уже существует';return'';}
async function handleRegister(){const ni=document.getElementById('regName'),si=document.getElementById('regSchool'),ci=document.getElementById('regCorp'),pi=document.getElementById('regPassword'),btn=document.getElementById('registerBtn');const n=ni.value.trim(),s=si.value.trim(),c=ci.value.trim(),p=pi.value.trim();const ne=validateName(n);if(ne){showToast(ne,true);return;}if(!s){showToast('❌ Введите школу',true);return;}if(!/^\d+$/.test(s)){showToast('❌ Школа только цифры',true);return;}if(!c){showToast('❌ Введите корпус',true);return;}if(!/^\d+$/.test(c)){showToast('❌ Корпус только цифры',true);return;}if(p.length<3){showToast('❌ Пароль не менее 3 символов',true);return;}btn.disabled=true;btn.textContent='⏳ Регистрация...';const id='u'+Date.now(),rc='REF'+Math.random().toString(36).substring(2,8).toUpperCase(),ref=new URLSearchParams(window.location.search).get('ref');try{const res=await saveToGoogle('registerUser',{id:id,name:n,school:s,corp:c,balance:0,bonus_balance:0,password:p,referral_code:rc,referred_by:ref||''});console.log('Результат:',res);if(res&&res.success){isDataLoaded=false;await loadDataFromGoogle();currentUser=users.find(u=>u.id===id)||users.find(u=>u.name===n);if(currentUser){saveSession();showToast(`✅ Добро пожаловать, ${currentUser.name}!`,false);renderApp();return;}}showToast('❌ Ошибка регистрации',true);}catch(e){console.error(e);showToast('❌ Ошибка соединения',true);}finally{btn.disabled=false;btn.textContent='Зарегистрироваться';}}
async function handleLogin(){const ni=document.getElementById('loginName'),si=document.getElementById('loginSchool'),ci=document.getElementById('loginCorp'),pi=document.getElementById('loginPassword'),btn=document.getElementById('loginBtn');const n=ni.value.trim(),s=si.value.trim(),c=ci.value.trim(),p=pi.value.trim();if(!n||!s||!c||!p){showToast('❌ Заполните все поля',true);return;}btn.disabled=true;btn.textContent='⏳ Вход...';await loadDataFromGoogle();const user=users.find(u=>u.name===n&&u.school===s&&u.corp===c);if(!user){showToast('❌ Пользователь не найден',true);btn.disabled=false;btn.textContent='Войти';return;}if(user.password!==p){showToast('❌ Неверный пароль',true);btn.disabled=false;btn.textContent='Войти';return;}if(user.isBanned==='true'){showToast('⛔ Аккаунт заблокирован',true);btn.disabled=false;btn.textContent='Войти';return;}currentUser=user;saveSession();showToast(`✅ С возвращением, ${user.name}!`,false);renderApp();btn.disabled=false;btn.textContent='Войти';}
function logout(){currentUser=null;adminMode=false;localStorage.removeItem('schooltask_session');renderApp();}
async function createTask(d,p,l,pt,s,btn){if(!currentUser)return;if(btn)btn.disabled=true;let pn=parseFloat(p);if(isNaN(pn)||pn<=0){showToast('❌ Цена положительная',true);if(btn)btn.disabled=false;return;}let bal=pt==='bonus'?(parseFloat(currentUser.bonus_balance)||0):(parseFloat(currentUser.balance)||0);if(bal<pn){showToast('❌ Недостаточно средств',true);if(btn)btn.disabled=false;return;}if(pt==='bonus')currentUser.bonus_balance-=pn;else currentUser.balance-=pn;let nt={id:Date.now().toString(),creatorId:currentUser.id,creatorSchool:currentUser.school,creatorCorp:currentUser.corp,description:d,price:pn,location:l,payment_type:pt,scope:s,status:'open',takerId:'',createdAt:new Date().toISOString()};let cr=await saveToGoogle('createTask',nt);if(!cr||!cr.success){showToast('❌ Ошибка создания',true);if(pt==='bonus')currentUser.bonus_balance+=pn;else currentUser.balance+=pn;if(btn)btn.disabled=false;renderApp();return;}await saveToGoogle('updateUser',{id:currentUser.id,balance:currentUser.balance,bonus_balance:currentUser.bonus_balance});isDataLoaded=false;await loadDataFromGoogle();currentUser=users.find(u=>u.id===currentUser.id);showToast('✅ Задание создано!',false);if(btn)btn.disabled=false;renderApp();}
async function deleteTask(tid,btn){if(btn)btn.disabled=true;if(!confirm('Удалить задание? Деньги вернутся.')){if(btn)btn.disabled=false;return;}let task=tasks.find(t=>t.id==tid);if(task&&task.status==='open'&&task.creatorId===currentUser.id){let tp=parseFloat(task.price);if(!isNaN(tp)&&tp>0){if(task.payment_type==='bonus')currentUser.bonus_balance+=tp;else currentUser.balance+=tp;await saveToGoogle('updateUser',{id:currentUser.id,balance:currentUser.balance,bonus_balance:currentUser.bonus_balance});showToast(`💰 Возвращено ${tp} ₽`,false);}}await saveToGoogle('deleteTask',{id:tid});isDataLoaded=false;await loadDataFromGoogle();currentUser=users.find(u=>u.id===currentUser.id);showToast('🗑️ Задание удалено',false);if(btn)btn.disabled=false;renderApp();}
async function takeTask(tid,btn){if(btn)btn.disabled=true;let task=tasks.find(t=>t.id==tid);if(!task||task.status!=='open'){if(btn)btn.disabled=false;return;}if(task.creatorId===currentUser.id){showToast('❌ Нельзя взять своё задание',true);if(btn)btn.disabled=false;return;}await saveToGoogle('updateTask',{id:task.id,status:'in_progress',takerId:currentUser.id});isDataLoaded=false;await loadDataFromGoogle();showToast('📢 Вы взяли задание!',false);if(btn)btn.disabled=false;renderApp();}
async function confirmCompletion(tid,btn){if(btn)btn.disabled=true;let task=tasks.find(t=>t.id==tid);if(!task||task.status!=='in_progress'){if(btn)btn.disabled=false;return;}if(task.takerId!==currentUser.id){if(btn)btn.disabled=false;return;}showToast('🎥 Не забудьте записать видео выполнения!',false);await saveToGoogle('updateTask',{id:task.id,status:'awaiting_confirmation'});isDataLoaded=false;await loadDataFromGoogle();showToast('✅ Задание выполнено! Ожидайте подтверждения',false);if(btn)btn.disabled=false;renderApp();}
async function confirmReceipt(tid,btn){if(btn)btn.disabled=true;let task=tasks.find(t=>t.id==tid);if(!task||task.status!=='awaiting_confirmation'){if(btn)btn.disabled=false;return;}if(task.creatorId!==currentUser.id){if(btn)btn.disabled=false;return;}let exec=users.find(u=>u.id===task.takerId);let total=parseFloat(task.price);let gain=total*0.95;if(exec){exec.balance+=gain;exec.bonus_balance+=10;await saveToGoogle('updateUser',{id:exec.id,balance:exec.balance,bonus_balance:exec.bonus_balance});await saveToGoogle('addTaskCompleteBonus',{userId:exec.id});}await saveToGoogle('updateTask',{id:task.id,status:'completed'});isDataLoaded=false;await loadDataFromGoogle();showToast(`💰 Подтверждено! Исполнитель получил ${gain.toFixed(2)} ₽`,false);if(btn)btn.disabled=false;renderApp();}

akerId?`<br>👤 Исполнитель: ${ex?.name||'?'}`:''}</div>${avg>0?`<div style="font-size:0.7rem;color:#fbbf24;">${getRatingStars(avg)} (${tr.length} отзывов)</div>`:''}<div class="action-buttons" style="margin-top:10px;">${btns}</div></div>`;};let createForm=`<div class="card"><h3>📝 Создать задание</h3><textarea id="taskDesc" rows="2" placeholder="Что нужно сделать? (например: принеси булочку)"></textarea><input type="number" id="taskPrice" placeholder="Цена (руб)"><input type="text" id="taskLocation" placeholder="Место (кабинет, этаж)"><select id="paymentType"><option value="main">💰 Оплатить с основного счёта (${(parseFloat(currentUser.balance)||0).toFixed(2)} ₽)</option><option value="bonus">🎁 Оплатить с бонусного счёта (${(parseFloat(currentUser.bonus_balance)||0).toFixed(2)} ₽)</option></select><select id="taskScope"><option value="school">🏫 Только моя школа</option><option value="all">🌍 Для всех участников</option></select><button class="btn-primary" id="createBtn">Создать</button></div>`;let profileHtml=`<div class="card"><h3>👤 Мой профиль</h3><p><strong>Имя:</strong> ${escapeHtml(currentUser.name)}</p><p><strong>Школа:</strong> ${escapeHtml(currentUser.school)}</p><p><strong>Корпус:</strong> ${escapeHtml(currentUser.corp)}</p><p><strong>💰 Основной баланс:</strong> ${(parseFloat(currentUser.balance)||0).toFixed(2)} ₽</p><p><strong>🎁 Бонусный счёт:</strong> ${(parseFloat(currentUser.bonus_balance)||0).toFixed(2)} ₽</p><p><strong>👥 Приглашено друзей:</strong> ${currentUser.referral_count||0}</p><p><strong>⭐ Рейтинг:</strong> ${getRatingStars(parseFloat(currentUser.rating)||0)} (${currentUser.ratingCount||0} оценок)</p><p><strong>📊 Выполнено заданий:</strong> ${currentUser.tasksCompleted||0}</p><p><strong>💰 Заработано:</strong> ${(parseFloat(currentUser.totalEarned)||0).toFixed(2)} ₽</p><div class="referral-code" onclick="copyReferralLink()">🔗 ${getReferralLink()}</div><button class="btn-info" onclick="claimDailyBonus()" style="margin-top:10px;width:100%;">🎁 Ежедневный бонус (+3₽)</button></div>`;let activeTab=window._activeTab||'allTasks',content='';if(activeTab==='allTasks')content=`<h3>📋 Доступные задания ${filters.scope==='all'?'(для всех)':'(ваша школа)'}</h3>${helpBlock}<div class="filter-group"><select id="filterScope"><option value="school" ${filters.scope==='school'?'selected':''}>🏫 Только моя школа</option><option value="all" ${filters.scope==='all'?'selected':''}>🌍 Для всех участников</option></select><input type="number" id="filterMinPrice" placeholder="Цена от" value="${filters.minPrice}"><input type="number" id="filterMaxPrice" placeholder="Цена до" value="${filters.maxPrice}"><button id="applyFilters" class="btn-info">🔍 Применить</button></div><div class="tasks-grid">${openTasks.map(t=>taskCard(t,true,false)).join('')||'<div style="text-align:center;padding:40px;">✨ Нет заданий</div>'}</div>`;else if(activeTab==='myTasks')content=`<h3>📌 Мои задания</h3><div class="tasks-grid">${myCreatedTasks.map(t=>taskCard(t,false,true)).join('')||'<div style="text-align:center;padding:40px;">✨ Нет заданий</div>'}</div>`;else if(activeTab==='myExecutions')content=`<h3>⚡ В работе</h3><div class="video-rule" style="margin-top:10px;"><h4>🎥 ВАЖНОЕ ПРАВИЛО!</h4><p>ОБЯЗАТЕЛЬНО запишите видео выполнения задания!</p></div><div class="tasks-grid">${myExecTasks.map(t=>taskCard(t,false,false)).join('')||'<div style="text-align:center;padding:40px;">✨ Нет заданий</div>'}</div>`;else if(activeTab==='completed')content=`<h3>✅ Завершённые задания</h3><div class="tasks-grid">${myCompletedTasks.map(t=>taskCard(t,false,false)).join('')||'<div style="text-align:center;padding:40px;">✨ Нет заданий</div>'}</div>`;else if(activeTab==='profile')content=profileHtml;else if(activeTab==='create')content=createForm;appDiv.innerHTML=`<div class="container"><div class="header"><div class="logo"><h1>🏫 SchoolTask</h1></div><div class="user-info"><div>👋 ${escapeHtml(currentUser.name)} | ${escapeHtml(currentUser.school)}</div><div class="balance-card" onclick="openWalletModal()">💰 ${(parseFloat(currentUser.balance)||0).toFixed(2)} ₽</div><div class="bonus-card" onclick="showBonusHelp()">🎁 ${(parseFloat(currentUser.bonus_balance)||0).toFixed(2)} ₽</div><button class="theme-toggle" id="themeToggleBtn">${isDarkTheme?'☀️':'🌙'}</button><button class="btn-danger" id="logoutBtn">Выйти</button></div></div><div style="display:flex;justify-content:space-between;margin-bottom:15px;"><div>${adminEntryBtn}</div><button class="btn-info" onclick="claimDailyBonus()">🎁 Бонус дня</button></div>${adminPanelHtml}<div class="tabs"><div class="tab ${activeTab==='allTasks'?'active':''}" data-tab="allTasks">📋 Все задания</div><div class="tab ${activeTab==='myTasks'?'active':''}" data-tab="myTasks">📦 Мои задания</div><div class="tab ${activeTab==='myExecutions'?'active':''}" data-tab="myExecutions">⚡ В работе</div><div class="tab ${activeTab==='completed'?'active':''}" data-tab="completed">✅ Завершённые</div><div class="tab ${activeTab==='profile'?'active':''}" data-tab="profile">👤 Профиль</div><div class="tab ${activeTab==='create'?'active':''}" data-tab="create">➕ Создать</div></div>${content}<div class="support-link" style="margin-top:20px;">📞 Поддержка: <strong>@leshr_ak47</strong> (Telegram)</div></div>`;document.querySelectorAll('.tab').forEach(t=>{t.onclick=()=>{window._activeTab=t.getAttribute('data-tab');renderApp();};});document.getElementById('logoutBtn').onclick=logout;document.getElementById('themeToggleBtn').onclick=toggleTheme;if(document.getElementById('createBtn'))document.getElementById('createBtn').onclick=()=>{createTask(document.getElementById('taskDesc').value,document.getElementById('taskPrice').value,document.getElementById('taskLocation').value,document.getElementById('paymentType').value,document.getElementById('taskScope').value,document.getElementById('createBtn'));};if(document.getElementById('applyFilters'))document.getElementById('applyFilters').onclick=()=>{filters.scope=document.getElementById('filterScope').value;filters.minPrice=document.getElementById('filterMinPrice').value;filters.maxPrice=document.getElementById('filterMaxPrice').value;renderApp();};if(isAdmin){if(document.getElementById('adminPanelBtn'))document.getElementById('adminPanelBtn').onclick=()=>adminMode?exitAdminMode():requestAdminAccess();if(document.getElementById('exitAdminBtn'))document.getElementById('exitAdminBtn').onclick=exitAdminMode;if(document.getElementById('refreshUsersBtn'))document.getElementById('refreshUsersBtn').onclick=async()=>{isDataLoaded=false;await loadDataFromGoogle();renderApp();};if(document.getElementById('clearTasksBtn'))document.getElementById('clearTasksBtn').onclick=deleteAllTasks;if(document.getElementById('adminSearch'))document.getElementById('adminSearch').oninput=(e)=>{adminSearchTerm=e.target.value;renderApp();};document.querySelectorAll('.topup-btn').forEach(b=>{b.onclick=()=>{let uid=b.getAttribute('data-userid'),isBonus=b.getAttribute('data-bonus')==='true',af=isBonus?document.getElementById('bonus-'+uid):document.getElementById('amount-'+uid),amt=parseFloat(af?af.value:100);if(amt>0)adminChangeBalance(uid,amt,isBonus);};});document.querySelectorAll('.withdraw-btn').forEach(b=>{b.onclick=()=>{let uid=b.getAttribute('data-userid'),isBonus=b.getAttribute('data-bonus')==='true',af=isBonus?document.getElementById('bonus-'+uid):document.getElementById('amount-'+uid),amt=parseFloat(af?af.value:100);if(amt>0)adminChangeBalance(uid,-amt,isBonus);};});document.querySelectorAll('.ban-btn').forEach(b=>{b.onclick=()=>showBanModal(b.getAttribute('data-userid'));});document.querySelectorAll('.unban-btn').forEach(b=>{b.onclick=()=>unbanUser(b.getAttribute('data-userid'));});}document.querySelectorAll('.take-btn').forEach(b=>{b.onclick=()=>takeTask(b.getAttribute('data-id'),b);});document.querySelectorAll('.delete-btn').forEach(b=>{b.onclick=()=>deleteTask(b.getAttribute('data-id'),b);});document.querySelectorAll('.edit-btn').forEach(b=>{let tid=b.getAttribute('data-id'),task=tasks.find(t=>t.id==tid);if(task)b.onclick=()=>showEditModal(task);});document.querySelectorAll('.complete-btn').forEach(b=>{b.onclick=()=>confirmCompletion(b.getAttribute('data-id'),b);});document.querySelectorAll('.confirm-btn').forEach(b=>{b.onclick=()=>confirmReceipt(b.getAttribute('data-id'),b);});document.querySelectorAll('.reject-btn').forEach(b=>{b.onclick=()=>rejectReceipt(b.getAttribute('data-id'),b);});document.querySelectorAll('.review-btn').forEach(b=>{b.onclick=()=>showReviewModal(b.getAttribute('data-id'),b.getAttribute('data-userid'));});}window.shareTelegram=shareTelegram;window.shareVK=shareVK;window.copyReferralLink=copyReferralLink;window.showBonusHelp=showBonusHelp;window.openWalletModal=openWalletModal;window.closeWalletModal=closeWalletModal;window.showPaymentAlert=showPaymentAlert;window.claimDailyBonus=claimDailyBonus;loadDataFromGoogle().then(()=>{restoreSession();renderApp();});
</script>
