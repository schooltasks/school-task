<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>SchoolTask - Биржа поручений</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', system-ui; }
        body { background: linear-gradient(145deg, #f0f4fa 0%, #e2e8f0 100%); min-height: 100vh; padding: 20px; transition: background 0.3s, color 0.3s; }
        
        body.dark-theme {
            background: linear-gradient(145deg, #1a1a2e 0%, #16213e 100%);
            color: #e2e8f0;
        }
        body.dark-theme .header,
        body.dark-theme .card,
        body.dark-theme .admin-panel,
        body.dark-theme .task-card,
        body.dark-theme .announcement {
            background: #1e293b;
            color: #e2e8f0;
        }
        body.dark-theme .user-info { background: #334155; }
        body.dark-theme .tab { background: #334155; color: #e2e8f0; }
        body.dark-theme .tab.active { background: #3b82f6; }
        body.dark-theme input, body.dark-theme textarea, body.dark-theme select {
            background: #334155; border-color: #475569; color: #e2e8f0;
        }
        body.dark-theme .search-box { background: #334155; }
        
        .container { max-width: 1300px; margin: 0 auto; }
        .header, .card, .admin-panel, .task-card { background: white; border-radius: 32px; padding: 20px; margin-bottom: 20px; box-shadow: 0 8px 20px rgba(0,0,0,0.05); }
        .header { display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; }
        .logo h1 { background: linear-gradient(135deg, #1e2b3c, #2c4c6e); -webkit-background-clip: text; background-clip: text; color: transparent; font-size: 1.6rem; }
        .user-info { display: flex; align-items: center; gap: 20px; background: #f8fafc; padding: 8px 20px; border-radius: 60px; flex-wrap: wrap; }
        .balance-card { background: #eef2ff; padding: 6px 16px; border-radius: 40px; font-weight: bold; }
        button { cursor: pointer; border: none; border-radius: 40px; padding: 10px 20px; font-weight: bold; transition: 0.2s; }
        .btn-primary { background: #2c6e4f; color: white; }
        .btn-success { background: #10b981; color: white; }
        .btn-danger { background: #dc2626; color: white; }
        .btn-warning { background: #f59e0b; color: white; }
        .btn-info { background: #3b82f6; color: white; }
        .theme-toggle { background: #334155; color: white; padding: 8px 16px; border-radius: 60px; font-size: 0.9rem; }
        input, textarea, select { width: 100%; padding: 12px 16px; border: 1px solid #cbd5e1; border-radius: 28px; margin-bottom: 12px; font-size: 1rem; }
        .tabs { display: flex; gap: 12px; flex-wrap: wrap; margin-bottom: 20px; }
        .tab { background: white; padding: 10px 24px; border-radius: 60px; cursor: pointer; font-weight: 600; }
        .tab.active { background: #1e4a6e; color: white; }
        .tasks-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(350px, 1fr)); gap: 20px; }
        
        /* ===== ОБЪЯВЛЕНИЕ ===== */
        .announcement {
            background: linear-gradient(135deg, #ffd700 0%, #ffb347 100%);
            border-radius: 32px;
            padding: 20px;
            margin-bottom: 20px;
            text-align: center;
            box-shadow: 0 8px 20px rgba(0,0,0,0.1);
            animation: pulse 2s infinite;
        }
        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.02); }
            100% { transform: scale(1); }
        }
        .announcement h2 {
            font-size: 1.8rem;
            margin-bottom: 10px;
            color: #1e293b;
        }
        .announcement p {
            font-size: 1.1rem;
            margin-bottom: 15px;
            color: #1e293b;
        }
        .announcement button {
            background: #dc2626;
            color: white;
            font-size: 1.1rem;
            padding: 12px 30px;
        }
        .announcement button:hover {
            background: #b91c1c;
            transform: scale(1.05);
        }
        .share-buttons {
            display: flex;
            gap: 15px;
            justify-content: center;
            margin-top: 15px;
            flex-wrap: wrap;
        }
        .share-btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 10px 20px;
            border-radius: 40px;
            text-decoration: none;
            font-weight: bold;
            transition: 0.2s;
        }
        .share-tg { background: #0088cc; color: white; }
        .share-vk { background: #0077ff; color: white; }
        .share-wa { background: #25d366; color: white; }
        .copy-link { background: #6b7280; color: white; cursor: pointer; }
        .share-btn:hover { transform: translateY(-2px); opacity: 0.9; }
        
        .disabled-warning {
            background: #fee2e2;
            color: #dc2626;
            padding: 10px 20px;
            border-radius: 40px;
            font-weight: bold;
            font-size: 0.85rem;
        }
        body.dark-theme .disabled-warning {
            background: #7f1d1d;
            color: #fecaca;
        }
        
        .toast { position: fixed; bottom: 30px; right: 30px; background: #1f2f3e; color: white; padding: 12px 24px; border-radius: 60px; z-index: 1000; animation: fadein 0.3s; }
        @keyframes fadein { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        .loading { text-align: center; padding: 40px; color: #6b7280; }
        
        @media (max-width: 700px) {
            .announcement h2 { font-size: 1.3rem; }
            .announcement p { font-size: 0.9rem; }
            .share-buttons { flex-direction: column; align-items: center; }
        }
    </style>
</head>
<body>
<div class="container" id="app"><div class="loading">⏳ Загрузка...</div></div>

<script>
    // ========== НАСТРОЙКИ ==========
    const API_URL = 'https://script.google.com/macros/s/AKfycbzJtuaoS9R0hom6adMX6r3b3E7N1vVVqgYpJlJ3oz9DXyvbGtx1LJ_ulAUJxxMdNSls/exec';
    const ADMIN_PASSWORD = 'dsl382dAZX';
    const TASK_TIMEOUT_HOURS = 5;
    
    let currentUser = null;
    let adminMode = false;
    let authMode = 'login';
    let adminSearchTerm = '';
    let cachedUsers = [];
    let cachedTasks = [];
    let cachedReviews = [];
    let cachedMessages = {};
    let isLoading = false;
    let isCreatingTask = false;
    let isDarkTheme = localStorage.getItem('darkTheme') === 'true';
    let currentPage = 0;
    const ITEMS_PER_PAGE = 10;
    let filters = { minPrice: '', maxPrice: '', category: '' };
    let cacheExpiry = 0;
    const CACHE_DURATION = 30000;
    
    if (isDarkTheme) document.body.classList.add('dark-theme');

    function toggleTheme() {
        isDarkTheme = !isDarkTheme;
        localStorage.setItem('darkTheme', isDarkTheme);
        if (isDarkTheme) document.body.classList.add('dark-theme');
        else document.body.classList.remove('dark-theme');
        renderApp();
    }

    async function apiCall(params, silent = false) {
        const url = new URL(API_URL);
        Object.keys(params).forEach(key => url.searchParams.append(key, params[key]));
        try {
            const response = await fetch(url.toString());
            const text = await response.text();
            try {
                return JSON.parse(text);
            } catch (e) {
                if (!silent) showToast('Ошибка: сервер вернул некорректный ответ', true);
                return null;
            }
        } catch (error) {
            if (!silent) showToast('Ошибка связи с сервером', true);
            return null;
        }
    }

    async function syncData(force = false) {
        const now = Date.now();
        if (!force && cacheExpiry > now && cachedUsers.length > 0) {
            return { users: cachedUsers, tasks: cachedTasks, reviews: cachedReviews };
        }
        if (isLoading) return { users: cachedUsers, tasks: cachedTasks, reviews: cachedReviews };
        isLoading = true;
        try {
            const [users, tasks, reviews] = await Promise.all([
                apiCall({ action: 'getUsers' }, true),
                apiCall({ action: 'getTasks' }, true),
                apiCall({ action: 'getReviews' }, true)
            ]);
            if (users && Array.isArray(users)) cachedUsers = users;
            if (tasks && Array.isArray(tasks)) cachedTasks = tasks;
            if (reviews && Array.isArray(reviews)) cachedReviews = reviews;
            cacheExpiry = now + CACHE_DURATION;
        } catch (e) {}
        isLoading = false;
        return { users: cachedUsers, tasks: cachedTasks, reviews: cachedReviews };
    }

    function showToast(msg, isError = false) {
        const toast = document.createElement('div');
        toast.className = 'toast';
        toast.innerText = msg;
        if (isError) toast.style.background = '#b91c1c';
        document.body.appendChild(toast);
        setTimeout(() => toast.remove(), 3000);
    }

    function copyShareLink() {
        const url = window.location.href;
        navigator.clipboard.writeText(url);
        showToast('✅ Ссылка скопирована! Поделитесь с друзьями');
    }

    function shareTelegram() {
        const url = window.location.href;
        const text = encodeURIComponent('🔥 SchoolTask - Биржа поручений для школьников! Зарабатывай и помогай друзьям! Присоединяйся:');
        window.open(`https://t.me/share/url?url=${encodeURIComponent(url)}&text=${text}`, '_blank');
    }

    function shareVK() {
        const url = window.location.href;
        window.open(`https://vk.com/share.php?url=${encodeURIComponent(url)}&title=SchoolTask&description=Биржа поручений для школьников!`, '_blank');
    }

    function shareWhatsApp() {
        const url = window.location.href;
        const text = encodeURIComponent('🔥 SchoolTask - Биржа поручений для школьников! Присоединяйся: ' + url);
        window.open(`https://wa.me/?text=${text}`, '_blank');
    }

    function saveSession() {
        if (currentUser) {
            localStorage.setItem('schoolTasks_session', JSON.stringify({
                id: currentUser.id,
                name: currentUser.name,
                savedAt: Date.now()
            }));
        } else {
            localStorage.removeItem('schoolTasks_session');
        }
    }

    async function restoreSession() {
        const saved = localStorage.getItem('schoolTasks_session');
        if (!saved) return false;
        try {
            const session = JSON.parse(saved);
            if (Date.now() - session.savedAt > 7*24*60*60*1000) {
                localStorage.removeItem('schoolTasks_session');
                return false;
            }
            await syncData();
            const user = cachedUsers.find(u => u.id === session.id);
            if (user && user.isBanned !== 'true' && user.isBanned !== true) {
                currentUser = user;
                return true;
            }
            localStorage.removeItem('schoolTasks_session');
        } catch(e) {}
        return false;
    }

    function isUsernameTaken(name) {
        return cachedUsers.some(u => u.name && u.name.toLowerCase() === name.trim().toLowerCase());
    }

    async function registerUser(name, school, corp, password) {
        if (!name.trim() || !school.trim() || !corp.trim()) { showToast('Заполните все поля', true); return false; }
        if (!password || password.length < 3) { showToast('Пароль не менее 3 символов', true); return false; }
        await syncData();
        if (isUsernameTaken(name)) { showToast(`❌ Имя "${name}" уже занято!`, true); return false; }
        const nextId = 'u' + Date.now();
        const newUser = { id: nextId, name: name.trim(), school: school.trim(), corp: corp.trim(), balance: 0, password: password.trim(), isBanned: false, banReason: '', banExpires: null, rating: 0, ratingCount: 0, registeredAt: new Date().toISOString() };
        const result = await apiCall({ action: 'registerUser', id: newUser.id, name: newUser.name, school: newUser.school, corp: newUser.corp, balance: newUser.balance, password: newUser.password, isBanned: false, banReason: '', banExpires: '', registeredAt: newUser.registeredAt });
        if (result && result.success) { cachedUsers.push(newUser); currentUser = newUser; saveSession(); showToast(`✅ Добро пожаловать, ${newUser.name}!`); renderApp(); return true; }
        else { showToast('Ошибка регистрации', true); return false; }
    }

    async function loginUser(name, school, corp, password) {
        const cleanName = name ? name.toString().trim() : '';
        const cleanSchool = school ? school.toString().trim() : '';
        const cleanCorp = corp ? corp.toString().trim() : '';
        const cleanPassword = password ? password.toString().trim() : '';
        if (!cleanName || !cleanSchool || !cleanCorp) { showToast('Заполните все поля', true); return false; }
        if (!cleanPassword) { showToast('Введите пароль', true); return false; }
        await syncData();
        const user = cachedUsers.find(u => (u.name || '').trim() === cleanName && (u.school || '').trim() === cleanSchool && (u.corp || '').trim() === cleanCorp);
        if (!user) { showToast('❌ Пользователь не найден', true); return false; }
        if ((user.password || '').trim() !== cleanPassword) { showToast('❌ Неверный пароль', true); return false; }
        if (user.isBanned === 'true' || user.isBanned === true) { showToast('⛔ Аккаунт заблокирован', true); return false; }
        currentUser = user; saveSession(); showToast(`✅ С возвращением, ${currentUser.name}!`); renderApp(); return true;
    }

    function logout() { currentUser = null; adminMode = false; authMode = 'login'; localStorage.removeItem('schoolTasks_session'); renderApp(); }

    async function createTask(description, price, locationDetails) {
        if (!currentUser) return;
        if (isCreatingTask) { showToast('Подождите...', true); return; }
        let priceNum = parseFloat(price);
        if (isNaN(priceNum) || priceNum <= 0) { showToast('Цена должна быть положительной', true); return; }
        isCreatingTask = true;
        await syncData();
        const userIdx = cachedUsers.findIndex(u => u.id === currentUser.id);
        if ((cachedUsers[userIdx].balance || 0) < priceNum) { showToast(`Недостаточно средств. Баланс: ${cachedUsers[userIdx].balance}₽`, true); isCreatingTask = false; return; }
        cachedUsers[userIdx].balance -= priceNum;
        currentUser.balance = cachedUsers[userIdx].balance;
        const newTask = { id: Date.now().toString(), creatorId: currentUser.id, creatorSchool: currentUser.school, description: description.trim(), price: priceNum, location: locationDetails.trim(), status: 'open', takerId: null, takenAt: null, completedAt: null, createdAt: new Date().toISOString() };
        await apiCall({ action: 'updateUser', id: currentUser.id, balance: currentUser.balance });
        const result = await apiCall({ action: 'createTask', ...newTask, takerId: '' });
        if (result && result.success) { cachedTasks.push(newTask); cacheExpiry = 0; showToast(`Задание создано! -${priceNum}₽`); }
        else { cachedUsers[userIdx].balance += priceNum; currentUser.balance = cachedUsers[userIdx].balance; showToast('Ошибка создания задания', true); }
        isCreatingTask = false;
        renderApp();
    }

    async function takeTask(taskId) {
        if (!currentUser) return;
        await syncData();
        let task = cachedTasks.find(t => t.id == taskId);
        if (!task || task.status !== 'open') { showToast('Задание недоступно', true); return; }
        if (task.creatorId === currentUser.id) { showToast('Нельзя взять своё задание', true); return; }
        task.status = 'in_progress';
        task.takerId = currentUser.id;
        task.takenAt = new Date().toISOString();
        await apiCall({ action: 'updateTask', id: task.id, status: 'in_progress', takerId: currentUser.id, takenAt: task.takenAt });
        showToast(`📢 Вы взяли задание!`);
        cacheExpiry = 0;
        renderApp();
    }

    async function confirmCompletion(taskId) {
        if (!currentUser) return;
        await syncData();
        let task = cachedTasks.find(t => t.id == taskId);
        if (!task || task.status !== 'in_progress') { showToast('Задание нельзя подтвердить', true); return; }
        if (task.takerId !== currentUser.id) { showToast('Только исполнитель может подтвердить', true); return; }
        task.status = 'awaiting_confirmation';
        task.completedAt = new Date().toISOString();
        await apiCall({ action: 'updateTask', id: task.id, status: 'awaiting_confirmation', completedAt: task.completedAt });
        showToast(`✅ Вы отметили задание как выполненное.`);
        cacheExpiry = 0;
        renderApp();
    }

    async function confirmReceipt(taskId) {
        if (!currentUser) return;
        await syncData();
        let task = cachedTasks.find(t => t.id == taskId);
        if (!task || task.status !== 'awaiting_confirmation') { showToast('Задание нельзя подтвердить', true); return; }
        if (task.creatorId !== currentUser.id) { showToast('Только создатель может подтвердить', true); return; }
        const totalPrice = parseFloat(task.price);
        const commission = totalPrice * 0.05;
        const executorGain = totalPrice - commission;
        const executor = cachedUsers.find(u => u.id === task.takerId);
        if (executor) {
            executor.balance = (parseFloat(executor.balance) || 0) + executorGain;
            await apiCall({ action: 'updateUser', id: executor.id, balance: executor.balance });
        }
        task.status = 'completed';
        await apiCall({ action: 'updateTask', id: task.id, status: 'completed' });
        showToast(`💰 Подтверждено! +${executorGain.toFixed(2)}₽ исполнителю`);
        cacheExpiry = 0;
        renderApp();
    }

    async function markAsNotReceived(taskId) {
        if (!currentUser) return;
        await syncData();
        let task = cachedTasks.find(t => t.id == taskId);
        if (!task || task.status !== 'awaiting_confirmation') { showToast('Задание нельзя отменить', true); return; }
        if (task.creatorId !== currentUser.id) { showToast('Только создатель может отметить', true); return; }
        const creator = cachedUsers.find(u => u.id === task.creatorId);
        if (creator) {
            creator.balance = (parseFloat(creator.balance) || 0) + parseFloat(task.price);
            await apiCall({ action: 'updateUser', id: creator.id, balance: creator.balance });
            if (currentUser.id === creator.id) currentUser.balance = creator.balance;
        }
        task.status = 'disputed';
        await apiCall({ action: 'updateTask', id: task.id, status: 'disputed' });
        showToast(`⚠️ Деньги возвращены на баланс`);
        cacheExpiry = 0;
        renderApp();
    }

    async function forceCancelTask(taskId) {
        if (!currentUser) return;
        await syncData();
        let task = cachedTasks.find(t => t.id == taskId);
        if (!task) return;
        if (task.creatorId !== currentUser.id) { showToast('Можно удалять только свои задания', true); return; }
        if (task.status !== 'open') { showToast('Нельзя удалить задание в работе', true); return; }
        const creator = cachedUsers.find(u => u.id === task.creatorId);
        if (creator) {
            creator.balance = (parseFloat(creator.balance) || 0) + parseFloat(task.price);
            await apiCall({ action: 'updateUser', id: creator.id, balance: creator.balance });
            if (currentUser.id === creator.id) currentUser.balance = creator.balance;
        }
        await apiCall({ action: 'deleteTask', id: task.id });
        cachedTasks = cachedTasks.filter(t => t.id != taskId);
        cacheExpiry = 0;
        showToast(`Задание удалено, деньги возвращены`);
        renderApp();
    }

    function getTaskStatusText(status) {
        switch(status) {
            case 'open': return { text: '📋 Доступно', class: 'status-open' };
            case 'in_progress': return { text: '⏳ Выполняется', class: 'status-progress' };
            case 'awaiting_confirmation': return { text: '🕐 Ожидает', class: 'status-awaiting' };
            case 'completed': return { text: '✅ Выполнено', class: 'status-completed' };
            case 'disputed': return { text: '⚠️ Спор', class: 'status-disputed' };
            default: return { text: status, class: 'status-open' };
        }
    }

    async function adminChangeBalance(userId, amount) {
        if (amount === 0) return;
        const user = cachedUsers.find(u => u.id === userId);
        if (!user) return;
        user.balance = (parseFloat(user.balance) || 0) + amount;
        await apiCall({ action: 'updateUser', id: userId, balance: user.balance });
        if (currentUser && currentUser.id === userId) currentUser.balance = user.balance;
        showToast(`${amount > 0 ? 'Пополнение' : 'Списание'} для ${user.name}: ${amount > 0 ? `+${amount}` : amount}₽`);
        cacheExpiry = 0;
        renderApp();
    }

    async function banUserWithDuration(userId, days, hours, reason) {
        const user = cachedUsers.find(u => u.id === userId);
        if (!user) return;
        if (user.id === currentUser?.id) { showToast('Нельзя забанить себя', true); return; }
        let expires = '';
        if (days > 0 || hours > 0) { const exp = new Date(); exp.setDate(exp.getDate() + days); exp.setHours(exp.getHours() + hours); expires = exp.toISOString(); }
        user.isBanned = true;
        user.banReason = reason || 'Нарушение правил';
        user.banExpires = expires;
        await apiCall({ action: 'updateUser', id: userId, isBanned: true, banReason: user.banReason, banExpires: expires });
        let durationText = '';
        if (days > 0 && hours > 0) durationText = `на ${days} дн. ${hours} ч.`;
        else if (days > 0) durationText = `на ${days} дн.`;
        else if (hours > 0) durationText = `на ${hours} ч.`;
        else durationText = 'навсегда';
        showToast(`⛔ ${user.name} заблокирован ${durationText}`);
        cacheExpiry = 0;
        renderApp();
    }

    async function unbanUser(userId) {
        const user = cachedUsers.find(u => u.id === userId);
        if (!user) return;
        user.isBanned = false;
        user.banReason = '';
        user.banExpires = null;
        await apiCall({ action: 'updateUser', id: userId, isBanned: false, banReason: '', banExpires: '' });
        showToast(`✅ ${user.name} разблокирован`);
        cacheExpiry = 0;
        renderApp();
    }

    function requestAdminAccess() { let pwd = prompt("Введите пароль администратора:"); if (pwd === ADMIN_PASSWORD) { adminMode = true; showToast("Админ-панель активирована"); renderApp(); } else showToast("Неверный пароль", true); }
    function exitAdminMode() { adminMode = false; renderApp(); }

    // ========== ОСНОВНОЙ РЕНДЕР ==========
    async function renderApp() {
        await syncData();
        
        const appDiv = document.getElementById('app');
        if (!currentUser) {
            const isLoginMode = authMode === 'login';
            appDiv.innerHTML = `
                <div class="header">
                    <div class="logo"><h1>🏫 SchoolTask</h1><span>Биржа поручений</span></div>
                    <button class="theme-toggle" id="themeToggleBtn">${isDarkTheme ? '☀️ Светлая' : '🌙 Тёмная'}</button>
                </div>
                <!-- ОБЪЯВЛЕНИЕ НА ГЛАВНОЙ -->
                <div class="announcement">
                    <h2>🔥 НУЖНА ВАША ПОМОЩЬ! 🔥</h2>
                    <p>📢 SchoolTask — это проект, который создаётся для вас!<br>
                    Чтобы сайт стал ещё лучше и появилось больше заданий — <strong>нужно расфорсить сайт</strong>!<br>
                    🤝 Поделитесь ссылкой с друзьями, одноклассниками и в школьных чатах!<br>
                    ⭐ Чем больше пользователей, тем больше интересных заданий и возможностей заработать!</p>
                    <button onclick="shareTelegram()">📢 Расфорсить в Telegram</button>
                    <div class="share-buttons">
                        <a href="#" class="share-btn share-tg" onclick="shareTelegram(); return false;">📱 Telegram</a>
                        <a href="#" class="share-btn share-vk" onclick="shareVK(); return false;">📱 ВКонтакте</a>
                        <a href="#" class="share-btn share-wa" onclick="shareWhatsApp(); return false;">📱 WhatsApp</a>
                        <a href="#" class="share-btn copy-link" onclick="copyShareLink(); return false;">🔗 Скопировать ссылку</a>
                    </div>
                </div>
                <div class="card">
                    <div class="tabs">
                        <div class="tab ${isLoginMode ? 'active' : ''}" id="loginTabBtn">🔐 Вход</div>
                        <div class="tab ${!isLoginMode ? 'active' : ''}" id="registerTabBtn">📝 Регистрация</div>
                    </div>
                    ${isLoginMode ? `
                        <input type="text" id="loginName" placeholder="Имя">
                        <input type="text" id="loginSchool" placeholder="Школа">
                        <input type="text" id="loginCorp" placeholder="Корпус">
                        <input type="password" id="loginPassword" placeholder="Пароль">
                        <button class="btn-primary" id="loginBtn">Войти</button>
                    ` : `
                        <input type="text" id="regName" placeholder="Имя (уникальное)">
                        <div id="regNameError" class="error-text"></div>
                        <input type="text" id="regSchool" placeholder="Школа">
                        <input type="text" id="regCorp" placeholder="Корпус">
                        <input type="password" id="regPassword" placeholder="Пароль (мин. 3 символа)">
                        <button class="btn-primary" id="registerBtn">Зарегистрироваться</button>
                    `}
                    <div style="margin-top:15px; text-align:center;">
                        <span class="disabled-warning">⚠️ Пополнение и вывод временно недоступны ⚠️</span>
                        <div style="margin-top:10px; font-size:12px; color:#6b7280;">Ведутся технические работы. Следите за обновлениями!</div>
                    </div>
                </div>
            `;
            
            if (!isLoginMode) {
                const nameInput = document.getElementById('regName');
                const errorDiv = document.getElementById('regNameError');
                nameInput?.addEventListener('input', () => {
                    const name = nameInput.value;
                    if (name.length > 0 && isUsernameTaken(name)) {
                        errorDiv.textContent = `❌ Имя "${name}" уже занято`;
                        errorDiv.style.display = 'block';
                    } else {
                        errorDiv.style.display = 'none';
                    }
                });
            }
            
            document.getElementById('loginTabBtn')?.addEventListener('click', () => { authMode = 'login'; renderApp(); });
            document.getElementById('registerTabBtn')?.addEventListener('click', () => { authMode = 'register'; renderApp(); });
            document.getElementById('loginBtn')?.addEventListener('click', () => {
                loginUser(
                    document.getElementById('loginName').value,
                    document.getElementById('loginSchool').value,
                    document.getElementById('loginCorp').value,
                    document.getElementById('loginPassword').value
                );
            });
            document.getElementById('registerBtn')?.addEventListener('click', () => {
                registerUser(
                    document.getElementById('regName').value,
                    document.getElementById('regSchool').value,
                    document.getElementById('regCorp').value,
                    document.getElementById('regPassword').value
                );
            });
            document.getElementById('themeToggleBtn')?.addEventListener('click', toggleTheme);
            return;
        }
        
        // ===== ДАЛЬШЕ ИДЁТ ОСНОВНОЙ ИНТЕРФЕЙС ДЛЯ АВТОРИЗОВАННЫХ ПОЛЬЗОВАТЕЛЕЙ =====
        const openTasks = cachedTasks.filter(t => t.status === 'open' && t.creatorSchool === currentUser.school);
        const myCreatedTasks = cachedTasks.filter(t => t.creatorId === currentUser.id);
        const myTasksAsExecutor = cachedTasks.filter(t => t.takerId === currentUser.id);
        
        let filteredTasks = openTasks;
        if (filters.minPrice) filteredTasks = filteredTasks.filter(t => t.price >= parseFloat(filters.minPrice));
        if (filters.maxPrice) filteredTasks = filteredTasks.filter(t => t.price <= parseFloat(filters.maxPrice));
        if (filters.category && filters.category !== 'all') filteredTasks = filteredTasks.filter(t => t.category === filters.category);
        
        const start = currentPage * ITEMS_PER_PAGE;
        const paginatedTasks = filteredTasks.slice(start, start + ITEMS_PER_PAGE);
        const hasMore = start + ITEMS_PER_PAGE < filteredTasks.length;
        
        const tasksHtml = (tasksList, showActions = true) => {
            if (!tasksList.length) return '<div class="empty-state" style="text-align:center; padding:40px;">✨ Нет заданий</div>';
            return `<div class="tasks-grid">${tasksList.map(task => {
                const creator = cachedUsers.find(u => u.id === task.creatorId);
                const taker = cachedUsers.find(u => u.id === task.takerId);
                const isCreator = task.creatorId === currentUser.id;
                const isTaker = task.takerId === currentUser.id;
                const statusInfo = getTaskStatusText(task.status);
                const canChat = (task.status === 'in_progress' || task.status === 'awaiting_confirmation') && (isCreator || isTaker);
                let actionButtons = '';
                if (task.status === 'open' && !isCreator && showActions) actionButtons = `<button class="btn-primary take-btn" data-taskid="${task.id}">📌 Взять задание</button>`;
                if (task.status === 'in_progress' && isTaker && showActions) actionButtons = `<button class="btn-success confirm-complete-btn" data-taskid="${task.id}">✅ Подтвердить выполнение</button>`;
                if (task.status === 'awaiting_confirmation' && isCreator && showActions) actionButtons = `<div class="action-buttons"><button class="btn-success confirm-receipt-btn" data-taskid="${task.id}">💰 Подтвердить получение</button><button class="btn-danger cancel-receipt-btn" data-taskid="${task.id}">❌ Не получил</button></div>`;
                if (task.status === 'open' && isCreator && showActions) actionButtons = `<button class="btn-danger delete-task-btn" data-taskid="${task.id}">❌ Удалить задание</button>`;
                if (canChat && showActions) actionButtons += `<button class="btn-info chat-btn" data-taskid="${task.id}">💬 Чат</button>`;
                return `<div class="task-card"><div class="task-header"><div class="task-price">${task.price} ₽</div><div class="task-status ${statusInfo.class}">${statusInfo.text}</div></div><div class="task-desc">📌 ${task.description}</div><div class="task-meta">📍 ${task.location}${task.category ? ` | 🏷️ ${task.category}` : ''}</div><div style="font-size:0.7rem; color:#6b7280;">👤 Создатель: ${creator ? creator.name : '?'} (${creator ? creator.school : ''})${taker ? `<br>👤 Исполнитель: ${taker.name}` : ''}</div>${actionButtons}</div>`;
            }).join('')}</div>`;
        };
        
        let adminPanelHtml = '';
        const isAdmin = currentUser.name && currentUser.name.toLowerCase() === 'leshr_ak47';
        if (isAdmin && adminMode) {
            let filteredUsers = cachedUsers;
            if (adminSearchTerm.trim()) filteredUsers = filteredUsers.filter(u => u.name && u.name.toLowerCase().includes(adminSearchTerm.toLowerCase()));
            adminPanelHtml = `<div class="admin-panel"><div class="admin-header"><h2>👑 Админ-панель</h2><button class="btn-danger" id="exitAdminBtn">Выйти</button></div><div class="admin-header"><div class="search-box">🔍 <input type="text" id="adminSearch" placeholder="Поиск..." value="${adminSearchTerm}"></div><div><button class="refresh-btn" id="refreshUsersBtn">🔄 Обновить</button> <span class="balance-card">👥 ${cachedUsers.length}</span></div></div><div class="users-table"><table><thead><tr><th>Имя</th><th>Школа</th><th>Баланс</th><th>Статус</th><th>Баланс</th><th>Бан</th></tr></thead><tbody>${filteredUsers.map(user => { const isBanned = user.isBanned === 'true' || user.isBanned === true; return `<tr><td><strong>${user.name || '?'}</strong></td><td>${user.school || '?'}<br><small>${user.corp || '?'}</small></td><td>${(parseFloat(user.balance) || 0).toFixed(2)} ₽</td><td>${isBanned ? '⛔ Забанен' : '✅ Активен'}</td><td><div class="balance-control"><input type="number" id="amount-${user.id}" value="100"><button class="topup-btn" data-userid="${user.id}">+</button><button class="withdraw-btn" data-userid="${user.id}">-</button></div></td><td>${!isBanned ? `<div class="ban-control"><input type="number" id="days-${user.id}" placeholder="Дни" value="0"><input type="number" id="hours-${user.id}" placeholder="Часы" value="0"><input type="text" id="reason-${user.id}" placeholder="Причина"><button class="ban-btn" data-userid="${user.id}">⛔ Бан</button></div>` : `<button class="unban-btn" data-userid="${user.id}">✅ Разбанить</button>`}</td></tr>`; }).join('')}</tbody></table></div></div>`;
        }
        
        const createForm = `<div class="card"><h3>📝 Создать задание</h3><textarea id="taskDesc" rows="2" placeholder="Что нужно сделать?"></textarea><input type="number" id="taskPrice" placeholder="Цена (руб)"><input type="text" id="taskLocation" placeholder="Место"><select id="taskCategory"><option value="Еда">🍕 Еда</option><option value="Учёба">📚 Учёба</option><option value="Помощь">🤝 Помощь</option><option value="Разное">🎲 Разное</option></select><button class="btn-primary" id="createTaskBtn">Создать</button></div>`;
        
        let activeTab = window._activeTab || 'allTasks';
        let mainContent = '';
        if (activeTab === 'allTasks') mainContent = `<h3>📋 Доступные задания (школа ${currentUser.school})</h3><div class="filter-group" style="display:flex; gap:10px; margin-bottom:15px; flex-wrap:wrap;"><input type="number" id="filterMinPrice" placeholder="Цена от" value="${filters.minPrice}" style="width:auto; flex:1;"><input type="number" id="filterMaxPrice" placeholder="Цена до" value="${filters.maxPrice}" style="width:auto; flex:1;"><select id="filterCategory" style="width:auto; flex:1;"><option value="all">Все категории</option><option value="Еда">🍕 Еда</option><option value="Учёба">📚 Учёба</option><option value="Помощь">🤝 Помощь</option><option value="Разное">🎲 Разное</option></select><button id="applyFiltersBtn" class="btn-info">🔍 Применить</button></div>${tasksHtml(paginatedTasks, true)}${hasMore ? `<button id="loadMoreBtn" class="btn-primary" style="margin-top:20px; width:100%;">📚 Загрузить ещё</button>` : ''}`;
        else if (activeTab === 'myTasks') mainContent = `<h3>📌 Мои задания</h3>${tasksHtml(myCreatedTasks, true)}`;
        else if (activeTab === 'myExecutions') mainContent = `<h3>⚡ Мои выполнения</h3>${tasksHtml(myTasksAsExecutor, true)}`;
        else if (activeTab === 'profile') mainContent = `<div class="card"><h3>👤 Мой профиль</h3><p><strong>Имя:</strong> ${currentUser.name}</p><p><strong>Школа:</strong> ${currentUser.school}</p><p><strong>Корпус:</strong> ${currentUser.corp}</p><p><strong>Баланс:</strong> ${(parseFloat(currentUser.balance)||0).toFixed(2)} ₽</p><p><strong>Рейтинг:</strong> ${currentUser.rating ? parseFloat(currentUser.rating).toFixed(1) : 'Нет'} ⭐</p><p><strong>Выполнено заданий:</strong> ${parseInt(currentUser.tasksCompleted)||0}</p><p><strong>Создано заданий:</strong> ${parseInt(currentUser.tasksCreated)||0}</p></div>`;
        else if (activeTab === 'create') mainContent = createForm;
        
        const adminButtonHtml = isAdmin ? `<button id="adminPanelBtn" style="background:#2c3e50; color:white;">🔐 Админка</button>` : '';
        
        appDiv.innerHTML = `
            <div class="header">
                <div class="logo"><h1>🏫 SchoolTask</h1></div>
                <div class="user-info">
                    <div>👋 ${currentUser.name} | ${currentUser.school}</div>
                    <div class="balance-card">💰 ${(parseFloat(currentUser.balance)||0).toFixed(2)} ₽</div>
                    <button class="theme-toggle" id="themeToggleBtn">${isDarkTheme ? '☀️' : '🌙'}</button>
                    <button class="btn-danger" id="logoutBtn">Выйти</button>
                </div>
            </div>
            <div style="display:flex; justify-content:space-between; margin-bottom:15px; flex-wrap:wrap; gap:10px;">
                <span class="disabled-warning">⚠️ Пополнение и вывод временно недоступны ⚠️</span>
                <div>${adminButtonHtml}</div>
            </div>
            ${adminPanelHtml}
            <div class="tabs">
                <div class="tab ${activeTab === 'allTasks' ? 'active' : ''}" data-tab="allTasks">📋 Все задания</div>
                <div class="tab ${activeTab === 'myTasks' ? 'active' : ''}" data-tab="myTasks">📦 Мои</div>
                <div class="tab ${activeTab === 'myExecutions' ? 'active' : ''}" data-tab="myExecutions">⚡ Мои выполнения</div>
                <div class="tab ${activeTab === 'profile' ? 'active' : ''}" data-tab="profile">👤 Профиль</div>
                <div class="tab ${activeTab === 'create' ? 'active' : ''}" data-tab="create">➕ Создать</div>
            </div>
            ${mainContent}
            <div style="margin-top:20px; text-align:center; font-size:12px;">⚠️ Комиссия 5% | ${TASK_TIMEOUT_HOURS} часов на подтверждение</div>
        `;
        
        document.querySelectorAll('.tab').forEach(el => el.addEventListener('click', () => { window._activeTab = el.dataset.tab; currentPage = 0; renderApp(); }));
        document.getElementById('logoutBtn')?.addEventListener('click', logout);
        document.getElementById('themeToggleBtn')?.addEventListener('click', toggleTheme);
        
        if (isAdmin) {
            document.getElementById('adminPanelBtn')?.addEventListener('click', () => { if (adminMode) exitAdminMode(); else requestAdminAccess(); });
            document.getElementById('exitAdminBtn')?.addEventListener('click', exitAdminMode);
            document.getElementById('refreshUsersBtn')?.addEventListener('click', async () => { await syncData(true); renderApp(); showToast('Обновлено'); });
            const searchInput = document.getElementById('adminSearch');
            if (searchInput) {
                let timeout;
                searchInput.addEventListener('input', (e) => { clearTimeout(timeout); timeout = setTimeout(() => { adminSearchTerm = e.target.value; renderApp(); }, 300); });
            }
        }
        
        document.getElementById('createTaskBtn')?.addEventListener('click', () => {
            const desc = document.getElementById('taskDesc')?.value;
            const price = document.getElementById('taskPrice')?.value;
            const loc = document.getElementById('taskLocation')?.value;
            if (desc && price && loc) createTask(desc, price, loc);
            else showToast('Заполните все поля', true);
        });
        
        document.getElementById('applyFiltersBtn')?.addEventListener('click', () => {
            filters.minPrice = document.getElementById('filterMinPrice')?.value || '';
            filters.maxPrice = document.getElementById('filterMaxPrice')?.value || '';
            filters.category = document.getElementById('filterCategory')?.value || 'all';
            currentPage = 0;
            renderApp();
        });
        
        document.getElementById('loadMoreBtn')?.addEventListener('click', () => { currentPage++; renderApp(); });
        
        document.querySelectorAll('.take-btn').forEach(btn => btn.addEventListener('click', () => takeTask(btn.dataset.taskid)));
        document.querySelectorAll('.delete-task-btn').forEach(btn => btn.addEventListener('click', () => forceCancelTask(btn.dataset.taskid)));
        document.querySelectorAll('.confirm-complete-btn').forEach(btn => btn.addEventListener('click', () => confirmCompletion(btn.dataset.taskid)));
        document.querySelectorAll('.confirm-receipt-btn').forEach(btn => btn.addEventListener('click', () => confirmReceipt(btn.dataset.taskid)));
        document.querySelectorAll('.cancel-receipt-btn').forEach(btn => btn.addEventListener('click', () => markAsNotReceived(btn.dataset.taskid)));
        document.querySelectorAll('.chat-btn').forEach(btn => btn.addEventListener('click', () => alert('Чат в разработке')));
        
        if (isAdmin && adminMode) {
            document.querySelectorAll('.topup-btn').forEach(btn => btn.addEventListener('click', () => { const userId = btn.dataset.userid; const amount = parseFloat(document.getElementById(`amount-${userId}`)?.value); if (amount > 0) adminChangeBalance(userId, amount); else showToast('Введите сумму', true); }));
            document.querySelectorAll('.withdraw-btn').forEach(btn => btn.addEventListener('click', () => { const userId = btn.dataset.userid; const amount = parseFloat(document.getElementById(`amount-${userId}`)?.value); if (amount > 0) adminChangeBalance(userId, -amount); else showToast('Введите сумму', true); }));
            document.querySelectorAll('.ban-btn').forEach(btn => btn.addEventListener('click', () => { const userId = btn.dataset.userid; const days = parseInt(document.getElementById(`days-${userId}`)?.value) || 0; const hours = parseInt(document.getElementById(`hours-${userId}`)?.value) || 0; const reason = document.getElementById(`reason-${userId}`)?.value || ''; banUserWithDuration(userId, days, hours, reason); }));
            document.querySelectorAll('.unban-btn').forEach(btn => btn.addEventListener('click', () => unbanUser(btn.dataset.userid)));
        }
    }

    restoreSession().then(() => renderApp());
</script>
</body>
</html>
