<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>SchoolTask - Биржа поручений</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', system-ui; }
        body { background: linear-gradient(145deg, #f0f4fa 0%, #e2e8f0 100%); min-height: 100vh; padding: 20px; transition: background 0.3s, color 0.3s; }
        body.dark-theme { background: linear-gradient(145deg, #1a1a2e 0%, #16213e 100%); color: #e2e8f0; }
        body.dark-theme .header, body.dark-theme .card, body.dark-theme .task-card, body.dark-theme .admin-panel, body.dark-theme .help-box, body.dark-theme .announcement { background: #1e293b; color: #e2e8f0; }
        body.dark-theme .user-info { background: #334155; }
        body.dark-theme .tab { background: #334155; color: #e2e8f0; }
        body.dark-theme .tab.active { background: #3b82f6; }
        body.dark-theme input, body.dark-theme textarea, body.dark-theme select { background: #334155; border-color: #475569; color: #e2e8f0; }
        
        .container { max-width: 1300px; margin: 0 auto; }
        .header, .card, .task-card { background: white; border-radius: 32px; padding: 20px; margin-bottom: 20px; box-shadow: 0 8px 20px rgba(0,0,0,0.05); transition: transform 0.1s ease, box-shadow 0.1s ease; }
        .header:active, .card:active, .task-card:active, button:active { transform: scale(0.98); }
        button { transition: transform 0.08s linear, background 0.2s; }
        button:active { transform: scale(0.95); }
        .header { display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; }
        .logo h1 { background: linear-gradient(135deg, #1e2b3c, #2c4c6e); -webkit-background-clip: text; background-clip: text; color: transparent; font-size: 1.6rem; }
        .user-info { display: flex; align-items: center; gap: 20px; background: #f8fafc; padding: 8px 20px; border-radius: 60px; flex-wrap: wrap; }
        .balance-card { background: #eef2ff; padding: 6px 16px; border-radius: 40px; font-weight: bold; cursor: pointer; transition: transform 0.08s linear; }
        .balance-card:active { transform: scale(0.95); }
        .bonus-card { background: linear-gradient(135deg, #fef3c7, #fde68a); color: #92400e; padding: 6px 16px; border-radius: 40px; font-weight: bold; cursor: pointer; transition: transform 0.08s linear; }
        .bonus-card:active { transform: scale(0.95); }
        button { cursor: pointer; border: none; border-radius: 40px; padding: 10px 20px; font-weight: bold; transition: 0.2s, transform 0.08s linear; }
        button:disabled { opacity: 0.6; cursor: not-allowed; transform: none !important; }
        .btn-primary { background: #2c6e4f; color: white; }
        .btn-success { background: #10b981; color: white; }
        .btn-danger { background: #dc2626; color: white; }
        .btn-edit { background: #8b5cf6; color: white; }
        .btn-info { background: #3b82f6; color: white; }
        .theme-toggle { background: #334155; color: white; padding: 8px 16px; border-radius: 60px; cursor: pointer; }
        input, textarea, select { width: 100%; padding: 12px 16px; border: 1px solid #cbd5e1; border-radius: 28px; margin-bottom: 12px; font-size: 1rem; transition: border 0.2s, transform 0.08s linear; }
        input:focus, textarea:focus, select:focus { outline: none; border-color: #3b82f6; transform: scale(1.01); }
        .input-hint { font-size: 0.75rem; color: #6b7280; margin-top: -8px; margin-bottom: 12px; }
        .tabs { display: flex; gap: 12px; flex-wrap: wrap; margin-bottom: 20px; }
        .tab { background: white; padding: 10px 24px; border-radius: 60px; cursor: pointer; font-weight: 600; transition: transform 0.08s linear; }
        .tab:active { transform: scale(0.95); }
        .tab.active { background: #1e4a6e; color: white; }
        .tasks-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(350px, 1fr)); gap: 20px; }
        
        .admin-panel { background: white; border-radius: 32px; padding: 20px; margin-bottom: 20px; border: 2px solid #ffd966; }
        .admin-header { display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 10px; margin-bottom: 20px; }
        .search-box { display: flex; align-items: center; gap: 8px; background: #f1f5f9; padding: 5px 15px; border-radius: 40px; }
        .search-box input { margin: 0; padding: 8px; background: transparent; border: none; width: 200px; outline: none; }
        .users-table { overflow-x: auto; margin-top: 15px; }
        .users-table table { width: 100%; border-collapse: collapse; }
        .users-table th, .users-table td { padding: 12px 8px; text-align: left; border-bottom: 1px solid #e2e8f0; }
        .balance-control { display: flex; gap: 5px; align-items: center; flex-wrap: wrap; }
        .balance-control input { width: 80px; margin: 0; padding: 6px; border-radius: 30px; }
        
        .announcement { background: linear-gradient(135deg, #ffd700 0%, #ffb347 100%); border-radius: 32px; padding: 20px; margin-bottom: 20px; text-align: center; animation: pulse 2s infinite; }
        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.01); } 100% { transform: scale(1); } }
        .share-buttons { display: flex; gap: 15px; justify-content: center; margin-top: 15px; flex-wrap: wrap; }
        .share-btn { padding: 10px 20px; border-radius: 40px; font-weight: bold; cursor: pointer; transition: transform 0.08s linear; }
        .share-btn:active { transform: scale(0.95); }
        .share-tg { background: #0088cc; color: white; }
        .share-vk { background: #0077ff; color: white; }
        .copy-link { background: #6b7280; color: white; }
        
        .help-box { background: #e0f2fe; border-radius: 20px; padding: 15px; margin-bottom: 20px; text-align: center; border-left: 5px solid #0284c7; }
        body.dark-theme .help-box { background: #0c4a6e; border-left-color: #38bdf8; }
        
        .referral-code { background: #e2e8f0; padding: 10px; border-radius: 40px; font-family: monospace; cursor: pointer; text-align: center; margin-top: 15px; transition: transform 0.08s linear; }
        .referral-code:active { transform: scale(0.98); }
        
        .task-header { display: flex; justify-content: space-between; margin-bottom: 12px; flex-wrap: wrap; }
        .task-price { font-size: 1.6rem; font-weight: 800; color: #2b6e4f; }
        .task-status { padding: 4px 12px; border-radius: 30px; font-size: 0.75rem; font-weight: bold; }
        .status-open { background: #e2e8f0; color: #1e4a6e; }
        .status-progress { background: #fef3c7; color: #d97706; }
        .status-awaiting { background: #e0f2fe; color: #0284c7; }
        .status-completed { background: #d1fae5; color: #10b981; }
        .action-buttons { display: flex; gap: 10px; margin-top: 12px; flex-wrap: wrap; }
        .filter-group { display: flex; gap: 10px; margin-bottom: 15px; flex-wrap: wrap; }
        .filter-group input, .filter-group select { flex: 1; margin: 0; }
        
        .toast { position: fixed; bottom: 30px; right: 30px; background: #1f2f3e; color: white; padding: 12px 24px; border-radius: 60px; z-index: 1000; animation: fadein 0.3s; }
        @keyframes fadein { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        .loading { text-align: center; padding: 40px; color: #6b7280; }
        .error-text { color: #dc2626; font-size: 0.8rem; display: none; margin-top: -8px; margin-bottom: 12px; }
        
        .wallet-modal { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.8); display: flex; align-items: center; justify-content: center; z-index: 2000; animation: fadein 0.2s; }
        .wallet-container { background: white; border-radius: 32px; width: 90%; max-width: 400px; padding: 20px; }
        
        .video-rule { background: #fef3c7; border-left: 5px solid #f59e0b; padding: 15px; margin-bottom: 20px; border-radius: 16px; }
        body.dark-theme .video-rule { background: #451a03; border-left-color: #f59e0b; }
        
        .support-link { margin-top: 20px; padding: 10px; background: #f1f5f9; border-radius: 20px; text-align: center; font-size: 12px; color: #475569; }
        body.dark-theme .support-link { background: #334155; color: #cbd5e1; }
        
        @keyframes spin { to { transform: rotate(360deg); } }
        .spinner { display: inline-block; width: 16px; height: 16px; border: 2px solid white; border-top-color: transparent; border-radius: 50%; animation: spin 0.6s linear infinite; margin-right: 8px; vertical-align: middle; }
        
        @media (max-width: 700px) { .filter-group { flex-direction: column; } }
    </style>
</head>
<body>
<div id="app"><div class="loading">⏳ Загрузка платформы...</div></div>

<script>
// ========== НАСТРОЙКИ ==========
const API_URL = 'https://script.google.com/macros/s/AKfycbxf5v8wNf6_yx-S87wcuWdr4kYbza6bWqQKwTaPZjIXZYtkPNB3AO3mHYW2Fo9lShA_/exec';

let currentUser = null;
let authMode = 'login';
let adminMode = false;
let adminSearchTerm = '';
let users = [];
let tasks = [];
let reviews = [];
let reports = [];
let isDarkTheme = localStorage.getItem('darkTheme') === 'true';
let filters = { scope: 'school', minPrice: '', maxPrice: '' };
let isLoading = false;
let dailyBonusClaimed = false;
let favorites = [];

if (isDarkTheme) document.body.classList.add('dark-theme');

// ===== ВСПОМОГАТЕЛЬНЫЕ ФУНКЦИИ =====
function escapeHtml(text) {
    if (!text) return '';
    const div = document.createElement('div');
    div.textContent = text;
    return div.innerHTML;
}

function showToast(msg, isError, duration = 3000) {
    let toast = document.createElement('div');
    toast.className = 'toast';
    toast.innerHTML = msg;
    if (isError) toast.style.background = '#b91c1c';
    document.body.appendChild(toast);
    setTimeout(() => toast.remove(), duration);
}

function formatDate(date) {
    if (!date) return 'неизвестно';
    return new Date(date).toLocaleString('ru-RU', {
        day: '2-digit', month: '2-digit', year: 'numeric',
        hour: '2-digit', minute: '2-digit'
    });
}

function timeAgo(date) {
    const seconds = Math.floor((new Date() - new Date(date)) / 1000);
    if (seconds < 60) return 'только что';
    const minutes = Math.floor(seconds / 60);
    if (minutes < 60) return `${minutes} мин назад`;
    const hours = Math.floor(minutes / 60);
    if (hours < 24) return `${hours} ч назад`;
    const days = Math.floor(hours / 24);
    if (days < 7) return `${days} дн назад`;
    return formatDate(date);
}

function toggleTheme() { 
    isDarkTheme = !isDarkTheme; 
    localStorage.setItem('darkTheme', isDarkTheme); 
    if (isDarkTheme) document.body.classList.add('dark-theme'); 
    else document.body.classList.remove('dark-theme'); 
    renderApp(); 
}

// ===== ЗАГРУЗКА ДАННЫХ С ПОВТОРАМИ =====
async function fetchWithRetry(url, maxRetries = 3) {
    for (let i = 0; i < maxRetries; i++) {
        try {
            const response = await fetch(url);
            if (response.ok) return await response.json();
        } catch(e) {
            console.log(`Попытка ${i+1} не удалась`);
            if (i === maxRetries - 1) throw e;
            await new Promise(r => setTimeout(r, 1000));
        }
    }
}

async function loadDataFromGoogle(force = false) {
    if (isLoading && !force) return users.length > 0;
    
    isLoading = true;
    showToast('🔄 Загрузка данных...', false, 1000);
    
    try {
        const usersData = await fetchWithRetry(API_URL + '?action=getUsers');
        if (Array.isArray(usersData)) users = usersData;
        
        const tasksData = await fetchWithRetry(API_URL + '?action=getTasks');
        if (Array.isArray(tasksData)) tasks = tasksData;
        
        const reviewsData = await fetchWithRetry(API_URL + '?action=getReviews');
        if (Array.isArray(reviewsData)) reviews = reviewsData;
        
        const reportsData = await fetchWithRetry(API_URL + '?action=getReports');
        if (Array.isArray(reportsData)) reports = reportsData;
        
        // Загружаем избранное
        if (currentUser) {
            const favData = await fetchWithRetry(API_URL + '?action=getFavorites&userId=' + currentUser.id);
            if (Array.isArray(favData)) favorites = favData;
        }
        
        const lastBonus = localStorage.getItem('lastDailyBonus');
        if (lastBonus) {
            const lastDate = new Date(parseInt(lastBonus));
            const today = new Date();
            dailyBonusClaimed = lastDate.toDateString() === today.toDateString();
        } else {
            dailyBonusClaimed = false;
        }
        
        console.log(`Загружено: ${users.length} пользователей, ${tasks.length} заданий`);
        isLoading = false;
        return true;
    } catch(e) {
        console.error('Ошибка загрузки:', e);
        showToast('⚠️ Не удалось загрузить данные. Проверьте интернет.', true);
        isLoading = false;
        return false;
    }
}

async function saveToGoogle(action, params) {
    try {
        const formData = new URLSearchParams();
        formData.append('action', action);
        for (let key in params) {
            if (params[key] !== undefined && params[key] !== null) {
                formData.append(key, params[key]);
            }
        }
        
        const response = await fetch(API_URL, {
            method: 'POST',
            headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
            body: formData.toString()
        });
        
        const text = await response.text();
        try {
            return JSON.parse(text);
        } catch(e) {
            return { success: false };
        }
    } catch(e) {
        console.error('Ошибка сохранения:', e);
        showToast('⚠️ Не удалось сохранить', true);
        return { success: false };
    }
}

function saveSession() { 
    if (currentUser) {
        localStorage.setItem('schooltask_session', JSON.stringify({ 
            id: currentUser.id, 
            name: currentUser.name,
            school: currentUser.school,
            corp: currentUser.corp
        })); 
    } else { 
        localStorage.removeItem('schooltask_session'); 
    }
}

async function restoreSession() {
    let saved = localStorage.getItem('schooltask_session');
    if (!saved) return false;
    try {
        let session = JSON.parse(saved);
        await loadDataFromGoogle(true);
        let user = users.find(u => u.name === session.name && u.school === session.school && u.corp === session.corp);
        if (user && user.isBanned !== 'true') { 
            currentUser = user; 
            await saveToGoogle('restoreSession', { userId: currentUser.id });
            return true; 
        }
        localStorage.removeItem('schooltask_session');
    } catch(e) {}
    return false;
}

function getReferralLink() { 
    let url = window.location.href.split('?')[0];
    if (currentUser && currentUser.referral_code) return url + '?ref=' + currentUser.referral_code;
    return url;
}

function copyReferralLink() { 
    navigator.clipboard.writeText(getReferralLink()); 
    showToast('✅ Ссылка скопирована! +5₽ за каждого друга', false); 
}

function shareTelegram() { 
    window.open('https://t.me/share/url?url=' + encodeURIComponent(getReferralLink()) + '&text=' + encodeURIComponent('SchoolTask - биржа поручений! +5₽ на бонусный счёт за друга!'), '_blank'); 
}

function shareVK() { 
    window.open('https://vk.com/share.php?url=' + encodeURIComponent(getReferralLink()), '_blank'); 
}

function showBonusHelp() {
    alert('🎁 Бонусный счёт\n\nБонусы НЕЛЬЗЯ вывести, только тратить на создание заданий!\n\n✨ Как получить:\n• +5₽ за каждого приглашённого друга\n• +10₽ за выполнение задания\n• +20₽ за отзыв 5 звёзд\n• +3₽ ежедневный бонус за вход');
}

// ===== ЕЖЕДНЕВНЫЙ БОНУС =====
async function claimDailyBonus() {
    if (!currentUser) return;
    if (dailyBonusClaimed) {
        showToast('❌ Вы уже получали сегодняшний бонус! Завтра будет новый.', false);
        return;
    }
    
    const result = await saveToGoogle('addDailyBonus', { userId: currentUser.id });
    if (result && result.success) {
        currentUser.bonus_balance = (parseFloat(currentUser.bonus_balance) || 0) + 3;
        dailyBonusClaimed = true;
        localStorage.setItem('lastDailyBonus', Date.now().toString());
        showToast('🎁 +3₽ на бонусный счёт! Заходите завтра за новым бонусом!', false);
        renderApp();
    } else {
        showToast('❌ Ошибка при получении бонуса', true);
    }
}

// ===== МЕНЮ КОШЕЛЬКА =====
let walletModal = null;

function openWalletModal() {
    if (!currentUser) return;
    if (walletModal) walletModal.remove();
    
    walletModal = document.createElement('div');
    walletModal.className = 'wallet-modal';
    walletModal.innerHTML = `
        <div class="wallet-container">
            <div style="display:flex;justify-content:space-between;margin-bottom:20px;">
                <h3>💰 Кошелёк</h3>
                <button onclick="closeWalletModal()" style="background:none;font-size:28px;cursor:pointer;">✕</button>
            </div>
            <div style="text-align:center;margin:20px 0;">
                <div style="color:#6b7280;">💰 Основной баланс</div>
                <div style="color:#2c6e4f;font-size:2rem;font-weight:bold;">${(parseFloat(currentUser.balance)||0).toFixed(2)} ₽</div>
            </div>
            <div style="text-align:center;margin:20px 0;border-top:1px solid #e2e8f0;padding-top:20px;">
                <div style="color:#6b7280;">🎁 Бонусный счёт</div>
                <div style="color:#eab308;font-size:2rem;font-weight:bold;">${(parseFloat(currentUser.bonus_balance)||0).toFixed(2)} ₽</div>
            </div>
            <div style="margin:20px 0;padding:15px;background:#e0f2fe;border-radius:20px;text-align:center;">
                <p style="font-size:14px;">💡 1 ₽ на сайте = 0.9 ₽ после комиссии (-10%)</p>
            </div>
            <div style="display:flex;flex-direction:column;gap:10px;">
                <button class="btn-success" onclick="showPaymentAlert('deposit')">💰 Пополнить</button>
                <button class="btn-primary" onclick="showPaymentAlert('withdraw')">💸 Вывод</button>
                <button class="btn-info" onclick="claimDailyBonus()">🎁 Ежедневный бонус (+3₽)</button>
            </div>
            <button class="btn-danger" onclick="closeWalletModal()" style="margin-top:15px;width:100%">Закрыть</button>
        </div>
    `;
    document.body.appendChild(walletModal);
}

function closeWalletModal() {
    if (walletModal) { walletModal.remove(); walletModal = null; }
    renderApp();
}

function showPaymentAlert(type) {
    if (type === 'deposit') {
        alert('💳 ПОПОЛНЕНИЕ БАЛАНСА\n\nДля пополнения баланса напишите в Telegram:\n@leshr_ak47\n\nУкажите ваш логин и сумму пополнения.\n\nКомиссия: 10%');
    } else {
        alert('💸 ВЫВОД СРЕДСТВ\n\nДля вывода средств напишите в Telegram:\n@leshr_ak47\n\nУкажите ваш логин, сумму вывода и реквизиты.\n\nМинимальная сумма: 100₽');
    }
}

// ===== ЖАЛОБЫ =====
async function addReport(reportedId, taskId, reason) {
    if (!currentUser) return;
    
    const result = await saveToGoogle('addReport', {
        id: Date.now().toString(),
        reporterId: currentUser.id,
        reportedId: reportedId,
        taskId: taskId,
        reason: reason,
        createdAt: new Date().toISOString()
    });
    
    if (result && result.success) {
        showToast('✅ Жалоба отправлена! Администратор рассмотрит её в ближайшее время.', false);
        await loadDataFromGoogle(true);
        renderApp();
    } else {
        showToast('❌ Ошибка при отправке жалобы', true);
    }
}

function showReportModal(taskId, reportedId) {
    let reason = prompt('Опишите причину жалобы:', 'Нарушение правил');
    if (reason && reason.trim()) {
        addReport(reportedId, taskId, reason.trim());
    } else if (reason !== null) {
        showToast('❌ Укажите причину жалобы', true);
    }
}

// ===== ВАЛИДАЦИЯ ИМЕНИ =====
function validateName(name) {
    if (name.length < 3) return '❌ Имя должно быть не менее 3 символов';
    if (name.length > 10) return '❌ Имя не более 10 символов';
    if (/^\d+$/.test(name)) return '❌ Имя не может состоять только из цифр!';
    if (!/[a-zA-Zа-яА-Я]/.test(name)) return '❌ Имя должно содержать хотя бы одну букву';
    if (users.some(u => u.name === name)) return '❌ Пользователь с таким именем уже существует';
    return '';
}

// ===== РЕГИСТРАЦИЯ =====
async function handleRegister() {
    const nameInput = document.getElementById('regName');
    const schoolInput = document.getElementById('regSchool');
    const corpInput = document.getElementById('regCorp');
    const passwordInput = document.getElementById('regPassword');
    const btn = document.getElementById('registerBtn');
    
    const name = nameInput.value.trim();
    const school = schoolInput.value.trim();
    const corp = corpInput.value.trim();
    const password = passwordInput.value.trim();
    
    const nameError = validateName(name);
    if (nameError) {
        showToast(nameError, true);
        return;
    }
    
    if (!school || !/^\d+$/.test(school)) {
        showToast('❌ Введите школу (только цифры)', true);
        return;
    }
    if (!corp || !/^\d+$/.test(corp)) {
        showToast('❌ Введите корпус (только цифры)', true);
        return;
    }
    if (password.length < 3) {
        showToast('❌ Пароль должен быть не менее 3 символов', true);
        return;
    }
    
    btn.disabled = true;
    btn.innerHTML = '<span class="spinner"></span> Регистрация...';
    
    const id = 'u' + Date.now();
    const referralCode = 'REF' + Math.random().toString(36).substring(2, 8).toUpperCase();
    const refCode = new URLSearchParams(window.location.search).get('ref');
    
    try {
        const result = await saveToGoogle('registerUser', {
            id: id, name: name, school: school, corp: corp,
            balance: 0, bonus_balance: 0, password: password,
            referral_code: referralCode, referred_by: refCode || ''
        });
        
        if (result && result.success) {
            await loadDataFromGoogle(true);
            currentUser = users.find(u => u.id === id) || users.find(u => u.name === name);
            if (currentUser) {
                saveSession();
                showToast(`✅ Добро пожаловать, ${currentUser.name}!`, false);

    } catch(e) {

    } finally {

        btn.innerHTML = 'Зарегистрироваться';

// ===== ВХОД (ИСПРАВЛЕННЫЙ) =====
async function handleLogin() {
    const nameInput = document.getElementById('loginName');
    const schoolInput = document.getElementById('loginSchool');
    const corpInput = document.getElementById('loginCorp');
    const passwordInput = document.getElementById('loginPassword');
    const btn = document.getElementById('loginBtn');
    
    const name = nameInput.value.trim();
    const school = schoolInput.value.trim();
    const corp = corpInput.value.trim();
    const password = passwordInput.value.trim();
    
    if (!name || !school || !corp || !password) {
        showToast('❌ Заполните все поля', true);
        return;
    }
    
    btn.disabled = true;
    btn.innerHTML = '<span class="spinner"></span> Вход...';
    
    try {
        // ПРИНУДИТЕЛЬНАЯ ЗАГРУЗКА ДАННЫХ
        const loaded = await loadDataFromGoogle(true);
        
        if (!loaded || users.length === 0) {
            showToast('❌ Не удалось загрузить данные. Проверьте интернет и попробуйте снова.', true);
            btn.disabled = false;
            btn.innerHTML = 'Войти';
            return;
        }
        
        // Ищем пользователя
        let user = users.find(u => 
            String(u.name || '').trim().toLowerCase() === name.toLowerCase() &&
            String(u.school || '').trim() === school &&
            String(u.corp || '').trim() === corp
        );
        
        if (!user) {
            showToast('❌ Пользователь не найден. Проверьте имя, школу и корпус.', true);
            btn.disabled = false;
            btn.innerHTML = 'Войти';
            return;
        }
        
        // Сравниваем пароль
        if (String(user.password) !== password) {
            showToast('❌ Неверный пароль', true);
            btn.disabled = false;
            btn.innerHTML = 'Войти';
            return;
        }
        
        if (user.isBanned === 'true') {
            showToast('⛔ Аккаунт заблокирован', true);
            btn.disabled = false;
            btn.innerHTML = 'Войти';
            return;
        }
        
        currentUser = user;
        saveSession();
        await saveToGoogle('restoreSession', { userId: currentUser.id });
        showToast(`✅ С возвращением, ${user.name}!`, false);
        renderApp();
        
    } catch(e) {
        console.error('Ошибка входа:', e);
        showToast('❌ Ошибка соединения с сервером', true);
    } finally {
        btn.disabled = false;
        btn.innerHTML = 'Войти';
    }
}

function logout() { 
    currentUser = null; 
    adminMode = false; 
    localStorage.removeItem('schooltask_session'); 
    renderApp(); 
}

// ===== ЗАДАНИЯ =====
async function createTask(desc, price, loc, paymentType, scope, btn) {
    if (!currentUser || !desc || !price || !loc) {
        showToast('❌ Заполните все поля', true);
        if(btn) btn.disabled=false;
        return;
    }
    if (btn) btn.disabled = true;
    
    let priceNum = parseFloat(price);
    if (isNaN(priceNum) || priceNum <= 0) {
        showToast('❌ Цена должна быть положительной', true);
        if(btn) btn.disabled=false;
        return;
    }
    
    let balance = paymentType === 'bonus' ? (parseFloat(currentUser.bonus_balance)||0) : (parseFloat(currentUser.balance)||0);
    if (balance < priceNum) {
        showToast('❌ Недостаточно средств', true);
        if(btn) btn.disabled=false;
        return;
    }
    
    if (paymentType === 'bonus') currentUser.bonus_balance -= priceNum;
    else currentUser.balance -= priceNum;
    
    let newTask = { 
        id: Date.now().toString(), creatorId: currentUser.id, 
        creatorSchool: currentUser.school, creatorCorp: currentUser.corp,
        description: desc, price: priceNum, location: loc, 
        payment_type: paymentType, scope: scope, status: 'open', 
        takerId: '', createdAt: new Date().toISOString() 
    };
    
    let createResult = await saveToGoogle('createTask', newTask);
    if (!createResult || !createResult.success) {
        showToast('❌ Ошибка создания задания', true);
        if (paymentType === 'bonus') currentUser.bonus_balance += priceNum;
        else currentUser.balance += priceNum;
        if(btn) btn.disabled=false;
        renderApp();
        return;
    }
    
    await saveToGoogle('updateUser', { id: currentUser.id, balance: currentUser.balance, bonus_balance: currentUser.bonus_balance });
    await loadDataFromGoogle(true);
    currentUser = users.find(u => u.id === currentUser.id);
    showToast('✅ Задание создано!', false);
    if(btn) btn.disabled=false;
    renderApp();
}

async function takeTask(taskId, btn) {
    if (btn) btn.disabled = true;
    
    const result = await saveToGoogle('takeTaskSafe', { taskId: taskId, userId: currentUser.id });
    
    if (result && result.success) {
        await loadDataFromGoogle(true);
        currentUser = users.find(u => u.id === currentUser.id);
        showToast('📢 Вы взяли задание!', false);
    } else {
        showToast(result?.error || '❌ Не удалось взять задание', true);
    }
    if(btn) btn.disabled=false;
    renderApp();
}

async function confirmCompletion(taskId, btn) {
    if (btn) btn.disabled = true;
    let task = tasks.find(t => t.id == taskId);
    if (!task || task.status !== 'in_progress') { if(btn) btn.disabled=false; return; }
    if (task.takerId !== currentUser.id) { if(btn) btn.disabled=false; return; }
    
    showToast('🎥 Не забудьте записать видео выполнения!', false);
    await saveToGoogle('updateTask', { id: task.id, status: 'awaiting_confirmation' });
    await loadDataFromGoogle(true);
    currentUser = users.find(u => u.id === currentUser.id);
    showToast('✅ Задание выполнено! Ожидайте подтверждения', false);
    if(btn) btn.disabled=false;
    renderApp();
}

async function confirmReceipt(taskId, btn) {
    if (btn) btn.disabled = true;
    let task = tasks.find(t => t.id == taskId);
    if (!task || task.status !== 'awaiting_confirmation') { if(btn) btn.disabled=false; return; }
    if (task.creatorId !== currentUser.id) { if(btn) btn.disabled=false; return; }
    
    let executor = users.find(u => u.id === task.takerId);
    let total = parseFloat(task.price);
    let gain = total * 0.95;
    if (executor) {
        executor.balance = (parseFloat(executor.balance) || 0) + gain;
        executor.bonus_balance = (parseFloat(executor.bonus_balance) || 0) + 10;
        executor.totalEarned = (parseFloat(executor.totalEarned) || 0) + gain;
        executor.tasksCompleted = (parseInt(executor.tasksCompleted) || 0) + 1;
        await saveToGoogle('updateUser', { id: executor.id, balance: executor.balance, bonus_balance: executor.bonus_balance });
        await saveToGoogle('addTaskCompleteBonus', { userId: executor.id });
    }
    await saveToGoogle('updateTask', { id: task.id, status: 'completed', completedAt: new Date().toISOString() });
    await loadDataFromGoogle(true);
    currentUser = users.find(u => u.id === currentUser.id);
    showToast(`💰 Подтверждено! Исполнитель получил ${gain.toFixed(2)} ₽`, false);
    if(btn) btn.disabled=false;
    renderApp();
}

async function rejectReceipt(taskId, btn) {
    if (btn) btn.disabled = true;
    let task = tasks.find(t => t.id == taskId);
    if (!task || task.status !== 'awaiting_confirmation') { if(btn) btn.disabled=false; return; }
    if (task.creatorId !== currentUser.id) { if(btn) btn.disabled=false; return; }
    
    if (task.payment_type === 'bonus') currentUser.bonus_balance += parseFloat(task.price);
    else currentUser.balance += parseFloat(task.price);
    await saveToGoogle('updateUser', { id: currentUser.id, balance: currentUser.balance, bonus_balance: currentUser.bonus_balance });
    await saveToGoogle('updateTask', { id: task.id, status: 'disputed' });
    await loadDataFromGoogle(true);
    currentUser = users.find(u => u.id === currentUser.id);
    showToast('⚠️ Деньги возвращены', false);
    if(btn) btn.disabled=false;
    renderApp();
}

async function deleteTask(taskId, btn) {
    if (btn) btn.disabled = true;
    if (!confirm('Удалить задание? Деньги вернутся на счёт.')) { if(btn) btn.disabled=false; return; }
    
    let task = tasks.find(t => t.id == taskId);
    if (task && task.status === 'open' && task.creatorId === currentUser.id) {
        const taskPrice = parseFloat(task.price);
        if (!isNaN(taskPrice) && taskPrice > 0) {
            if (task.payment_type === 'bonus') currentUser.bonus_balance += taskPrice;
            else currentUser.balance += taskPrice;
            await saveToGoogle('updateUser', { id: currentUser.id, balance: currentUser.balance, bonus_balance: currentUser.bonus_balance });
            showToast(`💰 Возвращено ${taskPrice} ₽`, false);
        }
    }
    
    await saveToGoogle('deleteTask', { id: taskId });
    await loadDataFromGoogle(true);
    currentUser = users.find(u => u.id === currentUser.id);
    showToast('🗑️ Задание удалено', false);
    if(btn) btn.disabled=false;
    renderApp();
}

function getStatusText(status) {
    switch(status) {
        case 'open': return { text: '📋 Доступно', class: 'status-open' };
        case 'in_progress': return { text: '⏳ Выполняется', class: 'status-progress' };
        case 'awaiting_confirmation': return { text: '🕐 Ожидает', class: 'status-awaiting' };
        case 'completed': return { text: '✅ Выполнено', class: 'status-completed' };
        default: return { text: status, class: 'status-open' };
    }
}

function getRatingStars(rating) {
    let stars = '';
    for (let i = 1; i <= 5; i++) stars += i <= rating ? '⭐' : '☆';
    return stars;
}

                                        <td>
                                            <div style="display:flex;flex-direction:column;gap:5px;">
                                                <div style="display:flex;gap:5px;">
                                                    <input type="number" id="amount-${user.id}" value="100" style="width:70px;padding:5px;border-radius:20px;">
                                                    <button class="topup-btn" data-userid="${user.id}" data-bonus="false" style="background:#10b981;color:white;padding:5px 10px;">+💰</button>
                                                    <button class="withdraw-btn" data-userid="${user.id}" data-bonus="false" style="background:#ef4444;color:white;padding:5px 10px;">-💰</button>
                                                </div>
                                                <div style="display:flex;gap:5px;">
                                                    <input type="number" id="bonus-${user.id}" value="100" style="width:70px;padding:5px;border-radius:20px;">
                                                    <button class="topup-btn" data-userid="${user.id}" data-bonus="true" style="background:#f59e0b;color:white;padding:5px 10px;">+🎁</button>
                                                    <button class="withdraw-btn" data-userid="${user.id}" data-bonus="true" style="background:#f97316;color:white;padding:5px 10px;">-🎁</button>
                                                </div>
                                            </div>
                                        </td>
                                        <td>
                                            ${!isBanned ? `<button class="ban-btn" data-userid="${user.id}" style="background:#dc2626;color:white;padding:5px 10px;">⛔ Бан</button>` : `<button class="unban-btn" data-userid="${user.id}" style="background:#10b981;color:white;padding:5px 10px;">✅ Разбан</button>`}
                                            <button class="reviews-btn" data-userid="${user.id}" style="background:#3b82f6;color:white;padding:5px 10px;margin-top:5px;">⭐ Отзывы</button>
                                            <button class="user-tasks-btn" data-userid="${user.id}" style="background:#8b5cf6;color:white;padding:5px 10px;margin-top:5px;">📋 Задания</button>
                                        </td>
                                    </tr>
                                `;
                            }).join('')}
                        </tbody>
                    </table>
                </div>
            </div>
        `;
    }
    
    let adminEntryBtn = isAdmin ? `<button id="adminPanelBtn" style="background:#2c3e50;color:white;">🔐 Админка</button>` : '';
    
    let openTasks = tasks.filter(t => {
        if (t.status !== 'open') return false;
        if (t.scope === 'all') return true;
        return t.creatorSchool === currentUser.school && t.creatorCorp === currentUser.corp;
    });
    
    if (filters.minPrice) openTasks = openTasks.filter(t => parseFloat(t.price) >= parseFloat(filters.minPrice));
    if (filters.maxPrice) openTasks = openTasks.filter(t => parseFloat(t.price) <= parseFloat(filters.maxPrice));
    
    let myCreatedTasks = tasks.filter(t => t.creatorId === currentUser.id);
    let myExecTasks = tasks.filter(t => t.takerId === currentUser.id && t.status !== 'completed');
    let myCompletedTasks = tasks.filter(t => t.status === 'completed' && (t.creatorId === currentUser.id || t.takerId === currentUser.id));
    
    let userRating = parseFloat(currentUser.rating) || 0;
    let userRatingCount = parseInt(currentUser.ratingCount) || 0;
    
    let helpBlock = `<div class="help-box">
        <h4>🎁 Бонусный счёт</h4>
        <p>Бонусы НЕ вывести, только тратить на задания. +5₽ за друга, +10₽ за выполнение, +20₽ за отзыв 5⭐, +3₽ ежедневно.</p>
        <div style="display:flex;justify-content:center;gap:10px;margin-top:10px;">
            <button class="btn-info" onclick="claimDailyBonus()">🎁 Забрать бонус</button>
        </div>
        <div class="share-buttons" style="margin-top:10px;">
            <div class="share-btn share-tg" onclick="shareTelegram()" style="padding:5px 10px;font-size:12px;">📱 Telegram</div>
            <div class="share-btn share-vk" onclick="shareVK()" style="padding:5px 10px;font-size:12px;">📱 ВКонтакте</div>
            <div class="share-btn copy-link" onclick="copyReferralLink()" style="padding:5px 10px;font-size:12px;">🔗 Скопировать ссылку</div>
        </div>
    </div>`;
    
    let taskCard = (task, showTakeBtn = true, showEditDelete = false) => {
        let creator = users.find(u => u.id === task.creatorId);
        let executor = users.find(u => u.id === task.takerId);
        let status = getStatusText(task.status);
        let btns = '';
        
        if (showTakeBtn && task.status === 'open' && task.creatorId !== currentUser.id) {
            btns = `<button class="btn-primary take-btn" data-id="${task.id}">📌 Взять задание</button>`;
        }
        if (task.status === 'in_progress' && task.takerId === currentUser.id) {
            btns = `<button class="btn-success complete-btn" data-id="${task.id}">✅ Подтвердить выполнение</button>`;
        }
        if (task.status === 'awaiting_confirmation' && task.creatorId === currentUser.id) {
            btns = `<div class="action-buttons"><button class="btn-success confirm-btn" data-id="${task.id}">💰 Подтвердить</button><button class="btn-danger reject-btn" data-id="${task.id}">❌ Отклонить</button></div>`;
        }
        if (task.status === 'completed' && task.creatorId === currentUser.id && !reviews.some(r => r.taskId === task.id && r.fromUserId === currentUser.id)) {
            btns += `<button class="btn-info review-btn" data-id="${task.id}" data-userid="${task.takerId}">⭐ Отзыв</button>`;
        }
        if (task.status === 'completed' && task.creatorId === currentUser.id) {
            btns += `<button class="btn-danger report-btn" data-id="${task.id}" data-userid="${task.takerId}" style="background:#6b7280;">⚠️ Жалоба</button>`;
        }
        if (showEditDelete && task.creatorId === currentUser.id && task.status === 'open') {
            btns += `<div class="action-buttons"><button class="btn-edit edit-btn" data-id="${task.id}">✏️ Редакт</button><button class="btn-danger delete-btn" data-id="${task.id}">🗑️ Удалить</button></div>`;
        }
        
        return `<div class="task-card">
            <div class="task-header">
                <div class="task-price">${task.price} ₽</div>
                <div class="task-status ${status.class}">${status.text}</div>
            </div>
            <div class="task-desc">📌 ${escapeHtml(task.description)}</div>
            <div class="task-meta">📍 ${escapeHtml(task.location)}</div>
            <div style="font-size:0.7rem;color:#6b7280;">👤 ${creator?.name || '?'} (${creator?.school || ''}, к.${creator?.corp || ''})</div>
            <div class="action-buttons">${btns}</div>
        </div>`;
    };
    
    let createForm = `<div class="card">
        <h3>📝 Создать задание</h3>
        <textarea id="taskDesc" rows="2" placeholder="Что нужно сделать?"></textarea>
        <input type="number" id="taskPrice" placeholder="Цена (руб)">
        <input type="text" id="taskLocation" placeholder="Место">
        <select id="paymentType">
            <option value="main">💰 Основной счёт (${(parseFloat(currentUser.balance)||0).toFixed(2)} ₽)</option>
            <option value="bonus">🎁 Бонусный счёт (${(parseFloat(currentUser.bonus_balance)||0).toFixed(2)} ₽)</option>
        </select>
        <select id="taskScope">
            <option value="school">🏫 Только моя школа</option>
            <option value="all">🌍 Для всех</option>
        </select>
        <button class="btn-primary" id="createBtn">Создать</button>
    </div>`;
    
    let profileHtml = `<div class="card">
        <h3>👤 Профиль</h3>
        <p><strong>Имя:</strong> ${escapeHtml(currentUser.name)}</p>
        <p><strong>Школа/Корпус:</strong> ${escapeHtml(currentUser.school)} / ${escapeHtml(currentUser.corp)}</p>
        <p><strong>💰 Основной:</strong> ${(parseFloat(currentUser.balance)||0).toFixed(2)} ₽</p>
        <p><strong>🎁 Бонусный:</strong> ${(parseFloat(currentUser.bonus_balance)||0).toFixed(2)} ₽</p>
        <p><strong>👥 Приглашено:</strong> ${currentUser.referral_count || 0}</p>
        <p><strong>⭐ Рейтинг:</strong> ${getRatingStars(userRating)} (${userRatingCount})</p>
        <p><strong>📊 Выполнено:</strong> ${currentUser.tasksCompleted || 0}</p>
        <div class="referral-code" onclick="copyReferralLink()">🔗 ${getReferralLink()}</div>
        <button class="btn-info" onclick="claimDailyBonus()" style="width:100%;margin-top:15px;">🎁 Бонус дня (+3₽)</button>
    </div>`;
    
    let activeTab = window._activeTab || 'allTasks';
    let content = '';
    
    if (activeTab === 'allTasks') {
        content = `<h3>📋 Доступные задания</h3>${helpBlock}
                   <div class="filter-group">
                       <select id="filterScope">
                           <option value="school" ${filters.scope === 'school' ? 'selected' : ''}>🏫 Только моя школа</option>
                           <option value="all" ${filters.scope === 'all' ? 'selected' : ''}>🌍 Для всех</option>
                       </select>
                       <input type="number" id="filterMinPrice" placeholder="Цена от" value="${filters.minPrice}">
                       <input type="number" id="filterMaxPrice" placeholder="Цена до" value="${filters.maxPrice}">
                       <button id="applyFilters" class="btn-info">🔍 Применить</button>
                   </div>
                   <div class="tasks-grid">${openTasks.map(t => taskCard(t, true, false)).join('') || '<div style="text-align:center;padding:40px;">✨ Нет заданий</div>'}</div>`;
    } else if (activeTab === 'myTasks') {
        content = `<h3>📌 Мои задания</h3>
                   <div class="tasks-grid">${myCreatedTasks.map(t => taskCard(t, false, true)).join('') || '<div style="text-align:center;padding:40px;">✨ Нет созданных заданий</div>'}</div>`;
    } else if (activeTab === 'myExecutions') {
        content = `<h3>⚡ В работе</h3>
                   <div class="tasks-grid">${myExecTasks.map(t => taskCard(t, false, false)).join('') || '<div style="text-align:center;padding:40px;">✨ Нет заданий в работе</div>'}</div>`;
    } else if (activeTab === 'completed') {
        content = `<h3>✅ Завершённые</h3>
                   <div class="tasks-grid">${myCompletedTasks.map(t => taskCard(t, false, false)).join('') || '<div style="text-align:center;padding:40px;">✨ Нет завершённых заданий</div>'}</div>`;
    } else if (activeTab === 'profile') {
        content = profileHtml;
    } else if (activeTab === 'create') {
        content = createForm;
    }
    
    appDiv.innerHTML = `
        <div class="container">
            <div class="header">
                <div class="logo"><h1>🏫 SchoolTask</h1></div>
                <div class="user-info">
                    <div>👋 ${escapeHtml(currentUser.name)} | ${escapeHtml(currentUser.school)}</div>
                    <div class="balance-card" onclick="openWalletModal()">💰 ${(parseFloat(currentUser.balance)||0).toFixed(2)} ₽</div>
                    <div class="bonus-card" onclick="showBonusHelp()">🎁 ${(parseFloat(currentUser.bonus_balance)||0).toFixed(2)} ₽</div>
                    <button class="theme-toggle" id="themeToggleBtn">${isDarkTheme ? '☀️' : '🌙'}</button>
                    <button class="btn-danger" id="logoutBtn">Выйти</button>
                </div>
            </div>
            <div style="margin-bottom:15px;">${adminEntryBtn}</div>
            ${adminPanelHtml}
            <div class="tabs">
                <div class="tab ${activeTab === 'allTasks' ? 'active' : ''}" data-tab="allTasks">📋 Все</div>
                <div class="tab ${activeTab === 'myTasks' ? 'active' : ''}" data-tab="myTasks">📦 Мои</div>
                <div class="tab ${activeTab === 'myExecutions' ? 'active' : ''}" data-tab="myExecutions">⚡ В работе</div>
                <div class="tab ${activeTab === 'completed' ? 'active' : ''}" data-tab="completed">✅ Готово</div>
                <div class="tab ${activeTab === 'profile' ? 'active' : ''}" data-tab="profile">👤 Профиль</div>
                <div class="tab ${activeTab === 'create' ? 'active' : ''}" data-tab="create">➕ Создать</div>
            </div>
            ${content}
            <div class="support-link">📞 Поддержка: <strong>@leshr_ak47</strong> (Telegram)</div>
        </div>
    `;
    
    // Обработчики событий
    document.querySelectorAll('.tab').forEach(tab => {
        tab.onclick = () => {
            window._activeTab = tab.getAttribute('data-tab');
            renderApp();
        };
    });
    
    document.getElementById('logoutBtn').onclick = logout;
    document.getElementById('themeToggleBtn').onclick = toggleTheme;
    
    if (document.getElementById('createBtn')) {
        document.getElementById('createBtn').onclick = () => {
            createTask(
                document.getElementById('taskDesc').value,
                document.getElementById('taskPrice').value,
                document.getElementById('taskLocation').value,
                document.getElementById('paymentType').value,
                document.getElementById('taskScope').value,
                document.getElementById('createBtn')
            );
        };
    }
    
    if (document.getElementById('applyFilters')) {
        document.getElementById('applyFilters').onclick = () => {
            filters.scope = document.getElementById('filterScope').value;
            filters.minPrice = document.getElementById('filterMinPrice').value;
            filters.maxPrice = document.getElementById('filterMaxPrice').value;
            renderApp();
        };
    }
    
    if (isAdmin) {
        if (document.getElementById('adminPanelBtn')) {
            document.getElementById('adminPanelBtn').onclick = () => adminMode ? exitAdminMode() : requestAdminAccess();
        }
        if (document.getElementById('exitAdminBtn')) document.getElementById('exitAdminBtn').onclick = exitAdminMode;
        if (document.getElementById('clearTasksBtn')) document.getElementById('clearTasksBtn').onclick = deleteAllTasks;
        if (document.getElementById('showStatsBtn')) {
            document.getElementById('showStatsBtn').onclick = () => {
                alert(`📊 СТАТИСТИКА\n👥 Пользователей: ${users.length}\n📋 Заданий: ${tasks.length}\n⭐ Отзывов: ${reviews.length}`);
            };
        }
        if (document.getElementById('showReportsBtn')) {
            document.getElementById('showReportsBtn').onclick = () => {
                if (reports.length === 0) alert('📋 Жалоб нет.');
                else {
                    let text = '⚠️ ЖАЛОБЫ ⚠️\n\n';
                    reports.slice(0, 10).forEach((r, i) => {
                        const reporter = users.find(u => u.id === r.reporterId);
                        const reported = users.find(u => u.id === r.reportedId);
                        text += `${i+1}. ${reporter?.name || '?'} → ${reported?.name || '?'}: ${r.reason}\n`;
                    });
                    alert(text);
                }
            };
        }
        if (document.getElementById('adminSearch')) {
            document.getElementById('adminSearch').oninput = (e) => { adminSearchTerm = e.target.value; renderApp(); };
        }
        
        document.querySelectorAll('.topup-btn').forEach(btn => {
            btn.onclick = () => {
                const userId = btn.getAttribute('data-userid');
                const isBonus = btn.getAttribute('data-bonus') === 'true';
                const amountField = isBonus ? document.getElementById('bonus-' + userId) : document.getElementById('amount-' + userId);
                const amount = parseFloat(amountField?.value || 100);
                if (amount > 0) adminChangeBalance(userId, amount, isBonus);
            };
        });
        
        document.querySelectorAll('.withdraw-btn').forEach(btn => {
            btn.onclick = () => {
                const userId = btn.getAttribute('data-userid');
                const isBonus = btn.getAttribute('data-bonus') === 'true';
                const amountField = isBonus ? document.getElementById('bonus-' + userId) : document.getElementById('amount-' + userId);
                const amount = parseFloat(amountField?.value || 100);
                if (amount > 0) adminChangeBalance(userId, -amount, isBonus);
            };
        });
        
        document.querySelectorAll('.ban-btn').forEach(btn => {
            btn.onclick = () => showBanModal(btn.getAttribute('data-userid'));
        });
        
        document.querySelectorAll('.unban-btn').forEach(btn => {
            btn.onclick = () => unbanUser(btn.getAttribute('data-userid'));
        });
        
        document.querySelectorAll('.reviews-btn').forEach(btn => {
            btn.onclick = () => {
                const userId = btn.getAttribute('data-userid');
                const userReviews = reviews.filter(r => r.toUserId === userId);
                const userObj = users.find(u => u.id === userId);
                if (userReviews.length === 0) alert(`⭐ У ${userObj?.name} нет отзывов.`);
                else {
                    let avg = userReviews.reduce((s,r)=>s+parseInt(r.rating),0)/userReviews.length;
                    alert(`⭐ ОТЗЫВЫ О ${userObj?.name}\nСр.оценка: ${avg.toFixed(1)}\nВсего: ${userReviews.length}\n\n${userReviews.slice(0,5).map(r => `• ${getRatingStars(r.rating)}: ${r.comment || 'без коммента'}`).join('\n')}`);
                }
            };
        });
        
        document.querySelectorAll('.user-tasks-btn').forEach(btn => {
            btn.onclick = () => {
                const userId = btn.getAttribute('data-userid');
                const userTasks = tasks.filter(t => t.creatorId === userId || t.takerId === userId);
                const userObj = users.find(u => u.id === userId);
                alert(`📋 ЗАДАНИЯ ${userObj?.name}\n📝 Создал: ${userTasks.filter(t=>t.creatorId===userId).length}\n🔧 Взял: ${userTasks.filter(t=>t.takerId===userId).length}`);
            };
        });
    }
    
    document.querySelectorAll('.take-btn').forEach(btn => {
        btn.onclick = () => takeTask(btn.getAttribute('data-id'), btn);
    });
    document.querySelectorAll('.delete-btn').forEach(btn => {
        btn.onclick = () => deleteTask(btn.getAttribute('data-id'), btn);
    });
    document.querySelectorAll('.edit-btn').forEach(btn => {
        const taskId = btn.getAttribute('data-id');
        const task = tasks.find(t => t.id == taskId);
        if (task) btn.onclick = () => showEditModal(task);
    });
    document.querySelectorAll('.complete-btn').forEach(btn => {
        btn.onclick = () => confirmCompletion(btn.getAttribute('data-id'), btn);
    });
    document.querySelectorAll('.confirm-btn').forEach(btn => {
        btn.onclick = () => confirmReceipt(btn.getAttribute('data-id'), btn);
    });
    document.querySelectorAll('.reject-btn').forEach(btn => {
        btn.onclick = () => rejectReceipt(btn.getAttribute('data-id'), btn);
    });
    document.querySelectorAll('.review-btn').forEach(btn => {
        btn.onclick = () => showReviewModal(btn.getAttribute('data-id'), btn.getAttribute('data-userid'));
    });
    document.querySelectorAll('.report-btn').forEach(btn => {
        btn.onclick = () => showReportModal(btn.getAttribute('data-id'), btn.getAttribute('data-userid'));
    });
}

window.shareTelegram = shareTelegram;
window.shareVK = shareVK;
window.copyReferralLink = copyReferralLink;
window.showBonusHelp = showBonusHelp;
window.openWalletModal = openWalletModal;
window.closeWalletModal = closeWalletModal;
window.showPaymentAlert = showPaymentAlert;
window.claimDailyBonus = claimDailyBonus;

// ЗАПУСК
(async function init() {
    await loadDataFromGoogle(false);
    await restoreSession();
    renderApp();
})();
</script>
</body>
</html>
